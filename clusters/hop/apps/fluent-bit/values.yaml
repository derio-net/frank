# Tolerate Hop's control-plane node so the DaemonSet pod schedules.
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

# Pipeline configuration — mirrors Frank's apps/fluent-bit/values.yaml
# verbatim except the output Host points at Frank's VictoriaLogs
# LoadBalancer IP (192.168.55.225, reachable from Hop via the Tailscale
# subnet route to 192.168.55.0/24).
config:
  inputs: |
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        multiline.parser  docker, cri
        Tag               kube.*
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

  outputs: |
    [OUTPUT]
        Name            http
        Match           kube.*
        Host            192.168.55.225
        Port            9428
        # _msg_field=msg matches Caddy's JSON key for the log message (after
        # kubernetes filter merges container JSON into the top-level record).
        # Stream fields use dotted keys because the kubernetes filter emits
        # `kubernetes.namespace_name` etc., not the legacy underscore form.
        URI             /insert/jsonline?_stream_fields=stream,kubernetes.pod_name,kubernetes.namespace_name,kubernetes.container_name&_msg_field=msg&_time_field=time
        Format          json_lines
        Json_Date_Key   time
        Json_Date_Format iso8601
        Retry_Limit     False

resources:
  requests:
    cpu: 10m
    memory: 40Mi
  limits:
    memory: 80Mi
