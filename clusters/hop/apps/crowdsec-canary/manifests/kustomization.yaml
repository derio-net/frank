apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: crowdsec-system

resources:
  - pvc-state.yaml
  - cronjob.yaml

# Generate the script ConfigMap from the single canary.py source (kept in this dir
# so the kustomize root-only load restrictor — ArgoCD's default — can read it). The
# hash suffix rolls the CronJob's mounted script whenever canary.py changes; the
# Application must run with prune:true so superseded hashed CMs are cleaned up.
configMapGenerator:
  - name: crowdsec-ban-canary-script
    files:
      - canary.py
