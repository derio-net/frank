apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy-config
  namespace: caddy-system
data:
  Caddyfile: |
    # Global options
    {
      email admin@derio.net
      acme_dns cloudflare {env.CF_API_TOKEN}
      # Default logger for ALL sites — Caddy applies this to per-site
      # access logs unless overridden. Output JSON to stdout so fluent-bit
      # can tail /var/log/containers/caddy-* and ship to VictoriaLogs.
      log {
        output stdout
        format json
        level INFO
      }
    }

    # --- Public routes ---

    # Headscale coordination server (public — clients must reach it)
    headscale.hop.derio.net {
      reverse_proxy headscale.headscale-system.svc:8080
    }

    # Blog (public)
    blog.derio.net {
      # Per-site access log — emits JSON request lines using the default
      # logger set in the global block. Fluent-bit on Hop tails these
      # via /var/log/containers/caddy-* and ships to Frank VictoriaLogs.
      log
      handle /frank* {
        reverse_proxy blog.blog-system.svc:8080
      }
      handle {
        redir https://blog.derio.net/frank{uri} permanent
      }
    }

    # Portfolio / personal site (public — placeholder for now)
    www.derio.net {
      respond "Coming soon." 200
    }

    # Analytics ingest (public) — reverse-proxies over Tailscale mesh to
    # GoatCounter on Frank (Cilium L2 LoadBalancer 192.168.55.224).
    # The mesh-only admin UI lives at https://counter.cluster.derio.net.
    counter.derio.net {
      log
      reverse_proxy 192.168.55.224:8080
    }

    # --- Private routes (Tailscale mesh only) ---

    # Headplane (Headscale admin UI — app lives at /admin/ base path)
    headplane.hop.derio.net {
      @not_mesh not remote_ip 100.64.0.0/10
      respond @not_mesh "Forbidden" 403
      @not_admin not path /admin /admin/*
      redir @not_admin /admin/ permanent
      reverse_proxy headplane.headscale-system.svc:3000
    }

    # Private landing page
    entry.hop.derio.net {
      @not_mesh not remote_ip 100.64.0.0/10
      respond @not_mesh "Forbidden" 403
      reverse_proxy landing.landing-system.svc:8080
    }

    # Note: DERP relay traffic goes through the main headscale.hop.derio.net
    # block above — Headscale handles /derp paths internally. No separate
    # route block needed.

    # --- Webhook ingress (public — GitHub fires from internet) ---

    # GitHub webhook → Tekton github-listener on Frank, via Tailscale mesh.
    # Caddy terminates public TLS; Tekton's `github` interceptor validates
    # the X-Hub-Signature-256 HMAC server-side (Caddy does NOT HMAC-validate;
    # the interceptor is the canonical Tekton path).
    #
    # Target IP is Frank's github-listener LB Service at 192.168.55.223
    # (claimed in .claude/rules/frank-infrastructure.md). The Service itself
    # is created in Phase 2 of the stoa-gitea-primary-rework-1 plan; until
    # then this route returns 502, which is expected during the rollout.
    webhooks.hop.derio.net {
      reverse_proxy 192.168.55.223:8080 {
        # Pass through GitHub's signature/event/delivery headers verbatim
        # so the Tekton interceptor sees them on Frank.
        header_up X-Hub-Signature-256 {http.request.header.X-Hub-Signature-256}
        header_up X-GitHub-Event       {http.request.header.X-GitHub-Event}
        header_up X-GitHub-Delivery    {http.request.header.X-GitHub-Delivery}
        header_up X-Hub-Signature      {http.request.header.X-Hub-Signature}
      }
    }
