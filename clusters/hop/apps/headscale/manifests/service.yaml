apiVersion: v1
kind: Service
metadata:
  name: headscale
  namespace: headscale-system
spec:
  selector:
    app.kubernetes.io/name: headscale
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 50443
      targetPort: grpc
      protocol: TCP
