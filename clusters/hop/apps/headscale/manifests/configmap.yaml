apiVersion: v1
kind: ConfigMap
metadata:
  name: headscale-config
  namespace: headscale-system
data:
  config.yaml: |
    server_url: https://headscale.hop.derio.net
    listen_addr: 0.0.0.0:8080
    metrics_listen_addr: 0.0.0.0:9090
    grpc_listen_addr: 0.0.0.0:50443
    grpc_allow_insecure: false

    database:
      type: sqlite
      sqlite:
        path: /var/lib/headscale/db.sqlite

    noise:
      private_key_path: /var/lib/headscale/noise_private.key

    prefixes:
      v4: 100.64.0.0/10
      v6: fd7a:115c:a1e0::/48
      allocation: sequential

    derp:
      server:
        enabled: true
        region_id: 999
        region_code: hop
        region_name: "Hop DERP"
        stun_listen_addr: 0.0.0.0:3478
        private_key_path: /var/lib/headscale/derp_server_private.key
      urls:
        - https://controlplane.tailscale.com/derpmap/default
      paths: []
      auto_update_enabled: false

    dns:
      base_domain: mesh.hop.derio.net
      magic_dns: true
      nameservers:
        global:
          - 1.1.1.1
          - 8.8.8.8
        split:
          lab.derio.net:
            - 192.168.10.11
            - 192.168.10.12
          frank.derio.net:
            - 192.168.10.11
            - 192.168.10.12
          arr.derio.net:
            - 192.168.10.11
            - 192.168.10.12
      extra_records:
        - name: headplane.hop.derio.net
          type: A
          value: 100.64.0.4
        - name: entry.hop.derio.net
          type: A
          value: 100.64.0.4
        # Frank Gitea SSH endpoint. The public DNS A record for
        # gitea.cluster.derio.net points at 192.168.55.220 (Traefik LB) for
        # HTTPS web access; Traefik does not speak SSH. Mesh peers reaching
        # Gitea over git+ssh need a name that points at 192.168.55.209
        # (the Gitea LB IP, port 2222). Requires --accept-routes on the
        # client; the LAN IP is reachable via the raspi-vlan10 subnet
        # routers (192.168.55.0/24).
        - name: gitea-ssh.cluster.derio.net
          type: A
          value: 192.168.55.209

    log:
      level: info

    policy:
      mode: file
      path: /etc/headscale/acl.yaml

  acl.yaml: |
    {
      // Allow all traffic within the mesh for now — tighten later
      "acls": [
        {
          "action": "accept",
          "src": ["*"],
          "dst": ["*:*"]
        }
      ],
      "tagOwners": {
        "tag:subnet-router": ["default"]
      },
      "autoApprovers": {
        "routes": {
          "192.168.10.0/24": ["tag:subnet-router"],
          "192.168.50.0/24": ["tag:subnet-router"],
          "192.168.55.0/24": ["tag:subnet-router"]
        },
        "exitNode": ["tag:subnet-router"]
      }
    }
