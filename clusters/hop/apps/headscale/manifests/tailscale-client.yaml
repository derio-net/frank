apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: tailscale
  namespace: headscale-system
  labels:
    app.kubernetes.io/name: tailscale
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: tailscale
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tailscale
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: tailscale
      containers:
        - name: tailscale
          image: tailscale/tailscale:v1.82.5
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth
                  key: authkey
            - name: TS_LOGIN_SERVER
              value: https://headscale.hop.derio.net
            - name: TS_STATE_DIR
              value: /var/lib/tailscale
            - name: TS_USERSPACE
              value: "true"
            - name: TS_HOSTNAME
              value: hop-1
          volumeMounts:
            - name: state
              mountPath: /var/lib/tailscale
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
          securityContext:
            runAsNonRoot: false
      volumes:
        - name: state
          hostPath:
            path: /var/mnt/hop-data/tailscale
            type: DirectoryOrCreate
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tailscale
  namespace: headscale-system
