apiVersion: batch/v1
kind: CronJob
metadata:
  name: headscale-backup
  namespace: headscale-system
spec:
  schedule: "0 3 * * *"  # Daily at 3am UTC
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              # sqlite3 ships in this image's read-only base layer. Previously this
              # was `alpine:3.20` + `apk add sqlite` at runtime, which wrote the
              # binary into the container's writable upper layer and tripped Falco's
              # "Drop and execute new binary in container" rule (MITRE TA0003) every
              # night at 03:00. Baking it in also drops the 3am apk-mirror dependency.
              # Pinned by digest (multi-arch index incl. linux/amd64) for reproducibility.
              image: docker.io/alpine/sqlite:3.51.2@sha256:4d4777999a587e11a575211294a2c5efd0c25ac17d7d453e42b84dfda14df5bc
              command:
                - /bin/sh
                - -c
                - |
                  # Use SQLite .backup for a consistent copy (not just cp)
                  sqlite3 /var/lib/headscale/db.sqlite ".backup '/backup/headscale-$(date +%Y%m%d).db'"
                  # Keep only last 7 backups
                  ls -t /backup/headscale-*.db | tail -n +8 | xargs rm -f 2>/dev/null || true
                  echo "Backup complete: /backup/headscale-$(date +%Y%m%d).db"
              volumeMounts:
                - name: data
                  mountPath: /var/lib/headscale
                  readOnly: true
                - name: backup
                  mountPath: /backup
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: headscale-data
            - name: backup
              hostPath:
                path: /var/mnt/hop-data/backups/headscale
                type: DirectoryOrCreate
