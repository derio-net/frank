apiVersion: apps/v1
kind: Deployment
metadata:
  name: headplane
  namespace: headscale-system
  labels:
    app.kubernetes.io/name: headplane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: headplane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: headplane
    spec:
      serviceAccountName: headplane
      containers:
        - name: headplane
          image: ghcr.io/tale/headplane:0.5.5
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: HP_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: config
              mountPath: /etc/headplane
              readOnly: true
            - name: headscale-config
              mountPath: /etc/headscale
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: headplane-config
        - name: headscale-config
          configMap:
            name: headscale-config
            items:
              - key: config.yaml
                path: config.yaml
