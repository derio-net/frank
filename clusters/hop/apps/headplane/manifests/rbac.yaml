apiVersion: v1
kind: ServiceAccount
metadata:
  name: headplane
  namespace: headscale-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: headplane
  namespace: headscale-system
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: headplane
  namespace: headscale-system
subjects:
  - kind: ServiceAccount
    name: headplane
    namespace: headscale-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: headplane
