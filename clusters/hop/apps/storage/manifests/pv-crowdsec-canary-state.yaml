apiVersion: v1
kind: PersistentVolume
metadata:
  name: crowdsec-canary-state
spec:
  capacity:
    storage: 16Mi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: hetzner-volume
  # The ban-pipeline canary persists its previous metric sample + consecutive-fail
  # counter here (one tiny JSON). Bind from the PV side to the canary PVC — like the
  # crowdsec LAPI PVs, the consumer PVC has no volumeName, so claimRef pins it.
  claimRef:
    namespace: crowdsec-system
    name: crowdsec-canary-state-pvc
  hostPath:
    # Subdir on the already-attached Hetzner Volume (/var/mnt/hop-data). No new volume.
    path: /var/mnt/hop-data/crowdsec-canary/state
    type: DirectoryOrCreate
  nodeAffinity:
    # Pinned to hop-1 explicitly (not the Exists tautology) — hostPath is single-node
    # only; a 2nd Hop node must not silently get a fresh empty dir.
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values: ["hop-1"]
