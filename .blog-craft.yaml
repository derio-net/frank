version: 2
blog_craft_version: "0.3.0"

project:
  name: "Frank"                                   # slug: drives the read-tracker storage key
  title: "Frank, the Talos Cluster"               # display title (navbar / <title>)
  tagline: "Building, operating, and deciding: an AI-hybrid Kubernetes homelab with Talos Linux, Cilium, Longhorn, ArgoCD, and GPU compute"
  base_url: "https://derio-net.github.io/frank/"
  base_path: "/frank/"
  module_path: "derio-net.github.io/frank"
  repo_url: "https://github.com/derio-net/frank"  # adds a GitHub nav link

# Image-layer prose is authored so blog-craft's COMPOSED prompt text (per entry)
# matches frank's legacy generate-all-images.py output — proven by
# smoke-image-compose. frank's blog/prompt_for_images.yaml + static/images are
# preserved as content; this block governs FUTURE /blog-craft:media runs.
image:
  provider: gemini
  model: gemini-3-pro-image-preview
  api_key_env: GEMINI_API_KEY
  output_dir: static/images
  prompts_file: prompt_for_images.yaml
  reference_pool: .reference-pool
  curation: { count_default: 1, archive_cap: 30, contact_sheet: true }
  composition_order: [base_character, base_atmosphere, reference_guidance, torso, mood, scene]
  layers:
    base_character: |
      Frank — a chibi-proportioned green Frankenstein-monster cluster mascot:
      stitched patches, RJ45 neck bolts, black-circle eyes with white pupils.
    base_atmosphere: |
      Dark server-room lighting, blue electrical arcs, warm overhead glow.
    reference_guidance: |
      Use the reference for face/proportions only; redraw the scene fresh.
    torso:
      building: ["work clothes", "overalls", "overalls under lab coat", "work apron with tools", "torso-deep in server hardware"]
      operating: ["open access panel on a workbench", "hoodie + sunglasses", "t-shirt, sleeves rolled"]
      papers: ["white shirt + black tie + reading glasses", "lab coat over shirt+tie+glasses", "leather overalls over shirt+tie+glasses"]
      generic: ["follows the scene"]
    mood:
      curious: "curious, head slightly tilted"
      weighing: "weighing options, considered"
      determined: "determined, focused"
      focused: "focused, concentrating"
      skeptical: "skeptical, one brow raised"
      approving: "approving, faint nod"

# series.title drives the NAV menu names (frank's nav is the short form); the
# longer section/overview + homepage-card titles live in frank's preserved content.
series:
  - { key: building,  title: "Building",  description: "Assembling the cluster, layer by layer.", content_type: posts }
  - { key: operating, title: "Operating", description: "Running and maintaining the cluster.",     content_type: posts }
  - { key: papers,    title: "Papers",    description: "Vendor analysis + decision narratives.",   content_type: papers }

content_types:
  papers:
    enabled: true
    dossier_dir: docs/papers-dossiers
    dossier_base_url: "https://github.com/derio-net/frank/blob/main/docs/papers-dossiers"
    data_dir: blog/data/papers
    gate: { min_vendors: 3, min_sources: 5, min_source_types: 3,
            min_artefacts: 3, min_artefact_kinds: 2, min_gaps: 1, min_counterargs: 1 }
    source_types:   [vendor-docs, paper, postmortem, talk, benchmark]
    artefact_kinds: [grafana-screenshot, asciinema, yaml, commit, incident]
    shortcodes:     [landscape, capability-matrix, scar, pullquote, dossier-link, references-index]
    crosslink_fields: [related_building, related_operating]
    weight_offset: 1

features:
  series_overview_posts: true
  read_tracker: true
  banners:   { operator_generated: true }
  roadmap:   { enabled: true, data: data/roadmap.yaml }
  analytics: { provider: goatcounter, url: "https://counter.derio.net" }
  # No css.mermaid_palette: frank's papers palette is baked into the papers CSS.

voice: |
  Frank speaks as the cluster itself — conversational, technically precise,
  darkly self-aware. Teach through story; admit failures with the same weight
  as successes.

ci:
  validators: [frontmatter, dossier, mermaid, hugo_build]
  deploy: { kind: container_pages }
