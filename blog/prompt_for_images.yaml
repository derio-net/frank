      down from it, labelled "cloud", "managed", and "DIY". His
      posture is thoughtful, not triumphant — the question is genuinely
      open. The whiteboard "2026?" and the three labels are the only
      writing in the image. ONE figure — one single Frank.

  - key: paper-04-cover
    torso_variant: 0
    mood: weighing
    references:
      - .reference-pool/papers/subjects/frank-white-shirt-black-tie-2.png
    output: blog/content/docs/papers/04-distributed-storage/cover.png
    description: Paper 04 cover — Frank weighing one of three replica platters at a desk
    prompt: >-
      Scene: a quiet desk study, not a server room. Three 3.5-inch hard
