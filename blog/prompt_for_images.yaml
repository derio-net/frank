      single Frank.

  - key: paper-11-cover
    torso_variant: 1
    mood: cautious
    references:
      - .reference-pool/papers/subjects/frank-white-shirt-black-tie-3.png
    output: blog/content/docs/papers/11-identity-heterogeneous-stack/cover.png
    description: Paper 11 cover — Frank (lab coat) surveying a wall of passport-style identity badges, one dimmed
    prompt: >-
      Frank examines a wide wall of glowing passport-style identity
