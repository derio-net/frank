    output: blog/content/docs/building/06-fun-stuff/cover.png
    description: "Fun Stuff — GitOps-managed RGB LEDs on case hardware"
    prompt: >-
      Frank the server-hardware Frankenstein monster standing in front of a
      mirror, admiring himself. His chest fans glow with rainbow RGB
