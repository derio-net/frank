# Image Generation Prompts for "Frank, the Talos Cluster" Blog
#
# Used by: scripts/generate-all-images.py
# Master reference: auto-picked per-series from
#     .reference-pool/<series>/reference-<series>.png
# where series comes from the entry's `series:` field or the key prefix
# (paper-* → papers, building-* → building, ops-* → operating, anything
# else → generic). Override with `-r path.png` for one-off runs.
#
# Multi-reference: each entry can list additional anchors under
# `references:` (paths from .reference-pool/<series>/subjects/ are the
# canonical pick). These STACK on top of the master reference; both go
# into the model call. Random sampling is also available via
# --pool-generic N / --pool-series N (off by default).
#
# ---------------------------------------------------------------------------
# COMPOSITION MODEL
# ---------------------------------------------------------------------------
# Every prompt sent to the image model is composed in this fixed order:
#
#   base_character       — signature traits, applied to every image
#   base_atmosphere      — lighting, colour, scene-feel, applied to every image
#   reference_guidance   — how to use the attached reference image(s)
#   torso_variants[X]    — torso kind (generic / building / operating / papers)
#   moods[Y] or Y        — short mood phrase (preset or free-form)
#   prompt               — scene-specific description, including the body-
#                          variant SPECIALIZATION (form factor, exposed
#                          device, clothing variant, etc.)
#
# X is picked from the image entry's `torso:` field, or derived from
# `series:` (papers/paper-* → papers, building/* → building, ops-/operating-*
# → operating, default → generic). Y is picked from `mood:`.
#
# ---------------------------------------------------------------------------
# IMPORTANT — message for any agent creating new image entries
# ---------------------------------------------------------------------------
# When you write a new image entry:
#
# 1. Choose `series` (and the script derives the default `torso`).
#
# 2. Pick a `torso_variant` index from the list under `torso_variants:` —
#    match it to the scene's body/clothing intent.
#
# 3. Pick a `mood` preset key from `moods:` — match it to the scene's emotion.
#
# 4. **Pick character-identity references explicitly** from
#    `.reference-pool/<series>/subjects/`. Filenames are descriptive — e.g.
#    `frank-white-shirt-black-tie-overalls.png` says exactly what's in the
#    frame. Choose 1 (occasionally 2) subject PNGs whose clothing AND pose
#    most closely match what you want the scene to look like. Optionally add
#    1 whole-image style anchor from `.reference-pool/<series>/*.png` (root
#    level — curated cover/tile keepers). List the chosen paths under
#    `references:` on the image entry:
#
#        references:
#          - .reference-pool/papers/subjects/frank-white-shirt-black-tie-2.png
#          - .reference-pool/papers/tile-papers.png
#
#    Do NOT rely on the random pool sampler — it's disabled by default
#    (`--pool-generic 0 --pool-series 0`). Explicit refs are the contract.
#
# 5. In your `prompt:` field, write the scene only. It MUST specialize the
#    generic torso variant chosen by `series:`:
#
#      building   → name the form factor in the scene (rack-mount, half-rack,
#                   ITX motherboard, blade, single-board, microserver, ...).
#      operating  → name which exposed device is on view (GPU, NVMe array,
#                   NIC, PSU, ...).
#      papers     → either keep the default white-shirt-and-tie OR invoke a
#                   variant — a lab coat worn open over the shirt, or a
#                   denim/leather overall in place of the shirt.
#
#    Do NOT repeat character traits already covered by base_character (skin,
#    eyes, hair, patches, scar, bolts, no nose, stitched hands), the chibi
#    proportions, the dark studio background, or the electric-blue sparks —
#    all of that is composed in by the script. Do NOT keyword-spam ("4k,
#    masterpiece, trending on artstation, ..."). Per-image prompts are short,
#    scene-specific, and follow the pattern:
#
#       [Subject doing Action in Location/Context]. [Composition/Camera].
#       [Lighting/Atmosphere variations if any]. [Specific constraints/text].
# ---------------------------------------------------------------------------

base_character: >-
  Frank — a chibi-proportioned green Frankenstein monster. Uneven
  cartoon-green skin with brown / reddish-tan sewn-on patches across the
  cheek and jaw (horizontal stitch lines crossing each; brown against
  green, NOT mechanical implants). Each eye is a solid BLACK circle
  with a single small WHITE pupil-dot — no glow. No nose. Messy black
  flat-top hair with jagged spiky peaks. Thick raised brow ridge, no
  eyebrows. A horizontal stitched scar across the upper forehead with
  a small rectangular RED bandage over it above the right eye. Two
  symmetric RJ45-connector bolts on the temples, each sparking
  faint blue. Hands stitched onto the arms with visible scar lines
  around the wrists. Cartoon illustration, thick outlines, vibrant
  colours.

# Atmosphere — consistent across every image
base_atmosphere: >-
  • Dark server-room aesthetic. Deep navy or near-black background;
    studio-style framing rather than a documentary photograph.
  • Small flecks of bright white / electric-blue sparks scattered
    through the scene; faint blue glow on metal edges and from any
    small LED indicators in the frame.
  • Lighting is a single warm overhead source unless the scene says
    otherwise; soft falloff into deep shadow rather than uniform fill.

reference_guidance:
  base: >-
    The reference images attached to this request are ANCHORS, not
    subjects to render.

    The FIRST reference image is the canonical character-design sheet.
    All of Frank's signature face features — chibi head proportions,
    solid BLACK eyes with a single small WHITE pupil-dot (no white
    sclera), no nose, jagged flat-top hair, brown sewn-on cheek and
    jaw patches, the red forehead bandage — come from THIS image and
    ONLY this image. If any additional reference image shows Frank
    with different face proportions, white eyes, an over-detailed
    face, or a "classic Frankenstein" square-jaw look, IGNORE those
    facial details — they are leftover from older iterations.

    Any ADDITIONAL reference images are clothing/pose anchors. Use
    them ONLY to match the clothing variant, accessories, and rough
    posture of the Frank you draw. Do NOT render them as separate
    figures, do NOT copy face details from them, and do NOT interpret
    their cropping or empty regions as compositional cues for the
    output frame.

    There is exactly ONE Frank in the final image, regardless of how
    many reference images show him.

    Redraw Frank from scratch in the scene's perspective and lighting;
    vary his pose, angle, head turn, and body language to fit the
    scene's action.

# ---------------------------------------------------------------------------
# TORSO VARIANTS
#
# Picked per image. Merged into the final prompt. The script defaults the variant from `series:` (Papers →
# papers, building/* → building, ops-/operating-* → operating, anything
# else → generic). Override per-image with `torso: <name>`.
#
# The variant text below is INTENTIONALLY generic. The PER-IMAGE prompt
# specializes it — see the IMPORTANT note at the top of this file.
# ---------------------------------------------------------------------------
torso_variants:
  generic:
    - Torso and clothing follow the scene prompt.

  # Two basic variants (as inspiration, not to be followed literally):
  # 1. Frank is building himself - the scene prompt specifies the form factor of the hardware parts he's assembling into his body (rack-mount, half-rack, ITX motherboard, blade, single-board, microserver, etc.). The scene prompt specifies which parts are flying in to assemble onto him.
  # 2. Frank is handling specific avatars of a technology in his stack (a bull for Longhorn, a tiny Kubernetes wheel for the cluster, a mini-SSD for storage, etc.) — the scene prompt specifies which device he's holding and how he's interacting with it.
  building:
    - Frank's torso/body is exposed server hardware
    - Frank wears dirty/patched work clothes.
    - Frank wears overalls.
    - Frank wears overalls under a lab coat.
    - Frank wears a work apron with tools in the pockets.

  # Two basic variants (as inspiration, not to be followed literally): 
  # 1. Frank is either on an operating table lying on a workbench, with an open access panel on his torso and various tools poking at him. The scene prompt specifies which device is exposed and what tools are poking him.
  # 2. Frank is operating machines in a server room, as a hacker or sysadmin would — standing or sitting at a rack, typing on a keyboard, flipping switches, etc. The scene prompt specifies the machines he's operating and the mood of the scene.
  operating:
    - Frank's is lying on his back, torso has an open access panel exposing a device under maintenance
    - Frank wears a hoodie and sunglasses.
    - Frank wears t-shirt with rolled-up sleeves.

  # Three variants: Creative expression is allowed, except on the same base clothing that MUST be worn (white button-down dress shirt, thin black necktie, small senior reading glasses perched low on the nose). The scene prompt specifies which variant he's wearing.
  papers:
    - Frank wears a thin black necktie over a white button-down dress shirt, small senior reading glasses perched low on the nose.
    - Frank wears a white lab coat over a white button-down dress shirt and thin black necktie, small senior reading glasses perched low on the nose.
    - Frank wears leather overalls over a white button-down dress shirt and thin black necktie, small senior reading glasses perched low on the nose.

# ---------------------------------------------------------------------------
# MOOD PRESET BANK
#
# Per-image `mood: <key>` looks up a preset here. If the value isn't a
# known key, it's passed through as a free-form mood string. Each preset
# is a single short sentence — enough to set the expression without
# fighting the scene prompt.
# ---------------------------------------------------------------------------
moods:
  curious: Frank's expression is curious — head tilted, brow lifted, eyes wide and attentive.
  weighing: Frank's expression is weighing — measured, slightly squinting, the look of someone judging an option.
  determined: Frank's expression is determined — jaw set, brow level, eyes forward and focused.
  worried: Frank's expression is worried — brow furrowed inward, mouth tightened, eyes slightly wider than usual.
  smirking: Frank's expression is smirking — one corner of the mouth pulled up, eyes narrowed in dry amusement.
  approving: Frank's expression is approving — a small contented smile, brow relaxed, eyes calm and pleased.
  skeptical: Frank's expression is skeptical — one brow raised higher than the other, mouth flat, eyes narrowed.
  satisfied: Frank's expression is satisfied — soft closed-mouth smile, brow at rest, eyes relaxed.
  cautious: Frank's expression is cautious — alert but not anxious; brow level, eyes scanning, mouth neutral.
  angry: Frank's expression is angry — brow pulled down, mouth tight, eyes narrowed and dark.
  alarmed: Frank's expression is alarmed — eyes wide, brow lifted high, mouth slightly open.
  focused: Frank's expression is focused — brow lowered in concentration, eyes locked on his work, mouth still.
  amused: Frank's expression is amused — small grin, brow relaxed, eyes bright.

# ---------------------------------------------------------------------------
# Site-wide assets (banner, favicon) — share a unified design language
# ---------------------------------------------------------------------------

images:
  # --- Site Banners & Icons ---------------------------------------------------

  - key: banner-landing
    output: blog/static/images/banner-landing.png
    description: Landing-page top banner — Frank being assembled mid-air, no text (1200x200, 6:1 ratio)
    prompt: >-
      An ultra-wide horizontal strip banner — exactly 1200 pixels wide by 200
      pixels tall (6:1 aspect ratio). Frank the server-hardware Frankenstein
      monster floats weightless in the center of the frame, arms and legs
      spread wide in a Vitruvian pose, suspended mid-assembly. Server parts
      stream toward him from all four edges — from the left: RAM sticks,
      PCIe cards, ethernet cables; from the right: NVMe SSDs, heatsinks, GPU
      fans; from above: a rack-mount chassis, motherboards, power supplies;
      from below: Raspberry Pis, NUC mini-PCs, cooling fans — all trailing
      motion streaks of electric blue light toward Frank's body, snapping
      into place as his torso, shoulders, and limbs. His face is calm and
      focused, mouth slightly open in awe. Green skin, messy black hair,
      black eyes with white pupils, stitches, RJ45 neck bolts crackling with
      blue electricity. Background: deep dark void with faint green PCB
      traces receding into the distance, blue lightning arcs between the
      incoming parts. ABSOLUTELY NO TEXT anywhere in the image — pure
      illustration only, no words, no title, no labels. Composition fades at
      both edges into darkness. The image MUST be extremely wide and short,
      like a letterbox strip — 1200x200 pixels, 6:1 ratio.

  - key: banner-operating
    output: blog/static/images/banner-operating.png
    description: Operating-on-Frank card cover — Frank wincing as gadgets poke him (1200x630)
    prompt: >-
      A wide cinematic banner. Frank the server-hardware Frankenstein monster
      lies flat on his back on a workbench/operating table that fills the
      lower half of the frame, arms and legs relaxed but slightly splayed.
      His face is scrunched in mild annoyance — brow furrowed, one eye
      squinted closed, mouth pulled to one side in a wince — as a cluster of
      tools and gadgets poke him from all angles: a screwdriver probes an
      open access panel on his chest, a multimeter's test probes press
      against his bicep, a soldering iron hovers near his forearm, a USB
      cable dangles into an RJ45 neck bolt, a stethoscope presses on his
      shoulder, a Raspberry Pi with exposed GPIO pins prods his thigh. The
      mood is "annoyed but tolerating it" — not pain, just the daily grind
      of being maintained. More anthropomorphic build: rounded shoulders
      (CPU heatsinks), muscular arm-cable bundles, contoured rack-chassis
      torso with an open access panel, NVMe-stack legs. Green skin, messy
      black hair, black eyes with white pupils, stitches, RJ45 neck bolts
      sparking blue electricity. Background: dark workshop bench with
      scattered schematic printouts and glowing terminal screens, faint
      green PCB traces on the walls and sparse blue lightning arcs. No text
      in the image. Output dimensions exactly 1200x630 pixels. Wide
      cinematic aspect ratio, 1200 pixels wide by 630 pixels tall.

  - key: favicon
    output: blog/static/images/favicon.png
    description: Master favicon — generated high-res, center-cropped to square, then scaled down to all derivatives in one pass
    prompt: >-
      A square icon of canonical Frank — head only, no body, no
      shoulders, no torso. Solid dark navy background (#1a1a2e).

      FRAME: a thin clean WHITE BORDER LINE just inside the edge of
      the image, forming a rectangular frame around the entire
      composition. ALL elements — Frank's head, hair peaks, temple
      bolts, and any blue electric sparks — must sit fully INSIDE
      this white frame, with comfortable padding between the
      outermost element and the frame line. The head should fill
      perhaps 60–70% of the framed area (NOT fill it edge to edge),
      so the temple-bolt sparks have room to extend outward without
      touching or crossing the frame.

      Because the crop is neckless, place the two symmetric RJ45
      bolts on the TEMPLES (one each side) — they must be clearly
      drawn, unmistakable as RJ45 sockets, silver/grey metal, with
      faint blue sparks that stay well inside the white frame.

      Expression: SMUG / KNOWING — small confident smirk, eyebrows
      angled to give a pleased-with-himself look. Alert eyes, fully
      open (not half-lidded, not sleepy).

      Flat cartoon/chibi style with clean bold dark outlines, designed
      to read at small sizes (16×16, 32×32). Square 1:1 framing.
      ABSOLUTELY NO TEXT. EXACTLY ONE character. No stray horns,
      hardware, or extra shapes peeking from under the hair.

      Apply all CANONICAL FRANK FEATURES from base_character as drawn
      — including the horizontal forehead scar, the small red
      rectangular patch above the right eye, the brown cheek / jaw
      patches (drawn as SEWN-ON SKIN with horizontal stitches, NOT
      as mechanical surfaces or gears), the chibi black-with-white-
      dot eyes, and the flat no-nose plane.
    post_process:
      # Gemini returns ~1408×736 regardless of requested aspect, so first
      # center-crop the source to square at 512×512 (overwrites the master
      # PNG); subsequent resize/ico steps work from the cropped image.
      - crop_resize: {target: "blog/static/images/favicon.png", width: 512, height: 512}
      - resize: {target: "blog/static/apple-touch-icon.png", size: 180}
      - resize: {target: "blog/static/favicon-32x32.png", size: 32}
      - resize: {target: "blog/static/favicon-16x16.png", size: 16}
      - ico: {target: "blog/static/favicon.ico", size: 32}

  - key: banner-papers
    series: papers
    output: blog/static/images/banner-papers.png
    description: Papers series header strip banner (1200x200, 6:1 ratio) — matches banner-building / banner-operating style with title text
    prompt: >-
      An ultra-wide horizontal strip banner, extremely wide and short
      — exactly 5000 pixels wide by 832 pixels tall (6:1 aspect ratio).
      On the LEFT THIRD, Frank the server-hardware Frankenstein monster
      stands in profile facing right (toward the title text), about 60%
      the strip height. He wears the Papers signature (white button-
      down dress shirt, thin black necktie, small senior reading
      glasses perched low on the nose) and holds an open manila folder
      with sticky tabs in one hand and a marker in the other, glancing
      sideways at the title. CENTER-RIGHT: the title text "The Frank
      Papers" in bold chunky retro-tech lettering, glowing electric
      blue with subtle circuit-trace underlines (MATCH the lettering
      style used in banner-building.png and banner-operating.png — same
      font, same glow, same circuit-trace underlines). Background:
      dark circuit-board surface with faint green PCB traces and sparse
      blue lightning arcs. BOTTOM EDGE: tiny decorative icons — a
      stack of bound papers with a spine label, a quadrant-chart icon,
      a small magnifying glass, and a balance/scales icon — evenly
      spaced. Composition fades at both edges into darkness. EXACTLY
      ONE FIGURE — one single Frank. The image MUST be extremely wide
      and short, like a letterbox strip — 5000×832 pixels, 6:1 ratio.

  # --- Papers Series Covers ---------------------------------------------------

  - key: paper-00-cover
    torso_variant: 0
    mood: skeptical
    output: blog/content/docs/papers/00-why-homelab-in-2026/cover.png
    description: Paper 00 cover — Frank at a whiteboard weighing three approaches
    prompt: >-
      Frank stands at a whiteboard, one hand on his chin. The whiteboard
