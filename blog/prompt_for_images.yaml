# Per-image entries — v5 composition blocks (blog-craft #44, config v5).
# Layer prose lives in .blog-craft.yaml image.layers; each entry carries:
#   composition.reference_images  {primary, clothing: [...]} — EXPLICIT: what is
#                                 declared is sent, nothing else
#   composition.order             composition_orders[name] or inline (default hero)
#   composition.modifiers         series, clothing: <group>[<variant>], mood
#   composition.scene             the scene text (was `prompt` in v4)
# Preview any key without an API call:
#   python blog/scripts/generate-images.py --print-prompt <key>
images:
- key: banner-landing
  aspect_ratio: '21:9'
  image_size: 2K
  output: blog/assets/images/banner-landing.png
  description: Landing-page top banner — Frank being assembled mid-air, no text (21:9 canvas holding
    three stacked ~7:1 strip copies; crop the best band)
  composition:
    reference_images:
      primary: .reference-pool/building/reference/frank-server-torso.png
    scene: 'An ultra-wide letterbox strip banner. Frank floats weightless in the center of the frame,
      arms and legs spread wide in a Vitruvian pose, suspended mid-assembly. Server parts stream toward
      him from all four edges — from the left: RAM sticks, PCIe cards, ethernet cables; from the right:
      NVMe SSDs, heatsinks, GPU fans; from above: a rack-mount chassis, motherboards, power supplies;
      from below: Raspberry Pis, NUC mini-PCs, cooling fans — all trailing motion streaks of electric
      blue light toward Frank''s body, snapping into place as his torso, shoulders, and limbs. His face
      is calm and focused, mouth slightly open in awe. Background: deep dark void with faint green PCB
      traces receding into the distance, blue lightning arcs between the incoming parts. ABSOLUTELY NO
      TEXT anywhere in the image — pure illustration only, no words, no title, no labels. Composition
      fades at both edges into darkness. THE CANVAS: the frame is divided into THREE horizontal bands
      of equal height, stacked VERTICALLY one above another — like three rows of a grid, NEVER three
      columns side by side. Each band contains the COMPLETE strip composition described above, scaled
      to fit ENTIRELY inside its own band: the whole figure and every element fully visible, with breathing
      room above and below, nothing touching the band boundaries and nothing cropped at the left or right
      canvas edges — the composition fades into darkness before reaching the edges of its band. No gaps
      or borders between bands. The layout is identical in every band; small organic variation in the
      flying parts between bands is welcome.'
    modifiers:
      clothing: generic[default]
- key: banner-operating
  aspect_ratio: '21:9'
  image_size: 2K
  output: blog/assets/images/banner-operating.png
  description: Operating-on-Frank banner — Frank wincing as gadgets poke him (21:9 canvas holding three
    stacked ~7:1 strip copies; crop the best band)
  composition:
    reference_images:
      primary: .reference-pool/operating/reference/frank-open-torso-2.png
    scene: 'A wide cinematic banner. Frank lies flat on his back on a workbench/operating table that fills
      the lower half of the frame, arms and legs relaxed but slightly splayed. His face is scrunched in
      mild annoyance — brow furrowed, one eye squinted closed, mouth pulled to one side in a wince — as
      a cluster of tools and gadgets poke him from all angles: a screwdriver probes an open access panel
      on his chest, a multimeter''s test probes press against his bicep, a soldering iron hovers near
      his forearm, a USB cable dangles into an RJ45 neck bolt, a stethoscope presses on his shoulder,
      a Raspberry Pi with exposed GPIO pins prods his thigh. The mood is "annoyed but tolerating it" —
      not pain, just the daily grind of being maintained. More anthropomorphic build: rounded shoulders
      (CPU heatsinks), muscular arm-cable bundles, contoured rack-chassis torso with an open access panel,
      NVMe-stack legs. Background: dark workshop bench with scattered schematic printouts and glowing
      terminal screens, faint green PCB traces on the walls and sparse blue lightning arcs. No text in
      the image. THE CANVAS: the frame is divided into THREE horizontal bands of equal height, stacked
      VERTICALLY one above another — like three rows of a grid, NEVER three columns side by side. Each
      band contains the COMPLETE table-scene composition described above, scaled to fit ENTIRELY inside
      its own wide short band: Frank and the table fully visible, with breathing room above and below,
      nothing touching the band boundaries and nothing cropped at the left or right canvas edges. No
      gaps or borders between bands. The layout is identical in every band; small organic variation in
      the poking tools between bands is welcome.'
    modifiers:
      clothing: operating[lying_open_access]
- key: favicon
  aspect_ratio: '1:1'
  output: blog/static/images/favicon.png
  description: Master favicon — generated high-res, center-cropped to square, then scaled down to 
    all derivatives in one pass
  post_process:
  - crop_resize:
      target: blog/static/images/favicon.png
      width: 512
      height: 512
  - resize:
      target: blog/static/apple-touch-icon.png
      size: 180
  - resize:
      target: blog/static/favicon-32x32.png
      size: 32
  - resize:
      target: blog/static/favicon-16x16.png
      size: 16
  - ico:
      target: blog/static/favicon.ico
      size: 32
  composition:
    reference_images:
      primary: .reference-pool/generic/reference/frank-favicon.png
    scene: 'A square icon of canonical Frank — head only, no body, no shoulders, no torso. Solid dark
      navy background (#1a1a2e).

      FRAME: a thin clean WHITE BORDER LINE just inside the edge of the image, forming a rectangular frame
      around the entire composition. ALL elements — Frank''s head, hair peaks, temple bolts, and any blue
      electric sparks — must sit fully INSIDE this white frame, with comfortable padding between the outermost
      element and the frame line. The head should fill perhaps 60–70% of the framed area (NOT fill it
      edge to edge), so the temple-bolt sparks have room to extend outward without touching or crossing
      the frame.

      Because the crop is neckless, place the two symmetric RJ45 bolts on the TEMPLES (one each side)
      — they must be clearly drawn, unmistakable as RJ45 sockets, silver/grey metal, with faint blue sparks
      that stay well inside the white frame.

      Expression: SMUG / KNOWING — small confident smirk, eyebrows angled to give a pleased-with-himself
      look. Alert eyes, fully open (not half-lidded, not sleepy).

      Flat cartoon/chibi style with clean bold dark outlines, designed to read at small sizes (16×16,
      32×32). Square 1:1 framing. ABSOLUTELY NO TEXT. No stray horns, hardware, or extra shapes peeking
      from under the hair.'
