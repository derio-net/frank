      celebrating it. He wears small circular wire-rim reading
      glasse swhich rest low on his face. 
      He wears a thin black necktie over a white
      button-down dress shirt. One hand gestures at the token stream
      as if measuring it. Warm overhead lamp. Dark studio-style
      background. RJ45 temple bolts, green skin, messy black hair. The
      two boxes labelled "engine" and "gateway" are the ONLY text in
