# Image Generation Prompts for "Frank, the Talos Cluster" Blog
#
# Used by: scripts/generate-all-images.py
# Reference: blog/static/images/reference.png
#
# Character: "Frank" — a chibi Frankenstein monster made of server hardware.
#   Green skin, messy black hair, black eyes, flat-top head, stitched/scarred.
#   Neck bolts are RJ45 connectors. Wears a utility belt of ethernet cables.
#   Torso is a rack-mount server chassis with blinking LEDs.
#   Blue glow comes from environment/props (sparks, tools, screens) — NOT his eyes.
#
# IMPORTANT: The reference image is for CHARACTER DESIGN only — body proportions,
# color palette, outfit, and overall aesthetic. Do NOT copy the face as a flat
# sticker or paste it unchanged. Redraw the face fresh in each scene with
# appropriate expression, angle, and lighting for the composition.

base_style: >-
  Cartoon illustration, vibrant colors, thick outlines, chibi proportions.
  Dark background with electric blue lightning accents.
  Tech-horror aesthetic, playful not scary.

  CANONICAL FRANK FEATURES (derived from the reference image — apply
  consistently across every scene):

  • SKIN: uneven cartoon green, with subtle shading variation across
    the face (not a flat colour fill).
  • HAIR: messy black flat-top with a clearly jagged, uneven silhouette
    at the top — visible spiky peaks of varying heights.
  • EYES: chibi style — each eye is an entirely BLACK solid round
    shape with a small WHITE DOT inside as the highlight / pupil
    (black-with-white-dot, NOT white-with-black-iris).
  • NOSE: absent. Flat featureless plane of green skin between the
    eyes and the mouth — no nose ridge, no nostrils, no nose shadow.
  • FOREHEAD SCAR: a HORIZONTAL stitched scar runs across the upper
    forehead just below the hairline — drawn as a dark line with
    multiple short vertical cross-stitches along its length.
  • RED FOREHEAD PATCH: a small rectangular RED patch (like a sewn-on
    hardware decal / label) sits above his RIGHT eye on the upper
    forehead. Distinctly RED, small, rectangular, with a thin dark
    border. This is one of Frank's signature details.
  • OTHER PATCHES: brown / tan skin patches elsewhere on the face
    (cheek, jaw) with horizontal stitches inside each patch.
    Unmistakably brown against the green skin, not slightly-darker
    green. Placement varies by scene. Critically, these are
    SEWN-ON SKIN PATCHES — flat coloured fabric/skin with simple
    horizontal stitch lines crossing them. They are NOT exposed
    mechanical surfaces, NOT visible gears, NOT circuit boards,
    NOT cybernetic implants. The mechanical / server-hardware
    aesthetic belongs in the environment and props around Frank,
    not on his face. Frank's face is monster-with-patches, not
    cyborg-with-implants.
  • BOLTS: TWO SYMMETRIC RJ45-connector bolts — either on the NECK
    (preferred when the neck is visible) OR on the TEMPLES (when the
    crop is head-only and the neck isn't shown). Always symmetric,
    one on each side. Faint blue electricity sparking from each.

  Blue glow comes from the environment, props, and electric sparks
  — NOT from Frank's eyes.

  Draw Frank's face naturally for each scene — match expression to
  the action, vary the head angle, and apply scene-appropriate
  lighting. Do NOT copy-paste the face from the reference; use it
  only as a design guide.

reference_guidance:
  # Base character-sheet guidance — applied to every image.
  # Reference image #1 is always blog/static/images/reference.png (passed via -r).
  base: >-
    Use the attached primary reference image as a CHARACTER DESIGN SHEET —
    it defines Frank's body shape, proportions, color palette, outfit, and
    hardware-part anatomy. Key face details: black messy hair, black eyes
    with white pupils, green skin, stitch scars, expressive brow. For each
    new image, redraw Frank from scratch in the scene's perspective and
    lighting. His facial expression should match the scene's mood. Vary
    his pose, angle, and body language naturally.

  # Per-series modifiers. When an image entry sets `series: <name>`, the
  # script injects that series's `modifiers` block into the prompt AND
  # passes the `banner` image as a SECONDARY reference (in addition to the
  # primary reference.png), so Gemini conditions on both the character
  # sheet and the series-specific aesthetic.
  series:
    building:
      banner: blog/static/images/banner-building.png
      modifiers: >-
        BUILDING-SERIES SIGNATURE — hands-on builder persona. Frank is
        actively constructing, assembling, or working on the subject of
        the post. Tools, parts, or hardware are typically in his hands.
        Workshop / lab lighting; scattered cables, blueprints, or hardware
        parts in the scene. Use the secondary reference image
        (banner-building.png) as a style anchor for the Building series.

    operating:
      banner: blog/static/images/banner-operating.png
      modifiers: >-
        OPERATING-SERIES SIGNATURE — SRE / maintenance persona. Frank is
        at an operations console facing monitoring screens, OR on a
        surgical table being maintained by overhead rail-mounted robotic
        arms, OR inspecting an open chassis. Dashboards, status indicators,
        and dark server-room lighting are typical. Calm, watchful
        expression — routine monitoring, not crisis. Use the secondary
        reference image (banner-operating.png) as a style anchor for the
        Operating series.

    papers:
      banner: blog/static/images/tile-papers.png
      modifiers: >-
        PAPERS-SERIES SIGNATURE — scholar / researcher persona. Frank
        wears a crisp white button-down dress shirt, a thin black necktie,
        and small thin-framed reading glasses perched low on the bridge
        of his nose (the kind older readers use for close work). This
        outfit is the consistent visual signature across every Papers
        image — apply it unless the scene explicitly contradicts. Use the
        secondary reference image (banner-papers.png) as a style anchor
        for the Papers series.

# ---------------------------------------------------------------------------
# Site-wide assets (banner, favicon) — share a unified design language
# ---------------------------------------------------------------------------

images:
  # --- Site Banners & Icons ---------------------------------------------------

  - key: banner-landing
    output: blog/static/images/banner-landing.png
    description: Landing-page top banner — Frank being assembled mid-air, no text (1200x200, 6:1 ratio)
    prompt: >-
      An ultra-wide horizontal strip banner — exactly 1200 pixels wide by 200
      pixels tall (6:1 aspect ratio). Frank the server-hardware Frankenstein
      monster floats weightless in the center of the frame, arms and legs
      spread wide in a Vitruvian pose, suspended mid-assembly. Server parts
      stream toward him from all four edges — from the left: RAM sticks,
      PCIe cards, ethernet cables; from the right: NVMe SSDs, heatsinks, GPU
      fans; from above: a rack-mount chassis, motherboards, power supplies;
      from below: Raspberry Pis, NUC mini-PCs, cooling fans — all trailing
      motion streaks of electric blue light toward Frank's body, snapping
      into place as his torso, shoulders, and limbs. His face is calm and
      focused, mouth slightly open in awe. Green skin, messy black hair,
      black eyes with white pupils, stitches, RJ45 neck bolts crackling with
      blue electricity. Background: deep dark void with faint green PCB
      traces receding into the distance, blue lightning arcs between the
      incoming parts. ABSOLUTELY NO TEXT anywhere in the image — pure
      illustration only, no words, no title, no labels. Composition fades at
      both edges into darkness. The image MUST be extremely wide and short,
      like a letterbox strip — 1200x200 pixels, 6:1 ratio.

  - key: banner-hero
    output: blog/static/images/banner-hero.png
    description: Building-Frank card cover — triumphant, anthropomorphic Frank (1200x630)
    prompt: >-
      A wide cinematic banner. Frank the server-hardware Frankenstein monster
      stands triumphantly atop a small mound of Raspberry Pis and NUC
      mini-PCs, arms raised overhead in a victory pose, one fist clenched,
      the other holding aloft a glowing Kubernetes wheel logo. This is a more
      anthropomorphic, confident Frank — his body shapes are rounder and more
      organic than blocky: shoulders are CPU heatsinks softened into muscular
      deltoids, arms are bundles of ethernet cables and PCIe risers that flex
      like tendons, legs are stacks of NVMe SSDs with curvature at the knees,
      and his torso is a rack-mount server chassis whose edges soften into a
      chest-and-abs silhouette. Green skin, messy black hair, expressive
      confident smile, black eyes with white pupils, stitches, RJ45 neck
      bolts crackling blue electricity. Behind him, a dark server room fades
      into a starfield, with a faint circuit-board pattern on the floor.
      Blue electric sparks arc from his neck bolts and between hardware
      joints. Output dimensions exactly 1200x630 pixels. Wide cinematic
      aspect ratio, 1200 pixels wide by 630 pixels tall.

  - key: banner-thin
    output: blog/static/images/banner-thin.png
    description: Post header strip banner (1200x200, 6:1 ratio)
    prompt: >-
      An ultra-wide horizontal strip banner, extremely wide and short — exactly
      1200 pixels wide by 200 pixels tall (6:1 aspect ratio). On the left third,
      Frank the server-hardware Frankenstein monster strides confidently to the
      right, about 60% the strip height — green skin, messy black hair, black
      eyes, rack-mount torso, RJ45 neck bolts sparking blue electricity.
      Center-right: the title "Building Frank" in bold chunky retro-tech
      lettering, glowing electric blue with subtle circuit-trace underlines.
      Background: dark circuit-board surface with faint green PCB traces and
      sparse blue lightning arcs. Bottom edge: tiny decorative icons — a
      Raspberry Pi, a NUC, an SSD, a Kubernetes wheel. Composition fades at
      both edges into darkness. The image MUST be extremely wide and short,
      like a letterbox strip — 1200x200 pixels, 6:1 ratio.


  - key: banner-operating
    output: blog/static/images/banner-operating.png
    description: Operating-on-Frank card cover — Frank wincing as gadgets poke him (1200x630)
    prompt: >-
      A wide cinematic banner. Frank the server-hardware Frankenstein monster
      lies flat on his back on a workbench/operating table that fills the
      lower half of the frame, arms and legs relaxed but slightly splayed.
      His face is scrunched in mild annoyance — brow furrowed, one eye
      squinted closed, mouth pulled to one side in a wince — as a cluster of
      tools and gadgets poke him from all angles: a screwdriver probes an
      open access panel on his chest, a multimeter's test probes press
      against his bicep, a soldering iron hovers near his forearm, a USB
      cable dangles into an RJ45 neck bolt, a stethoscope presses on his
      shoulder, a Raspberry Pi with exposed GPIO pins prods his thigh. The
      mood is "annoyed but tolerating it" — not pain, just the daily grind
      of being maintained. More anthropomorphic build: rounded shoulders
      (CPU heatsinks), muscular arm-cable bundles, contoured rack-chassis
      torso with an open access panel, NVMe-stack legs. Green skin, messy
      black hair, black eyes with white pupils, stitches, RJ45 neck bolts
      sparking blue electricity. Background: dark workshop bench with
      scattered schematic printouts and glowing terminal screens, faint
      green PCB traces on the walls and sparse blue lightning arcs. No text
      in the image. Output dimensions exactly 1200x630 pixels. Wide
      cinematic aspect ratio, 1200 pixels wide by 630 pixels tall.

  - key: banner-operating-thin
    output: blog/static/images/banner-operating-thin.png
    description: Operating series header strip banner (1200x200, 6:1 ratio)
    prompt: >-
      An ultra-wide horizontal strip banner, extremely wide and short — exactly
      1200 pixels wide by 200 pixels tall (6:1 aspect ratio). Frank the
      server-hardware Frankenstein monster lies on his back on a surgical
      operating table on the left third of the image, about 60% the strip
      height. We can see all of his body.
      His chest cavity is open, revealing circuit boards, drives, and
      glowing cables inside. Multiple robotic arms (mounted to the ceiling or
      the table frame) reach into his chest — one arm solders a circuit trace,
      another swaps a miniature SSD, a third reconnects a glowing cable. Frank
      is conscious and focused but relaxed, guiding the arms with a small handheld
      controller. Green skin, messy black hair, black eyes, RJ45 neck bolts
      sparking blue electricity. Center-right: the title "Operating on Frank"
      in bold chunky retro-tech lettering, glowing electric blue with subtle
      circuit-trace underlines (matching the "Building Frank" thin banner
      style). Background: dark circuit-board surface with faint green PCB
      traces and sparse blue lightning arcs. Bottom edge: tiny decorative icons
      — a wrench, a stethoscope, a terminal prompt, a heartbeat monitor.
      Composition fades at both edges into darkness. The image MUST be
      extremely wide and short, like a letterbox strip — 1200x200 pixels,
      6:1 ratio.

  - key: favicon
    output: blog/static/images/favicon.png
    description: Master favicon — generated high-res, center-cropped to square, then scaled down to all derivatives in one pass
    prompt: >-
      A square icon of canonical Frank — head only, no body, no
      shoulders, no torso. Solid dark navy background (#1a1a2e).

      FRAME: a thin clean WHITE BORDER LINE just inside the edge of
      the image, forming a rectangular frame around the entire
      composition. ALL elements — Frank's head, hair peaks, temple
      bolts, and any blue electric sparks — must sit fully INSIDE
      this white frame, with comfortable padding between the
      outermost element and the frame line. The head should fill
      perhaps 60–70% of the framed area (NOT fill it edge to edge),
      so the temple-bolt sparks have room to extend outward without
      touching or crossing the frame.

      Because the crop is neckless, place the two symmetric RJ45
      bolts on the TEMPLES (one each side) — they must be clearly
      drawn, unmistakable as RJ45 sockets, silver/grey metal, with
      faint blue sparks that stay well inside the white frame.

      Expression: SMUG / KNOWING — small confident smirk, eyebrows
      angled to give a pleased-with-himself look. Alert eyes, fully
      open (not half-lidded, not sleepy).

      Flat cartoon/chibi style with clean bold dark outlines, designed
      to read at small sizes (16×16, 32×32). Square 1:1 framing.
      ABSOLUTELY NO TEXT. EXACTLY ONE character. No stray horns,
      hardware, or extra shapes peeking from under the hair.

      Apply all CANONICAL FRANK FEATURES from base_style as drawn
      — including the horizontal forehead scar, the small red
      rectangular patch above the right eye, the brown cheek / jaw
      patches (drawn as SEWN-ON SKIN with horizontal stitches, NOT
      as mechanical surfaces or gears), the chibi black-with-white-
      dot eyes, and the flat no-nose plane.
    post_process:
      # Gemini returns ~1408×736 regardless of requested aspect, so first
      # center-crop the source to square at 512×512 (overwrites the master
      # PNG); subsequent resize/ico steps work from the cropped image.
      - crop_resize: {target: "blog/static/images/favicon.png", width: 512, height: 512}
      - resize: {target: "blog/static/apple-touch-icon.png", size: 180}
      - resize: {target: "blog/static/favicon-32x32.png", size: 32}
      - resize: {target: "blog/static/favicon-16x16.png", size: 16}
      - ico: {target: "blog/static/favicon.ico", size: 32}

  - key: banner-papers
    series: papers
    output: blog/static/images/banner-papers.png
    description: Papers series header strip banner (1200x200, 6:1 ratio) — matches banner-building / banner-operating style with title text
    prompt: >-
      An ultra-wide horizontal strip banner, extremely wide and short
      — exactly 1200 pixels wide by 200 pixels tall (6:1 aspect ratio).
      On the LEFT THIRD, Frank the server-hardware Frankenstein monster
      stands in profile facing right (toward the title text), about 60%
      the strip height. He wears the Papers signature (white button-
      down dress shirt, thin black necktie, small senior reading
      glasses perched low on the nose) and holds an open manila folder
      with sticky tabs in one hand and a marker in the other, glancing
      sideways at the title. CENTER-RIGHT: the title text "The Frank
      Papers" in bold chunky retro-tech lettering, glowing electric
      blue with subtle circuit-trace underlines (MATCH the lettering
      style used in banner-building.png and banner-operating.png — same
      font, same glow, same circuit-trace underlines). Background:
      dark circuit-board surface with faint green PCB traces and sparse
      blue lightning arcs. BOTTOM EDGE: tiny decorative icons — a
      stack of bound papers with a spine label, a quadrant-chart icon,
      a small magnifying glass, and a balance/scales icon — evenly
      spaced. Composition fades at both edges into darkness. EXACTLY
      ONE FIGURE — one single Frank. The image MUST be extremely wide
      and short, like a letterbox strip — 1200×200 pixels, 6:1 ratio.

  # --- Papers Series Covers ---------------------------------------------------

  - key: paper-00-cover
    # NOTE: deliberately NOT setting `series: papers` here — using only
    # reference.png as the style anchor avoids the aspect-ratio leak we
    # hit on building-cover regenerations (the 6:1 banner-papers.png as
    # secondary ref made Gemini emit 2048×512 covers). The Papers
    # signature (glasses + tie + dress shirt) is explicit in the prompt
    # below; reference.png anchors Frank's identity.
    output: blog/content/docs/papers/00-why-homelab-in-2026/cover.png
    description: Paper 00 cover — Frank at a whiteboard weighing three approaches with a skeptical expression
    prompt: >-
      Frank stands at a whiteboard, one hand on his chin in a skeptical
      "weighing" expression. On the whiteboard behind him: "2026?"
      written in large chalk letters at the top, with three branching
      arrows below it — one labeled "cloud", one labeled "managed",
      one labeled "DIY". He wears the Papers signature (white button-
      down dress shirt, thin black necktie, small senior reading
      glasses perched low on the nose). His posture is thoughtful, not
      triumphant — the question is genuinely open. Warm overhead lamp.
      Dark studio-style background. The whiteboard "2026?" and the
      three labels are the ONLY text in the image — no extra captions
      or watermarks. ONE FIGURE — one single Frank.

  - key: paper-10-cover
    # Same convention as paper-00-cover: only reference.png anchors style;
    # the Papers signature (glasses + tie + dress shirt) is explicit in the
    # prompt below.
    output: blog/content/docs/papers/10-self-hosted-inference/cover.png
    description: Paper 10 cover — Frank examining a glowing token-stream LLM with a curious/weighing expression
    prompt: >-
      Frank the server-hardware Frankenstein monster examines a glowing
      token-stream emanating from an LLM — visualised as a softly
      luminous river of letters and tokens flowing between two boxes
      labelled "engine" and "gateway". Frank's expression is curious
      and weighing — he is sizing up the system, not celebrating it.
      He wears thin round reading glasses resting low on his nose and
      a thin black necktie over a white button-down dress shirt. One
      hand gestures at the token stream as if measuring it. Warm
      overhead lamp. Dark studio-style background. RJ45 neck bolts,
      green skin, messy black hair, rack-mount torso. The two boxes
      labelled "engine" and "gateway" are the ONLY text in the image
      — no extra captions or watermarks. ONE FIGURE — one single Frank.

  # --- Post Covers ------------------------------------------------------------

  - key: building-00-overview
    series: building
    output: blog/content/docs/building/00-overview/cover.png
    description: "Overview & Roadmap — Frank assembling himself"
    prompt: >-
      Frank the server-hardware Frankenstein monster standing at a workbench
      covered in blueprints. He wears blue-tinted safety goggles pushed up
      on his forehead. He is assembling himself — one arm (ethernet cables)
      is attached, the other (a GPU card) is being bolted on with blue sparks
      flying at the joint. On the workbench: Raspberry Pis, NUC mini-PCs,
      SSDs, RAM sticks, and a large blueprint/schematic showing a full cluster
      topology with seven nodes connected by lines. A roadmap checklist floats
      in the air beside him with glowing checkmarks. A blue-flame blowtorch
      lies on the bench. Workshop/lab setting with server rack shelves in
      background.

  - key: building-01-introduction
    series: building
    output: blog/content/docs/building/01-introduction/cover.png
    description: "Introduction — Why build a homelab (rejecting the cloud)"
    prompt: >-
      Frank the server-hardware Frankenstein monster sitting at a cozy desk,
      sketching blueprints of a cluster on paper. The desk has scattered
      hardware: a Raspberry Pi, a NUC mini-PC, a GPU card, ethernet cables.
      A thought bubble above his head shows a cloud icon with a big red X
      through it — he's rejecting the cloud. On the wall behind him, a
      poster shows four zones labeled "Management", "Core HA", "AI Compute",
      "Edge" with tiny hardware silhouettes in each. Warm workshop lighting,
      server rack shelves in background.

  - key: building-02-foundation
    series: building
    output: blog/content/docs/building/02-foundation/cover.png
    description: "Foundation — Talos immutable OS, Cilium eBPF networking"
    prompt: >-
      Frank the server-hardware Frankenstein monster laying the foundation
      of a building on a construction site. He wears a hard hat with a small
      blue antenna on top, crackling with faint blue sparks. He places three
      identical NUC-shaped bricks as the base layer, each stamped with a Talos
      shield logo. Glowing green eBPF/Cilium network threads weave between
      the bricks like mortar. A hexagonal bee (Cilium mascot) buzzes nearby
      trailing green network threads. Above the foundation, a ghostly padlock
      icon represents immutability — no SSH, no shell. Construction site
      setting with scaffolding and a "No SSH" warning sign.

  - key: building-03-storage
    series: building
    output: blog/content/docs/building/03-storage/cover.png
    description: "Storage — Longhorn distributed storage with 3 replicas"
    prompt: >-
      Frank the server-hardware Frankenstein monster riding a longhorn bull
      made of stacked hard drives and SSDs. The bull's horns are SATA cables,
      body is a RAID array of glowing drives. Frank holds reins made of
      iSCSI cables. Behind them, three glowing copies of a data block
      float in the air — representing three replicas. A small "gpu-local"
      label on a separate SSD strapped to the bull's saddle. Western ranch
      setting with server racks as fence posts, sunset sky.

  - key: building-04-gpu-compute
    series: building
    output: blog/content/docs/building/04-gpu-compute/cover.png
    description: "GPU Compute — RTX 5070 drama + Intel Arc iGPU"
    prompt: >-
      Frank the server-hardware Frankenstein monster with two mismatched
      arms: his right arm is a massive NVIDIA RTX 5070 GPU card (green
      glow, oversized, crackling with energy) and his left arm is a smaller
      Intel Arc iGPU (compact, sleek blue glow). The NVIDIA arm has a
      "PCIe Gen 1?!" warning sticker being peeled off — now fixed and
      working. The Intel arm has a tiny "DRA" badge. Lightning bolts arc
      between both arms. Frank grins triumphantly. Below him, a "Node
      Feature Discovery" label floats. Dark server room background.

  - key: building-05-gitops
    series: building
    output: blog/content/docs/building/05-gitops/cover.png
    description: "GitOps — ArgoCD App-of-Apps orchestra"
    prompt: >-
      Frank the server-hardware Frankenstein monster conducting an orchestra.
      Each orchestra member is a small box-shaped robot labeled with an
      app name (cilium, longhorn, gpu-operator, ollama, litellm). Frank
      holds a conductor's baton shaped like a git branch. The sheet music
