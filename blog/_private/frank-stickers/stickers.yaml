# Frank Stickers — prompt set (mirrors blog/prompt_for_images.yaml)
#
# Per-sticker prompt is composed in this fixed order:
#   base_character + sticker_atmosphere + reference_guidance + face_pins
#   + clothing + "Frank's expression: <mood>." + scene + border_spec
#
# References sent with each sticker (order matters — first = face authority):
#   references.canon_face, then references.style_anchors (09 & 20 head/hair),
#   then the per-sticker clothing subject from references.subjects_dir.
# All reference paths resolve against the repo root.
#
# `sheet` + `pos` drive build-sheets.py (2 x A4, 3x3 each).
# Regenerate one sticker: ./generate-stickers.py --only <key>

base_character: |-
  Frank — a chibi-proportioned green Frankenstein monster. Uneven cartoon-green skin with brown / reddish-tan sewn-on patches across the cheek and jaw (horizontal stitch lines crossing each; brown against green, NOT mechanical implants). Each eye is a solid BLACK circle with a single small WHITE pupil-dot — no glow. No nose. His head is slightly ROUNDED and softened — NOT a hard blocky / square flat-top Frankenstein head, NOT an angular jaw. Hair is messy and spiky with jagged peaks and is DARK (dark charcoal, near-black) — clearly DARKER than and visually DISTINCT from his green skin; it is NOT green or olive hair. Only a faint green GLOW / sheen sits on the spiky edges (matching the attached 09 & 20 sticker anchors); the bulk of the hair stays dark. Thick raised brow ridge, no eyebrows. A horizontal stitched scar across the upper forehead with a small rectangular RED bandage over it above the right eye. Two symmetric RJ45-connector bolts on the temples, each sparking faint blue. Hands stitched onto the arms with visible scar lines around the wrists. Cartoon illustration, thick outlines, vibrant colours.
sticker_atmosphere: |-
  This is a die-cut character STICKER, not a scene. Frank stands alone on a FLAT, PURE-WHITE (#FFFFFF) background with absolutely NO environment, NO server room, NO furniture, NO background props, NO text, NO drop shadow on the background. Bright, even, cheerful studio lighting on the figure — vibrant saturated cartoon colours, crisp thick black outlines, clean cel shading. The ONLY objects allowed in the frame are Frank himself and the clothes, accessories and hand tools described below.
reference_guidance: |-
  The reference images attached to this request are ANCHORS, not subjects to render.
  The FIRST reference image is the canonical character-design sheet. All of Frank's signature face features — chibi head proportions, solid BLACK eyes with a single small WHITE pupil-dot (no white sclera), no nose, jagged flat-top hair, brown sewn-on cheek and jaw patches, the red forehead bandage — come from THIS image and ONLY this image. If any additional reference image shows Frank with different face proportions, white eyes, an over-detailed face, or a "classic Frankenstein" square-jaw look, IGNORE those facial details — they are leftover from older iterations.
  Any ADDITIONAL reference images are clothing/pose anchors. Use them ONLY to match the clothing variant, accessories, and rough posture of the Frank you draw. Do NOT render them as separate figures, do NOT copy face details from them, and do NOT interpret their cropping or empty regions as compositional cues for the output frame.
  There is exactly ONE Frank in the final image, regardless of how many reference images show him.
  Redraw Frank from scratch in the scene's perspective and lighting; vary his pose, angle, head turn, and body language to fit the scene's action.
face_pins: |-
  IDENTITY LOCK — Frank's face MUST match the FIRST reference (the canonical character sheet): NO nose at all; NO fangs and NO visible teeth (mouth is a simple closed or flat line); NO eyebrows and NO unibrow — only a thick green brow RIDGE. EYES ARE CRITICAL: each eye is a SOLID BLACK oval that fills the eye opening, with absolutely NO white sclera and NO coloured iris — the ONLY white is a single tiny round pupil highlight dot. Do NOT draw large round cartoon/anime eyes with white around the pupil. ALWAYS render both temple bolts as RJ45 network connectors (modular-jack shape with visible gold pin contacts — NOT plain hex bolts), sparking faint blue. ALWAYS include the small RED rectangular bandage over the forehead scar above the right eye. Keep the brown sewn-on patches on the cheek and jaw.
border_spec: |-
  STICKER FINISH: render Frank as a glossy die-cut sticker. Around the whole figure draw a thick, even WHITE die-cut margin (a wide white 'sticker bleed' that hugs the outline of the figure and everything he holds). Immediately outside that white margin draw a single clean DARK-GREEN (#1b4332) keyline stroke of even, medium thickness that follows the same silhouette — this is the cut line. Outside the green keyline is nothing but the pure-white background. Keep the figure COMPACT and centered with generous even padding so the whole sticker (white bleed + green keyline) sits fully inside the square frame with room to spare. Pose must be tidy with NO thin trailing protrusions (no loose dangling cables, no sprawled limbs) so the green cut-line stays a simple, easy-to-cut closed shape.
defaults:
  aspect_ratio: '1:1'
references:
  canon_face: .reference-pool/building/reference-building.png
  style_anchors:
  - blog/_private/frank-stickers/images/sticker-09-server-blade.png
  - blog/_private/frank-stickers/images/sticker-20-tinkering.png
  # character sheets are name-parallel to the retired subjects/ renders,
  # so per-sticker filenames keep resolving unchanged
  subjects_dir: .reference-pool/building/reference
