# Frank Papers — series roster.
# Source of truth for the papers-roadmap.html shortcode.
#
# The shortcode looks up Site.Pages for each entry by paper_number and
# derives status dynamically:
#   - entry.deferred: true                     -> deferred (Phase 2, struck-through)
#   - page exists + draft: false               -> published (linked, full colour)
#   - page exists + draft: true                -> drafting (linked, dim)
#   - no page bundle yet                       -> planned (grey, not linked)
#
# Adding a paper here makes it appear on the /docs/papers/ roadmap.
# Publishing a paper (its index.md flips draft: false) auto-promotes the
# status on the next Hugo build.
#
# `layer` is the docs/layers.yaml registry code, used for CSS colour class
# (.layer-<code>). For papers that don't map 1:1 to a registry layer
# (Papers 15, 18, 19), use the closest fit or `default`.

