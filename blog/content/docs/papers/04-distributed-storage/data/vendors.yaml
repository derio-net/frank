features:
  - key: block
    label: Block (RWO)
  - key: file
    label: File (RWX)
  - key: object
    label: Object (S3)
  - key: snapshots
    label: Snapshots
  - key: backups
    label: Off-cluster backup
  - key: replication
    label: Synchronous replication
  - key: oss
    label: OSS / no contract required
  - key: min_nodes
    label: Min healthy nodes
vendors:
  - name: Longhorn
    features:
      block: "yes"
      file: "partial"
      object: "no"
      snapshots: "yes"
      backups: "yes"
      replication: "yes"
      oss: "yes"
      min_nodes: "3"
