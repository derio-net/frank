baseURL = "https://derio-net.github.io/frank/"
languageCode = "en-us"
title = "Frank, the Talos Cluster"

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

[params]
  description = "Building, operating, and deciding: an AI-hybrid Kubernetes homelab with Talos Linux, Cilium, Longhorn, ArgoCD, and GPU compute"
  projectSlug = "Frank"
  papersDossierDir = "docs/papers-dossiers"
  papersDossierBaseURL = "https://github.com/derio-net/frank/blob/main/docs/papers-dossiers"

  [params.navbar]
    displayTitle = true
    displayLogo = false

  [params.footer]
    displayPoweredBy = false

  [params.editURL]
    enable = false

  [params.search]
    enable = true
    type = "flexsearch"
    [params.search.flexsearch]
      index = "content"

  # Series-index card layout (cards | table | none) — read by the series-index shortcode.
  [params.seriesIndex]
    style = "cards"

  # Build-time WebP image optimization (blog-craft #14) — read by opt-image.html.
  [params.imageOptimize]
    enabled = true
    format = "webp"
    quality = 82
    maxWidth = 1600
    bannerMaxWidth = 2560

# `series` must be a taxonomy or Hextra's opengraph partial fails on
# series-tagged pages (`first 6 $series.Pages`). capabilities/references
# back the papers content-type's cross-referencing.
[taxonomies]
  series = "series"
  capabilities = "capabilities"
  references = "references"

[[menu.main]]
  name = "Building"
  pageRef = "/docs/building"
  weight = 1

[[menu.main]]
  name = "Operating"
  pageRef = "/docs/operating"
  weight = 2

[[menu.main]]
  name = "Papers"
  pageRef = "/docs/papers"
  weight = 3

[[menu.main]]
  name = "Search"
  weight = 4
  [menu.main.params]
    type = "search"

[[menu.main]]
  name = "GitHub"
  url = "https://github.com/derio-net/frank"
  weight = 5
  [menu.main.params]
    icon = "github"
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    lineNos = false
    style = "monokai"

[outputs]
  home = ["HTML", "RSS", "JSON"]

# Hugo 0.158+ default security.http.urls excludes URLs containing "@", which
# blocks Hextra's flexsearch CDN load (cdn.jsdelivr.net/npm/flexsearch@<ver>).
# Override removes that exclusion. Drop this block entirely if you disable search.
[security]
  [security.http]
    urls = ['(?i)^https?://[a-z]', '! (?i)localhost']
