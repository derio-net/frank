baseURL = "https://derio-net.github.io/frank/"
languageCode = "en-us"
title = "Frank, the Talos Cluster"

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

[params]
  description = "Tutorial series on building and operating an AI-hybrid Kubernetes homelab"

  [params.navbar]
    displayTitle = true
    displayLogo = false

  [params.footer]
    displayPoweredBy = false

  [params.editURL]
    enable = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    lineNos = false
    style = "monokai"

[outputs]
  home = ["HTML", "RSS", "JSON"]
