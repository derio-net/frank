baseURL = "https://derio-net.github.io/frank/"
languageCode = "en-us"
title = "Frank, the Talos Cluster"
theme = "PaperMod"

[params]
  env = "production"
  description = "Tutorial series on building and operating an AI-hybrid Kubernetes homelab"
  author = "Ioannis Dermitzakis"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false

  heroBanner = "images/banner-hero.png"
  thinBanner = "images/banner-thin.png"
  operatingThinBanner = "images/banner-operating-thin.png"
  mainSections = ["building", "operating"]

  [params.label]
    text = "Frank, the Talos Cluster"

  [params.homeInfoParams]
    Title = "Frank, the Talos Cluster"
    Content = "Tutorial series on building and operating an AI-hybrid Kubernetes homelab with Talos Linux, Cilium, Longhorn, ArgoCD, and GPU compute."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/derio-net/frank"

[menu]
  [[menu.main]]
    identifier = "building"
    name = "Building"
    url = "/building/"
    weight = 10
  [[menu.main]]
    identifier = "operating"
    name = "Operating"
    url = "/operating/"
    weight = 15
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "rss"
    name = "RSS"
    url = "/index.xml"
    weight = 25

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    codeFences = true
    lineNos = false
    style = "monokai"
