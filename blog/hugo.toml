baseURL = "https://derio-net.github.io/frank/"
languageCode = "en-us"
title = "Frank, the Talos Cluster"

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

[params]
  description = "Tutorial series on building and operating an AI-hybrid Kubernetes homelab"

  [params.navbar]
    displayTitle = true
    displayLogo = false

  [params.footer]
    displayPoweredBy = false

  [params.editURL]
    enable = false

  [params.search]
    enable = true
    type = "flexsearch"
    [params.search.flexsearch]
      index = "content"

[[menu.main]]
  name = "Building"
  pageRef = "/docs/building"
  weight = 1

[[menu.main]]
  name = "Operating"
  pageRef = "/docs/operating"
  weight = 2

[[menu.main]]
  name = "Search"
  weight = 3
  [menu.main.params]
    type = "search"

[[menu.main]]
  name = "GitHub"
  url = "https://github.com/derio-net/frank"
  weight = 4
  [menu.main.params]
    icon = "github"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    lineNos = false
    style = "monokai"

[outputs]
  home = ["HTML", "RSS", "JSON"]

# Hugo 0.158+ default security.http.urls excludes URLs containing "@", which
# blocks Hextra's flexsearch CDN load (cdn.jsdelivr.net/npm/flexsearch@<ver>).
# Override removes that exclusion. Drop this block entirely if you disable search.
[security]
  [security.http]
    urls = ['(?i)^https?://[a-z]', '! (?i)localhost']
