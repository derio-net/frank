  - omnictl apply -f patches/phase13-auth/omni-configpatch.yaml
  - 'Wait for Omni to propagate config to control-plane nodes (configuptodate: true in ClusterMachineStatus)'
  verify:
  - talosctl -n 192.168.55.21 get staticpod kube-apiserver -o yaml | grep oidc
  - talosctl -n 192.168.55.22 get staticpod kube-apiserver -o yaml | grep oidc
  - talosctl -n 192.168.55.23 get staticpod kube-apiserver -o yaml | grep oidc
  status: done
- id: auth-traefik-authentik-route
  layer: auth
  app: authentik
  plan: docs/superpowers/plans/2026-03-11--auth--authentik.md
  when: After Task 5 Step 4 — LB service has external IP
  why_manual: Traefik config on raspi-omni is outside cluster management
  commands:
  - 'Add authentik entry to Traefik config on raspi-omni: cilium_ip 192.168.55.211, port 80, url auth.frank.derio.net'
  - Restart Traefik on raspi-omni
  verify:
  - curl -s https://auth.frank.derio.net/if/flow/initial-setup/ | grep -i authentik
  status: done
- id: auth-traefik-forward-auth
  layer: auth
  app: authentik
  plan: docs/superpowers/plans/2026-03-11--auth--authentik.md
  when: After Task 9 Step 3 — Proxy providers created in Authentik
  why_manual: Traefik config on raspi-omni is outside cluster management
  commands:
  - Configure Traefik forwardAuth middleware pointing to https://auth.frank.derio.net/outpost.goauthentik.io/auth/traefik
  - Apply forwardAuth middleware to Longhorn, Hubble, Sympozium routes
  - Restart Traefik on raspi-omni
  verify:
  - Navigate to https://longhorn.frank.derio.net — redirects to Authentik login
  - After login, Longhorn UI loads normally
  - Repeat for https://hubble.frank.derio.net and https://sympozium.frank.derio.net
  status: done
- id: backup-r2-sops-secret
  layer: backup
  app: longhorn
  plan: docs/superpowers/plans/2026-03-08--backup--longhorn-r2.md
  when: After Task 2 — after SOPS-encrypting the R2 secret
  why_manual: SOPS metadata (.sops key) in Secret YAML is rejected by ArgoCD ServerSideApply schema validation; encrypted secrets must live outside ArgoCD-managed paths and be applied out-of-band
  commands:
  - sops --decrypt secrets/longhorn/r2-secret.yaml | kubectl apply -f -
  verify:
  - kubectl get secret longhorn-r2-secret -n longhorn-system
  status: done
- id: cicd-authentik-gitea-oidc
  layer: cicd
  app: gitea
  plan: docs/superpowers/plans/2026-03-29--cicd--platform.md
