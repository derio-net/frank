# docs/runbooks/manual-operations.yaml
#
# Central registry of all manual operations required across layers.
# Each entry corresponds to a # manual-operation block in a plan file.
# Maintained by the /sync-runbook skill — run it after editing any plan
# that adds or changes manual operations.
#
# Fields:
#   id          — unique identifier, format: <layer>-short-name
#   layer       — layer code (hw, os, net, stor, gpu, gitops, fun, obs, backup, secrets, infer, agents, auth, tenant, orch, media, edge, repo)
#   app         — ArgoCD app name or "bootstrap"
#   plan        — relative path to the plan file, or null
#   when        — trigger: what must be done first
#   why_manual  — reason this cannot be declarative
#   commands    — exact steps to execute
#   verify      — how to confirm success
#   status      — pending | done


operations:
  - id: gitops-argocd-bootstrap
    layer: gitops
    app: bootstrap
    plan: null
    when: "Initial cluster setup — before any ArgoCD apps exist"
    why_manual: "ArgoCD must be installed before it can manage itself; chicken-and-egg bootstrap"
    commands:
      - "helm repo add argo https://argoproj.github.io/argo-helm"
      - helm repo update
      - helm install argocd argo/argo-cd -n argocd --create-namespace --version 9.4.6
      - kubectl apply -f apps/root/ -n argocd
    verify:
      - kubectl get pods -n argocd
      - argocd app list --port-forward --port-forward-namespace argocd
    status: done

  - id: gpu-bios-f3-to-f6
    layer: gpu
    app: gpu-operator
    plan: docs/superpowers/plans/2026-03-09--gpu--pcie-link-speed-fix.md
    when: "After Task 1 — USB drive prepared with F6 and F3 BIOS files"
    why_manual: "BIOS update requires physical access to the machine and Q-Flash interaction — cannot be done remotely or declaratively"
    commands:
      - "Power on gpu-1, press DEL during POST to enter BIOS setup"
      - "Save & Exit → Save Profiles → export to USB as z790-eagle-f3-backup.cmo"
      - "Press F8 to launch Q-Flash, select Z790EAGLEAX.F6 from USB, confirm flash"
      - "Wait for board to reboot automatically, re-enter BIOS setup (DEL on POST)"
      - Verify BIOS version shows F6 in the top-right corner of the BIOS screen
      - "Save & Exit → Save Profiles → export to USB as z790-eagle-f6-defaults.cmo"
      - ⚠️  Settings → Miscellaneous → Secure Boot → confirm DISABLED (F6 enables it by default)
    verify:
      - BIOS version shown as F6 in BIOS setup header
      - Secure Boot shows Disabled
    status: pending

  - id: gpu-pcie-gen4
    layer: gpu
    app: gpu-operator
    plan: docs/superpowers/plans/2026-03-09--gpu--pcie-link-speed-fix.md
    when: "After Task 2 — BIOS F6 confirmed, Secure Boot confirmed disabled"
    why_manual: "PCIe slot speed is a BIOS setting — no Talos patch or kernel parameter equivalent exists for this board/driver combination"
    commands:
      - Settings → IO Ports → Above 4G Decoding → Enabled
      - Settings → IO Ports → Re-Size BAR Support → Enabled
      - Settings → IO Ports → PEG/PCIe Slot Configuration → Set x16 slot from Auto → Gen 4
      - Boot → CSM Support → Disabled
      - Press F10 to save and exit
      - Allow gpu-1 to boot into Talos
    verify:
      - "talosctl -n 192.168.55.31 dmesg | grep '0000:01:00.0' | grep 'GT/s'"
      - Output should show 16.0 GT/s (not 2.5 GT/s)
    status: pending

  - id: obs-grafana-victorialogs-migration
    layer: obs
    app: victoria-metrics
    plan: docs/superpowers/plans/2026-03-08--repo--declarative-drift-remediation.md
    when: "After Task 4 Step 5 — after ArgoCD has synced the new provisioning ConfigMap"
    why_manual: "The live API-added datasource must be deleted via Grafana UI before the provisioned one activates; Grafana does not auto-replace API datasources with provisioned ones of the same name"
    commands:
      - "Open Grafana at http://192.168.55.203"
      - Navigate to Connections → Data sources
      - "Find 'VictoriaLogs' (the API-added one, editable) and click Delete datasource"
      - kubectl -n monitoring rollout restart deployment victoria-metrics-grafana
    verify:
      - "kubectl -n monitoring logs -l app.kubernetes.io/name=grafana | grep -i victorialogs"
      - Open Grafana → Connections → Data sources — VictoriaLogs should appear as provisioned (non-editable)
      - Click Test on VictoriaLogs — expect green success
    status: done
    notes: "Grafana automatically adopted the API-added datasource when it found a provisioning config with the same name on pod restart — no manual UI deletion was needed. Datasource now readOnly=True (confirmed via API)."

  - id: backup-r2-sops-secret
    layer: backup
    app: longhorn
    plan: docs/superpowers/plans/2026-03-08--backup--longhorn-r2.md
    when: "After Task 2 — after SOPS-encrypting the R2 secret"
    why_manual: "SOPS metadata (.sops key) in Secret YAML is rejected by ArgoCD ServerSideApply schema validation; encrypted secrets must live outside ArgoCD-managed paths and be applied out-of-band"
    commands:
      - "sops --decrypt secrets/longhorn/r2-secret.yaml | kubectl apply -f -"
    verify:
      - kubectl get secret longhorn-r2-secret -n longhorn-system
    status: done

  - id: secrets-eso-credentials-secret
    layer: secrets
    app: external-secrets
    plan: docs/superpowers/plans/2026-03-08--secrets--infisical-eso.md
    when: "Task 7 — after SOPS-encrypting eso-credentials.yaml with Client ID and Secret from Infisical UI"
    why_manual: "SOPS metadata is rejected by ArgoCD ServerSideApply schema validation; encrypted secrets must live outside ArgoCD-managed paths and be applied out-of-band"
    commands:
      - source .env
      - "sops --decrypt secrets/infisical/eso-credentials.yaml | kubectl apply -f -"
    verify:
      - kubectl get secret infisical-credentials -n external-secrets
    status: done

  - id: secrets-infisical-bootstrap-secrets
    layer: secrets
    app: infisical
    plan: docs/superpowers/plans/2026-03-08--secrets--infisical-eso.md
    when: "Task 4 — after SOPS-encrypting infisical-secrets.yaml and infisical-db-uri.yaml"
    why_manual: "SOPS metadata is rejected by ArgoCD ServerSideApply schema validation; encrypted secrets must live outside ArgoCD-managed paths and be applied out-of-band"
    commands:
      - source .env
      - "sops --decrypt secrets/infisical/infisical-secrets.yaml | kubectl apply -f -"
      - "sops --decrypt secrets/infisical/infisical-db-uri.yaml | kubectl apply -f -"
    verify:
      - kubectl get secret infisical-secrets -n infisical
      - kubectl get secret infisical-db-uri -n infisical
    status: done

  - id: secrets-infisical-project-slug
    layer: secrets
    app: infisical-extras
    plan: docs/superpowers/plans/2026-03-08--secrets--infisical-eso.md
    when: "After ClusterSecretStore deployed and reports 'Project with slug not found'"
    why_manual: "Infisical auto-generates a slug that differs from the project name; no API endpoint accessible to eso-cluster-reader (Viewer) returns workspace list — slug must be read from Infisical UI"
    commands:
      - Open Infisical UI → frank-cluster project → Project Settings → General → copy Project Slug
      - "Update apps/infisical/manifests/cluster-secret-store.yaml: secretsScope.projectSlug: <slug>"
      - git add apps/infisical/manifests/cluster-secret-store.yaml
      - "{'git commit -m \"fix(infisical)': 'set correct project slug in ClusterSecretStore\"'}"
      - git push
    verify:
      - "kubectl get clustersecretstore infisical -o jsonpath='{.status.conditions[0].message}'"
      - "Expected: Valid — store validated"
    status: done
    notes: "Project slug is 'frank-cluster-iwpg' (auto-generated by Infisical v0.151.0; differs from project name 'frank-cluster'). Workspace list endpoint /api/v1/workspace returns empty array for Viewer-scoped identity."

  - id: secrets-infisical-secrets-redis-update
    layer: secrets
    app: infisical
    plan: docs/superpowers/plans/2026-03-08--secrets--infisical-eso.md
    when: "After discovering Redis chart bug — after REDIS_URL added to infisical-secrets.yaml via sops --set"
    why_manual: "SOPS metadata is rejected by ArgoCD ServerSideApply schema validation; re-apply required after adding REDIS_URL because the chart builds REDIS_URL from redis.auth.password (plain value) rather than existingSecret, so the correct URL must come from infisical-secrets envFrom"
    commands:
      - source .env
      - "sops --decrypt secrets/infisical/infisical-secrets.yaml | kubectl apply -f -"
    verify:
      - "kubectl get secret infisical-secrets -n infisical -o jsonpath='{.data.REDIS_URL}' | base64 -d"
    status: done
    notes: "REDIS_URL value: redis://default:<password>@redis-master:6379 — password matches redis.auth.existingSecretPasswordKey in infisical-redis chart"

  - id: secrets-infisical-ui-setup
    layer: secrets
    app: infisical
    plan: docs/superpowers/plans/2026-03-08--secrets--infisical-eso.md
    when: "Task 5 complete — Infisical pod Running and UI reachable at http://192.168.55.204"
    why_manual: "Initial admin account, project creation, and Machine Identity setup have no CLI equivalent in self-hosted Infisical"
    commands:
      - "Open http://192.168.55.204 → Sign Up → create admin account"
      - "Create project: frank-cluster"
      - Verify prod environment exists (Settings → Environments)
      - "Organization Settings → Machine Identities → Create Identity: eso-cluster-reader, Universal Auth"
      - Click Add Client Secret → copy Client ID and Client Secret (shown once)
      - frank-cluster project → Access Control → add eso-cluster-reader with Viewer role
    verify:
      - Machine Identity eso-cluster-reader exists in Organization Settings
      - eso-cluster-reader has Viewer access to frank-cluster project
    status: done
    notes: "UI paths differ from docs in v0.151.0: Organization Access → Identities (not Organization Settings → Machine Identities). Client Secret found under the identity's Authentication tab."

  - id: secrets-redis-statefulset-cleanup
    layer: secrets
    app: infisical-redis
    plan: docs/superpowers/plans/2026-03-08--secrets--infisical-eso.md
    when: "After creating infisical-redis ArgoCD app — when infisical pod reports EPERM connecting to Redis"
    why_manual: "ArgoCD prune:false leaves orphaned StatefulSets; the old redis-master StatefulSet (created by bundled infisical chart, label instance:infisical) conflicts with the NetworkPolicy from infisical-redis app (selects instance:infisical-redis) — must delete manually to allow correct StatefulSet to be recreated"
    commands:
      - kubectl delete statefulset redis-master -n infisical
    verify:
      - kubectl get pods -n infisical
      - "Wait for redis-master-0 to restart with correct labels: kubectl get pod redis-master-0 -n infisical --show-labels"
    status: done
    notes: "selfHeal:true in infisical-redis app recreated the StatefulSet immediately with correct labels (instance:infisical-redis)"

  - id: agents-create-sympozium-llm-key
    layer: agents
    app: sympozium-extras
    plan: docs/superpowers/plans/2026-03-09--agents--sympozium.md
    when: "Before pushing — ExternalSecret needs the Infisical source"
    why_manual: "Infisical secret creation requires UI/API interaction outside ArgoCD"
    commands:
      - "Generate a LiteLLM virtual key: curl -X POST http://192.168.55.206:4000/key/generate -H 'Authorization: Bearer <MASTER_KEY>' -H 'Content-Type: application/json' -d '{\"key_alias\": \"sympozium\"}'"
      - Copy the generated key from the response
      - "In Infisical UI (192.168.55.204:8080), project frank-cluster-iwpg, environment prod: create secret SYMPOZIUM_LITELLM_KEY with the generated key value"
    verify:
      - kubectl get externalsecret sympozium-llm-key -n sympozium-system — should show SecretSynced (after push and sync)
    status: done

  - id: agents-telegram-bot-setup
    layer: agents
    app: sympozium-extras
    plan: docs/superpowers/plans/2026-03-09--agents--sympozium.md
    when: "When ready to enable Telegram channel — not required for initial deploy"
    why_manual: "Telegram BotFather interaction is manual, token must be stored in Infisical"
    commands:
      - "Create bot via Telegram BotFather: /newbot, follow prompts"
      - Store bot token in Infisical under path /sympozium/TELEGRAM_BOT_TOKEN
      - Enable Telegram channel in SympoziumInstance manifest and push
    verify:
      - "kubectl get pods -n sympozium-system -l app=sympozium-telegram — should be Running"
    status: pending

  - id: auth-agent-machine-user
    layer: auth
    app: authentik
    plan: docs/superpowers/plans/2026-03-11--auth--authentik.md
    when: "After Task 10 Step 2 — Agent auth blueprint deployed"
    why_manual: "Machine user credentials and client secret must be set via Authentik admin UI"
    commands:
      - "In Authentik Admin UI: Directory > Users > Create Service Account"
      - "Username: claude-agent, Create group: No"
      - "In Authentik Admin UI: Directory > Users > claude-agent > Groups > Add to root-admins"
      - "In Authentik Admin UI: Providers > Kubernetes Agent Access > Edit > set Client Secret"
      - "Generate client secret: openssl rand -base64 32 | tr -d '\n' | head -c 32"
      - Save the client_id (k8s-agent) and client_secret for .env_agent
    verify:
      - "In Authentik Admin UI: Directory > Users shows claude-agent service account"
      - "In Authentik Admin UI: Directory > Users > claude-agent shows root-admins membership"
    status: done

  - id: auth-akadmin-group
    layer: auth
    app: authentik
    plan: docs/superpowers/plans/2026-03-11--auth--authentik.md
    when: "After Task 5 Step 6 — Authentik initial setup complete"
    why_manual: "Bootstrap user assignment cannot be done via blueprint (user doesn't exist until first login)"
    commands:
      - "In Authentik Admin UI: Directory > Users > akadmin > Groups > Add to root-admins"
    verify:
      - "In Authentik Admin UI: Directory > Users > akadmin shows root-admins group membership"
    status: done

  - id: auth-argocd-oidc-client-secret
    layer: auth
    app: authentik
    plan: docs/superpowers/plans/2026-03-11--auth--authentik.md
    when: "After Task 6 Step 4 — Blueprint has created the ArgoCD provider"
    why_manual: "Client secret cannot be set via blueprint (secret value must not be in Git)"
    commands:
      - "In Authentik Admin UI: Applications > Providers > ArgoCD > Edit > set Client Secret from SOPS secret value"
    verify:
      - "In Authentik Admin UI: Providers > ArgoCD shows client_secret is set (not empty)"
    status: done

  - id: auth-argocd-oidc-secret
    layer: auth
    app: argocd
    plan: docs/superpowers/plans/2026-03-11--auth--authentik.md
    when: "Before Task 6 Step 3 — ArgoCD needs the OIDC secret before OIDC is enabled"
    why_manual: "SOPS-encrypted secret applied out-of-band"
    commands:
      - "sops --decrypt secrets/authentik/argocd-oidc-secret.yaml | kubectl apply -f -"
    verify:
      - kubectl get secret argocd-oidc-secret -n argocd
    status: done

  - id: auth-authentik-bootstrap-secrets
    layer: auth
    app: authentik
    plan: docs/superpowers/plans/2026-03-11--auth--authentik.md
    when: "Before Task 3 — secrets must exist before Authentik pods start"
    why_manual: "SOPS-encrypted secrets cannot be applied via ArgoCD (SOPS + ServerSideApply don't mix)"
    commands:
      - kubectl apply -f apps/root/templates/ns-authentik.yaml
      - "sops --decrypt secrets/authentik/authentik-secrets.yaml | kubectl apply -f -"
    verify:
      - "kubectl get secret authentik-secrets -n authentik -o jsonpath='{.data.secret_key}' | base64 -d | head -c 5 && echo '...'"
    status: done

  - id: auth-grafana-oidc-client-secret
    layer: auth
    app: authentik
    plan: docs/superpowers/plans/2026-03-11--auth--authentik.md
    when: "After Task 7 Step 5 — Blueprint has created the Grafana provider"
    why_manual: "Client secret cannot be set via blueprint"
    commands:
      - "In Authentik Admin UI: Applications > Providers > Grafana > Edit > set Client Secret"
    verify:
      - "Navigate to https://grafana.frank.derio.net, click 'Sign in with Authentik', login as akadmin"
    status: done

  - id: auth-grafana-oidc-secret
    layer: auth
    app: grafana
    plan: docs/superpowers/plans/2026-03-11--auth--authentik.md
    when: "Before Task 7 Step 4 — Grafana needs OIDC secret"
    why_manual: "SOPS-encrypted secret applied out-of-band"
    commands:
      - "sops --decrypt secrets/authentik/grafana-oidc-secret.yaml | kubectl apply -f -"
    verify:
      - kubectl get secret grafana-oidc-secret -n monitoring
    status: done

  - id: auth-infisical-oidc-config
    layer: auth
    app: infisical
    plan: docs/superpowers/plans/2026-03-11--auth--authentik.md
    when: "After Task 8 Step 2 — Blueprint has created the Infisical provider"
    why_manual: "Infisical OIDC configuration is done via admin UI, not Helm values"
    commands:
      - "Decrypt client secret: sops --decrypt secrets/authentik/infisical-oidc-secret.yaml"
      - "In Authentik Admin UI: Providers > Infisical > Edit > set Client Secret"
      - "In Infisical Admin UI: Organization Settings > Security > SSO > Configure OIDC"
      - "Set Issuer URL: https://auth.frank.derio.net/application/o/infisical/"
      - "Set Client ID: infisical"
      - "Set Client Secret: (same value as in Authentik)"
    verify:
      - "Navigate to https://infisical.frank.derio.net, see 'Sign in with SSO' option"
    status: n/a
    notes: "Infisical OIDC SSO requires Pro plan — blocked on free tier"

  - id: auth-talos-oidc-patch
    layer: auth
    app: n/a
    plan: docs/superpowers/plans/2026-03-11--auth--authentik.md
    when: "After Task 10 — Authentik agent provider exists"
    why_manual: "Talos machine config patches are applied via omnictl"
    commands:
      - "omnictl apply -f patches/phase13-auth/omni-configpatch.yaml"
    verify:
      - "talosctl -n 192.168.55.21 get staticpod kube-apiserver -o yaml | grep oidc"
    status: done
    notes: "Applied as ConfigPatch 150-auth-oidc-apiserver via omnictl. Verified on all 3 control planes via staticpod resource."

  - id: auth-traefik-authentik-route
    layer: auth
    app: authentik
    plan: docs/superpowers/plans/2026-03-11--auth--authentik.md
    when: "After Task 5 Step 4 — LB service has external IP"
    why_manual: "Traefik config on raspi-omni is outside cluster management"
    commands:
      - "Add authentik entry to Traefik config on raspi-omni: cilium_ip 192.168.55.211, port 80, url auth.frank.derio.net"
      - Restart Traefik on raspi-omni
    verify:
      - "curl -s https://auth.frank.derio.net/if/flow/initial-setup/ | grep -i authentik"
    status: done

  - id: auth-traefik-forward-auth
    layer: auth
    app: authentik
    plan: docs/superpowers/plans/2026-03-11--auth--authentik.md
    when: "After Task 9 Step 3 — Proxy providers created in Authentik"
    why_manual: "Traefik config on raspi-omni is outside cluster management"
    commands:
      - "Configure Traefik forwardAuth middleware pointing to https://auth.frank.derio.net/outpost.goauthentik.io/auth/traefik"
      - "Apply forwardAuth middleware to Longhorn, Hubble, Sympozium routes"
      - Restart Traefik on raspi-omni
    verify:
      - "Navigate to https://longhorn.frank.derio.net — redirects to Authentik login"
      - "After login, Longhorn UI loads normally"
      - "Repeat for https://hubble.frank.derio.net and https://sympozium.frank.derio.net"
    status: done
    notes: "User applied Traefik changes via Ansible before implementation started"

  - id: deploy-install-kubectl-plugin
    layer: deploy
    app: argo-rollouts
    plan: docs/superpowers/specs/2026-03-25--deploy--argo-rollouts-design.md
    when: "After controller is deployed — before operating any rollouts"
    why_manual: "CLI plugin is a local developer tool, not a cluster resource"
    commands:
      - "curl -LO https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-darwin-amd64"
      - "chmod +x kubectl-argo-rollouts-darwin-amd64 && sudo mv kubectl-argo-rollouts-darwin-amd64 /usr/local/bin/kubectl-argo-rollouts"
    verify:
      - "kubectl argo rollouts version"
    status: done

  - id: orch-build-paperclip-image
    layer: orch
    app: paperclip
    plan: docs/superpowers/plans/2026-03-14--orch--paperclip.md
    when: "Before deploying paperclip — image must exist in GHCR"
    why_manual: "Upstream repo has no published images; building requires local Docker and GHCR auth"
    commands:
      - "git clone https://github.com/paperclipai/paperclip.git /tmp/paperclip && cd /tmp/paperclip && git checkout v0.3.1"
      - "docker build -t ghcr.io/derio-net/paperclip:v0.3.1 ."
      - "echo $GHCR_PAT | docker login ghcr.io -u derio-net --password-stdin"
      - "docker push ghcr.io/derio-net/paperclip:v0.3.1"
    verify:
      - "docker pull ghcr.io/derio-net/paperclip:v0.3.1"
    status: done

  - id: orch-create-infisical-secrets
    layer: orch
    app: paperclip
    plan: docs/superpowers/plans/2026-03-14--orch--paperclip.md
    when: "Before deploying paperclip — ExternalSecrets need source data"
    why_manual: "Secrets must be created in Infisical UI/CLI — cannot be declared in git"
    commands:
      - "Create LiteLLM virtual key for Paperclip in LiteLLM admin UI, store as PAPERCLIP_LITELLM_KEY in Infisical"
      - "Generate random string: openssl rand -base64 32 — store as PAPERCLIP_AUTH_SECRET in Infisical"
      - "Create GitHub PAT with read:packages scope, store as GHCR_PAT in Infisical (if not already present)"
    verify:
      - infisical secrets get PAPERCLIP_LITELLM_KEY
      - infisical secrets get PAPERCLIP_AUTH_SECRET
      - kubectl get externalsecret -n paperclip-system
    status: done

  - id: orch-traefik-paperclip-route
    layer: orch
    app: paperclip
    plan: docs/superpowers/plans/2026-03-14--orch--paperclip.md
    when: "After Paperclip deployment is healthy — add Traefik route on raspi-omni"
    why_manual: "Traefik runs outside K8s on raspi-omni, managed via Ansible"
    commands:
      - "Add paperclip entry to Traefik Ansible vars: host paperclip.frank.derio.net, backend 192.168.55.212:3100"
      - Run Ansible playbook to apply Traefik config on raspi-omni
    verify:
      - "curl -sk https://paperclip.frank.derio.net/ returns 200 (or auth redirect if forward-auth enabled)"
    status: pending

  - id: media-comfyui-model-download
    layer: media
    app: comfyui
    plan: docs/superpowers/plans/2026-03-14--media--comfyui-gpu-switcher.md
    when: "After Task 15 - ComfyUI first confirmed running"
    why_manual: "Model files must be downloaded interactively into the PVC; cannot be declarative"
    commands:
      - "# Activate ComfyUI via GPU Switcher UI at http://192.168.55.214:8080"
      - "# Wait for ComfyUI pod to be Running"
      - "# Open ComfyUI Manager at http://192.168.55.213:8188 -> Manager -> Install Models"
      - "# Install LTX-2.3 video model (~5GB)"
      - "# Optionally install Flux/SDXL image model and audio models"
    verify:
      - kubectl exec -n comfyui deploy/comfyui -- ls -la /opt/ComfyUI/models/checkpoints/
      - "# Verify models appear in ComfyUI Web UI model dropdown"
    status: pending

  - id: media-traefik-comfyui-route
    layer: media
    app: comfyui
    plan: docs/superpowers/plans/2026-03-14--media--comfyui-gpu-switcher.md
    when: "After ComfyUI deployment is healthy — add Traefik route on raspi-omni"
    why_manual: "Traefik runs outside K8s on raspi-omni, managed via Ansible"
    commands:
      - "Add comfyui entry to Traefik Ansible vars: host comfyui.frank.derio.net, backend 192.168.55.213:8188"
      - "Add gpu-switcher entry to Traefik Ansible vars: host gpu.frank.derio.net, backend 192.168.55.214:8080"
      - Run Ansible playbook to apply Traefik config on raspi-omni
    verify:
      - "curl -sk https://comfyui.frank.derio.net/ returns 200 (or auth redirect if forward-auth enabled)"
      - "curl -sk https://gpu.frank.derio.net/ returns 200 (or auth redirect if forward-auth enabled)"
    status: pending

  - id: infer-infisical-secrets
    layer: infer
    app: litellm
    plan: docs/superpowers/plans/2026-03-09--infer--ollama-litellm.md
    when: "Before Task 5 — secrets must exist in Infisical before ExternalSecret can sync"
    why_manual: "API keys are user credentials — must be entered via Infisical UI"
    commands:
      - "Open Infisical UI at http://192.168.55.204"
      - Navigate to frank-cluster project → prod environment
      - "Add secret: Key=OPENROUTER_API_KEY, Value=<your OpenRouter API key from https://openrouter.ai/settings/keys>"
      - "Add secret: Key=LITELLM_MASTER_KEY, Value=<generate with: openssl rand -hex 32>"
    verify:
      - Secrets visible in Infisical UI under frank-cluster/prod
    status: pending

  - id: edge-hop-argocd-bootstrap
    layer: edge
    app: argocd (hop)
    plan: docs/superpowers/plans/2026-03-16--edge--hop-public.md
    when: "After Task 3 — Hop root chart is committed and hop-1 is Ready"
    why_manual: "ArgoCD must be Helm-installed before it can manage itself"
    commands:
      - "export KUBECONFIG=<HOP_KUBECONFIG>"
      - kubectl create namespace argocd
      - "helm repo add argo https://argoproj.github.io/argo-helm"
      - helm install argocd argo/argo-cd --version 9.4.6 --namespace argocd -f clusters/hop/apps/argocd/values.yaml
      - |
        kubectl apply -f - <<'EOF'
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: root
          namespace: argocd
        spec:
          project: default
          source:
            repoURL: https://github.com/derio-net/frank.git
            targetRevision: main
            path: clusters/hop/apps/root
          destination:
            server: https://kubernetes.default.svc
            namespace: argocd
          syncPolicy:
            automated:
              prune: false
              selfHeal: true
        EOF
    verify:
      - "kubectl -n argocd get pods  # all pods Running"
      - "kubectl -n argocd get app root  # should show Synced/Healthy"
      - "# Note: root app initially uses project:default (AppProject hop-infrastructure doesn't exist yet). After first sync creates the AppProject, update: argocd app set root --project hop-infrastructure"
    status: pending

  - id: edge-hop-caddy-cloudflare-secret
    layer: edge
    app: caddy
    plan: docs/superpowers/plans/2026-03-16--edge--hop-public.md
    when: "Before Caddy deployment — needs Cloudflare API token"
    why_manual: "SOPS-encrypted secret applied out-of-band"
    commands:
      - |
        cat <<'EOF' > /tmp/caddy-cloudflare.yaml
        apiVersion: v1
        kind: Secret
        metadata:
          name: caddy-cloudflare
          namespace: caddy-system
        type: Opaque
        stringData:
          api-token: "<CLOUDFLARE_API_TOKEN_WITH_DNS_EDIT>"
        EOF
      - "sops --encrypt --age <AGE_PUBLIC_KEY> /tmp/caddy-cloudflare.yaml > secrets/hop/caddy-cloudflare.yaml"
      - "sops --decrypt secrets/hop/caddy-cloudflare.yaml | kubectl --kubeconfig <HOP_KUBECONFIG> apply -f -"
      - rm /tmp/caddy-cloudflare.yaml
    verify:
      - "kubectl --kubeconfig <HOP_KUBECONFIG> -n caddy-system get secret caddy-cloudflare"
    status: pending

