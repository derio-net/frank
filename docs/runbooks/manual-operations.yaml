# docs/runbooks/manual-operations.yaml
#
# Central registry of all manual operations required across layers.
# Each entry corresponds to a # manual-operation block in a plan file.
# Maintained by the /sync-runbook skill — run it after editing any plan
# that adds or changes manual operations.
#
# Fields:
#   id          — unique identifier, format: <layer>-short-name
#   layer       — layer code (hw, os, net, stor, gpu, gitops, fun, obs, backup, secrets, infer, agents, auth, tenant, orch, media, edge, repo)
#   app         — ArgoCD app name or "bootstrap"
#   plan        — relative path to the plan file, or null
#   when        — trigger: what must be done first
#   why_manual  — reason this cannot be declarative
#   commands    — exact steps to execute
#   verify      — how to confirm success
#   status      — pending | done


operations:
- id: agent-images-dispatch-pat
  layer: agents
  app: agent-images
  plan: 2026-04-15--agents--agent-images-and-vk-local-sidecar
  when: after Phase 0 Task 3 Step 1
  why_manual: PAT with cross-repo dispatch scope must be minted and stored as a secret; agent cannot create org PATs
  commands:
  - gh secret set DISPATCH_PAT --repo derio-net/agent-images --body "$(cat /path/to/pat)"
  verify:
  - gh secret list --repo derio-net/agent-images | grep DISPATCH_PAT
  status: pending
- id: agent-images-repo-create
  layer: agents
  app: agent-images
  plan: 2026-04-15--agents--agent-images-and-vk-local-sidecar
  when: before Phase 0 Task 2
  why_manual: repo creation requires GitHub org-owner auth, not available to the VK agent
  commands:
  - gh repo create derio-net/agent-images --public --description "Shared base image and per-pod child images for secure agent pods on Frank" --clone
  - 'cd agent-images && git checkout -b main && printf ''# agent-images\n'' > README.md && git add README.md && git commit -m "chore: initial commit" && git push -u origin main'
  verify:
  - gh repo view derio-net/agent-images --json name,visibility | jq -e '.name == "agent-images" and .visibility == "PUBLIC"'
  status: done
- id: agents-create-sympozium-llm-key
  layer: agents
  app: sympozium-extras
  plan: docs/superpowers/plans/2026-03-09--agents--sympozium.md
  when: Before pushing — ExternalSecret needs the Infisical source
  why_manual: Infisical secret creation requires UI/API interaction outside ArgoCD
  commands:
  - 'Generate a LiteLLM virtual key: curl -X POST http://192.168.55.206:4000/key/generate -H ''Authorization: Bearer <MASTER_KEY>'' -H ''Content-Type: application/json'' -d ''{"key_alias": "sympozium"}'''
  - Copy the generated key from the response
  - 'In Infisical UI (192.168.55.204:8080), project frank-cluster-iwpg, environment prod: create secret SYMPOZIUM_LITELLM_KEY with the generated key value'
  verify:
  - kubectl get externalsecret sympozium-llm-key -n sympozium-system — should show SecretSynced (after push and sync)
  status: done
- id: agents-telegram-bot-setup
  layer: agents
  app: sympozium-extras
  plan: docs/superpowers/plans/2026-03-09--agents--sympozium.md
  when: When ready to enable Telegram channel — not required for initial deploy
  why_manual: Telegram BotFather interaction is manual, token must be stored in Infisical
  commands:
  - 'Create bot via Telegram BotFather: /newbot, follow prompts'
  - Store bot token in Infisical under path /sympozium/TELEGRAM_BOT_TOKEN
  - Enable Telegram channel in SympoziumInstance manifest and push
  verify:
  - kubectl get pods -n sympozium-system -l app=sympozium-telegram — should be Running
  status: pending
- id: frank-actions-create-pr-permission
  layer: agents
  app: frank-repo
  plan: 2026-04-15--agents--agent-images-and-vk-local-sidecar
  when: before Phase 3 Task 3
  why_manual: GitHub repo/org settings cannot be toggled from within a workflow
  commands:
  - gh api -X PUT orgs/derio-net/actions/permissions/workflow -F default_workflow_permissions=read -F can_approve_pull_request_reviews=true
  - gh api -X PUT repos/derio-net/frank/actions/permissions/workflow -F default_workflow_permissions=read -F can_approve_pull_request_reviews=true
  verify:
  - gh api repos/derio-net/frank/actions/permissions/workflow --jq '.can_approve_pull_request_reviews'
  status: done
- id: n8n-01-sops-secret
  layer: agents
  app: n8n-01
  plan: docs/superpowers/specs/2026-03-29--agents--n8n-01-design.md
  when: Before first ArgoCD sync
  why_manual: Bootstrap secret must exist before n8n-01-postgresql starts; SOPS secrets applied out-of-band
  commands:
  - sops --decrypt secrets/n8n-01/n8n-01-secrets.yaml | kubectl apply -f -
  verify:
  - kubectl -n n8n-01 get secret n8n-01-secrets -o jsonpath='{.data.password}' | base64 -d
  status: done
- id: secure-agent-pod-bootstrap-secrets
  layer: agents
  app: secure-agent-pod
  plan: docs/superpowers/plans/2026-03-30--agents--secure-agent-pod.md
  when: Before first ArgoCD sync
  why_manual: Bootstrap secrets must exist before ESO can sync; SOPS decryption requires manual key access
  commands:
  - sops --decrypt secrets/secure-agent-pod/agent-secrets-tier2.yaml | kubectl apply -f -
  - sops --decrypt secrets/secure-agent-pod/agent-configs.yaml | kubectl apply -f -
  verify:
  - kubectl get secret agent-secrets-tier2 -n secure-agent-pod
  - kubectl get secret agent-configs -n secure-agent-pod
  status: done
- id: secure-agent-pod-infisical-setup
  layer: agents
  app: secure-agent-pod
  plan: docs/superpowers/plans/2026-03-30--agents--secure-agent-pod.md
  when: Before first ArgoCD sync (after bootstrap secrets)
  why_manual: Infisical project/secret creation requires Infisical UI; ESO universal auth token must be provisioned
  commands:
  - Navigate to Infisical → project → verify ANTHROPIC_API_KEY exists
  - kubectl get externalsecret agent-secrets-infisical -n secure-agent-pod
  verify:
  - 'kubectl get externalsecret agent-secrets-infisical -n secure-agent-pod -o jsonpath=''{.status.conditions[0].status}''  # Should return True'
  status: done
- id: secure-agent-pod-kali-cleanup
  layer: agents
  app: secure-agent-pod
  plan: docs/superpowers/plans/2026-03-30--agents--secure-agent-pod.md
  when: After Kali manifests removed and ArgoCD synced
  why_manual: PVC data deletion is destructive and irreversible; requires human confirmation
  commands:
  - kubectl delete pvc kali-root -n kali-system
  - kubectl delete namespace kali-system
  verify:
  - 'kubectl get namespace kali-system  # Should return not found'
  status: done
- id: secure-agent-pod-kali-cutover
  layer: agents
  app: secure-agent-pod
  plan: 2026-04-15--agents--agent-images-and-vk-local-sidecar
  when: after Phase 2 Task B Step 4
  why_manual: merging bounces the pod
  commands:
  - gh pr merge <PR_NUMBER> --repo derio-net/frank --squash
  - argocd app sync secure-agent-pod --port-forward --port-forward-namespace argocd
  verify:
  - kubectl -n secure-agent-pod exec deploy/secure-agent-pod -c kali -- sh -c 'command -v vibe-kanban || echo MISSING'
  status: pending
- id: secure-agent-pod-sidecar-merge
  layer: agents
  app: secure-agent-pod
  plan: 2026-04-15--agents--agent-images-and-vk-local-sidecar
  when: after Phase 2 Task A Step 4
  why_manual: merging bounces the pod running the VK session executing this plan
  commands:
  - gh pr merge <PR_NUMBER> --repo derio-net/frank --squash
  - argocd app sync secure-agent-pod --port-forward --port-forward-namespace argocd
  verify:
  - kubectl -n secure-agent-pod get pod -l app=secure-agent-pod -o jsonpath='{.items[0].status.containerStatuses[*].ready}'
  status: pending
- id: vibe-kanban-dispatch-pat
  layer: agents
  app: vibe-kanban
  plan: 2026-04-15--agents--agent-images-and-vk-local-sidecar
  when: after Phase 1 Task 1 Step 3
  why_manual: PAT must be minted and stored as a secret in the vibe-kanban repo
  commands:
  - gh secret set DISPATCH_PAT --repo derio-net/vibe-kanban --body "$(cat /path/to/pat)"
  verify:
  - gh secret list --repo derio-net/vibe-kanban | grep DISPATCH_PAT
  status: pending
- id: auth-agent-machine-user
  layer: auth
  app: authentik
  plan: docs/superpowers/plans/2026-03-11--auth--authentik.md
  when: After Task 10 Step 2 — Agent auth blueprint deployed
  why_manual: Machine user credentials and client secret must be set via Authentik admin UI
  commands:
  - 'In Authentik Admin UI: Directory > Users > Create Service Account'
  - 'Username: claude-agent, Create group: No'
  - 'In Authentik Admin UI: Directory > Users > claude-agent > Groups > Add to root-admins'
  - 'In Authentik Admin UI: Providers > Kubernetes Agent Access > Edit > set Client Secret'
  - 'Generate client secret: openssl rand -base64 32 | tr -d ''\n'' | head -c 32'
  - Save the client_id (k8s-agent) and client_secret for .env_agent
  verify:
  - 'In Authentik Admin UI: Directory > Users shows claude-agent service account'
  - 'In Authentik Admin UI: Directory > Users > claude-agent shows root-admins membership'
  status: done
- id: auth-akadmin-group
  layer: auth
  app: authentik
  plan: docs/superpowers/plans/2026-03-11--auth--authentik.md
  when: After Task 5 Step 6 — Authentik initial setup complete
  why_manual: Bootstrap user assignment cannot be done via blueprint (user doesn't exist until first login)
  commands:
  - 'In Authentik Admin UI: Directory > Users > akadmin > Groups > Add to root-admins'
  verify:
  - 'In Authentik Admin UI: Directory > Users > akadmin shows root-admins group membership'
  status: done
- id: auth-argocd-oidc-client-secret
  layer: auth
  app: authentik
  plan: docs/superpowers/plans/2026-03-11--auth--authentik.md
  when: After Task 6 Step 4 — Blueprint has created the ArgoCD provider
  why_manual: Client secret cannot be set via blueprint (secret value must not be in Git)
  commands:
  - 'In Authentik Admin UI: Applications > Providers > ArgoCD > Edit > set Client Secret from SOPS secret value'
  verify:
  - 'In Authentik Admin UI: Providers > ArgoCD shows client_secret is set (not empty)'
  status: done
- id: auth-argocd-oidc-secret
  layer: auth
  app: argocd
  plan: docs/superpowers/plans/2026-03-11--auth--authentik.md
  when: Before Task 6 Step 3 — ArgoCD needs the OIDC secret before OIDC is enabled
  why_manual: SOPS-encrypted secret applied out-of-band
  commands:
  - sops --decrypt secrets/authentik/argocd-oidc-secret.yaml | kubectl apply -f -
  verify:
  - kubectl get secret argocd-oidc-secret -n argocd
  status: done
- id: auth-authentik-bootstrap-secrets
  layer: auth
  app: authentik
  plan: docs/superpowers/plans/2026-03-11--auth--authentik.md
  when: Before Task 3 — secrets must exist before Authentik pods start
  why_manual: SOPS-encrypted secrets cannot be applied via ArgoCD (SOPS + ServerSideApply don't mix)
  commands:
  - kubectl apply -f apps/root/templates/ns-authentik.yaml
  - sops --decrypt secrets/authentik/authentik-secrets.yaml | kubectl apply -f -
  verify:
  - kubectl get secret authentik-secrets -n authentik -o jsonpath='{.data.secret_key}' | base64 -d | head -c 5 && echo '...'
  status: done
- id: auth-grafana-oidc-client-secret
  layer: auth
  app: authentik
  plan: docs/superpowers/plans/2026-03-11--auth--authentik.md
  when: After Task 7 Step 5 — Blueprint has created the Grafana provider
  why_manual: Client secret cannot be set via blueprint
  commands:
  - 'In Authentik Admin UI: Applications > Providers > Grafana > Edit > set Client Secret'
  verify:
  - Navigate to https://grafana.frank.derio.net, click 'Sign in with Authentik', login as akadmin
  status: done
- id: auth-grafana-oidc-secret
  layer: auth
  app: grafana
  plan: docs/superpowers/plans/2026-03-11--auth--authentik.md
  when: Before Task 7 Step 4 — Grafana needs OIDC secret
  why_manual: SOPS-encrypted secret applied out-of-band
  commands:
  - sops --decrypt secrets/authentik/grafana-oidc-secret.yaml | kubectl apply -f -
  verify:
  - kubectl get secret grafana-oidc-secret -n monitoring
  status: done
- id: auth-infisical-oidc-config
  layer: auth
  app: infisical
  plan: docs/superpowers/plans/2026-03-11--auth--authentik.md
  when: After Task 8 Step 2 — Blueprint has created the Infisical provider
  why_manual: Infisical OIDC configuration is done via admin UI, not Helm values
  commands:
  - 'Decrypt client secret: sops --decrypt secrets/authentik/infisical-oidc-secret.yaml'
  - 'In Authentik Admin UI: Providers > Infisical > Edit > set Client Secret'
  - 'In Infisical Admin UI: Organization Settings > Security > SSO > Configure OIDC'
  - 'Set Issuer URL: https://auth.frank.derio.net/application/o/infisical/'
  - 'Set Client ID: infisical'
  - 'Set Client Secret: (same value as in Authentik)'
  verify:
  - Navigate to https://infisical.frank.derio.net, see 'Sign in with SSO' option
  status: n/a
- id: auth-talos-oidc-patch
