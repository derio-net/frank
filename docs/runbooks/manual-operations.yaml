# docs/runbooks/manual-operations.yaml
#
# Central registry of all manual operations required across phases.
# Each entry corresponds to a # manual-operation block in a plan file.
# Maintained by the /sync-runbook skill — run it after editing any plan
# that adds or changes manual operations.
#
# Fields:
#   id          — unique identifier, format: phaseNN-short-name
#   phase       — phase number (0 = bootstrap, before ArgoCD)
#   app         — ArgoCD app name or "bootstrap"
#   plan        — relative path to the plan file, or null
#   when        — trigger: what must be done first
#   why_manual  — reason this cannot be declarative
#   commands    — exact steps to execute
#   verify      — how to confirm success
#   status      — pending | done

operations:
  - id: phase00-argocd-bootstrap
    phase: 0
    app: bootstrap
    plan: null
    when: "Initial cluster setup — before any ArgoCD apps exist"
    why_manual: "ArgoCD must be installed before it can manage itself; chicken-and-egg bootstrap"
    commands:
      - helm repo add argo https://argoproj.github.io/argo-helm
      - helm repo update
      - helm install argocd argo/argo-cd -n argocd --create-namespace --version 9.4.6
      - kubectl apply -f apps/root/ -n argocd
    verify:
      - kubectl get pods -n argocd
      - argocd app list --port-forward --port-forward-namespace argocd
    status: done

  - id: gpu1-bios-f3-to-f6
    phase: 4
    app: gpu-operator
    plan: docs/plans/2026-03-09-gpu1-pcie-link-speed-fix.md
    when: "After Task 1 — USB drive prepared with F6 and F3 BIOS files"
    why_manual: "BIOS update requires physical access to the machine and Q-Flash interaction — cannot be done remotely or declaratively"
    commands:
      - "Power on gpu-1, press DEL during POST to enter BIOS setup"
      - "Save & Exit → Save Profiles → export to USB as z790-eagle-f3-backup.cmo"
      - "Press F8 to launch Q-Flash, select Z790EAGLEAX.F6 from USB, confirm flash"
      - "Wait for board to reboot automatically, re-enter BIOS setup (DEL on POST)"
      - "Verify BIOS version shows F6 in the top-right corner of the BIOS screen"
      - "Save & Exit → Save Profiles → export to USB as z790-eagle-f6-defaults.cmo"
      - "⚠️  Settings → Miscellaneous → Secure Boot → confirm DISABLED (F6 enables it by default)"
    verify:
      - "BIOS version shown as F6 in BIOS setup header"
      - "Secure Boot shows Disabled"
    status: pending

  - id: gpu1-pcie-gen4
    phase: 4
    app: gpu-operator
    plan: docs/plans/2026-03-09-gpu1-pcie-link-speed-fix.md
    when: "After Task 2 — BIOS F6 confirmed, Secure Boot confirmed disabled"
    why_manual: "PCIe slot speed is a BIOS setting — no Talos patch or kernel parameter equivalent exists for this board/driver combination"
    commands:
      - "Settings → IO Ports → Above 4G Decoding → Enabled"
      - "Settings → IO Ports → Re-Size BAR Support → Enabled"
      - "Settings → IO Ports → PEG/PCIe Slot Configuration → Set x16 slot from Auto → Gen 4"
      - "Boot → CSM Support → Disabled"
      - "Press F10 to save and exit"
      - "Allow gpu-1 to boot into Talos"
    verify:
      - "talosctl -n 192.168.55.31 dmesg | grep '0000:01:00.0' | grep 'GT/s'"
      - "Output should show 16.0 GT/s (not 2.5 GT/s)"
    status: pending

  - id: phase07-grafana-victorialogs-migration
    phase: 7
    app: victoria-metrics
    plan: docs/plans/2026-03-08-declarative-drift-remediation-plan.md
    when: "After drift remediation Task 4 Step 5 — after ArgoCD has synced the new provisioning ConfigMap"
    why_manual: "The live API-added datasource must be deleted via Grafana UI before the provisioned one activates; Grafana does not auto-replace API datasources with provisioned ones of the same name"
    commands:
      - "Open Grafana at http://192.168.55.203"
      - "Navigate to Connections → Data sources"
      - "Find 'VictoriaLogs' (the API-added one, editable) and click Delete datasource"
      - kubectl -n monitoring rollout restart deployment victoria-metrics-grafana
    verify:
      - kubectl -n monitoring logs -l app.kubernetes.io/name=grafana | grep -i victorialogs
      - "Open Grafana → Connections → Data sources — VictoriaLogs should appear as provisioned (non-editable)"
      - "Click Test on VictoriaLogs — expect green success"
    status: done
    notes: "Grafana automatically adopted the API-added datasource when it found a provisioning config with the same name on pod restart — no manual UI deletion was needed. Datasource now readOnly=True (confirmed via API)."

  - id: phase08-r2-sops-secret
    phase: 8
    app: longhorn
    plan: docs/plans/2026-03-08-phase08-backup-impl.md
    when: "After Task 2 — after SOPS-encrypting the R2 secret"
    why_manual: "SOPS metadata (.sops key) in Secret YAML is rejected by ArgoCD ServerSideApply schema validation; encrypted secrets must live outside ArgoCD-managed paths and be applied out-of-band"
    commands:
      - sops --decrypt secrets/longhorn/r2-secret.yaml | kubectl apply -f -
    verify:
      - kubectl get secret longhorn-r2-secret -n longhorn-system
    status: done

  - id: phase09-infisical-bootstrap-secrets
    phase: 9
    app: infisical
    plan: docs/plans/2026-03-08-phase09-secrets-management.md
    when: "Task 4 — after SOPS-encrypting infisical-secrets.yaml and infisical-db-uri.yaml"
    why_manual: "SOPS metadata is rejected by ArgoCD ServerSideApply schema validation; encrypted secrets must live outside ArgoCD-managed paths and be applied out-of-band"
    commands:
      - source .env
      - sops --decrypt secrets/infisical/infisical-secrets.yaml | kubectl apply -f -
      - sops --decrypt secrets/infisical/infisical-db-uri.yaml | kubectl apply -f -
    verify:
      - kubectl get secret infisical-secrets -n infisical
      - kubectl get secret infisical-db-uri -n infisical
    status: done

  - id: phase09-infisical-ui-setup
    phase: 9
    app: infisical
    plan: docs/plans/2026-03-08-phase09-secrets-management.md
    when: "Task 5 complete — Infisical pod Running and UI reachable at http://192.168.55.204"
    why_manual: "Initial admin account, project creation, and Machine Identity setup have no CLI equivalent in self-hosted Infisical"
    commands:
      - "Open http://192.168.55.204:8080 → Sign Up → create admin account"
      - "Create project: frank-cluster"
      - "Organization Access → Identities → Create Identity: eso-cluster-reader, Member role"
      - "Click identity → Authentication → Create Client Secret → copy Client ID and Client Secret"
      - "frank-cluster project → Project Access → Access Control → Machine Identities → add eso-cluster-reader with Viewer role"
    verify:
      - "Identity eso-cluster-reader exists under Organization Access → Identities"
      - "eso-cluster-reader has Viewer access to frank-cluster project"
    status: done
    notes: "UI paths differ from docs in v0.151.0: Organization Access → Identities (not Organization Settings → Machine Identities). Client Secret found under the identity's Authentication tab."

  - id: phase09-eso-credentials-secret
    phase: 9
    app: external-secrets
    plan: docs/plans/2026-03-08-phase09-secrets-management.md
    when: "Task 7 — after SOPS-encrypting eso-credentials.yaml with Client ID and Secret from Infisical UI"
    why_manual: "SOPS metadata is rejected by ArgoCD ServerSideApply schema validation; encrypted secrets must live outside ArgoCD-managed paths and be applied out-of-band"
    commands:
      - source .env
      - sops --decrypt secrets/infisical/eso-credentials.yaml | kubectl apply -f -
    verify:
      - kubectl get secret infisical-credentials -n external-secrets
    status: done

  - id: phase09-infisical-secrets-redis-update
    phase: 9
    app: infisical
    plan: docs/plans/2026-03-08-phase09-secrets-management.md
    when: "After discovering Redis chart bug — after REDIS_URL added to infisical-secrets.yaml via sops --set"
    why_manual: "SOPS metadata is rejected by ArgoCD ServerSideApply schema validation; re-apply required after adding REDIS_URL because the chart builds REDIS_URL from redis.auth.password (plain value) rather than existingSecret, so the correct URL must come from infisical-secrets envFrom"
    commands:
      - source .env
      - sops --decrypt secrets/infisical/infisical-secrets.yaml | kubectl apply -f -
    verify:
      - kubectl get secret infisical-secrets -n infisical -o jsonpath='{.data.REDIS_URL}' | base64 -d
    status: done
    notes: "REDIS_URL value: redis://default:<password>@redis-master:6379 — password matches redis.auth.existingSecretPasswordKey in infisical-redis chart"

  - id: phase09-redis-statefulset-cleanup
    phase: 9
    app: infisical-redis
    plan: docs/plans/2026-03-08-phase09-secrets-management.md
    when: "After creating infisical-redis ArgoCD app — when infisical pod reports EPERM connecting to Redis"
    why_manual: "ArgoCD prune:false leaves orphaned StatefulSets; the old redis-master StatefulSet (created by bundled infisical chart, label instance:infisical) conflicts with the NetworkPolicy from infisical-redis app (selects instance:infisical-redis) — must delete manually to allow correct StatefulSet to be recreated"
    commands:
      - kubectl delete statefulset redis-master -n infisical
    verify:
      - kubectl get pods -n infisical
      - "Wait for redis-master-0 to restart with correct labels: kubectl get pod redis-master-0 -n infisical --show-labels"
    status: done
    notes: "selfHeal:true in infisical-redis app recreated the StatefulSet immediately with correct labels (instance:infisical-redis)"

  - id: phase09-infisical-project-slug
    phase: 9
    app: infisical-extras
    plan: docs/plans/2026-03-08-phase09-secrets-management.md
    when: "After ClusterSecretStore deployed and reports 'Project with slug not found'"
    why_manual: "Infisical auto-generates a slug that differs from the project name; no API endpoint accessible to eso-cluster-reader (Viewer) returns workspace list — slug must be read from Infisical UI"
    commands:
      - "Open Infisical UI → frank-cluster project → Project Settings → General → copy Project Slug"
      - "Update apps/infisical/manifests/cluster-secret-store.yaml: secretsScope.projectSlug: <slug>"
      - git add apps/infisical/manifests/cluster-secret-store.yaml
      - git commit -m "fix(infisical): set correct project slug in ClusterSecretStore"
      - git push
    verify:
      - kubectl get clustersecretstore infisical -o jsonpath='{.status.conditions[0].message}'
      - "Expected: Valid — store validated"
    status: done
    notes: "Project slug is 'frank-cluster-iwpg' (auto-generated by Infisical v0.151.0; differs from project name 'frank-cluster'). Workspace list endpoint /api/v1/workspace returns empty array for Viewer-scoped identity."

  - id: inference-infisical-secrets
    phase: inference
    app: litellm
    plan: docs/plans/2026-03-09-local-inference.md
    when: "Before Task 5 — secrets must exist in Infisical before ExternalSecret can sync"
    why_manual: "API keys are user credentials — must be entered via Infisical UI"
    commands:
      - "Open Infisical UI at http://192.168.55.204"
      - "Navigate to frank-cluster project → prod environment"
      - "Add secret: Key=OPENROUTER_API_KEY, Value=<your OpenRouter API key from https://openrouter.ai/settings/keys>"
      - "Add secret: Key=LITELLM_MASTER_KEY, Value=<generate with: openssl rand -hex 32>"
    verify:
      - "Secrets visible in Infisical UI under frank-cluster/prod"
    status: pending
