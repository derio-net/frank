- number: 9
  title: Pipeline Stage C тАФ Cosign Image Signing
  steps:
  - id: P5.T9.S1
    text: |-
      Generate cosign key pair and store in Infisical


      ```yaml
      # manual-operation
      id: cicd-cosign-keypair
      layer: cicd
      app: tekton
      plan: docs/superpowers/plans/2026-03-29--cicd--platform.md
      when: "Before Pipeline Stage C"
      why_manual: "Key generation must be done securely, then stored in Infisical"
      commands:
        - "COSIGN_PASSWORD='' cosign generate-key-pair (empty password тАФ the Task uses COSIGN_PASSWORD='')"
        - "Store cosign.key (private) in Infisical as COSIGN_KEY"
        - "Store cosign.pub (public) in repo at apps/tekton/cosign.pub"
      verify:
        - "Infisical тЖТ COSIGN_KEY exists"
        - "cosign.pub committed to repo"
      status: pending
      ```
  - id: P5.T9.S2
    text: |-
      Create ExternalSecret for cosign key


      Create `apps/tekton/manifests/externalsecret-cosign.yaml`:

      ```yaml
      apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      metadata:
        name: cosign-key
        namespace: tekton-pipelines
      spec:
        refreshInterval: 5m
        secretStoreRef:
          name: infisical
          kind: ClusterSecretStore
        target:
          name: cosign-key
          creationPolicy: Owner
        data:
          - secretKey: cosign.key
            remoteRef:
              key: COSIGN_KEY
      ```
  - id: P5.T9.S3
    text: |-
      Create cosign-sign Task


      Create `apps/tekton/tasks/cosign-sign.yaml`:

      ```yaml
      # Signs an OCI image with cosign
      apiVersion: tekton.dev/v1
      kind: Task
      metadata:
        name: cosign-sign
        namespace: tekton-pipelines
      spec:
        params:
          - name: image
            type: string
            description: "Full image reference to sign (with digest)"
        steps:
          - name: sign
            image: bitnami/cosign:latest
            env:
              - name: COSIGN_KEY
                value: /cosign/cosign.key
              - name: COSIGN_PASSWORD
                value: ""
            command: ["cosign"]
            args:
              - "sign"
              - "--key"
              - "/cosign/cosign.key"
              - "--tlog-upload=false"
              - "--allow-insecure-registry"
              - "$(params.image)"
            volumeMounts:
              - name: cosign-key
                mountPath: /cosign
                readOnly: true
        volumes:
          - name: cosign-key
            secret:
              secretName: cosign-key
      ```

      Note: `--tlog-upload=false` disables transparency log upload (Rekor) since this is a private registry. `--allow-insecure-registry` handles the self-signed cert. Remove if cert is trusted.
  - id: P5.T9.S4
    text: |-
      Extend gitea-ci Pipeline with cosign-sign


      Add to `apps/tekton/pipelines/gitea-ci.yaml`, after `build-push`:

      ```yaml
          # Add to spec.tasks, after 'build-push':
          - name: sign
            runAfter: ["build-push"]
            when:
              - input: $(params.image)
                operator: notin
                values: [""]
            taskRef:
              name: cosign-sign
            params:
              - name: image
                value: $(params.image)
      ```

      Note: Ideally the cosign-sign task should use the image digest (not tag) for signing. The build-push task should output the digest as a result, and the sign task should consume it. This requires adding a `results` field to the build-push task. Implement this refinement during execution тАФ for now, the tag-based signing works.
  - id: P5.T9.S5
    text: |-
      Commit


      ```bash
      git add apps/tekton/tasks/cosign-sign.yaml apps/tekton/manifests/externalsecret-cosign.yaml apps/tekton/pipelines/gitea-ci.yaml apps/tekton/cosign.pub
      git commit -m "feat(cicd): add Stage C тАФ cosign image signing after push to Zot"
      ```
  - id: P5.T9.S6
    text: |-
      Push and verify


      ```bash
      git push
      # Trigger a pipeline with image param set (same as Task 8 test)
      # After pipeline succeeds:
      cosign verify --key apps/tekton/cosign.pub --insecure-ignore-tlog --allow-insecure-registry \
        192.168.55.210:5000/test/myapp:latest
      # Expect: Verified OK (or similar success message)
      ```

      > **Deviation (2026-04-13):** Multiple fixes needed for build+sign pipeline:
      >
      > 1. **PodSecurity `restricted` blocks Kaniko** тАФ Vendored Tekton release sets `enforce: restricted` on the namespace. Patched vendored `release.yaml` to use `baseline`. The standalone namespace override in `tekton-extras` was overwritten by the `tekton-pipelines` app on every sync.
      > 2. **Kaniko auth: `.dockerconfigjson` vs `config.json`** тАФ Kaniko reads `$DOCKER_CONFIG/config.json` but `kubernetes.io/dockerconfigjson` Secrets mount as `.dockerconfigjson`. Added duplicate `config.json` key to the ExternalSecret template.
      > 3. **Cosign image `bitnami/cosign:2.4.1` doesn't exist** тАФ Switched to `gcr.io/projectsigstore/cosign:v2.4.1` (distroless, official).
      > 4. **Cosign needs registry credentials** тАФ Sign task pushes the `.sig` artifact to Zot. Mounted `zot-push-creds` Secret at `/docker` and set `DOCKER_CONFIG=/docker`.

