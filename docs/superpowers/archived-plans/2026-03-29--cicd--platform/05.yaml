- number: 8
  title: Pipeline Stage B тАФ Build Image and Push to Zot
  steps:
  - id: P5.T8.S1
    text: |-
      Create ExternalSecret for Zot push credentials


      Create `apps/tekton/manifests/externalsecret-zot-push.yaml`:

      ```yaml
      apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      metadata:
        name: zot-push-creds
        namespace: tekton-pipelines
      spec:
        refreshInterval: 5m
        secretStoreRef:
          name: infisical
          kind: ClusterSecretStore
        target:
          name: zot-push-creds
          creationPolicy: Owner
          template:
            type: kubernetes.io/dockerconfigjson
            data:
              .dockerconfigjson: |
                {"auths":{"192.168.55.210:5000":{"username":"tekton-push","password":"{{ .push_password }}"}}}
        data:
          - secretKey: push_password
            remoteRef:
              key: ZOT_PUSH_PASSWORD
      ```

      Note: Kaniko uses `kubernetes.io/dockerconfigjson` type secrets for registry auth. The ExternalSecret template renders the push password into the dockerconfig format.
  - id: P5.T8.S2
    text: |-
      Create build-push Task


      Create `apps/tekton/tasks/build-push.yaml`:

      ```yaml
      # Builds a container image and pushes to Zot
      # Default: Kaniko (no Docker daemon required, Talos-compatible)
      apiVersion: tekton.dev/v1
      kind: Task
      metadata:
        name: build-push
        namespace: tekton-pipelines
      spec:
        params:
          - name: image
            type: string
            description: "Full image reference (e.g., 192.168.55.210:5000/myapp:latest)"
          - name: dockerfile
            type: string
            default: "Dockerfile"
          - name: context
            type: string
            default: "."
        workspaces:
          - name: source
            description: "The git repo with Dockerfile"
          - name: dockerconfig
            description: "Docker config.json for registry auth"
        steps:
          - name: build-and-push
            image: gcr.io/kaniko-project/executor:latest
            args:
              - "--dockerfile=$(params.dockerfile)"
              - "--context=$(workspaces.source.path)/$(params.context)"
              - "--destination=$(params.image)"
              - "--skip-tls-verify"
            env:
              - name: DOCKER_CONFIG
                value: $(workspaces.dockerconfig.path)
      ```

      Note: The `dockerconfig` workspace is bound to the `zot-push-creds` Secret (type `kubernetes.io/dockerconfigjson`) via the Pipeline's workspace binding. Kaniko reads `$(DOCKER_CONFIG)/config.json` for registry auth. `--skip-tls-verify` handles the self-signed cert тАФ remove if cert-manager cert is trusted.
  - id: P5.T8.S3
    text: |-
      Extend the gitea-ci Pipeline with build-push


      Add the build-push task to `apps/tekton/pipelines/gitea-ci.yaml` after the `test` task. Add new params:

      ```yaml
          # Add to spec.params:
          - name: image
            type: string
            default: ""
            description: "Image to build and push (empty = skip build)"

          # Add to spec.tasks, after 'test':
          - name: build-push
            runAfter: ["test"]
            when:
              - input: $(params.image)
                operator: notin
                values: [""]
            taskRef:
              name: build-push
            params:
              - name: image
                value: $(params.image)
            workspaces:
              - name: source
                workspace: shared-workspace
              - name: dockerconfig
                workspace: docker-credentials

          # Add to spec.workspaces (after shared-workspace):
          - name: docker-credentials
            optional: true
            description: "Docker config.json for registry auth (bound to zot-push-creds Secret)"
      ```

      Note: The `when` clause makes the build step optional тАФ if `image` param is empty, it's skipped. This keeps Stage A pipelines (test-only) working.

      Also update the TriggerTemplate to pass the `docker-credentials` workspace:

      ```yaml
          # Add to TriggerTemplate resourcetemplates[0].spec.workspaces:
          - name: docker-credentials
            secret:
              secretName: zot-push-creds
      ```
  - id: P5.T8.S4
    text: |-
      Commit


      ```bash
      git add apps/tekton/tasks/build-push.yaml apps/tekton/manifests/externalsecret-zot-push.yaml apps/tekton/pipelines/gitea-ci.yaml apps/tekton/triggers/triggertemplate.yaml
      git commit -m "feat(cicd): add Stage B тАФ Kaniko image build and push to Zot"
      ```
  - id: P5.T8.S5
    text: |-
      Push and verify


      ```bash
      git push
      # Create a test repo in Gitea with a Dockerfile, then trigger a pipeline with image param set
      # Or test manually:
      cat <<'EOF' | kubectl apply -f -
      apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: test-build-
        namespace: tekton-pipelines
      spec:
        pipelineRef:
          name: gitea-ci
        params:
          - name: repo-url
            value: "http://gitea-http.gitea.svc.cluster.local:3000/<owner>/<repo>.git"
          - name: revision
            value: "main"
          - name: repo-full-name
            value: "<owner>/<repo>"
          - name: branch
            value: "main"
          - name: image
            value: "192.168.55.210:5000/test/myapp:latest"
        workspaces:
          - name: shared-workspace
            volumeClaimTemplate:
              spec:
                accessModes: ["ReadWriteOnce"]
                storageClassName: longhorn-cicd
                resources:
                  requests:
                    storage: 1Gi
          - name: docker-credentials
            secret:
              secretName: zot-push-creds
      EOF

      kubectl get pipelinerun -n tekton-pipelines -w
      # Expect: Succeeded

      # Verify image in Zot
      curl -sk https://192.168.55.210:5000/v2/_catalog
      # Expect: "test/myapp" in the repositories list
      ```

