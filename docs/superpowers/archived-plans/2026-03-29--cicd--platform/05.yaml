- number: 7
  title: Pipeline Stage A тАФ Clone, Test, Report Status
  steps:
  - id: P5.T7.S1
    text: |-
      Vendor git-clone Task from Tekton catalog


      ```bash
      curl -sL "https://raw.githubusercontent.com/tektoncd/catalog/main/task/git-clone/0.9/git-clone.yaml" \
        -o apps/tekton/tasks/git-clone.yaml

      # Verify
      grep "^kind:" apps/tekton/tasks/git-clone.yaml
      # Expect: Task
      ```

      Note: Check the Tekton catalog for the latest version of git-clone. The URL path includes the version number.
  - id: P5.T7.S2
    text: |-
      Create run-tests Task


      Create `apps/tekton/tasks/run-tests.yaml`:

      ```yaml
      # Runs a configurable test command in the cloned workspace
      apiVersion: tekton.dev/v1
      kind: Task
      metadata:
        name: run-tests
        namespace: tekton-pipelines
      spec:
        params:
          - name: test-command
            type: string
            default: "echo 'No tests configured'"
            description: "Command to run for testing"
        workspaces:
          - name: source
            description: "The git repo"
        steps:
          - name: test
            image: alpine:3
            workingDir: $(workspaces.source.path)
            script: |
              #!/bin/sh
              set -e
              echo "Running tests..."
              $(params.test-command)
              echo "Tests passed."
      ```
  - id: P5.T7.S3
    text: |-
      Create gitea-status Task


      Create `apps/tekton/tasks/gitea-status.yaml`:

      ```yaml
      # Reports commit status (success/failure) back to Gitea PR
      # Used in the `finally` block of pipelines
      apiVersion: tekton.dev/v1
      kind: Task
      metadata:
        name: gitea-status
        namespace: tekton-pipelines
      spec:
        params:
          - name: repo-full-name
            type: string
            description: "Full repo name (e.g., owner/repo)"
          - name: revision
            type: string
            description: "Git commit SHA"
          - name: state
            type: string
            description: "success, pending, failure, or error"
          - name: description
            type: string
            default: "Tekton CI"
          - name: context
            type: string
            default: "tekton-ci"
          - name: gitea-url
            type: string
            default: "http://gitea-http.gitea.svc.cluster.local:3000"
        steps:
          - name: report
            image: alpine:3
            env:
              - name: GITEA_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: gitea-api-token
                    key: token
            script: |
              #!/bin/sh
              apk add --no-cache curl
              STATUS_URL="$(params.gitea-url)/api/v1/repos/$(params.repo-full-name)/statuses/$(params.revision)"
              curl -s -X POST "$STATUS_URL" \
                -H "Authorization: token $GITEA_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{
                  \"state\": \"$(params.state)\",
                  \"description\": \"$(params.description)\",
                  \"context\": \"$(params.context)\"
                }"
              echo "Reported status '$(params.state)' for $(params.revision)"
      ```

      Note: The Gitea internal service name (`gitea-http.gitea.svc.cluster.local`) depends on the Helm chart's service naming. Verify after Gitea deployment: `kubectl get svc -n gitea`.
  - id: P5.T7.S4
    text: |-
      Create the gitea-ci Pipeline


      Create `apps/tekton/pipelines/gitea-ci.yaml`:

      ```yaml
      # Main CI pipeline triggered by Gitea webhooks
      # Stage A: clone тЖТ test тЖТ report status
      apiVersion: tekton.dev/v1
      kind: Pipeline
      metadata:
        name: gitea-ci
        namespace: tekton-pipelines
      spec:
        params:
          - name: repo-url
            type: string
          - name: revision
            type: string
          - name: repo-full-name
            type: string
          - name: branch
            type: string
          - name: test-command
            type: string
            default: "echo 'No tests configured тАФ pipeline works!'"
        workspaces:
          - name: shared-workspace
        tasks:
          - name: clone
            taskRef:
              name: git-clone
            params:
              - name: url
                value: $(params.repo-url)
              - name: revision
                value: $(params.revision)
            workspaces:
              - name: output
                workspace: shared-workspace
          - name: test
            runAfter: ["clone"]
            taskRef:
              name: run-tests
            params:
              - name: test-command
                value: $(params.test-command)
            workspaces:
              - name: source
                workspace: shared-workspace
        finally:
          - name: report-success
            when:
              - input: $(tasks.status)
                operator: in
                values: ["Succeeded"]
            taskRef:
              name: gitea-status
            params:
              - name: repo-full-name
                value: $(params.repo-full-name)
              - name: revision
                value: $(params.revision)
              - name: state
                value: "success"
              - name: description
                value: "All checks passed"
          - name: report-failure
            when:
              - input: $(tasks.status)
                operator: notin
                values: ["Succeeded"]
            taskRef:
              name: gitea-status
            params:
              - name: repo-full-name
                value: $(params.repo-full-name)
              - name: revision
                value: $(params.revision)
              - name: state
                value: "failure"
              - name: description
                value: "Pipeline failed"
      ```
  - id: P5.T7.S5
    text: |-
      Commit


      ```bash
      git add apps/tekton/tasks/ apps/tekton/pipelines/
      git commit -m "feat(cicd): add Stage A pipeline тАФ clone, test, report status to Gitea"
      ```
  - id: P5.T7.S6
    text: |-
      Push and verify end-to-end


      ```bash
      git push
      # Wait for tekton-extras ArgoCD app to sync
      argocd app get tekton-extras --port-forward --port-forward-namespace argocd

      # Verify Tasks and Pipeline exist
      kubectl get task -n tekton-pipelines
      # Expect: git-clone, run-tests, gitea-status
      kubectl get pipeline -n tekton-pipelines
      # Expect: gitea-ci
      ```
  - id: P5.T7.S7
    text: |-
      Test the full webhook тЖТ pipeline тЖТ status flow


      Push a commit to the test repo in Gitea (or trigger via mirror sync), then:

      ```bash
      kubectl get pipelinerun -n tekton-pipelines -w
      # Expect: gitea-ci-XXXXX тЖТ Running тЖТ Succeeded

      # Check logs
      tkn pipelinerun logs -n tekton-pipelines --last
      # Expect: "No tests configured тАФ pipeline works!" and "Reported status 'success'"

      # Check Gitea: the commit should show a green check mark
      curl -s -H "Authorization: token <GITEA_API_TOKEN>" \
        "http://192.168.55.209:3000/api/v1/repos/<owner>/<repo>/statuses/<sha>" | jq '.[0].state'
      # Expect: "success"
      ```

      > **Deviation (2026-04-13):** Multiple fixes required to get the pipeline running in production. PR #48 was code-review-only (dry-run), and real deployment surfaced several Tekton v1 + PodSecurity issues:
      >
      > 1. **`resources` тЖТ `computeResources`** тАФ Tekton v1 Task CRD uses `computeResources` for step limits. The `resources` field silently fails schema validation, causing ArgoCD `ComparisonError` that blocked all tekton-extras syncs.
      > 2. **`build-push` dockerconfig workspace not optional** тАФ Pipeline declares `docker-credentials` as optional, but the task workspace was required. Tekton validates upfront and rejects all PipelineRuns.
      > 3. **`fsGroup` missing from PipelineRun pod template** тАФ PVC workspace mounts as root, but git-clone runs as UID 65534. Added `taskRunTemplate.podTemplate.securityContext.fsGroup: 65534` to TriggerTemplate.
      > 4. **`safe.directory` for git** тАФ After fsGroup fix, git still rejected workspace with "dubious ownership". Added `git config --global --add safe.directory '*'`.
      > 5. **HOME=/ read-only** тАФ `git config --global` writes to `$HOME/.gitconfig`. UID 65534 has HOME=/ which is read-only. Set `HOME=/tekton/home` env var.
      > 6. **PodSecurity contexts missing** тАФ `gitea-status`, `run-tests`, and `cosign-sign` tasks had no `securityContext`, causing PodSecurity "restricted" violations. Added `runAsNonRoot`, `capabilities.drop`, `seccompProfile`.
      > 7. **`runAsUser` needed for root-default images** тАФ `alpine:3.20` defaults to root, `curlimages/curl` uses non-numeric user. Both need explicit `runAsUser` for PodSecurity compliance.
      > 8. **`$(tasks.status)` = "Completed" not "Succeeded"** тАФ When tasks are skipped via `when` clauses (build-push/sign), Tekton reports `"Completed"`. Pipeline `finally` block now accepts both values.
      > 9. **Gitea API token** тАФ `GITEA_API_TOKEN` was missing from Infisical. Created via Gitea API (`tekton-ci` token, `write:repository` scope), stored in Infisical.

