- number: 7
  title: Create n8n-01 ArgoCD Application CR
  steps:
  - id: P1.T7.S1
    text: |-
      Create Application CR


      Create `apps/root/templates/n8n-01.yaml`:

      ```yaml
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: n8n-01
        namespace: argocd
        finalizers:
          - resources-finalizer.argocd.argoproj.io
      spec:
        project: infrastructure
        source:
          repoURL: {{ .Values.repoURL }}
          targetRevision: {{ .Values.targetRevision }}
          path: apps/n8n-01/manifests
        destination:
          server: {{ .Values.destination.server }}
          namespace: n8n-01
        syncPolicy:
          automated:
            prune: false
            selfHeal: true
          syncOptions:
            - CreateNamespace=false
            - ServerSideApply=true
      ```

      Note: No `ignoreDifferences` needed — unlike the PostgreSQL app, n8n-01's manifest path contains no Secrets (the SOPS secret is applied out-of-band to the namespace, not managed by this Application).
  - id: P1.T7.S2
    text: |-
      Commit


      ```bash
      git add apps/root/templates/n8n-01.yaml
      git commit -m "feat(agents): add n8n-01 ArgoCD Application CR"
      ```

