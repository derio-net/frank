- number: 10
  title: Deploy and Verify
  steps:
  - id: P1.T10.S1
    text: |-
      Apply SOPS secret (manual operation)


      ```bash
      source .env  # Frank cluster KUBECONFIG
      # Namespace must exist first — wait for ArgoCD to sync the root app after pushing
      kubectl get namespace n8n-01 || kubectl create namespace n8n-01
      sops --decrypt secrets/n8n-01/n8n-01-secrets.yaml | kubectl apply -f -
      ```

      Verify:
      ```bash
      kubectl -n n8n-01 get secret n8n-01-secrets -o jsonpath='{.data.password}' | base64 -d
      ```
      Expected: The password value (not empty, not an error).
  - id: P1.T10.S2
    text: |-
      Wait for ArgoCD sync


      ```bash
      argocd app list --port-forward --port-forward-namespace argocd | grep n8n
      ```

      Expected: Both `n8n-01` and `n8n-01-postgresql` appear and begin syncing.
  - id: P1.T10.S3
    text: |-
      Verify PostgreSQL is running


      ```bash
      kubectl -n n8n-01 get pods -l app.kubernetes.io/name=n8n-01-postgresql
      ```

      Expected: Pod in `Running` state with `1/1` ready.
  - id: P1.T10.S4
    text: |-
      Verify n8n init container completes


      ```bash
      kubectl -n n8n-01 logs -l app.kubernetes.io/name=n8n-01 -c bootstrap-admin
      ```

      Expected: Either "User created successfully" or an error about user already existing (both are acceptable due to `|| true`).
  - id: P1.T10.S5
    text: |-
      Verify n8n pod is running


      ```bash
      kubectl -n n8n-01 get pods -l app.kubernetes.io/name=n8n-01
      ```

      Expected: Pod in `Running` state with `1/1` ready.
  - id: P1.T10.S6
    text: |-
      Verify LoadBalancer IP assignment


      ```bash
      kubectl -n n8n-01 get svc n8n-01
      ```

      Expected: `EXTERNAL-IP` shows `192.168.55.216`.
  - id: P1.T10.S7
    text: |-
      Verify n8n UI is accessible


      ```bash
      curl -s -o /dev/null -w "%{http_code}" http://192.168.55.216:5678/healthz
      ```

      Expected: `200`
  - id: P1.T10.S8
    text: |-
      Verify metrics endpoint


      ```bash
      curl -s http://192.168.55.216:5678/metrics | head -5
      ```

      Expected: Prometheus metrics output starting with `# HELP` or `# TYPE` lines with `n8n_` prefix.
  - id: P1.T10.S9
    text: |-
      Verify login with hardcoded credentials


      Open `http://192.168.55.216:5678` in a browser. Log in with:
      - Email: `admin@n8n.local`
      - Password: `admin`

      Expected: Successfully logged in to the n8n dashboard.
  - id: P1.T10.S10
    text: |-
      Verify ArgoCD health


      ```bash
      argocd app get n8n-01 --port-forward --port-forward-namespace argocd | head -10
      argocd app get n8n-01-postgresql --port-forward --port-forward-namespace argocd | head -10
      ```

      Expected: Both apps show `Health: Healthy`, `Sync: Synced`.
