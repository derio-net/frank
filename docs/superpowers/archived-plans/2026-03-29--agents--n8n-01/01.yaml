- number: 3
  title: Create n8n-01 Namespace Template
  steps:
  - id: P1.T3.S1
    text: |-
      Create namespace manifest


      Create `apps/root/templates/ns-n8n-01.yaml`:

      ```yaml
      apiVersion: v1
      kind: Namespace
      metadata:
        name: n8n-01
        labels:
          pod-security.kubernetes.io/enforce: baseline
          pod-security.kubernetes.io/enforce-version: latest
          pod-security.kubernetes.io/audit: baseline
          pod-security.kubernetes.io/warn: baseline
      ```

      Note: `baseline` PodSecurity (not `privileged`) — n8n doesn't need hostPort, privileged containers, or host namespaces. The init container runs as a normal user.
  - id: P1.T3.S2
    text: |-
      Commit


      ```bash
      git add apps/root/templates/ns-n8n-01.yaml
      git commit -m "feat(agents): add n8n-01 namespace template"
      ```

