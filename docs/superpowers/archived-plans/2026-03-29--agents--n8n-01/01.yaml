- number: 4
  title: Create n8n-01 PVC
  steps:
  - id: P1.T4.S1
    text: |-
      Create PVC manifest


      Create `apps/n8n-01/manifests/pvc.yaml`:

      ```yaml
      # Persistent storage for n8n data (binary data, file uploads, custom nodes)
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: n8n-01-data
        namespace: n8n-01
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn
        resources:
          requests:
            storage: 10Gi
      ```
