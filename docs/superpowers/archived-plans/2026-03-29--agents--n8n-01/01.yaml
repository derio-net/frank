- number: 8
  title: Add Authentik Proxy Provider Blueprint
  steps:
  - id: P1.T8.S1
    text: |-
      Add n8n-01 proxy provider and application entries


      Append the following after the last entry (Sympozium application at line 81) in `apps/authentik-extras/manifests/blueprints-proxy-providers.yaml`, inside the `entries:` list of the embedded YAML:

      ```yaml
            # n8n-01 proxy provider
            - model: authentik_providers_proxy.proxyprovider
              state: present
              identifiers:
                name: n8n-01
              id: provider-n8n-01
              attrs:
                authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
                authentication_flow: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
                mode: forward_single
                external_host: https://n8n-01.frank.derio.net

            - model: authentik_core.application
              state: present
              identifiers:
                slug: n8n-01
              attrs:
                name: n8n-01
                provider: !KeyOf provider-n8n-01
                meta_launch_url: https://n8n-01.frank.derio.net
      ```
  - id: P1.T8.S2
    text: |-
      Commit


      ```bash
      git add apps/authentik-extras/manifests/blueprints-proxy-providers.yaml
      git commit -m "feat(agents): add n8n-01 Authentik forward-auth proxy provider"
      ```

