- number: 6
  title: Create n8n-01 Service
  steps:
  - id: P1.T6.S1
    text: |-
      Create service manifest


      Create `apps/n8n-01/manifests/service.yaml`:

      ```yaml
      # n8n-01 LoadBalancer at 192.168.55.216 via Cilium L2 IPAM
      apiVersion: v1
      kind: Service
      metadata:
        name: n8n-01
        namespace: n8n-01
        annotations:
          lbipam.cilium.io/ips: "192.168.55.216"
        labels:
          app.kubernetes.io/name: n8n-01
          app.kubernetes.io/component: server
      spec:
        type: LoadBalancer
        selector:
          app.kubernetes.io/name: n8n-01
          app.kubernetes.io/component: server
        ports:
          - name: http
            port: 5678
            targetPort: http
            protocol: TCP
      ```
  - id: P1.T6.S2
    text: |-
      Commit


      ```bash
      git add apps/n8n-01/manifests/service.yaml
      git commit -m "feat(agents): add n8n-01 LoadBalancer service at 192.168.55.216"
      ```

