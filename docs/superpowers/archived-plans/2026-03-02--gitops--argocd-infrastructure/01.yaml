      ## Phase B: ArgoCD Configuration Files
- number: 3
  title: Create apps/ Directory Structure and Move Helm Values
  steps:
  - id: P1.T3.S1
    text: |-
      Create directory structure


      ```bash
      mkdir -p apps/cilium apps/longhorn/manifests apps/gpu-operator apps/argocd apps/root/templates
      ```
  - id: P1.T3.S2
    text: |-
      Create Cilium values


      Create `apps/cilium/values.yaml`:

      ```yaml
      ipam:
        mode: kubernetes

      kubeProxyReplacement: true
      k8sServiceHost: 127.0.0.1
      k8sServicePort: 7445

      securityContext:
        capabilities:
          ciliumAgent:
            - CHOWN
            - KILL
            - NET_ADMIN
            - NET_RAW
            - IPC_LOCK
            - SYS_ADMIN
            - SYS_RESOURCE
            - DAC_OVERRIDE
            - FOWNER
            - SETGID
            - SETUID
          cleanCiliumState:
            - NET_ADMIN
            - SYS_ADMIN
            - SYS_RESOURCE

      cgroup:
        autoMount:
          enabled: false
        hostRoot: /sys/fs/cgroup

      hubble:
        enabled: true
        relay:
          enabled: true
        ui:
          enabled: true

      operator:
        replicas: 2
      ```
  - id: P1.T3.S3
    text: |-
      Create Longhorn values


      Create `apps/longhorn/values.yaml`:

      ```yaml
      defaultSettings:
        defaultReplicaCount: 3
        storageMinimalAvailablePercentage: 15
        nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
        defaultDataLocality: best-effort

      persistence:
        defaultClassReplicaCount: 3
        defaultClass: true
      ```
  - id: P1.T3.S4
    text: |-
      Create Longhorn GPU-local StorageClass manifest


      Create `apps/longhorn/manifests/gpu-local-sc.yaml`:

      ```yaml
      apiVersion: storage.k8s.io/v1
      kind: StorageClass
      metadata:
        name: longhorn-gpu-local
      provisioner: driver.longhorn.io
      reclaimPolicy: Delete
      volumeBindingMode: Immediate
      allowVolumeExpansion: true
      parameters:
        numberOfReplicas: "1"
        dataLocality: strict-local
        diskSelector: "gpu-local"
      ```
  - id: P1.T3.S5
    text: |-
      Create GPU Operator values


      Create `apps/gpu-operator/values.yaml`:

      ```yaml
      driver:
        enabled: false

      toolkit:
        enabled: false

      operator:
        defaultRuntime: containerd
      ```
  - id: P1.T3.S6
    text: |-
      Verify files exist


      ```bash
      find apps/ -type f | sort
      ```

      Expected:
      ```
      apps/cilium/values.yaml
      apps/gpu-operator/values.yaml
      apps/longhorn/manifests/gpu-local-sc.yaml
      apps/longhorn/values.yaml
      ```
  - id: P1.T3.S7
    text: |-
      Commit


      ```bash
      git add apps/
      git commit -m "feat(argocd): add Helm values and manifests for infrastructure apps"
      ```

      ---
- number: 4
  title: Create ArgoCD Helm Values
  steps:
  - id: P1.T4.S1
    text: |-
      Create ArgoCD values


      Create `apps/argocd/values.yaml`:

      ```yaml
      ## ArgoCD Helm values
      ## Chart: argo-cd (argo/argo-cd)
      ## Repo: https://argoproj.github.io/argo-helm

      # Single-replica for homelab (no HA needed)
      controller:
        replicas: 1

      server:
        replicas: 1
        # Disable TLS on server (Traefik handles TLS termination if needed)
        extraArgs:
          - --insecure

      repoServer:
        replicas: 1

      redis:
        enabled: true

      # Disable dex (using built-in auth for now)
      dex:
        enabled: false

      configs:
        params:
          # Allow ArgoCD to manage resources in any namespace
          server.insecure: true
        cm:
          # Resource tracking via annotation (avoids conflicts with Helm labels)
          application.resourceTrackingMethod: annotation
      ```
  - id: P1.T4.S2
    text: |-
      Commit


      ```bash
      git add apps/argocd/values.yaml
      git commit -m "feat(argocd): add ArgoCD Helm values for homelab deployment"
      ```

      ---
- number: 5
  title: Create Root App-of-Apps Chart
  steps:
  - id: P1.T5.S1
    text: |-
      Create Chart.yaml


      Create `apps/root/Chart.yaml`:

      ```yaml
      apiVersion: v2
      name: frank-infrastructure
      version: 1.0.0
      description: App-of-Apps for frank cluster infrastructure
      ```
  - id: P1.T5.S2
    text: |-
      Create values.yaml


      Create `apps/root/values.yaml`:

      ```yaml
      # Git repo containing Helm values for each app
      repoURL: https://github.com/derio-net/frank.git
      targetRevision: main

      # Cluster destination
      destination:
        server: https://kubernetes.default.svc
      ```
  - id: P1.T5.S3
    text: |-
      Create AppProject template


      Create `apps/root/templates/project.yaml`:

      ```yaml
      apiVersion: argoproj.io/v1alpha1
      kind: AppProject
      metadata:
        name: infrastructure
        namespace: argocd
        finalizers:
          - resources-finalizer.argocd.argoproj.io
      spec:
        description: Frank cluster infrastructure components
        sourceRepos:
          - '*'
        destinations:
          - namespace: '*'
            server: {{ .Values.destination.server }}
        clusterResourceWhitelist:
          - group: '*'
            kind: '*'
        namespaceResourceWhitelist:
          - group: '*'
            kind: '*'
      ```
  - id: P1.T5.S4
    text: |-
      Create Longhorn namespace template (with PSS labels)


      Create `apps/root/templates/ns-longhorn.yaml`:

      ```yaml
      apiVersion: v1
      kind: Namespace
      metadata:
        name: longhorn-system
        labels:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/enforce-version: latest
          pod-security.kubernetes.io/audit: privileged
          pod-security.kubernetes.io/warn: privileged
      ```
  - id: P1.T5.S5
    text: |-
      Create GPU Operator namespace template (with PSS labels)


      Create `apps/root/templates/ns-gpu-operator.yaml`:

      ```yaml
      apiVersion: v1
      kind: Namespace
      metadata:
        name: gpu-operator
        labels:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/enforce-version: latest
          pod-security.kubernetes.io/audit: privileged
          pod-security.kubernetes.io/warn: privileged
      ```
  - id: P1.T5.S6
    text: |-
      Verify chart renders


      ```bash
      helm template frank-infra apps/root/
      ```

      Expected: Renders the AppProject and both Namespace YAML documents without errors.
  - id: P1.T5.S7
    text: |-
      Commit


      ```bash
      git add apps/root/Chart.yaml apps/root/values.yaml apps/root/templates/
      git commit -m "feat(argocd): create root App-of-Apps chart with project and namespaces"
      ```

      ---
- number: 6
  title: Create Cilium Application Template
  steps:
  - id: P1.T6.S1
    text: |-
      Create Cilium Application template


      Create `apps/root/templates/cilium.yaml`:

      ```yaml
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: cilium
        namespace: argocd
        finalizers:
          - resources-finalizer.argocd.argoproj.io
      spec:
        project: infrastructure
        sources:
          - repoURL: https://helm.cilium.io/
            chart: cilium
            targetRevision: "1.17.0"
            helm:
              releaseName: cilium
              valueFiles:
                - $values/apps/cilium/values.yaml
          - repoURL: {{ .Values.repoURL }}
            targetRevision: {{ .Values.targetRevision }}
            ref: values
        destination:
          server: {{ .Values.destination.server }}
          namespace: kube-system
        syncPolicy:
          automated:
            prune: false
            selfHeal: true
          syncOptions:
            - ServerSideApply=true
            - RespectIgnoreDifferences=true
        ignoreDifferences:
          - group: ""
            kind: Secret
            jsonPointers:
              - /data
      ```
  - id: P1.T6.S2
    text: |-
      Verify renders


      ```bash
      helm template frank-infra apps/root/ | grep -A 5 "name: cilium"
      ```

      Expected: Shows the Cilium Application with correct chart and values references.
  - id: P1.T6.S3
    text: |-
      Commit


      ```bash
      git add apps/root/templates/cilium.yaml
      git commit -m "feat(argocd): add Cilium Application template (adopts existing release)"
      ```

      ---
- number: 7
  title: Create Longhorn Application Templates
  steps:
  - id: P1.T7.S1
    text: |-
      Create Longhorn Helm Application template


      Create `apps/root/templates/longhorn.yaml`:

      ```yaml
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: longhorn
        namespace: argocd
        finalizers:
          - resources-finalizer.argocd.argoproj.io
      spec:
        project: infrastructure
        sources:
          - repoURL: https://charts.longhorn.io
            chart: longhorn
            targetRevision: "1.11.0"
            helm:
              releaseName: longhorn
              valueFiles:
                - $values/apps/longhorn/values.yaml
          - repoURL: {{ .Values.repoURL }}
            targetRevision: {{ .Values.targetRevision }}
            ref: values
        destination:
          server: {{ .Values.destination.server }}
          namespace: longhorn-system
        syncPolicy:
          automated:
            prune: false
            selfHeal: true
          syncOptions:
            - ServerSideApply=true
      ```
  - id: P1.T7.S2
    text: |-
      Create Longhorn extras Application template


      Create `apps/root/templates/longhorn-extras.yaml`:

      ```yaml
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: longhorn-extras
        namespace: argocd
        finalizers:
          - resources-finalizer.argocd.argoproj.io
      spec:
        project: infrastructure
        source:
          repoURL: {{ .Values.repoURL }}
          targetRevision: {{ .Values.targetRevision }}
          path: apps/longhorn/manifests
        destination:
          server: {{ .Values.destination.server }}
          namespace: longhorn-system
        syncPolicy:
          automated:
            prune: false
            selfHeal: true
      ```
  - id: P1.T7.S3
    text: |-
      Verify renders


      ```bash
      helm template frank-infra apps/root/ | grep "name: longhorn"
      ```

      Expected: Shows both `longhorn` and `longhorn-extras` Applications.
  - id: P1.T7.S4
    text: |-
      Commit


      ```bash
      git add apps/root/templates/longhorn.yaml apps/root/templates/longhorn-extras.yaml
      git commit -m "feat(argocd): add Longhorn Application templates (Helm + extras)"
      ```

