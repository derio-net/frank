- number: 8
  title: Create GPU Operator Application Template
  steps:
  - id: P1.T8.S1
    text: |-
      Create GPU Operator Application template


      Create `apps/root/templates/gpu-operator.yaml`:

      ```yaml
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: gpu-operator
        namespace: argocd
        finalizers:
          - resources-finalizer.argocd.argoproj.io
        annotations:
          argocd.argoproj.io/sync-wave: "10"
      spec:
        project: infrastructure
        sources:
          - repoURL: https://helm.ngc.nvidia.com/nvidia
