schema_version: 2
phase:
  number: 6
  title: Delivery, Ingress, CI (19, 24, 25)
  tag: agentic
  depends_on: []
  tracking_issue: null
tasks:
- number: 1
  title: Layer 19 — Progressive Delivery / Argo Rollouts (frank-ops#19)
  steps:
  - id: P6.T1.S1
    text: |-
      Append rule — argo-rollouts controller pod NotReady


      ```yaml
            # --- Layer 19 — Progressive Delivery / Argo Rollouts (frank-ops#19) ---
            # Per-pod: one alert per NotReady argo-rollouts controller pod.
            - orgId: 1
              name: layer-19-rollouts-down
              folder: feature-health
              interval: 1m
              rules:
                - uid: layer-19-rollouts-down
                  title: Layer 19 Argo Rollouts Controller Down
                  condition: C
                  data:
                    - refId: A
                      relativeTimeRange: { from: 600, to: 0 }
                      datasourceUid: P4169E866C3094E38
                      model:
                        refId: A
                        expr: 'kube_pod_status_ready{namespace="argo-rollouts",condition="true"}'
                        instant: true
                        intervalMs: 1000
                        maxDataPoints: 43200
                    - refId: B
                      relativeTimeRange: { from: 600, to: 0 }
                      datasourceUid: __expr__
                      model:
                        refId: B
                        type: reduce
                        expression: A
                        reducer: last
                        settings: { mode: dropNN }
                    - refId: C
                      relativeTimeRange: { from: 600, to: 0 }
                      datasourceUid: __expr__
                      model:
                        refId: C
                        type: threshold
                        expression: B
                        conditions:
                          - evaluator: { type: lt, params: [1] }
                  noDataState: OK
                  execErrState: Error
                  for: 10m
                  labels:
                    severity: warning
                    github_issue: "frank-ops#19"
                  annotations:
                    summary: "L19 Rollouts: controller pod {{ $labels.pod }} NotReady — canary analyses will stall"
                    runbook: "kubectl -n argo-rollouts describe pod {{ $labels.pod }}"
      ```
- number: 2
  title: Layer 24 — In-Cluster Ingress / Traefik (frank-ops#24)
  steps:
  - id: P6.T2.S1
    text: |-
      Append rule — Traefik pod NotReady


      ```yaml
            # --- Layer 24 — In-Cluster Ingress / Traefik (frank-ops#24) ---
            # Per-pod: one alert per NotReady Traefik pod.
            - orgId: 1
              name: layer-24-ingress-down
              folder: feature-health
              interval: 1m
              rules:
                - uid: layer-24-ingress-down
                  title: Layer 24 Traefik Ingress Down
                  condition: C
                  data:
                    - refId: A
                      relativeTimeRange: { from: 600, to: 0 }
                      datasourceUid: P4169E866C3094E38
                      model:
                        refId: A
                        expr: 'kube_pod_status_ready{namespace="traefik",condition="true"}'
                        instant: true
                        intervalMs: 1000
                        maxDataPoints: 43200
                    - refId: B
                      relativeTimeRange: { from: 600, to: 0 }
                      datasourceUid: __expr__
                      model:
                        refId: B
                        type: reduce
                        expression: A
                        reducer: last
                        settings: { mode: dropNN }
                    - refId: C
                      relativeTimeRange: { from: 600, to: 0 }
                      datasourceUid: __expr__
                      model:
                        refId: C
                        type: threshold
                        expression: B
                        conditions:
                          - evaluator: { type: lt, params: [1] }
                  noDataState: OK
                  execErrState: Error
                  for: 5m
                  labels:
                    severity: critical
                    github_issue: "frank-ops#24"
                  annotations:
                    summary: "L24 Traefik: pod {{ $labels.pod }} NotReady — *.cluster.derio.net hostnames at risk"
                    runbook: "kubectl -n traefik describe pod {{ $labels.pod }}; kubectl -n traefik logs {{ $labels.pod }} --tail=50"
      ```
- number: 3
  title: Layer 25 — CI/CD Platform (frank-ops#25)
  steps:
  - id: P6.T3.S1
    text: |-
      Append rule — Gitea, Tekton controller, or Zot down


      ```yaml
            # --- Layer 25 — CI/CD / Gitea + Tekton + Zot (frank-ops#25) ---
            # Per-pod: one alert per NotReady Gitea / Tekton / Zot pod.
            - orgId: 1
              name: layer-25-cicd-down
              folder: feature-health
              interval: 1m
              rules:
                - uid: layer-25-cicd-down
                  title: Layer 25 CI/CD Platform Degraded
                  condition: C
                  data:
                    - refId: A
                      relativeTimeRange: { from: 600, to: 0 }
                      datasourceUid: P4169E866C3094E38
                      model:
                        refId: A
                        expr: 'kube_pod_status_ready{namespace=~"gitea|tekton-pipelines|zot",condition="true"}'
                        instant: true
                        intervalMs: 1000
                        maxDataPoints: 43200
                    - refId: B
                      relativeTimeRange: { from: 600, to: 0 }
                      datasourceUid: __expr__
                      model:
                        refId: B
                        type: reduce
                        expression: A
                        reducer: last
                        settings: { mode: dropNN }
                    - refId: C
                      relativeTimeRange: { from: 600, to: 0 }
                      datasourceUid: __expr__
                      model:
                        refId: C
                        type: threshold
                        expression: B
                        conditions:
                          - evaluator: { type: lt, params: [1] }
                  noDataState: OK
                  execErrState: Error
                  for: 10m
                  labels:
                    severity: warning
                    github_issue: "frank-ops#25"
                  annotations:
                    summary: "L25 CI/CD: {{ $labels.namespace }}/{{ $labels.pod }} NotReady"
                    runbook: "kubectl -n {{ $labels.namespace }} describe pod {{ $labels.pod }}"
      ```
- number: 4
  title: Deploy + verify Phase 6 rules
  steps:
  - id: P6.T4.S1
    text: |-
      Commit + push


      ```bash
      git add apps/grafana-alerting/manifests/alert-rules-cm.yaml
      git commit -m "feat(obs): add Layer 19 + 24 + 25 delivery/ingress/CI rules → frank-ops#19-103"
      git push origin main
      kubectl delete pod -n monitoring -l app.kubernetes.io/name=grafana
      kubectl rollout status -n monitoring deploy/grafana --timeout=120s
      ```
  - id: P6.T4.S2
    text: |-
      Smoke-test (webhook loop frank-ops#19 warning, frank-ops#24 critical, frank-ops#25 warning)


