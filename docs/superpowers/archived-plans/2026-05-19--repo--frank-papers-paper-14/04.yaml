tasks:
- number: 1
  title: Generate per-paper cover image
  steps:
  - id: P4.T1.S1
    text: |-
      Add Paper 14 cover prompt to `blog/prompt_for_images.yaml`


      Add a new entry under the `# --- Papers Series Covers ---`
      section, after the most recent paper entry:

      ```yaml
        - key: paper-14-cover
          output: blog/content/docs/papers/14-progressive-delivery/cover.png
          description: Paper 14 cover — Frank examining a traffic-splitting signal box with a weighing expression
          prompt: >-
            Frank the server-hardware Frankenstein monster stands in
            front of a vintage railway signal box with three large
            numbered levers labelled 20, 50, 100 (representing canary
            setWeight steps). One green-skinned hand rests on the 20
            lever, half-pulled; the other hand holds a clipboard with
            a small Grafana-style sparkline drawn on it. His expression
            is weighing — genuinely uncertain whether the metric will
            hold. He wears thin round reading glasses resting low on
            his nose and a thin black necktie. Warm overhead lamp on a
            dark background. RJ45 neck bolts, green skin, messy black
            hair, rack-mount torso. The signal box glows faintly amber.
            No text in the image.
      ```
  - id: P4.T1.S2
    text: |-
      Generate the cover image


      ```bash
      set -a && source .env_common && set +a
      uv sync
      .venv/bin/python scripts/generate-all-images.py \
        -r blog/static/images/reference.png \
        --only paper-14-cover
      ```

      Expected: `blog/content/docs/papers/14-progressive-delivery/cover.png`
      created, ≥50KB.

      If generation fails for any reason (Gemini API timeout, quota,
      etc.), fall back: `cp blog/static/images/reference.png
      blog/content/docs/papers/14-progressive-delivery/cover.png` and
      tick step `--state - --note "Gemini fallback used; regen
      post-merge."`

      Spot-check: Frank should have thin round reading glasses, thin
      black tie, weighing expression, and the signal-box / lever
      metaphor should be recognisable. Up to 3 regeneration attempts
      if the visual signature is missing.
- number: 2
  title: Render Mermaid diagrams and verify they parse
  steps:
  - id: P4.T2.S1
    text: |-
      Review draft for `TODO:<type>` diagram placeholders


      ```bash
      grep -n "TODO:" blog/content/docs/papers/14-progressive-delivery/index.md
      ```

      Expected: no `TODO:` lines remaining after Phase 3 draft work
      (TL;DR remains pending — that is by design and lives outside
      the Mermaid scope).
  - id: P4.T2.S2
    text: |-
      Verify Mermaid diagrams parse without errors in Hugo dev server


      ```bash
      cd blog && PATH=/usr/local/Cellar/go/1.26.2/bin:$PATH hugo --minify --buildDrafts 2>&1 | grep -E "^ERROR|^WARN" | head -10
      ls -lh public/docs/papers/14-progressive-delivery/index.html
      ```

      Expected: zero ERROR lines; `index.html` exists and is ≥10 KB.
- number: 3
  title: Capture Argo Rollouts / Grafana canary screenshot
  steps:
  - id: P4.T3.S1
    text: |-
      Capture a canary screenshot showing a real rollout in progress


      Source: `kubectl argo rollouts get rollout litellm -n litellm`
      output, or a Grafana panel showing the canary's error-rate
      during a real promotion.

      Procedure:
      ```bash
      # From a machine with cluster access:
      # 1. kubectl argo rollouts get rollout litellm -n litellm --watch
      #    (capture the staged 20/50/100 progress)
      # OR
      # 2. Open Grafana → LiteLLM dashboard during a canary run
      #    and screenshot the error-rate panel.
      ```

      Save to:
      ```
      blog/content/docs/papers/14-progressive-delivery/argo-rollouts-canary.png
      ```

      If cluster access is unavailable, copy the 1×1 placeholder
      and rename with `-TODO.png` suffix:
      ```bash
      cp blog/content/docs/papers/11-identity-heterogeneous-stack/authentik-applications-TODO.png \
         blog/content/docs/papers/14-progressive-delivery/argo-rollouts-canary-TODO.png
      ```
      Tick the step `--state - --note "Cluster access unavailable
      from worktree."`
- number: 4
  title: Full Hugo build smoke-test
  steps:
  - id: P4.T4.S1
    text: |-
      Run the production Hugo build to assert zero errors


      ```bash
      cd blog && PATH=/usr/local/Cellar/go/1.26.2/bin:$PATH hugo --minify --buildDrafts 2>&1 | grep -E "^ERROR|^WARN" | head -10
      ls -lh public/docs/papers/14-progressive-delivery/index.html
      ```

      Expected: zero ERROR lines; `index.html` exists and is ≥10 KB.
