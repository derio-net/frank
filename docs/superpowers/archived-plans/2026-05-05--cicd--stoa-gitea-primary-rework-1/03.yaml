tasks:
- number: 1
  title: Author `github-status` Task
  steps:
  - id: P3.T1.S1
    text: |-
      Create `apps/tekton/tasks/github-status.yaml`


      ```yaml
      apiVersion: tekton.dev/v1
      kind: Task
      metadata:
        name: github-status
        namespace: tekton-pipelines
      spec:
        description: |
          POST a commit status to GitHub via repos/<owner>/<repo>/statuses/<sha>.
          Used as the mandatory final step of any pipeline that runs against a
          GitHub-sourced commit (PR-time CI, main-sync verification, etc.).
        params:
          - name: repo
            description: "owner/repo (e.g. agentic-stoa/hum)"
            type: string
          - name: sha
            description: "commit SHA to attach status to"
            type: string
          - name: state
            description: "pending | success | failure | error"
            type: string
          - name: context
            description: "status context label (default: tekton/ci)"
            type: string
            default: "tekton/ci"
          - name: target_url
            description: "URL the status check links to (Tekton dashboard PipelineRun)"
            type: string
            default: ""
          - name: description
            description: "short status message (≤140 chars)"
            type: string
            default: ""
        steps:
          - name: post-status
            image: curlimages/curl:8.10.1
            computeResources:
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                cpu: 100m
                memory: 64Mi
            env:
              - name: GITHUB_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: stoa-github-mirror   # ESO-loaded; same Secret as parent plan
                    key: token
            script: |
              #!/bin/sh
              set -eu
              BODY=$(printf '{"state":"%s","context":"%s","description":"%s","target_url":"%s"}' \
                "$(params.state)" "$(params.context)" "$(params.description)" "$(params.target_url)")
              echo "posting to repos/$(params.repo)/statuses/$(params.sha): $BODY"
              HTTP=$(curl -s -o /tmp/resp -w '%{http_code}' \
                -X POST \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H 'Accept: application/vnd.github+json' \
                -H 'Content-Type: application/json' \
                "https://api.github.com/repos/$(params.repo)/statuses/$(params.sha)" \
                -d "$BODY")
              cat /tmp/resp
              echo
              if [ "$HTTP" -ge 400 ]; then
                echo "ERROR: github status post failed (HTTP $HTTP)" >&2
                exit 1
              fi
      ```

      Note on the curl image: `runAsNonRoot` per the gotcha in `frank-gotchas.md` — `curlimages/curl` uses non-numeric user `curl_user`. Add explicit `runAsUser: 100` if Pod security fails, OR use a different image.
  - id: P3.T1.S2
    text: |-
      Commit + verify Task lands


      ```bash
      git add apps/tekton/tasks/github-status.yaml
      git commit -m 'feat(cicd): github-status Task — POST commit status to GitHub (rework Phase 3)'
      git push
      kubectl get task -n tekton-pipelines github-status   # expect: present
      ```
- number: 2
  title: Author `github-pull-sync` Pipeline
  steps:
  - id: P3.T2.S1
    text: |-
      Create `apps/tekton/pipelines/github-pull-sync.yaml`


      ```yaml
      apiVersion: tekton.dev/v1
      kind: Pipeline
      metadata:
        name: github-pull-sync
        namespace: tekton-pipelines
      spec:
        description: |
          Pull a ref from GitHub and push it into the matching Gitea-replica repo.
          Triggered by:
            - PR webhook events (ref-from = refs/pull/N/head, ref-to = refs/pull/N/head on Gitea side)
            - push-to-main webhook events (ref-from = refs/heads/main, ref-to = refs/heads/main)
          Idempotent — git push is force-with-lease against refs/pull/* on Gitea.
        params:
          - name: github-repo   # e.g. agentic-stoa/hum
            type: string
          - name: gitea-repo    # e.g. agentic-stoa/hum (same in this rework)
            type: string
          - name: ref-from      # e.g. refs/pull/12/head
            type: string
          - name: ref-to        # e.g. refs/pull/12/head OR refs/heads/main
            type: string
          - name: sha           # the commit SHA to fetch
            type: string
        workspaces:
          - name: source
            description: clone target dir
          - name: ssh-creds
            description: stoa-bot SSH key for pushing into Gitea
        tasks:
          - name: fetch-from-github
            taskRef:
              name: git-clone
            workspaces:
              - name: output
                workspace: source
            params:
              - name: url
                value: "https://github.com/$(params.github-repo).git"
              - name: revision
                value: "$(params.sha)"
              - name: refspec
                value: "+$(params.ref-from):$(params.ref-from)"
              - name: deleteExisting
                value: "true"
          - name: push-to-gitea
            runAfter: [fetch-from-github]
            workspaces:
              - name: source
                workspace: source
              - name: ssh
                workspace: ssh-creds
            taskSpec:
              params:
                - name: gitea-repo
                - name: ref-to
              workspaces:
                - name: source
                - name: ssh
                  mountPath: /workspace/ssh
              steps:
                - name: push
                  image: alpine/git:2.45.2
                  script: |
                    #!/bin/sh
                    set -eu
                    cd $(workspaces.source.path)
                    mkdir -p ~/.ssh
                    cp $(workspaces.ssh.path)/id_rsa ~/.ssh/id_rsa
                    chmod 600 ~/.ssh/id_rsa
                    ssh-keyscan -p 2222 -H 192.168.55.209 >> ~/.ssh/known_hosts
                    git remote add gitea git@192.168.55.209:agentic-stoa/$(echo $(params.gitea-repo) | cut -d/ -f2).git || true
                    git push --force gitea HEAD:$(params.ref-to)
            params:
              - name: gitea-repo
                value: "$(params.gitea-repo)"
              - name: ref-to
                value: "$(params.ref-to)"
      ```

      Note: this pipeline assumes `git-clone` Task already exists at `apps/tekton/tasks/git-clone.yaml` (it does — verified in the parent plan's substrate).
  - id: P3.T2.S2
    text: |-
      Provision `stoa-bot` SSH key for the pull-sync pipeline


      The pull-sync pipeline pushes INTO Gitea using `stoa-bot`'s SSH key. We need:

      1. Generate an SSH keypair for `stoa-bot` (if not already done in parent plan Phase 0): `ssh-keygen -t ed25519 -f /tmp/stoa-bot-id -C 'tekton-stoa-bot'`
      2. Add the public key to Gitea: UI → stoa-bot user → Settings → SSH/GPG Keys → Add
      3. Create a Kubernetes Secret holding the private key:

         ```yaml
         # SOPS-encrypted, lives in secrets/stoa/stoa-bot-ssh-key.yaml
         apiVersion: v1
         kind: Secret
         metadata:
           name: stoa-bot-ssh-key
           namespace: tekton-pipelines
         type: Opaque
         stringData:
           id_rsa: <PRIVATE_KEY>
         ```

      Apply via the standard SOPS-bootstrap manual-op pattern (operator-side, age key required — can't be done from in-cluster).

      The pull-sync Pipeline references this Secret as `ssh-creds` workspace via:

      ```yaml
      workspaces:
        - name: ssh-creds
          secret:
            secretName: stoa-bot-ssh-key
      ```

      (Wired up in Phase 4 when the Trigger spec assembles the workspace bindings.)
  - id: P3.T2.S3
    text: |-
      Commit + verify Pipeline lands


      ```bash
      git add apps/tekton/pipelines/github-pull-sync.yaml
      git commit -m 'feat(cicd): github-pull-sync Pipeline (rework Phase 3)'
      git push
      kubectl get pipeline -n tekton-pipelines github-pull-sync   # expect: present
      ```
  - id: P3.T2.S4
    text: |-
      Manual smoke test: invoke pull-sync with a known SHA


      Trigger a PipelineRun by hand to verify the pipeline mechanics before wiring triggers in Phase 4:

      ```bash
      kubectl create -f - <<'EOF'
      apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: github-pull-sync-smoke-
        namespace: tekton-pipelines
      spec:
        pipelineRef:
          name: github-pull-sync
        params:
          - name: github-repo
            value: agentic-stoa/hum
          - name: gitea-repo
            value: agentic-stoa/hum
          - name: ref-from
            value: refs/heads/main
          - name: ref-to
            value: refs/heads/main
          - name: sha
            value: <CURRENT_GITHUB_MAIN_SHA>
        workspaces:
          - name: source
            emptyDir: {}
          - name: ssh-creds
            secret:
              secretName: stoa-bot-ssh-key
      EOF
      ```

      Verify: PipelineRun succeeds, Gitea's main HEAD == GitHub's main HEAD.
