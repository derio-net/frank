tasks:
- number: 1
  title: Create Go Project and Repository
  steps:
  - id: P1.T1.S1
    text: |-
      Create the repository on GitHub


      ```bash
      gh repo create derio-net/health-bridge --private --description "Grafana webhook → GitHub Project lifecycle state bridge"
      gh repo clone derio-net/health-bridge
      cd health-bridge
      ```
  - id: P1.T1.S2
    text: |-
      Initialize Go module


      ```bash
      go mod init github.com/derio-net/health-bridge
      ```

      Expected: `go.mod` created with module path.
  - id: P1.T1.S3
    text: "Write `main.go`\n\n\nCreate `main.go`:\n\n```go\npackage main\n\nimport\
      \ (\n\t\"log\"\n\t\"net/http\"\n\t\"os\"\n\t\"strconv\"\n)\n\nfunc main() {\n\
      \ttoken := mustEnv(\"GITHUB_TOKEN\")\n\tsecret := mustEnv(\"WEBHOOK_SECRET\"\
      )\n\torg := envOrDefault(\"GITHUB_ORG\", \"derio-net\")\n\tprojectNum := envOrDefaultInt(\"\
      PROJECT_NUMBER\", 1)\n\tport := envOrDefault(\"PORT\", \"8080\")\n\n\tbridge,\
      \ err := NewBridge(token, org, projectNum)\n\tif err != nil {\n\t\tlog.Fatalf(\"\
      Failed to initialize bridge: %v\", err)\n\t}\n\n\tmux := http.NewServeMux()\n\
      \tmux.HandleFunc(\"POST /webhook\", bridge.WebhookHandler(secret))\n\tmux.HandleFunc(\"\
      GET /healthz\", func(w http.ResponseWriter, r *http.Request) {\n\t\tw.WriteHeader(http.StatusOK)\n\
      \t\tw.Write([]byte(\"ok\"))\n\t})\n\tmux.HandleFunc(\"GET /readyz\", func(w\
      \ http.ResponseWriter, r *http.Request) {\n\t\tif bridge.Ready() {\n\t\t\tw.WriteHeader(http.StatusOK)\n\
      \t\t\tw.Write([]byte(\"ready\"))\n\t\t} else {\n\t\t\tw.WriteHeader(http.StatusServiceUnavailable)\n\
      \t\t\tw.Write([]byte(\"not ready\"))\n\t\t}\n\t})\n\n\tlog.Printf(\"health-bridge\
      \ listening on :%s (org=%s, project=%d)\", port, org, projectNum)\n\tlog.Fatal(http.ListenAndServe(\"\
      :\"+port, mux))\n}\n\nfunc mustEnv(key string) string {\n\tval := os.Getenv(key)\n\
      \tif val == \"\" {\n\t\tlog.Fatalf(\"Required environment variable %s is not\
      \ set\", key)\n\t}\n\treturn val\n}\n\nfunc envOrDefault(key, fallback string)\
      \ string {\n\tif val := os.Getenv(key); val != \"\" {\n\t\treturn val\n\t}\n\
      \treturn fallback\n}\n\nfunc envOrDefaultInt(key string, fallback int) int {\n\
      \tif val := os.Getenv(key); val != \"\" {\n\t\tn, err := strconv.Atoi(val)\n\
      \t\tif err != nil {\n\t\t\tlog.Fatalf(\"Environment variable %s must be an integer,\
      \ got %q\", key, val)\n\t\t}\n\t\treturn n\n\t}\n\treturn fallback\n}\n```"
  - id: P1.T1.S4
    text: |-
      Commit


      ```bash
      git add go.mod main.go
      git commit -m "feat: initial project structure with main entry point"
      ```

