                resources:
                  requests:
                    cpu: 10m
                    memory: 16Mi
                  limits:
                    memory: 32Mi
                livenessProbe:
                  httpGet:
                    path: /healthz
                    port: http
                  initialDelaySeconds: 5
                  periodSeconds: 30
                readinessProbe:
                  httpGet:
                    path: /readyz
                    port: http
                  initialDelaySeconds: 5
                  periodSeconds: 10
      ---
      apiVersion: v1
      kind: Service
      metadata:
        name: health-bridge
        namespace: monitoring
        labels:
