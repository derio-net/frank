- number: 3
  title: Implement GitHub GraphQL Client
  steps:
  - id: P1.T3.S1
    text: "Write `github.go`\n\n\nCreate `github.go`:\n\n```go\npackage main\n\nimport\
      \ (\n\t\"bytes\"\n\t\"encoding/json\"\n\t\"fmt\"\n\t\"io\"\n\t\"log\"\n\t\"\
      net/http\"\n\t\"time\"\n)\n\nconst githubGraphQLURL = \"https://api.github.com/graphql\"\
      \nconst githubRESTURL = \"https://api.github.com\"\n\n// GitHubClient handles\
      \ GitHub API interactions for project lifecycle management.\ntype GitHubClient\
      \ struct {\n\ttoken         string\n\torg           string\n\tprojectNumber\
      \ int\n\tprojectID     string\n\tfieldID       string\n\toptionIDs     map[string]string\
      \ // lifecycle state name → option ID\n\thttpClient    *http.Client\n}\n\ntype\
      \ graphQLRequest struct {\n\tQuery     string         `json:\"query\"`\n\tVariables\
      \ map[string]any `json:\"variables,omitempty\"`\n}\n\ntype graphQLResponse struct\
      \ {\n\tData   json.RawMessage `json:\"data\"`\n\tErrors []struct {\n\t\tMessage\
      \ string `json:\"message\"`\n\t} `json:\"errors\"`\n}\n\n// NewGitHubClient\
      \ creates a client and loads project metadata (project ID, field ID, option\
      \ IDs).\nfunc NewGitHubClient(token, org string, projectNumber int) (*GitHubClient,\
      \ error) {\n\tc := &GitHubClient{\n\t\ttoken:         token,\n\t\torg:     \
      \      org,\n\t\tprojectNumber: projectNumber,\n\t\toptionIDs:     make(map[string]string),\n\
      \t\thttpClient:    &http.Client{Timeout: 30 * time.Second},\n\t}\n\tif err :=\
      \ c.loadProjectMetadata(); err != nil {\n\t\treturn nil, err\n\t}\n\treturn\
      \ c, nil\n}\n\nfunc (c *GitHubClient) loadProjectMetadata() error {\n\tquery\
      \ := `query($org: String!, $number: Int!) {\n\t\torganization(login: $org) {\n\
      \t\t\tprojectV2(number: $number) {\n\t\t\t\tid\n\t\t\t\tfield(name: \"Lifecycle\"\
      ) {\n\t\t\t\t\t... on ProjectV2SingleSelectField {\n\t\t\t\t\t\tid\n\t\t\t\t\
      \t\toptions {\n\t\t\t\t\t\t\tid\n\t\t\t\t\t\t\tname\n\t\t\t\t\t\t}\n\t\t\t\t\
      \t}\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\t}`\n\n\tvars := map[string]any{\n\t\t\"org\"\
      :    c.org,\n\t\t\"number\": c.projectNumber,\n\t}\n\n\tresp, err := c.graphQL(query,\
      \ vars)\n\tif err != nil {\n\t\treturn fmt.Errorf(\"load project metadata: %w\"\
      , err)\n\t}\n\n\tvar result struct {\n\t\tOrganization struct {\n\t\t\tProjectV2\
      \ struct {\n\t\t\t\tID    string `json:\"id\"`\n\t\t\t\tField struct {\n\t\t\
      \t\t\tID      string `json:\"id\"`\n\t\t\t\t\tOptions []struct {\n\t\t\t\t\t\
      \tID   string `json:\"id\"`\n\t\t\t\t\t\tName string `json:\"name\"`\n\t\t\t\
      \t\t} `json:\"options\"`\n\t\t\t\t} `json:\"field\"`\n\t\t\t} `json:\"projectV2\"\
      `\n\t\t} `json:\"organization\"`\n\t}\n\tif err := json.Unmarshal(resp, &result);\
      \ err != nil {\n\t\treturn fmt.Errorf(\"parse project metadata: %w\", err)\n\
      \t}\n\n\tproject := result.Organization.ProjectV2\n\tif project.ID == \"\" {\n\
      \t\treturn fmt.Errorf(\"project #%d not found in org %s\", c.projectNumber,\
      \ c.org)\n\t}\n\tc.projectID = project.ID\n\n\tif project.Field.ID == \"\" {\n\
      \t\treturn fmt.Errorf(\"'Lifecycle' field not found on project #%d\", c.projectNumber)\n\
      \t}\n\tc.fieldID = project.Field.ID\n\n\tfor _, opt := range project.Field.Options\
      \ {\n\t\tc.optionIDs[opt.Name] = opt.ID\n\t}\n\n\tlog.Printf(\"Loaded project\
      \ metadata: id=%s, field=%s, %d lifecycle states\",\n\t\tc.projectID, c.fieldID,\
      \ len(c.optionIDs))\n\treturn nil\n}\n\n// UpdateLifecycleState finds the Issue's\
      \ project item and updates its Lifecycle field.\nfunc (c *GitHubClient) UpdateLifecycleState(repo\
      \ string, issueNumber int, newState string) error {\n\toptionID, ok := c.optionIDs[newState]\n\
      \tif !ok {\n\t\treturn fmt.Errorf(\"unknown lifecycle state %q (available: %v)\"\
      , newState, mapKeys(c.optionIDs))\n\t}\n\n\t// Step 1: Find the project item\
      \ ID for this issue\n\titemID, err := c.findProjectItem(repo, issueNumber)\n\
      \tif err != nil {\n\t\treturn fmt.Errorf(\"find project item for %s#%d: %w\"\
      , repo, issueNumber, err)\n\t}\n\n\t// Step 2: Update the Lifecycle field\n\t\
      mutation := `mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId:\
      \ String!) {\n\t\tupdateProjectV2ItemFieldValue(input: {\n\t\t\tprojectId: $projectId\n\
      \t\t\titemId: $itemId\n\t\t\tfieldId: $fieldId\n\t\t\tvalue: { singleSelectOptionId:\
      \ $optionId }\n\t\t}) {\n\t\t\tprojectV2Item { id }\n\t\t}\n\t}`\n\n\tvars :=\
      \ map[string]any{\n\t\t\"projectId\": c.projectID,\n\t\t\"itemId\":    itemID,\n\
      \t\t\"fieldId\":   c.fieldID,\n\t\t\"optionId\":  optionID,\n\t}\n\n\tif _,\
      \ err := c.graphQL(mutation, vars); err != nil {\n\t\treturn fmt.Errorf(\"update\
      \ lifecycle field: %w\", err)\n\t}\n\n\treturn nil\n}\n\nfunc (c *GitHubClient)\
      \ findProjectItem(repo string, issueNumber int) (string, error) {\n\tquery :=\
      \ `query($org: String!, $repo: String!, $number: Int!) {\n\t\trepository(owner:\
      \ $org, name: $repo) {\n\t\t\tissue(number: $number) {\n\t\t\t\tprojectItems(first:\
      \ 10) {\n\t\t\t\t\tnodes {\n\t\t\t\t\t\tid\n\t\t\t\t\t\tproject { id }\n\t\t\
      \t\t\t}\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\t}`\n\n\tvars := map[string]any{\n\t\t\"\
      org\":    c.org,\n\t\t\"repo\":   repo,\n\t\t\"number\": issueNumber,\n\t}\n\
      \n\tresp, err := c.graphQL(query, vars)\n\tif err != nil {\n\t\treturn \"\"\
      , err\n\t}\n\n\tvar result struct {\n\t\tRepository struct {\n\t\t\tIssue struct\
      \ {\n\t\t\t\tProjectItems struct {\n\t\t\t\t\tNodes []struct {\n\t\t\t\t\t\t\
      ID      string `json:\"id\"`\n\t\t\t\t\t\tProject struct {\n\t\t\t\t\t\t\tID\
      \ string `json:\"id\"`\n\t\t\t\t\t\t} `json:\"project\"`\n\t\t\t\t\t} `json:\"\
      nodes\"`\n\t\t\t\t} `json:\"projectItems\"`\n\t\t\t} `json:\"issue\"`\n\t\t\
      } `json:\"repository\"`\n\t}\n\tif err := json.Unmarshal(resp, &result); err\
      \ != nil {\n\t\treturn \"\", fmt.Errorf(\"parse project items: %w\", err)\n\t\
      }\n\n\tfor _, item := range result.Repository.Issue.ProjectItems.Nodes {\n\t\
      \tif item.Project.ID == c.projectID {\n\t\t\treturn item.ID, nil\n\t\t}\n\t\
      }\n\n\treturn \"\", fmt.Errorf(\"issue %s#%d is not on project %s\", repo, issueNumber,\
      \ c.projectID)\n}\n\n// CreateBugIssue creates a new bug Issue linked to a feature\
      \ Issue when it transitions to dead.\nfunc (c *GitHubClient) CreateBugIssue(repo\
      \ string, featureIssueNumber int, alert Alert) (string, error) {\n\ttitle :=\
      \ fmt.Sprintf(\"[Bug] %s is dead — %s\", alert.Labels[\"alertname\"], alert.Annotations[\"\
      summary\"])\n\tbody := fmt.Sprintf(`## Auto-created by health-bridge\n\n**Feature\
      \ Issue:** %s/%s#%d\n**Alert:** %s\n**Severity:** %s\n**Summary:** %s\n**Started:**\
      \ %s\n\nThis feature has been marked as **dead** by the health monitoring system.\n\
      \n[View in Grafana](%s)\n\n---\n*Automated by health-bridge on dead transition*`,\n\
      \t\tc.org, repo, featureIssueNumber,\n\t\talert.Labels[\"alertname\"],\n\t\t\
      alert.Labels[\"severity\"],\n\t\talert.Annotations[\"summary\"],\n\t\talert.StartsAt,\n\
      \t\talert.GeneratorURL,\n\t)\n\n\tpayload, err := json.Marshal(map[string]any{\n\
      \t\t\"title\":  title,\n\t\t\"body\":   body,\n\t\t\"labels\": []string{\"bug\"\
      },\n\t})\n\tif err != nil {\n\t\treturn \"\", err\n\t}\n\n\turl := fmt.Sprintf(\"\
      %s/repos/%s/%s/issues\", githubRESTURL, c.org, repo)\n\treq, err := http.NewRequest(\"\
      POST\", url, bytes.NewReader(payload))\n\tif err != nil {\n\t\treturn \"\",\
      \ err\n\t}\n\treq.Header.Set(\"Authorization\", \"Bearer \"+c.token)\n\treq.Header.Set(\"\
      Content-Type\", \"application/json\")\n\treq.Header.Set(\"Accept\", \"application/vnd.github+json\"\
      )\n\n\tresp, err := c.httpClient.Do(req)\n\tif err != nil {\n\t\treturn \"\"\
      , fmt.Errorf(\"http request: %w\", err)\n\t}\n\tdefer resp.Body.Close()\n\n\t\
      respBody, _ := io.ReadAll(resp.Body)\n\tif resp.StatusCode != http.StatusCreated\
      \ {\n\t\treturn \"\", fmt.Errorf(\"github API returned %d: %s\", resp.StatusCode,\
      \ string(respBody))\n\t}\n\n\tvar result struct {\n\t\tHTMLURL string `json:\"\
      html_url\"`\n\t}\n\tif err := json.Unmarshal(respBody, &result); err != nil\
      \ {\n\t\treturn \"\", fmt.Errorf(\"parse response: %w\", err)\n\t}\n\n\treturn\
      \ result.HTMLURL, nil\n}\n\n// AddIssueComment adds a comment to a GitHub Issue\
      \ via REST API.\nfunc (c *GitHubClient) AddIssueComment(repo string, issueNumber\
      \ int, body string) error {\n\turl := fmt.Sprintf(\"%s/repos/%s/%s/issues/%d/comments\"\
      , githubRESTURL, c.org, repo, issueNumber)\n\n\tpayload, err := json.Marshal(map[string]string{\"\
      body\": body})\n\tif err != nil {\n\t\treturn err\n\t}\n\n\treq, err := http.NewRequest(\"\
      POST\", url, bytes.NewReader(payload))\n\tif err != nil {\n\t\treturn err\n\t\
      }\n\treq.Header.Set(\"Authorization\", \"Bearer \"+c.token)\n\treq.Header.Set(\"\
      Content-Type\", \"application/json\")\n\treq.Header.Set(\"Accept\", \"application/vnd.github+json\"\
      )\n\n\tresp, err := c.httpClient.Do(req)\n\tif err != nil {\n\t\treturn fmt.Errorf(\"\
      http request: %w\", err)\n\t}\n\tdefer resp.Body.Close()\n\n\tif resp.StatusCode\
      \ != http.StatusCreated {\n\t\trespBody, _ := io.ReadAll(resp.Body)\n\t\treturn\
      \ fmt.Errorf(\"github API returned %d: %s\", resp.StatusCode, string(respBody))\n\
      \t}\n\n\treturn nil\n}\n\nfunc (c *GitHubClient) graphQL(query string, variables\
      \ map[string]any) (json.RawMessage, error) {\n\treqBody := graphQLRequest{Query:\
      \ query, Variables: variables}\n\tpayload, err := json.Marshal(reqBody)\n\t\
      if err != nil {\n\t\treturn nil, fmt.Errorf(\"marshal request: %w\", err)\n\t\
      }\n\n\treq, err := http.NewRequest(\"POST\", githubGraphQLURL, bytes.NewReader(payload))\n\
      \tif err != nil {\n\t\treturn nil, fmt.Errorf(\"create request: %w\", err)\n\
      \t}\n\treq.Header.Set(\"Authorization\", \"Bearer \"+c.token)\n\treq.Header.Set(\"\
      Content-Type\", \"application/json\")\n\n\tresp, err := c.httpClient.Do(req)\n\
      \tif err != nil {\n\t\treturn nil, fmt.Errorf(\"http request: %w\", err)\n\t\
      }\n\tdefer resp.Body.Close()\n\n\tbody, err := io.ReadAll(resp.Body)\n\tif err\
      \ != nil {\n\t\treturn nil, fmt.Errorf(\"read response: %w\", err)\n\t}\n\n\t\
      if resp.StatusCode != http.StatusOK {\n\t\treturn nil, fmt.Errorf(\"github API\
      \ returned %d: %s\", resp.StatusCode, string(body))\n\t}\n\n\tvar gqlResp graphQLResponse\n\
      \tif err := json.Unmarshal(body, &gqlResp); err != nil {\n\t\treturn nil, fmt.Errorf(\"\
      parse response: %w\", err)\n\t}\n\n\tif len(gqlResp.Errors) > 0 {\n\t\treturn\
      \ nil, fmt.Errorf(\"graphql errors: %v\", gqlResp.Errors[0].Message)\n\t}\n\n\
      \treturn gqlResp.Data, nil\n}\n\nfunc mapKeys(m map[string]string) []string\
      \ {\n\tkeys := make([]string, 0, len(m))\n\tfor k := range m {\n\t\tkeys = append(keys,\
      \ k)\n\t}\n\treturn keys\n}\n```"
