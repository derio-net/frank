- number: 2
  title: Implement Core Bridge Logic
  steps:
  - id: P1.T2.S1
    text: "Write `bridge.go`\n\n\nCreate `bridge.go`:\n\n```go\npackage main\n\nimport\
      \ (\n\t\"encoding/json\"\n\t\"fmt\"\n\t\"io\"\n\t\"log\"\n\t\"net/http\"\n\t\
      \"strconv\"\n\t\"strings\"\n)\n\n// Bridge is the core service that processes\
      \ Grafana alerts and updates GitHub.\ntype Bridge struct {\n\tgithub *GitHubClient\n\
      }\n\n// GrafanaPayload is the webhook payload sent by Grafana alerting.\ntype\
      \ GrafanaPayload struct {\n\tStatus string  `json:\"status\"`\n\tAlerts []Alert\
      \ `json:\"alerts\"`\n}\n\n// Alert is a single alert within a Grafana webhook\
      \ payload.\ntype Alert struct {\n\tStatus       string            `json:\"status\"\
      `\n\tLabels       map[string]string `json:\"labels\"`\n\tAnnotations  map[string]string\
      \ `json:\"annotations\"`\n\tStartsAt     string            `json:\"startsAt\"\
      `\n\tEndsAt       string            `json:\"endsAt\"`\n\tGeneratorURL string\
      \            `json:\"generatorURL\"`\n\tFingerprint  string            `json:\"\
      fingerprint\"`\n}\n\n// NewBridge creates a Bridge and loads GitHub Project\
      \ metadata.\nfunc NewBridge(token, org string, projectNumber int) (*Bridge,\
      \ error) {\n\tgh, err := NewGitHubClient(token, org, projectNumber)\n\tif err\
      \ != nil {\n\t\treturn nil, fmt.Errorf(\"github client init: %w\", err)\n\t\
      }\n\treturn &Bridge{github: gh}, nil\n}\n\n// Ready returns true if the bridge\
      \ has loaded project metadata.\nfunc (b *Bridge) Ready() bool {\n\treturn b.github\
      \ != nil && b.github.projectID != \"\"\n}\n\n// WebhookHandler returns an HTTP\
      \ handler that validates the webhook secret\n// and processes Grafana alerts.\n\
      func (b *Bridge) WebhookHandler(secret string) http.HandlerFunc {\n\treturn\
      \ func(w http.ResponseWriter, r *http.Request) {\n\t\tbody, err := io.ReadAll(r.Body)\n\
      \t\tif err != nil {\n\t\t\thttp.Error(w, \"read error\", http.StatusBadRequest)\n\
      \t\t\treturn\n\t\t}\n\t\tdefer r.Body.Close()\n\n\t\t// Validate webhook secret\
      \ via Authorization header (Bearer token)\n\t\tauthHeader := r.Header.Get(\"\
      Authorization\")\n\t\tif authHeader != \"Bearer \"+secret {\n\t\t\tlog.Printf(\"\
      Unauthorized webhook request from %s\", r.RemoteAddr)\n\t\t\thttp.Error(w, \"\
      unauthorized\", http.StatusUnauthorized)\n\t\t\treturn\n\t\t}\n\n\t\tvar payload\
      \ GrafanaPayload\n\t\tif err := json.Unmarshal(body, &payload); err != nil {\n\
      \t\t\tlog.Printf(\"Invalid JSON payload: %v\", err)\n\t\t\thttp.Error(w, \"\
      invalid JSON\", http.StatusBadRequest)\n\t\t\treturn\n\t\t}\n\n\t\tprocessed\
      \ := 0\n\t\tfor _, alert := range payload.Alerts {\n\t\t\tif err := b.processAlert(alert);\
      \ err != nil {\n\t\t\t\tlog.Printf(\"Error processing alert %s: %v\", alert.Labels[\"\
      alertname\"], err)\n\t\t\t\tcontinue\n\t\t\t}\n\t\t\tprocessed++\n\t\t}\n\n\t\
      \tw.WriteHeader(http.StatusOK)\n\t\tfmt.Fprintf(w, `{\"processed\": %d, \"total\"\
      : %d}`, processed, len(payload.Alerts))\n\t}\n}\n\nfunc (b *Bridge) processAlert(alert\
      \ Alert) error {\n\tissueRef := alert.Labels[\"github_issue\"]\n\tif issueRef\
      \ == \"\" {\n\t\tlog.Printf(\"Alert %s has no github_issue label, skipping\"\
      , alert.Labels[\"alertname\"])\n\t\treturn nil\n\t}\n\n\trepo, number, err :=\
      \ ParseIssueRef(issueRef)\n\tif err != nil {\n\t\treturn fmt.Errorf(\"parse\
      \ issue ref %q: %w\", issueRef, err)\n\t}\n\n\tnewState := MapAlertToState(alert.Status,\
      \ alert.Labels[\"severity\"])\n\n\t// Update lifecycle state on project board\n\
      \tif err := b.github.UpdateLifecycleState(repo, number, newState); err != nil\
      \ {\n\t\treturn fmt.Errorf(\"update lifecycle %s → %s: %w\", issueRef, newState,\
      \ err)\n\t}\n\n\t// Add comment to issue with alert context\n\tcomment := FormatComment(alert,\
      \ newState)\n\tif err := b.github.AddIssueComment(repo, number, comment); err\
      \ != nil {\n\t\tlog.Printf(\"Warning: failed to add comment to %s (state update\
      \ succeeded): %v\", issueRef, err)\n\t\t// Non-fatal: the state update is the\
      \ critical action\n\t}\n\n\t// On dead transition, create a bug Issue linked\
      \ to the feature Issue\n\tif newState == \"dead\" {\n\t\tbugURL, err := b.github.CreateBugIssue(repo,\
      \ number, alert)\n\t\tif err != nil {\n\t\t\tlog.Printf(\"Warning: failed to\
      \ create bug issue for %s: %v\", issueRef, err)\n\t\t} else {\n\t\t\tlog.Printf(\"\
      Created bug issue: %s\", bugURL)\n\t\t}\n\t}\n\n\tlog.Printf(\"Processed: %s\
      \ → %s (alert: %s, status: %s)\", issueRef, newState, alert.Labels[\"alertname\"\
      ], alert.Status)\n\treturn nil\n}\n\n// ParseIssueRef parses a \"repo#number\"\
      \ string into repo name and issue number.\nfunc ParseIssueRef(ref string) (repo\
      \ string, number int, err error) {\n\tparts := strings.SplitN(ref, \"#\", 2)\n\
      \tif len(parts) != 2 {\n\t\treturn \"\", 0, fmt.Errorf(\"expected format 'repo#number',\
      \ got %q\", ref)\n\t}\n\trepo = parts[0]\n\tnumber, err = strconv.Atoi(parts[1])\n\
      \tif err != nil {\n\t\treturn \"\", 0, fmt.Errorf(\"invalid issue number %q:\
      \ %w\", parts[1], err)\n\t}\n\tif repo == \"\" || number <= 0 {\n\t\treturn\
      \ \"\", 0, fmt.Errorf(\"invalid issue ref: repo=%q number=%d\", repo, number)\n\
      \t}\n\treturn repo, number, nil\n}\n\n// MapAlertToState maps Grafana alert\
      \ status and severity to a lifecycle state.\nfunc MapAlertToState(alertStatus,\
      \ severity string) string {\n\tswitch alertStatus {\n\tcase \"resolved\":\n\t\
      \treturn \"healthy\"\n\tcase \"firing\":\n\t\tswitch severity {\n\t\tcase \"\
      critical\":\n\t\t\treturn \"dead\"\n\t\tcase \"warning\":\n\t\t\treturn \"degraded\"\
      \n\t\tdefault:\n\t\t\treturn \"degraded\" // Default firing alerts to degraded\n\
      \t\t}\n\tdefault:\n\t\treturn \"degraded\" // Unknown status defaults to degraded\n\
      \t}\n}\n\n// FormatComment creates a markdown comment for a GitHub Issue describing\
      \ the alert.\nfunc FormatComment(alert Alert, newState string) string {\n\t\
      var sb strings.Builder\n\tsb.WriteString(fmt.Sprintf(\"## Health Bridge: `%s`\\\
      n\\n\", newState))\n\tsb.WriteString(fmt.Sprintf(\"**Alert:** %s\\n\", alert.Labels[\"\
      alertname\"]))\n\tsb.WriteString(fmt.Sprintf(\"**Status:** %s\\n\", alert.Status))\n\
      \tsb.WriteString(fmt.Sprintf(\"**Severity:** %s\\n\", alert.Labels[\"severity\"\
      ]))\n\tif summary := alert.Annotations[\"summary\"]; summary != \"\" {\n\t\t\
      sb.WriteString(fmt.Sprintf(\"**Summary:** %s\\n\", summary))\n\t}\n\tif desc\
      \ := alert.Annotations[\"description\"]; desc != \"\" {\n\t\tsb.WriteString(fmt.Sprintf(\"\
      **Description:** %s\\n\", desc))\n\t}\n\tsb.WriteString(fmt.Sprintf(\"**Started:**\
      \ %s\\n\", alert.StartsAt))\n\tif alert.Status == \"resolved\" && alert.EndsAt\
      \ != \"\" {\n\t\tsb.WriteString(fmt.Sprintf(\"**Resolved:** %s\\n\", alert.EndsAt))\n\
      \t}\n\tif alert.GeneratorURL != \"\" {\n\t\tsb.WriteString(fmt.Sprintf(\"\\\
      n[View in Grafana](%s)\\n\", alert.GeneratorURL))\n\t}\n\tsb.WriteString(\"\\\
      n---\\n*Automated by health-bridge*\\n\")\n\treturn sb.String()\n}\n```"
  - id: P1.T2.S2
    text: |-
      Commit


      ```bash
      git add bridge.go
      git commit -m "feat: implement core bridge logic — webhook handler, alert mapping, comment formatting"
      ```

