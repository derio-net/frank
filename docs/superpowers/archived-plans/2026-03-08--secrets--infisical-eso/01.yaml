      ```
      secret/infisical-credentials created
      ```
  - id: P1.T7.S4
    text: |-
      Verify


      ```bash
      kubectl get secret infisical-credentials -n external-secrets
      ```

      Expected: Secret exists with 2 data keys.
  - id: P1.T7.S5
    text: |-
      Commit


      ```bash
