- number: 8
  title: Create ClusterSecretStore and infisical-extras App
  steps:
  - id: P1.T8.S1
    text: |-
      Create ClusterSecretStore manifest


      ```yaml
      # apps/infisical/manifests/cluster-secret-store.yaml
      apiVersion: external-secrets.io/v1
      kind: ClusterSecretStore
      metadata:
        name: infisical
      spec:
        provider:
          infisical:
            auth:
              universalAuthCredentials:
                clientId:
                  name: infisical-credentials
                  namespace: external-secrets
                  key: clientId
                clientSecret:
                  name: infisical-credentials
                  namespace: external-secrets
                  key: clientSecret
            hostAPI: http://192.168.55.204:8080/api
            secretsScope:
              projectSlug: frank-cluster-iwpg
              environmentSlug: prod
              secretsPath: /
      ```
  - id: P1.T8.S2
    text: |-
      Create infisical-extras Application CR


      Following the `longhorn-extras` pattern for raw manifests.

      ```yaml
      # apps/root/templates/infisical-extras.yaml
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: infisical-extras
        namespace: argocd
        finalizers:
          - resources-finalizer.argocd.argoproj.io
      spec:
        project: infrastructure
        source:
          repoURL: {{ .Values.repoURL }}
          targetRevision: {{ .Values.targetRevision }}
          path: apps/infisical/manifests
        destination:
          server: {{ .Values.destination.server }}
          namespace: external-secrets
        syncPolicy:
          automated:
            prune: false
            selfHeal: true
          syncOptions:
            - ServerSideApply=true
      ```
  - id: P1.T8.S3
    text: |-
      Verify file structure


      ```bash
      ls apps/infisical/manifests/
      ls apps/root/templates/ | grep infisical
      ```

      Expected: `cluster-secret-store.yaml` in manifests, and 3 files in templates: `ns-infisical.yaml`, `infisical.yaml`, `infisical-extras.yaml`.
  - id: P1.T8.S4
    text: |-
      Commit


      ```bash
      git add apps/infisical/manifests/cluster-secret-store.yaml \
              apps/root/templates/infisical-extras.yaml
      git commit -m "feat(secrets): add ClusterSecretStore and infisical-extras Application"
      ```

