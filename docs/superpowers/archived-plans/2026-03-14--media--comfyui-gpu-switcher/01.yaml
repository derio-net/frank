      | ComfyUI | 192.168.55.213 | Cilium L2 LoadBalancer (port 8188) |
      | GPU Switcher | 192.168.55.214 | Cilium L2 LoadBalancer (port 8080) |
      ```
  - id: P1.T17.S2
    text: |-
