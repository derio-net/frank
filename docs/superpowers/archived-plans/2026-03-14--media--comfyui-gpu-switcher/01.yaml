  - id: P1.T7.S3
    text: "Implement k8s.go\n\n\nCreate `apps/gpu-switcher/app/k8s.go`:\n\n```go\n\
      package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\tmetav1 \"k8s.io/apimachinery/pkg/apis/meta/v1\"\
      \n\t\"k8s.io/client-go/kubernetes\"\n)\n\n// Workload represents a GPU workload\
      \ that can be activated/deactivated.\ntype Workload struct {\n\tName       \
      \    string // Display name (e.g., \"ollama\", \"comfyui\")\n\tNamespace   \
      \   string // Kubernetes namespace\n\tDeploymentName string // Deployment to\
      \ scale\n}\n\n// WorkloadStatus is the current state of a workload.\ntype WorkloadStatus\
      \ struct {\n\tWorkload\n\tReplicas      int32  // Desired replicas\n\tReadyReplicas\
      \ int32  // Running and ready\n\tPodPhase      string // Phase of first matching\
      \ pod, or \"None\"\n}\n\n// GetStatus returns the current status of all workloads.\n\
      func GetStatus(ctx context.Context, client kubernetes.Interface, workloads []Workload)\
      \ ([]WorkloadStatus, error) {\n\tstatuses := make([]WorkloadStatus, 0, len(workloads))\n\
      \tfor _, w := range workloads {\n\t\tdep, err := client.AppsV1().Deployments(w.Namespace).Get(ctx,\
      \ w.DeploymentName, metav1.GetOptions{})\n\t\tif err != nil {\n\t\t\treturn\
      \ nil, fmt.Errorf(\"get deployment %s/%s: %w\", w.Namespace, w.DeploymentName,\
      \ err)\n\t\t}\n\t\tvar replicas int32\n\t\tif dep.Spec.Replicas != nil {\n\t\
      \t\treplicas = *dep.Spec.Replicas\n\t\t}\n\t\tpodPhase := \"None\"\n\t\tpods,\
      \ err := client.CoreV1().Pods(w.Namespace).List(ctx, metav1.ListOptions{\n\t\
      \t\tLabelSelector: fmt.Sprintf(\"app.kubernetes.io/name=%s\", w.Name),\n\t\t\
      \tLimit:         1,\n\t\t})\n\t\tif err == nil && len(pods.Items) > 0 {\n\t\t\
      \tpodPhase = string(pods.Items[0].Status.Phase)\n\t\t}\n\t\tstatuses = append(statuses,\
      \ WorkloadStatus{\n\t\t\tWorkload:      w,\n\t\t\tReplicas:      replicas,\n\
      \t\t\tReadyReplicas: dep.Status.ReadyReplicas,\n\t\t\tPodPhase:      podPhase,\n\
      \t\t})\n\t}\n\treturn statuses, nil\n}\n\n// ActivateWorkload scales the target\
      \ workload to 1 and all others to 0.\nfunc ActivateWorkload(ctx context.Context,\
      \ client kubernetes.Interface, workloads []Workload, name string) error {\n\t\
      found := false\n\tfor _, w := range workloads {\n\t\tif w.Name == name {\n\t\
      \t\tfound = true\n\t\t\tbreak\n\t\t}\n\t}\n\tif !found {\n\t\treturn fmt.Errorf(\"\
      unknown workload: %s\", name)\n\t}\n\tfor _, w := range workloads {\n\t\tvar\
      \ target int32\n\t\tif w.Name == name {\n\t\t\ttarget = 1\n\t\t}\n\t\tif err\
      \ := scaleDeployment(ctx, client, w.Namespace, w.DeploymentName, target); err\
      \ != nil {\n\t\t\treturn err\n\t\t}\n\t}\n\treturn nil\n}\n\n// DeactivateAll\
      \ scales all workloads to 0.\nfunc DeactivateAll(ctx context.Context, client\
      \ kubernetes.Interface, workloads []Workload) error {\n\tfor _, w := range workloads\
      \ {\n\t\tif err := scaleDeployment(ctx, client, w.Namespace, w.DeploymentName,\
      \ 0); err != nil {\n\t\t\treturn err\n\t\t}\n\t}\n\treturn nil\n}\n\nfunc scaleDeployment(ctx\
      \ context.Context, client kubernetes.Interface, namespace, name string, replicas\
      \ int32) error {\n\tscale, err := client.AppsV1().Deployments(namespace).GetScale(ctx,\
      \ name, metav1.GetOptions{})\n\tif err != nil {\n\t\treturn fmt.Errorf(\"get\
      \ scale %s/%s: %w\", namespace, name, err)\n\t}\n\tscale.Spec.Replicas = replicas\n\
      \t_, err = client.AppsV1().Deployments(namespace).UpdateScale(ctx, name, scale,\
      \ metav1.UpdateOptions{})\n\tif err != nil {\n\t\treturn fmt.Errorf(\"update\
      \ scale %s/%s: %w\", namespace, name, err)\n\t}\n\treturn nil\n}\n```"
