          button { flex: 1; padding: 0.75rem 1.5rem; border-radius: 8px; border: none; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: background 0.2s, opacity 0.2s; }
          button:disabled { opacity: 0.5; cursor: not-allowed; }
          .btn-ollama { background: #3b82f6; color: white; }
          .btn-ollama:hover:not(:disabled) { background: #2563eb; }
          .btn-comfyui { background: #a855f7; color: white; }
          .btn-comfyui:hover:not(:disabled) { background: #9333ea; }
          .btn-stop { background: #334155; color: #e2e8f0; }
          .btn-stop:hover:not(:disabled) { background: #475569; }
          .error { background: #7f1d1d; color: #fca5a5; padding: 1rem; border-radius: 8px; margin-top: 1rem; display: none; }
          .loading { opacity: 0.6; pointer-events: none; }
          .refresh-note { text-align: center; color: #475569; font-size: 0.75rem; margin-top: 1rem; }
        </style>
      </head>
      <body>
        <div class="container">
          <h1>GPU Switcher</h1>
          <p class="subtitle">Frank Cluster - RTX 5070 Ti (16 GB)</p>

          <div id="workloads"></div>

          <div class="actions">
            <button class="btn-ollama" onclick="activate('ollama')">Activate Ollama</button>
            <button class="btn-comfyui" onclick="activate('comfyui')">Activate ComfyUI</button>
            <button class="btn-stop" onclick="deactivateAll()">Stop All</button>
          </div>

          <div id="error" class="error"></div>
          <p class="refresh-note">Auto-refreshes every 5 seconds</p>
        </div>

        <script>
          function createWorkloadCard(w) {
            var isActive = w.replicas > 0;
            var isReady = w.readyReplicas > 0;

            var card = document.createElement('div');
            card.className = 'card' + (isActive ? ' active' : '');

            var header = document.createElement('div');
            header.className = 'card-header';

            var nameEl = document.createElement('span');
            nameEl.className = 'card-name';
            nameEl.textContent = w.name;
            header.appendChild(nameEl);

            var badge = document.createElement('span');
            if (isActive && isReady) {
              badge.className = 'badge badge-active';
              badge.textContent = 'Active';
            } else if (isActive) {
              badge.className = 'badge badge-pending';
              badge.textContent = 'Starting';
            } else {
              badge.className = 'badge badge-inactive';
              badge.textContent = 'Inactive';
            }
            header.appendChild(badge);
            card.appendChild(header);

            var meta = document.createElement('div');
            meta.className = 'meta';
            var items = [
              'Replicas: ' + w.replicas,
              'Ready: ' + w.readyReplicas,
              'Pod: ' + w.podPhase
            ];
            items.forEach(function(text) {
              var span = document.createElement('span');
              span.textContent = text;
              meta.appendChild(span);
            });
            card.appendChild(meta);

            return card;
          }

          function renderWorkloads(workloads) {
            var container = document.getElementById('workloads');
            while (container.firstChild) {
              container.removeChild(container.firstChild);
            }
            workloads.forEach(function(w) {
              container.appendChild(createWorkloadCard(w));
            });
          }

          async function fetchStatus() {
            try {
              var resp = await fetch('/api/status');
              if (!resp.ok) throw new Error(await resp.text());
              var data = await resp.json();
              renderWorkloads(data);
              document.getElementById('error').style.display = 'none';
            } catch (e) {
              showError(e.message);
            }
          }

          async function activate(name) {
            if (!confirm('Switch GPU to ' + name + '? This will stop the other workload.')) return;
            document.body.classList.add('loading');
            try {
              var resp = await fetch('/api/activate/' + name, { method: 'POST' });
              if (!resp.ok) throw new Error(await resp.text());
              await fetchStatus();
            } catch (e) {
              showError(e.message);
            } finally {
              document.body.classList.remove('loading');
            }
          }

          async function deactivateAll() {
            if (!confirm('Stop all GPU workloads?')) return;
            document.body.classList.add('loading');
            try {
              var resp = await fetch('/api/deactivate', { method: 'POST' });
              if (!resp.ok) throw new Error(await resp.text());
              await fetchStatus();
            } catch (e) {
              showError(e.message);
            } finally {
              document.body.classList.remove('loading');
            }
          }

          function showError(msg) {
            var el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
          }

          fetchStatus();
          setInterval(fetchStatus, 5000);
        </script>
      </body>
      </html>
      ```
  - id: P1.T8.S2
    text: "Create main.go with HTTP server\n\n\nCreate `apps/gpu-switcher/app/main.go`:\n\
      \n```go\npackage main\n\nimport (\n\t\"context\"\n\t\"embed\"\n\t\"encoding/json\"\
      \n\t\"fmt\"\n\t\"io/fs\"\n\t\"log\"\n\t\"net/http\"\n\t\"os\"\n\t\"strings\"\
      \n\t\"time\"\n\n\t\"k8s.io/client-go/kubernetes\"\n\t\"k8s.io/client-go/rest\"\
      \n)\n\n//go:embed static\nvar staticFiles embed.FS\n\n// workloadStatusJSON\
      \ is the JSON response for a workload status.\ntype workloadStatusJSON struct\
      \ {\n\tName          string `json:\"name\"`\n\tNamespace     string `json:\"\
      namespace\"`\n\tReplicas      int32  `json:\"replicas\"`\n\tReadyReplicas int32\
      \  `json:\"readyReplicas\"`\n\tPodPhase      string `json:\"podPhase\"`\n}\n\
      \nfunc main() {\n\tport := os.Getenv(\"PORT\")\n\tif port == \"\" {\n\t\tport\
      \ = \"8080\"\n\t}\n\n\tclient, err := buildClient()\n\tif err != nil {\n\t\t\
      log.Fatalf(\"Failed to create Kubernetes client: %v\", err)\n\t}\n\n\tworkloads\
      \ := parseWorkloads()\n\n\tmux := http.NewServeMux()\n\n\t// Serve static files\
      \ at root\n\tstaticFS, _ := fs.Sub(staticFiles, \"static\")\n\tmux.Handle(\"\
      /\", http.FileServer(http.FS(staticFS)))\n\n\t// API: get status of all workloads\n\
      \tmux.HandleFunc(\"/api/status\", func(w http.ResponseWriter, r *http.Request)\
      \ {\n\t\tif r.Method != http.MethodGet {\n\t\t\thttp.Error(w, \"method not allowed\"\
      , http.StatusMethodNotAllowed)\n\t\t\treturn\n\t\t}\n\t\tctx, cancel := context.WithTimeout(r.Context(),\
      \ 10*time.Second)\n\t\tdefer cancel()\n\t\tstatuses, err := GetStatus(ctx, client,\
      \ workloads)\n\t\tif err != nil {\n\t\t\thttp.Error(w, err.Error(), http.StatusInternalServerError)\n\
      \t\t\treturn\n\t\t}\n\t\tresp := make([]workloadStatusJSON, len(statuses))\n\
      \t\tfor i, s := range statuses {\n\t\t\tresp[i] = workloadStatusJSON{\n\t\t\t\
      \tName:          s.Name,\n\t\t\t\tNamespace:     s.Namespace,\n\t\t\t\tReplicas:\
      \      s.Replicas,\n\t\t\t\tReadyReplicas: s.ReadyReplicas,\n\t\t\t\tPodPhase:\
      \      s.PodPhase,\n\t\t\t}\n\t\t}\n\t\tw.Header().Set(\"Content-Type\", \"\
      application/json\")\n\t\tjson.NewEncoder(w).Encode(resp)\n\t})\n\n\t// API:\
      \ activate a specific workload\n\tmux.HandleFunc(\"/api/activate/\", func(w\
      \ http.ResponseWriter, r *http.Request) {\n\t\tif r.Method != http.MethodPost\
      \ {\n\t\t\thttp.Error(w, \"method not allowed\", http.StatusMethodNotAllowed)\n\
      \t\t\treturn\n\t\t}\n\t\tname := strings.TrimPrefix(r.URL.Path, \"/api/activate/\"\
      )\n\t\tif name == \"\" {\n\t\t\thttp.Error(w, \"workload name required\", http.StatusBadRequest)\n\
      \t\t\treturn\n\t\t}\n\t\tctx, cancel := context.WithTimeout(r.Context(), 30*time.Second)\n\
      \t\tdefer cancel()\n\t\tif err := ActivateWorkload(ctx, client, workloads, name);\
      \ err != nil {\n\t\t\thttp.Error(w, err.Error(), http.StatusInternalServerError)\n\
      \t\t\treturn\n\t\t}\n\t\tw.WriteHeader(http.StatusOK)\n\t\tfmt.Fprintf(w, \"\
      activated %s\", name)\n\t})\n\n\t// API: deactivate all workloads\n\tmux.HandleFunc(\"\
      /api/deactivate\", func(w http.ResponseWriter, r *http.Request) {\n\t\tif r.Method\
      \ != http.MethodPost {\n\t\t\thttp.Error(w, \"method not allowed\", http.StatusMethodNotAllowed)\n\
      \t\t\treturn\n\t\t}\n\t\tctx, cancel := context.WithTimeout(r.Context(), 30*time.Second)\n\
      \t\tdefer cancel()\n\t\tif err := DeactivateAll(ctx, client, workloads); err\
      \ != nil {\n\t\t\thttp.Error(w, err.Error(), http.StatusInternalServerError)\n\
      \t\t\treturn\n\t\t}\n\t\tw.WriteHeader(http.StatusOK)\n\t\tfmt.Fprint(w, \"\
      all workloads deactivated\")\n\t})\n\n\tlog.Printf(\"GPU Switcher listening\
      \ on :%s\", port)\n\tlog.Fatal(http.ListenAndServe(\":\"+port, mux))\n}\n\n\
      // buildClient creates a Kubernetes clientset using in-cluster config.\nfunc\
      \ buildClient() (kubernetes.Interface, error) {\n\tconfig, err := rest.InClusterConfig()\n\
      \tif err != nil {\n\t\treturn nil, fmt.Errorf(\"in-cluster config: %w\", err)\n\
      \t}\n\treturn kubernetes.NewForConfig(config)\n}\n\n// parseWorkloads reads\
      \ workload definitions from the WORKLOADS env var.\n// Format: \"name:namespace:deployment,name:namespace:deployment,...\"\
      \n// Default: \"ollama:ollama:ollama,comfyui:comfyui:comfyui\"\nfunc parseWorkloads()\
      \ []Workload {\n\traw := os.Getenv(\"WORKLOADS\")\n\tif raw == \"\" {\n\t\t\
      raw = \"ollama:ollama:ollama,comfyui:comfyui:comfyui\"\n\t}\n\tvar workloads\
      \ []Workload\n\tfor _, entry := range strings.Split(raw, \",\") {\n\t\tparts\
      \ := strings.SplitN(entry, \":\", 3)\n\t\tif len(parts) != 3 {\n\t\t\tlog.Fatalf(\"\
      invalid workload entry: %s (expected name:namespace:deployment)\", entry)\n\t\
      \t}\n\t\tworkloads = append(workloads, Workload{\n\t\t\tName:           parts[0],\n\
      \t\t\tNamespace:      parts[1],\n\t\t\tDeploymentName: parts[2],\n\t\t})\n\t\
      }\n\treturn workloads\n}\n```\n\n> **Key decisions:**\n> - Workload definitions\
      \ via `WORKLOADS` env var — extensible without code changes\n> - In-cluster\
      \ K8s client (runs as a pod with ServiceAccount)\n> - Embedded static files\
      \ via `//go:embed` — single binary, no runtime dependencies\n> - 5-second auto-refresh\
      \ in the UI for live status updates\n> - Confirm dialog before any switching\
      \ action"
