- number: 5
  title: ExternalSecret for LiteLLM credentials
  steps:
  - id: P1.T5.S1
    text: |-
      Create the ExternalSecret


      Create `apps/paperclip/manifests/external-secret-llm.yaml`:

      ```yaml
      # Syncs LiteLLM API key from Infisical and merges with static base URL.
      # Paperclip uses the OpenAI SDK internally — setting OPENAI_BASE_URL
      # routes all model calls through the in-cluster LiteLLM gateway.
      apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      metadata:
        name: paperclip-llm-key
        namespace: paperclip-system
      spec:
        refreshInterval: 5m
        secretStoreRef:
          name: infisical
          kind: ClusterSecretStore
        target:
          name: paperclip-llm-key
          creationPolicy: Owner
          template:
            data:
              OPENAI_API_KEY: "{{ .OPENAI_API_KEY }}"
              OPENAI_BASE_URL: "http://litellm.litellm.svc:4000"
        data:
          - secretKey: OPENAI_API_KEY
            remoteRef:
              key: PAPERCLIP_LITELLM_KEY
      ```
  - id: P1.T5.S2
    text: |-
      Commit


      ```bash
      git add apps/paperclip/manifests/external-secret-llm.yaml
      git commit -m "feat(phase14): add Paperclip LiteLLM ExternalSecret"
