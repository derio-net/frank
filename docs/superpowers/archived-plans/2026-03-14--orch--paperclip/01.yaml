- number: 11
  title: Paperclip ArgoCD Application CR
  steps:
  - id: P1.T11.S1
    text: |-
      Create the Application CR


      Create `apps/root/templates/paperclip.yaml`:

      ```yaml
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: paperclip
        namespace: argocd
        annotations:
          argocd.argoproj.io/sync-wave: "1"
        finalizers:
          - resources-finalizer.argocd.argoproj.io
      spec:
        project: infrastructure
        source:
          repoURL: {{ .Values.repoURL }}
          targetRevision: {{ .Values.targetRevision }}
          path: apps/paperclip/manifests
        destination:
          server: {{ .Values.destination.server }}
          namespace: paperclip-system
        syncPolicy:
          automated:
            prune: false
            selfHeal: true
          syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
            - RespectIgnoreDifferences=true
        ignoreDifferences:
          - group: ""
            kind: Secret
            jsonPointers:
              - /data
      ```

      Notes:
      - `sync-wave: "1"` ensures this deploys after `paperclip-db` (wave 0).
      - `ignoreDifferences` + `RespectIgnoreDifferences=true` prevents ArgoCD from detecting drift on ExternalSecret-managed Secrets. This is an improvement over the `sympozium-extras` reference pattern which lacks both — ExternalSecrets constantly update Secret data, causing unnecessary sync diffs without this.
      - Uses single `source` (not `sources`) since there's no upstream chart — just raw manifests from this repo.
  - id: P1.T11.S2
    text: |-
      Commit


      ```bash
      git add apps/root/templates/paperclip.yaml
      git commit -m "feat(phase14): add Paperclip ArgoCD Application CR"
      ```

