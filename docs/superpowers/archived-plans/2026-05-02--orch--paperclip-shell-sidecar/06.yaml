      Post-Deploy Checklist [manual]
      <!-- Tracking: https://github.com/derio-net/frank/issues/180 -->
      **Depends on:** Phase 5

      This is a fix/extension plan, so most post-deploy steps are absorbed into Phase 5. This phase explicitly confirms the per-step disposition rather than skipping silently.

      - [-] **Step 1: Expose externally** — *skipped:* not user-facing; SSH/Mosh are operator-only on the LAN. No Traefik IngressRoute, no homepage tile.
      - [-] **Step 2: Write building blog post** — *skipped:* extension to existing layer; appended to `building/15-paperclip` in Phase 5 Task 2 instead.
      - [-] **Step 3: Write operating blog post** — *skipped:* extension to existing layer; appended to `operating/18-paperclip` in Phase 5 Task 2 instead.
      - [ ] **Step 4: Update README** — done in Phase 5 Task 3. Confirm.
      - [-] **Step 5: Sync runbook** — *skipped:* no `# manual-operation` blocks introduced.
      - [ ] **Step 6: Update plan status** — done in Phase 5 Task 5. Confirm `**Status:** Deployed`.

      ---

      ## Deployment Notes

      *(Populated as phases run. Each row records the date, phase, and the concrete value or decision recorded at that step.)*

      | Date | Phase | Note |
      |------|-------|------|
      | 2026-05-02 | Phase 1 | `derio-net/agent-images` PR opened: https://github.com/derio-net/agent-images/pull/46 — adds `paperclip-shell/` directory, CI matrix entry, and smoke test. P1.T4.S2 (capturing the merged SHA + GHCR tag for Phase 2 to consume) deferred until that PR merges. |
      | 2026-05-02 | Phase 1 | Investigation findings: agent-shell-base defaults are `AGENT_USER=agent` / `AGENT_HOME=/home/agent` / UID,GID=1000 (inherited unchanged). The `/run` ownership fix and `with-contenv` shebang fix have already landed in `agent-shell-base/Dockerfile` (lines 69–70 and `/command/with-contenv` shebangs respectively), so no upstream blocker. |
      | 2026-05-02 | Phase 1 | Deviation from plan: sshd in `agent-shell-base` is configured with `UsePAM no` (sshd_config L7), so PAM `motd.dynamic` is not available. Implemented MOTD via `/etc/profile.d/50-paperclip-shell-motd.sh` instead — fires for both interactive ssh and `kubectl exec -it ... bash -l`. |
      | 2026-05-02 | Phase 1 | Deviation from plan: added `/etc/profile.d/40-paperclip-shell-paths.sh` (not in original plan) to wire mise shims, `~/.cargo/bin`, and `~/.local/bin` into the operator's PATH. The installer also prepends these dirs at reconcile-time so `npm`/`cargo` from a mise-installed runtime resolve correctly inside `cont-init.d` boot context. |
      | 2026-05-02 | Phase 1 | Deviation from plan: `install-base-runtimes.sh` was extended with the apt build deps (`build-essential`, `pkg-config`, `libssl-dev`, `python3`, `python3-yaml`, `pipx`, `jq`) needed by the runtime managers and by `install-inventory.sh`'s YAML parsing. Original plan implicitly assumed these were already in the parent image; they aren't. The system Python is the load-bearing one for inventory parsing — at `cont-init.d` boot time mise shims are not yet on PATH for the script's own environment, and parsing must keep working before any mise-managed runtimes land on the PV. |
      | 2026-05-02 | Phase 1 | Deviation from plan: `install-inventory.sh` uses `mise where "$tool"` rather than the plan's `mise ls "$tool" \| grep`. `mise where` returns 0 when a matching version family is installed (incl. when the operator did `mise install python@3.12.4` interactively and the inventory says `python@3.12`); `mise ls` would require parsing. Cleaner idempotency + closer to mise's intended public API. |
      | 2026-05-02 | Phase 1 | Deviation from plan: investigation evidence was that `agent-shell-base` ships **no** `/etc/profile.d/` additions and **no** PAM motd configuration today (`sshd_config` L7 sets `UsePAM no`; `etc/skel/` only contains `.tmux.conf`). `paperclip-shell` is the first image in this lineage to add either, so there is no inherited motd convention to reuse — the `/etc/profile.d/50-paperclip-shell-motd.sh` decision is the new convention for now. |
      | 2026-05-02 | Phase 1 | Post-review corrections (commit `64e5a42`, agent-images PR #46): pre-create `/var/log/cont-init.d` and `/var/lib/paperclip-shell` owned by AGENT_UID at image-build time (without this the installer's `tee` + MOTD write fail silently under K8s `cap-drop=ALL` / `runAsUser: 1000`); drop dead `RUSTUP_HOME=/usr/local/lib/rustup` in favour of per-user `~/.rustup` initialisation; harden `run()` rc capture; switch `cargo install --list` parsing to a whitespace-strip pipeline; drop trailing blank line in Telegram body via `printf` instead of HEREDOC. |
      | 2026-05-03 | Phase 1 | P1.T4.S2 — agent-images PR #46 merged (merge commit `146b7a6`); current `main` HEAD is `8af0d0800905487dfdb1716218d64bc1f915aecc` (also tagged `latest`). Phase 2 pins `ghcr.io/derio-net/paperclip-shell:8af0d0800905487dfdb1716218d64bc1f915aecc`. |
      | 2026-05-03 | Phase 2 | Deviation from plan: dropped `shareProcessNamespace: true` from the Pod spec. The plan assumed it would let the shell sidecar `ps -ef` paperclip's tree, but it's incompatible with `agent-shell-base` s6-overlay v3 init under `runAsNonRoot` (`s6-overlay-suexec: fatal: can only run as pid 1`). Sibling `ruflo` discovered the same in PR #196 — paperclip-shell follows that resolution. The shell still has full visibility into `/paperclip` (the actual debugging surface) via the shared PVC. |
      | 2026-05-03 | Phase 2 | Deviation from plan: P2.T3 SSH-keys ESO rewritten as a SOPS-bootstrap Secret in `secrets/paperclip/` (mirrors `secrets/ruflo/` and `secrets/secure-agent-pod/`). The plan's premise — that `agent-ssh-keys` is ESO-managed and we should mirror it — turned out to be wrong: `agent-ssh-keys` is a manually-applied SOPS Secret with no ExternalSecret backing it. Following the existing convention rather than introducing a one-off Infisical entry just for this Secret. The Telegram-alerts Secret (`paperclip-shell-alerts`) remains a real ESO since the `FRANK_C2_TELEGRAM_*` Infisical entries are already used by `grafana-alerting` and `ruflo-shell-alerts`. |
      | 2026-05-03 | Phase 2 | Deviation from plan: kept the existing `data` volume name on the Deployment (reused by both the upstream paperclip container and the sidecar at `/paperclip`) rather than renaming to `paperclip-data`. Volume name in pod spec is purely an alias for the PVC `paperclip-data`; renaming would have churned the upstream container's mount unnecessarily. |
      | 2026-05-03 | Phase 2 | Deviation from plan: P2.T5.S1 paperclip-container UID investigation skipped at write-time. The pod already sets `fsGroup: 1000` (pre-existing), so the shared `/paperclip` PVC is group-writable by group 1000, and the sidecar's `runAsUser: 1000` falls within that group. No initContainer chown needed; no override of the upstream paperclip container. Phase 3 will validate this empirically (Phase 3 Task 1 Step 3). |
      | 2026-05-03 | Phase 2 | Added `terminationGracePeriodSeconds: 45` to the Pod spec to give the shell sidecar's `cont-finish.d` (s6 shutdown) hooks time to drain tmux state, mirroring `ruflo`. |
      | 2026-05-03 | Phase 3 | P3.T0.S1 — `paperclip-shell-ssh-keys` Secret bootstrapped in-cluster from the existing `secure-agent-pod/agent-ssh-keys` pubkey (`raspi-controller`), per the README's "reuse the one already paired" guidance. **Operator follow-up:** SOPS-encrypt and commit `secrets/paperclip/paperclip-shell-ssh-keys.yaml` so the cluster is reproducible from git. |
      | 2026-05-03 | Phase 3 | P3.T1.S1 — pod restart needed after Secret bootstrap. The `30-authorized-keys` `cont-init.d` script copies `/etc/ssh-keys/authorized_keys` → `/home/agent/.ssh/authorized_keys` once at container boot (guarded `if [ -f ]`). When the pod boots before the Secret exists, the copy is a no-op — sshd then comes up with an empty `authorized_keys` and rejects every login. Resolution for this validation: `kubectl rollout restart deploy/paperclip` after applying the Secret. Documented as an operating gotcha, not a code fix — Secret-first ordering is the operator's responsibility, and the fail-open boot is intentional (`Secret optional: true`). |
      | 2026-05-03 | Phase 3 | P3.T2.S3 — mosh end-to-end UDP test deferred (no mosh client in this validation environment). Server-side validation passes: `mosh-server (mosh 1.4.0)` binary present in the sidecar; `mosh-server new -p 60000:60015` (with `LC_ALL=C.UTF-8`) prints `MOSH CONNECT 60000 <key>` correctly; Service has all 17 ports (TCP/22 + UDP/60000–60015) bound to LB IP `192.168.55.221` with EndpointSlice resolving to the sidecar Pod. End-to-end UDP exchange is a single-line operator check (`mosh agent@192.168.55.221`) and will fall out of normal use. |
      | 2026-05-03 | Phase 3 | P3.T4 — induced-failure test ran via `kubectl patch configmap paperclip-shell-inventory` with `selfHeal` momentarily disabled on the ArgoCD Application, rather than the plan's commit/push/sync flow. Reason: this Phase 3 PR branch is unmerged so ArgoCD wouldn't pick up a branch-only commit; round-tripping a commit to `main` and back just to flip a CM value would have left a noise commit in history. After the failure was captured, `selfHeal` was re-enabled and a manual sync reverted the CM to ground truth — verified clean reconcile + success MOTD afterwards. |
      | 2026-05-03 | Phase 3 | P3.T4 gotcha (operating note): SSH-launched `paperclip-shell-reconcile` does **not** fire Telegram on failure. sshd scrubs container env at login, so `FRANK_C2_TELEGRAM_BOT_TOKEN` / `FRANK_C2_TELEGRAM_CHAT_ID` (provided by `envFrom: secretRef: paperclip-shell-alerts`) are not present in the SSH session — `notify-telegram.sh` exits 0 silently. The boot-time reconcile (`cont-init.d/40-shell-inventory`) and `kubectl exec ... paperclip-shell-reconcile` both inherit PID-1 env and DO fire Telegram. The MOTD failure summary is unaffected (it's written from `last-reconcile.motd` regardless of env). To add to operating docs in Phase 5. |
      | 2026-05-03 | Phase 3 | P3.T4.S3 — Telegram delivery confirmed end-to-end. Direct API POST returned `{"ok":true,"result":{"message_id":942,...}}` to chat `2034763022` (Ioannis @DerioUnbound) via bot `@agent_zero_cc_bot`. The full reconcile-driven path was also exercised via `kubectl exec` with bogus npm package and produced the failure-MOTD `⚠ paperclip-shell: 1 install(s) failed on last reconcile (npm i -g @anthropic-ai/this-package-does-not-exist-XXXX)`. |
      | 2026-05-03 | Phase 3 | P3.T2 ephemeral key audit trail — to SSH from this in-cluster validation pod (no operator private key available here), an ed25519 keypair was generated under `/tmp/phase3-test-key{,.pub}` inside the `secure-agent-pod` filesystem; the pubkey was appended to `paperclip-shell-ssh-keys`'s `authorized_keys`; SSH/tmux/mosh-server checks ran; then the Secret was reverted to operator-only and `/tmp/phase3-test-key*`, `/tmp/test-pub`, `/tmp/authorized_keys_combined`, `/tmp/known_hosts_phase3`, `/tmp/authorized_keys` all removed. The private key existed only at `/tmp/` inside the in-cluster pod, never on a PVC or the host filesystem; the live `paperclip-shell-ssh-keys` Secret now contains only the operator pubkey (verified `wc -l = 1`). |
      | 2026-05-03 | Phase 4 | P4.T1.S2 — initial inventory committed. Mise: `python@3.12`, `node@20`, `rust@stable`. npm-global: `@anthropic-ai/claude-code`, `@openai/codex`. pipx: `black`, `ruff`. cargo: `ripgrep`, `eza`. Order matters at install time but a single reconcile pass handles it because the script prepends mise shims to PATH at the top — once `mise install node@20` lands the shim, the npm-global loop later in the same run resolves `npm` to mise's. |
      | 2026-05-03 | Phase 4 | P4.T2 — out-of-band reconcile against the populated inventory: `installed=8 already=1 removed=0 failed=1`. Detail: `mise install` for python/node/rust all succeeded; `pipx install` for black/ruff succeeded; `cargo install` for ripgrep/eza succeeded. `npm i -g @anthropic-ai/claude-code` reported as `already` because the agent-shell-base image already installs it system-wide at `/usr/lib/node_modules/`. `npm i -g @openai/codex` failed with `EACCES: permission denied, mkdir '/usr/lib/node_modules/@openai'` — proves `npm` resolved to **system `/usr/bin/npm`** during the reconcile, not mise's shim. Root cause: `mise install <runtime>` does not activate the runtime — the mise shim falls through to the system binary until `mise use -g <runtime>` writes `~/.config/mise/config.toml`. The reconcile script therefore needs an `assert_manager mise && mise use -g …` step (or equivalent activation) between the mise loop and the npm-global / cargo loops. Workaround applied during validation: `mise use -g node@20 rust@stable` after the first reconcile; subsequent npm-global installs resolve to mise's user-prefix. **Action item (deferred — out of Phase 4 scope):** patch `install-inventory.sh` so the mise loop activates each tool after `mise install` (e.g., `mise use -g "$tool"`), and use `/usr/bin/python3` explicitly for YAML parsing (the script's mise-shim `python3` resolves to mise's python after activation, which doesn't have PyYAML). Tracked as derio-net/agent-images#56. |
      | 2026-05-03 | Phase 4 | P4.T2 — second reconcile (after `mise use -g python@3.12 node@20 rust@stable`) blew up with `ModuleNotFoundError: No module named 'yaml'` from `python3` because the mise-managed python doesn't have PyYAML. Reverted with `mise use -g --rm python` so the script's `python3` falls back to `/usr/bin/python3`. This is the second arm of the same script bug — both arms close with: parse YAML via the explicit system `/usr/bin/python3`, and only activate runtimes the operator actually needs at the shell. |
      | 2026-05-03 | Phase 4 | P4.T2.S2 — manager-by-manager verification after reconcile: `mise ls` → 3 runtimes; `cargo install --list` → ripgrep, eza; `pipx list --short` → black, ruff. `npm ls -g --depth=0` against mise-shim `npm` shows only `corepack` + `npm` itself (claude-code is in the system prefix, codex is nowhere). Once the script bug above is fixed, a clean rebuild on a fresh PV will land claude-code + codex into `~/.local/share/mise/installs/node/20/lib/node_modules/`. |
      | 2026-05-03 | Phase 4 | P4.T3 — persistence verified across `kubectl rollout restart deploy/paperclip`. After the bounce: mise runtimes intact, `~/.cargo/bin/{rg,eza,fd}` intact, pipx tools intact. The boot-time reconcile ran against the live (still-empty on `main`) ConfigMap and produced `installed=0 already=0 removed=0 failed=0` — clean no-op MOTD. Confirms the PV (`paperclip-shell-home`) is the durable store and the ConfigMap drives reconciliation, not state. |
      | 2026-05-03 | Phase 4 | P4.T4 — drift policy. Interactive installs (`cargo install fd-find` from an SSH session) survive pod bounces because the binary lands on `~/.cargo/bin/` on the PV. The Layer-3 escape hatch is **intentional**: try a tool out via SSH, decide later whether it earns a slot in the inventory ConfigMap. The promotion rule is *survival across PV migration*: anything you want re-installed on a fresh PV must be in `configmap-shell-inventory.yaml`. Anything in `~/.cargo/bin/` / `~/.npm-global/` / `~/.local/share/pipx/` that is **not** in the inventory is treated as ephemeral by definition — surviving pod bounce is a side-effect of PV reuse, not a guarantee. fd-find (installed during this validation) intentionally left in place as the audit trail; promote to inventory if it becomes part of the operator's reflexes. |
      | 2026-05-03 | Phase 4 | P4 ArgoCD plumbing note — Phase 4 cannot exercise reconcile end-to-end against a feature branch because the ArgoCD `paperclip` Application's `spec` is templated by the root App-of-Apps and re-applied on every root sync (selfHeal flips back to `true`, `targetRevision` flips back to `main`). Patching the live ConfigMap, suspending selfHeal on the leaf Application, and re-pointing `targetRevision` at the feature branch all got reverted within the validation window. Validation therefore relied on (a) one successful reconcile against the live-patched CM during the brief stable window, (b) PV-resident state surviving the inevitable revert and re-bounce. Same constraint will bite any future plan that needs to live-test a CM/Secret on a feature branch — push-merge-then-test is the durable path; live-patch-then-revert is fine for one-off observability of behaviour but not for cumulative state changes. |
