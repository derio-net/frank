- number: 12
  title: Paperclip Rollout (Recreate strategy)
  steps:
  - id: P3.T12.S1
    text: |-
      Create rollout.yaml from deployment.yaml spec *(skipped — Phase 3 reverted)*


      ```yaml
      # Argo Rollouts Recreate for Paperclip AI Orchestrator
      #
      # Replaces deployment.yaml (deleted manually in Task 11).
      # Strategy: Recreate — compatible with RWO PVC (/paperclip on Longhorn).
      #   Blue-green is NOT possible: two concurrent ReplicaSets would deadlock on the RWO volume.
      #
      # Rollback: kubectl argo rollouts abort paperclip -n paperclip-system
      #   (restores previous ReplicaSet — Argo Rollouts keeps it around until TTL)
      apiVersion: argoproj.io/v1alpha1
      kind: Rollout
      metadata:
        name: paperclip
        namespace: paperclip-system
        labels:
          app.kubernetes.io/name: paperclip
          app.kubernetes.io/component: server
      spec:
        replicas: 1
        selector:
          matchLabels:
            app.kubernetes.io/name: paperclip
            app.kubernetes.io/component: server
        template:
          metadata:
            labels:
              app.kubernetes.io/name: paperclip
              app.kubernetes.io/component: server
          spec:
            nodeSelector:
              zone: core
            securityContext:
              fsGroup: 1000
            imagePullSecrets:
              - name: paperclip-ghcr
            containers:
              - name: paperclip
                image: ghcr.io/derio-net/paperclip:v0.3.2
                ports:
                  - name: http
                    containerPort: 3100
                    protocol: TCP
                envFrom:
                  - configMapRef:
                      name: paperclip-config
                  - secretRef:
                      name: paperclip-llm-key
                  - secretRef:
                      name: paperclip-auth
                  - secretRef:
                      name: paperclip-anthropic
                      optional: true
                env:
                  - name: PG_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: paperclip-db-postgresql
                        key: password
                  - name: DATABASE_URL
                    value: "postgres://paperclip:$(PG_PASSWORD)@paperclip-db-postgresql.paperclip-system.svc:5432/paperclip"
                volumeMounts:
                  - name: data
                    mountPath: /paperclip
                resources:
                  requests:
                    memory: 256Mi
                    cpu: 250m
                  limits:
                    memory: 1Gi
                    cpu: "1"
                readinessProbe:
                  tcpSocket:
                    port: http
                  periodSeconds: 10
                livenessProbe:
                  tcpSocket:
                    port: http
                  initialDelaySeconds: 30
                  periodSeconds: 15
            volumes:
              - name: data
                persistentVolumeClaim:
                  claimName: paperclip-data
        strategy:
          recreate: {}
      ```
