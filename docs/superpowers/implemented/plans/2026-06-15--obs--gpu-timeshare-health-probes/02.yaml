tasks:
- number: 1
  title: ExternalSecret for the probe key (monitoring ns)
  steps:
  - id: P2.T1.S1
    text: |
      Mirror `apps/litellm/manifests/external-secret.yaml`. Create
      `apps/blackbox-exporter/manifests/external-secret-litellm-key.yaml`:
      an ExternalSecret in ns `monitoring` named `litellm-master-key`,
      syncing the existing Infisical key `LITELLM_MASTER_KEY` → secret key
      `litellm-master-key`. Use the SAME secretStoreRef the litellm
      ExternalSecret uses (copy refreshInterval, secretStoreRef verbatim).
      (Master key chosen over a dedicated virtual key — no manual mint; the
      key already exists in Infisical so ESO syncs it on deploy.)
  - id: P2.T1.S2
    text: |
      Confirm the ArgoCD blackbox-exporter Application source path globs
      `apps/blackbox-exporter/manifests/` (so the new manifest is picked up).
      Verify by grepping `apps/root/templates/` for the blackbox-exporter app
      path. No Application CR edit expected.
- number: 2
  title: Mount the key into blackbox-exporter (optional)
  steps:
  - id: P2.T2.S1
    text: |
      In `apps/blackbox-exporter/manifests/deployment.yaml`, add a volume from
      secret `litellm-master-key` with `optional: true` and a volumeMount at
      `/etc/blackbox-secrets` (readOnly). CRITICAL: optional:true so the pod
      (which runs the blog uptime probe) starts even if the key is briefly unsynced.
      ```
      volumes:
        - name: litellm-master-key
          secret:
            secretName: litellm-master-key
            optional: true
      # container.volumeMounts:
        - name: litellm-master-key
          mountPath: /etc/blackbox-secrets
          readOnly: true
      ```
  - id: P2.T2.S2
    text: |
      Sanity-render the deployment YAML (`yq . apps/blackbox-exporter/manifests/deployment.yaml >/dev/null && echo OK`);
      confirm volume + mount present with optional:true.
