      Known: live image is `ghcr.io/loft-sh/vcluster-pro:0.32.1`. Most likely either chart pin needs bump, or image field needs ignoreDifferences.
  - id: P5.T3.S2
    text: |-
      Apply fix and verify `Synced/Healthy`.
