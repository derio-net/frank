  - id: P1.T4.S7
    text: |-
      Verify end-to-end from a mesh client (e.g., Mac)


      ```bash
      # Verify split DNS
      dig litellm.frank.derio.net  # Should resolve via 192.168.10.11
      dig google.com                # Should resolve via 1.1.1.1

      # Verify subnet routes (without exit node)
