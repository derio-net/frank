  steps:
  - id: P1.T2.S1
    text: |-
      Add the `split` key under `dns.nameservers`


      In the `config.yaml` data key, replace the `dns` section (lines 40-53) with:

      ```yaml
          dns:
            base_domain: mesh.hop.derio.net
            magic_dns: true
            nameservers:
              global:
                - 1.1.1.1
                - 8.8.8.8
              split:
                lab.derio.net:
                  - 192.168.10.11
                  - 192.168.10.12
                frank.derio.net:
                  - 192.168.10.11
                  - 192.168.10.12
            extra_records:
              - name: headplane.hop.derio.net
                type: A
                value: 100.64.0.4
              - name: entry.hop.derio.net
                type: A
                value: 100.64.0.4
      ```
