tasks:
- number: 1
  title: Deploy Blackbox Exporter
  steps:
  - id: P1.T1.S1
    text: |-
      Create Blackbox Exporter ConfigMap


      ```yaml
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: blackbox-exporter-config
        namespace: <observability-namespace>
      data:
        blackbox.yml: |
          modules:
            http_2xx:
              prober: http
              timeout: 10s
              http:
                valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
                valid_status_codes: [200, 301, 302]
                follow_redirects: true
                preferred_ip_protocol: ip4
            http_2xx_no_redirect:
              prober: http
              timeout: 10s
              http:
                valid_status_codes: [200]
                follow_redirects: false
                preferred_ip_protocol: ip4
            tcp_connect:
              prober: tcp
              timeout: 5s
      ```
  - id: P1.T1.S2
    text: |-
      Create Blackbox Exporter Deployment + Service


      ```yaml
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: blackbox-exporter
        namespace: <observability-namespace>
        labels:
          app: blackbox-exporter
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: blackbox-exporter
        template:
          metadata:
            labels:
              app: blackbox-exporter
          spec:
            containers:
              - name: blackbox-exporter
                image: prom/blackbox-exporter:v0.25.0
                ports:
                  - containerPort: 9115
                args:
                  - --config.file=/config/blackbox.yml
                volumeMounts:
                  - name: config
                    mountPath: /config
                resources:
                  requests:
                    cpu: 10m
                    memory: 32Mi
                  limits:
                    memory: 64Mi
            volumes:
              - name: config
                configMap:
                  name: blackbox-exporter-config
      ---
      apiVersion: v1
      kind: Service
      metadata:
        name: blackbox-exporter
        namespace: <observability-namespace>
        labels:
          app: blackbox-exporter
      spec:
        selector:
          app: blackbox-exporter
        ports:
          - port: 9115
            targetPort: 9115
      ```
  - id: P1.T1.S3
    text: |-
      Apply and verify


      ```bash
      kubectl apply -f <path-to-manifests>
      kubectl get pods -n <observability-namespace> -l app=blackbox-exporter
      kubectl logs -n <observability-namespace> -l app=blackbox-exporter --tail=20
      ```

      Expected: Pod running, logs show "Listening on :9115".
  - id: P1.T1.S4
    text: |-
      Configure VictoriaMetrics to scrape probes


      If using VM Operator CRDs:

      ```yaml
      apiVersion: operator.victoriametrics.com/v1beta1
      kind: VMProbe
      metadata:
        name: feature-health-probes
        namespace: <observability-namespace>
      spec:
        targets:
          staticConfig:
            targets:
              - http://n8n.n8n.svc.cluster.local:5678
              - https://paperclip.frank.derio.net
              - https://grafana.frank.derio.net
              - https://blog.derio.net
            labels:
              probe_group: feature_health
        module: http_2xx
        vmProberSpec:
          url: blackbox-exporter.<observability-namespace>.svc:9115
      ```

      If using raw Prometheus scrape config, add a scrape job with relabeling:

      ```yaml
      - job_name: blackbox_feature_health
        metrics_path: /probe
        params:
          module: [http_2xx]
        static_configs:
          - targets:
              - http://n8n.n8n.svc.cluster.local:5678
              - https://paperclip.frank.derio.net
              - https://grafana.frank.derio.net
              - https://blog.derio.net
            labels:
              probe_group: feature_health
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
          - source_labels: [__param_target]
            target_label: instance
          - target_label: __address__
            replacement: blackbox-exporter.<observability-namespace>.svc:9115
      ```
  - id: P1.T1.S5
    text: |-
      Test a probe


      ```bash
      kubectl port-forward -n <observability-namespace> svc/blackbox-exporter 9115:9115 &
      curl -s "http://localhost:9115/probe?target=https://grafana.frank.derio.net&module=http_2xx" | grep probe_success
      kill %1
      ```

      Expected: `probe_success 1`
  - id: P1.T1.S6
    text: |-
      Commit


      ```bash
      git add <manifest paths>
      git commit -m "feat: deploy blackbox-exporter for feature health probes"
      ```

