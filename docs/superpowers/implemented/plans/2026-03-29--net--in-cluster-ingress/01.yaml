- number: 8
  title: Create Homepage manifests
  steps:
  - id: P1.T8.S1
    text: |-
      Create the Deployment


      Create `apps/homepage/manifests/deployment.yaml`:

      ```yaml
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: homepage
        namespace: homepage
        labels:
          app: homepage
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: homepage
        template:
          metadata:
            labels:
              app: homepage
          spec:
            nodeSelector:
              zone: edge
            containers:
              - name: homepage
                image: ghcr.io/gethomepage/homepage:v1.12.1
                ports:
                  - containerPort: 3000
                    name: http
                volumeMounts:
                  - name: config-services
                    mountPath: /app/config/services.yaml
                    subPath: services.yaml
                  - name: config-settings
                    mountPath: /app/config/settings.yaml
                    subPath: settings.yaml
            volumes:
              - name: config-services
                configMap:
                  name: homepage-services
              - name: config-settings
                configMap:
                  name: homepage-settings
      ```
  - id: P1.T8.S2
    text: |-
      Create the Service


      Create `apps/homepage/manifests/service.yaml`:

      ```yaml
      apiVersion: v1
      kind: Service
      metadata:
        name: homepage
        namespace: homepage
        labels:
          app: homepage
      spec:
        type: ClusterIP
        selector:
          app: homepage
        ports:
