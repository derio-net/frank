- number: 1
  title: Create the ArgoCD Application CR
  steps:
  - id: P1.T1.S1
    text: |-
      Create the Application CR


      Follow the raw-manifests pattern from `apps/root/templates/health-bridge.yaml`. The only differences: app name and path.

      ```yaml
      # apps/root/templates/grafana-alerting.yaml
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: grafana-alerting
        namespace: argocd
        finalizers:
          - resources-finalizer.argocd.argoproj.io
      spec:
        project: infrastructure
        source:
          repoURL: {{ .Values.repoURL }}
          targetRevision: {{ .Values.targetRevision }}
          path: apps/grafana-alerting/manifests
        destination:
          server: {{ .Values.destination.server }}
          namespace: monitoring
        syncPolicy:
          automated:
            prune: false
            selfHeal: true
          syncOptions:
            - CreateNamespace=false
            - ServerSideApply=true
            - RespectIgnoreDifferences=true
        ignoreDifferences:
          - group: ""
            kind: Secret
            jsonPointers:
              - /data
      ```
  - id: P1.T1.S2
    text: |-
      Verify YAML syntax


