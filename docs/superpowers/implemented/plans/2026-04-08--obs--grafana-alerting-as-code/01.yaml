- number: 4
  title: Create the Notification Policy ConfigMap
  steps:
  - id: P1.T4.S1
    text: |-
      Create the notification policy ConfigMap


      ```yaml
      # apps/grafana-alerting/manifests/notification-policy-cm.yaml
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: grafana-alerting-notification-policy
        namespace: monitoring
      data:
        notification-policy.yaml: |
          apiVersion: 1
          policies:
            - orgId: 1
              receiver: "Telegram - Willikins"
              group_wait: 30s
              group_interval: 3m
              repeat_interval: 3m
              routes:
                - receiver: "Telegram - Willikins"
                  matchers:
                    - severity=critical
                  continue: true
                - receiver: "Telegram - Willikins"
                  matchers:
                    - severity=warning
                  continue: true
                - receiver: "Health Bridge Webhook"
                  matchers:
                    - grafana_folder=Feature Health
                  continue: false
      ```
