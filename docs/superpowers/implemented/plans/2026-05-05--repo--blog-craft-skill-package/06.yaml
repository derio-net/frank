tasks:
- number: 1
  title: Local plugin install
  steps:
  - id: P6.T1.S1
    text: |-
      Install the plugin from the local path. *(install path turned out to be a two-step `marketplace add` then `install <plugin>@<marketplace>`, not the bare `/plugin install <path>` shown here. Required adding `.claude-plugin/marketplace.json` to blog-craft (see commit `f2c90ac`) and patching `~/.claude/plugins/known_marketplaces.json` to add a missing `lastUpdated` field. Three skills now appear in this session as `blog-craft:bootstrap-blog`, `blog-craft:blog-post`, `blog-craft:media`.)*
- number: 2
  title: Drive the full pipeline by hand
  steps:
  - id: P6.T2.S2
    text: |-
      Bootstrap a fresh blog. *(driven two ways: (a) for the conversational layer — operator drove `/bootstrap-blog` to scaffold the **stoa-blog** in a separate terminal, which surfaced the bugs that became PR #1 (banner placement, 2-col tile grid, Hextra subpath URL handling, operator-generated banners for Gemini's panoramic-aspect-ratio limit); (b) for static-surface validation — drove `tools/bootstrap-render.sh` against `tests/fixtures/answers-frank-like.yaml` → `/tmp/blog-craft-pr1-test/` with `BLOG_CRAFT_TEST_MODE=1`. Hugo build clean; homepage renders 2-col grid linking to `docs/tutorials/` and `docs/recipes/`; no 404s.)*
  - id: P6.T2.S3
    text: |-
      Create a post. *(driven two ways: (a) operator drove `/blog-post` against the real stoa-blog with a live Gemini call — that real-use exposed the asymmetry between asking the user for body/summary vs composing them from context, which became PR #1's commit-2 (`feat(blog-post): compose body and summary from context`) refactor; (b) drove `tools/blog-post-create.sh` directly against `/tmp/blog-craft-pr1-test/tutorials/01-hello-frank/` with `BLOG_CRAFT_TEST_MODE=1` for the static-surface verification — page bundle written with correct frontmatter (title, weight=2, draft:false, summary), prompts entry appended (`key: tutorials-01`), 1px stub PNG generated at `static/images/tutorials-01-cover.png`, both Series Index and Topic/Evolution Map rows added to `00-overview/index.md`.)*
  - id: P6.T2.S4
    text: |-
      Add a media placeholder and fill it. *(executed against `/tmp/blog-craft-pr1-test/content/docs/tutorials/01-hello-frank/` — added the canonical `<!-- MEDIA: ... -->` + `<!-- {{</* shortcode */>}} -->` pair, dropped a 1px PNG named `screenshot.png` in the bundle, ran `tools/media-fill.py`. Marker pair correctly replaced with live `{{< screenshot src="screenshot.png" caption="Test screenshot" >}}`. Hugo build clean; rendered HTML at `public/docs/tutorials/01-hello-frank/index.html` contains `<figure class="screenshot"><img src="/test/docs/tutorials/01-hello-frank/screenshot.png" loading="lazy" /><figcaption>Test screenshot</figcaption></figure>` with subpath-correct URL. Re-running media-fill confirmed idempotent: `no <!-- MEDIA: --> placeholders found`. Side note caught during the test: the `/blog-post` skill's prose says "see MEDIA-GUIDE.md for marker syntax" — agents must read that before composing markers, since the second placeholder line uses Hugo's `{{</* */>}}` commented-shortcode form, NOT the bare `{{< >}}` form.)*
- number: 3
  title: Verify acceptance criteria
  steps:
  - id: P6.T3.S5
    text: |-
      Walk the spec's six acceptance criteria. *(all 6 ✅. **AC1** plugin installs cleanly via two-step `/plugin marketplace add` → `/plugin install` (annotation in Step 1). **AC2** `bootstrap-blog` produces a working Hugo + Hextra site — `public/index.html` 31KB, lists both configured series with subpath-correct URLs. **AC3** `.blog-craft.yaml` is written with full schema; re-running `bootstrap-render.sh` against the same target exits 2 with `Refusing to overwrite. Remove the file manually if you really want to re-bootstrap.` **AC4** `blog-post` creates page bundle + cover image (`BLOG_CRAFT_TEST_MODE=1` mocks the live Gemini HTTP call; real-Gemini path is exercised, only the API request short-circuits — confidence in real-Gemini behavior carries from operator-driven stoa-blog runs that did call the API) + updates overview. **AC5** `media` finds + (operator-)optimizes + inserts a screenshot placeholder end-to-end (optimization is operator-driven per `MEDIA-GUIDE.md`'s pngquant/optipng instructions — the helper itself doesn't auto-compress). **AC6** end-to-end smoke against freshly-bootstrapped `/tmp/blog-craft-pr1-test/` — full pipeline (bootstrap → first post → first media-fill) clean. Plus PR #1's 6-item test plan: 6/6 PASS. Plus all 3 smoke suites: 22/22 PASS (5+10+7).)*
- number: 4
  title: Push and tag
  steps:
  - id: P6.T4.S6
    text: |-
      Push to GitHub. *(done across two PRs. **PR #1** (`feat: site banner above navbar; 2-col homepage tiles; body+summary composition`, https://github.com/derio-net/blog-craft/pull/1) merged 2026-05-12 — site banner partial, 2-col Hextra card grid, asymmetric `image=` vs `link=` subpath handling, operator-generated banners (Gemini doesn't do panoramic), body/summary auto-composition refactor. **PR #2** (`feat: hugo-serve.sh wrapper + smoke-blog-post.sh helper-signature fix`, https://github.com/derio-net/blog-craft/pull/2) merged 2026-05-12 — wrapper around `hugo server` for predictable Hugo Module builds, smoke-blog-post adapted to PR #1's helper signature, consistency sweep across 6 docs/scripts. Both PRs went through code-review; PR #2's review-fix commit addressed three Important issues plus three Minor polish items. Default branch flipped from feature → main on first push (PR #1 description noted this).)*
  - id: P6.T4.S7
    text: |-
      Tag v0.1.0. *(tagged **v0.2.0** instead. Rationale: PR #1 + PR #2 added meaningful surface (banner, 2-col tiles, body/summary composition, hugo-serve wrapper) on top of the original Phase-5 plugin install, so the first versioned release reflects that. Tag created locally (annotated) and pushed to origin: `v0.2.0` → `d49984f`. Tag message captures the cumulative surface and the 22/22 smoke result.)*
  - id: P6.T4.S8
    text: |-
      Update plan status. *(this edit — top-of-file Status: Not Started → Complete. Convention follows `plan-config.yaml`'s `repo` layer: "Complete" rather than "Deployed" since blog-craft has no cluster footprint.)*
  - id: P6.T4.S9
    text: |-
      Clean up test artifacts. *(removed `/tmp/test-bootstrap-fixture/`, `/tmp/blog-craft-pr1-test/`, `/tmp/blog-craft-test-venv/`, plus the `/tmp/pr1-*` and `/tmp/test-blog-post-*` fixture files used for the helper drives, plus `/tmp/hugo-serve.log` and `/tmp/hugo-smoke-bootstrap.log`.)*


      ---

      ## Notes for the executor

      - **No Frank changes.** This plan touches one file in Frank: this plan file itself, plus a status flip on the spec's plan-index table (handled by `vk plan spec-index`). All other work lands in `~/Docs/projects/DERIO_NET/blog-craft/`.
      - **Two repos, one head.** Each phase commits to `blog-craft`, not Frank. Don't try to push Frank as part of this plan — those commits stay on the `docs/repo-blog-craft-spec` branch in Frank for later folding into main.
      - **Test-first interpretation for declarative skill files.** A SKILL.md is a behavioral spec written in prose. The "test" is a smoke script that drives the skill end-to-end and asserts on filesystem state. Phases 3–5 each define their smoke test in Task 1 *before* writing the SKILL.md in Task 2.
      - **Mock the Gemini call in Phase 4's smoke test.** Real Gemini calls cost money and require an API key. The `BLOG_CRAFT_TEST_MODE=1` switch in `scripts/generate-images.py` writes a 1px PNG instead. Phase 6's manual run is where the real call happens.
      - **`gh repo create` requires `gh auth login`.** Phase 1 Step 5 assumes the user has already authenticated. If not, the script should error clearly, not silently fall back to creating a local-only repo.
