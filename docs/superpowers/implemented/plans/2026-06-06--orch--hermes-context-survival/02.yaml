- number: 1
  title: TDD the stdlib-only extraction script (testable via stdin mode)
  steps:
  - id: P2.T1.S1
    text: |-
      Write the FAILING test first: `scripts/tests/test_fetch_text.py`.
      It loads `apps/hermes-agent-shell/manifests/configmap-fetch-text.yaml`
      (yaml.safe_load), extracts `data["fetch-text"]`, writes it to a tmp
      file, and runs it with `python3 <tmp> --stdin --max-chars 200`
      feeding fixture HTML. Asserts: (1) title line present, (2) body
      text present, (3) `<script>` content absent, (4) output capped at
      200 chars + truncation notice, (5) exit code 0.

      BEGIN FILE scripts/tests/test_fetch_text.py
      """fetch-text ConfigMap script — functional tests via --stdin mode."""
      import pathlib
      import subprocess
      import sys

      import yaml

      REPO = pathlib.Path(__file__).resolve().parents[2]
      CM = REPO / "apps/hermes-agent-shell/manifests/configmap-fetch-text.yaml"

      FIXTURE = """<html><head><title>Frank Post</title>
      <script>var hidden = 'SCRIPT_MUST_NOT_LEAK';</script>
      <style>.x{color:red}</style></head>
      <body><nav>skip-nav</nav><h1>Hermes Shell</h1>
      <p>The cluster runs a 64k context variant now.</p></body></html>"""


      def _script(tmp_path):
          doc = yaml.safe_load(CM.read_text())
          script = doc["data"]["fetch-text"]
          p = tmp_path / "fetch-text"
          p.write_text(script)
          return p


      def _run(tmp_path, *args):
          return subprocess.run(
              [sys.executable, str(_script(tmp_path)), *args],
              input=FIXTURE, capture_output=True, text=True, timeout=30,
          )


      def test_extracts_title_and_body(tmp_path):
          r = _run(tmp_path, "--stdin")
          assert r.returncode == 0, r.stderr
          assert "Frank Post" in r.stdout
          assert "64k context variant" in r.stdout


      def test_strips_script_and_style(tmp_path):
          r = _run(tmp_path, "--stdin")
          assert "SCRIPT_MUST_NOT_LEAK" not in r.stdout
          assert "color:red" not in r.stdout


      def test_caps_output(tmp_path):
          # Fixture body text is ~65 chars; cap below that to force truncation.
          # (Deviation from first draft: a 200-char cap never triggered on the
          # small fixture — caught red-green during implementation.)
          r = _run(tmp_path, "--stdin", "--max-chars", "30")
          assert "truncated at 30 chars" in r.stdout
          assert "variant now" not in r.stdout
      END FILE

      Run: `uv run --with pyyaml --with pytest pytest scripts/tests/test_fetch_text.py`
      → expect FAILURE (ConfigMap file does not exist yet). That is red.
  - id: P2.T1.S2
    text: |-
      Create `apps/hermes-agent-shell/manifests/configmap-fetch-text.yaml`
      — a ConfigMap whose single key `fetch-text` is the full script.

      BEGIN FILE apps/hermes-agent-shell/manifests/configmap-fetch-text.yaml
      # fetch-text — context-hygiene web reader for the hermes shell.
      # WHY: hermes v0.15.2 has no key-free native web-extract backend, so
      # the model falls back to `curl -s <url>` and floods its context with
      # raw HTML (the 2026-06-06 session-amnesia incident: 208KB page →
      # silent Ollama truncation at 16384 tokens → permanent history loss).
      # This helper extracts title+body text, capped, stdlib-only (the image
      # carries python3.11 for hermes itself; no extra packages).
      # Mounted at /usr/local/bin/fetch-text via subPath (deployment.yaml).
      # NOTE: kubelet never live-updates subPath mounts — script edits need
      # a pod restart to take effect (rare; acceptable for this helper).
      # SOUL.md steers the agent here (manual-op orch-hermes-soul-fetch-text).
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: hermes-agent-shell-fetch-text
        namespace: hermes-agent-shell
        labels:
          app: hermes-agent-shell
      data:
        fetch-text: |
          #!/usr/bin/env python3
          """fetch-text <url> — fetch a web page as size-capped plain text.

          Modes:  fetch-text https://example.com/page
                  cat page.html | fetch-text --stdin
          Output: final URL (when fetching), title line, extracted body
                  text, truncation notice when capped.
          """
          import argparse
          import html
          import re
          import sys
          import urllib.request
          from html.parser import HTMLParser

          SKIP = {"script", "style", "noscript", "template", "svg", "head"}


          class TextExtractor(HTMLParser):
              def __init__(self):
                  super().__init__(convert_charrefs=True)
                  self.title = ""
                  self._in_title = False
                  self._skip_depth = 0
                  self.chunks = []

              def handle_starttag(self, tag, attrs):
                  if tag == "title":
                      self._in_title = True
                  if tag in SKIP:
                      self._skip_depth += 1

              def handle_endtag(self, tag):
                  if tag == "title":
                      self._in_title = False
                  if tag in SKIP and self._skip_depth:
                      self._skip_depth -= 1

              def handle_data(self, data):
                  if self._in_title:
                      self.title += data
                      return
                  if self._skip_depth == 0 and data.strip():
                      self.chunks.append(data)


          def main():
              ap = argparse.ArgumentParser()
              ap.add_argument("url", nargs="?", help="page URL")
              ap.add_argument("--stdin", action="store_true",
                              help="read HTML from stdin instead of fetching")
              ap.add_argument("--max-chars", type=int, default=20000)
              args = ap.parse_args()

              if args.stdin:
                  raw, final_url = sys.stdin.read(), None
              elif args.url:
                  req = urllib.request.Request(
                      args.url, headers={"User-Agent": "fetch-text/1.0 (hermes-agent-shell)"})
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      raw = resp.read(5 * 1024 * 1024).decode("utf-8", "replace")
                      final_url = resp.geturl()
              else:
                  ap.error("need a URL or --stdin")

              p = TextExtractor()
              p.feed(raw)
              text = re.sub(r"[ \t]+", " ", html.unescape(" ".join(c.strip() for c in p.chunks)))
              text = re.sub(r"\s*\n\s*", "\n", text).strip()

              if final_url:
                  print(f"URL: {final_url}")
              if p.title.strip():
                  print(f"TITLE: {p.title.strip()}\n")
              if len(text) > args.max_chars:
                  print(text[: args.max_chars])
                  print(f"\n[truncated at {args.max_chars} chars — page continues]")
              else:
                  print(text)


          if __name__ == "__main__":
              main()
      END FILE
  - id: P2.T1.S3
    text: |-
      Green: `uv run --with pyyaml --with pytest pytest scripts/tests/test_fetch_text.py -q`
      → all 3 tests pass (the tests exercise the exact bytes the ConfigMap
      ships, via --stdin mode — no network needed).
- number: 2
  title: Mount the helper into the shell pod
  steps:
  - id: P2.T2.S1
    text: |-
      In `apps/hermes-agent-shell/manifests/deployment.yaml`:

      (a) under `volumes:` add
      BEGIN SNIPPET
              - name: fetch-text
                configMap:
                  name: hermes-agent-shell-fetch-text
                  defaultMode: 0755
      END SNIPPET

      (b) under the hermes container's `volumeMounts:` add (single-file
      subPath mount, same idiom as the byok-env shim above it)
      BEGIN SNIPPET
                  - name: fetch-text
                    mountPath: /usr/local/bin/fetch-text
                    subPath: fetch-text
                    readOnly: true
      END SNIPPET
  - id: P2.T2.S2
    text: |-
      Structural validation:
      ```bash
      uv run --with pyyaml python3 -c "
      import yaml
      d = yaml.safe_load(open('apps/hermes-agent-shell/manifests/deployment.yaml'))
      spec = d['spec']['template']['spec']
      vol = next(v for v in spec['volumes'] if v['name'] == 'fetch-text')
      assert vol['configMap']['defaultMode'] == 0o755, vol
      mnt = next(m for m in spec['containers'][0]['volumeMounts'] if m['name'] == 'fetch-text')
      assert mnt['mountPath'] == '/usr/local/bin/fetch-text' and mnt['subPath'] == 'fetch-text', mnt
      print('deployment mount OK')"
      ```
