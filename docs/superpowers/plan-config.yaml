plan:
  filename: "YYYY-MM-DD--{layer}--{details}.md"
  layers: docs/layers.yaml
  save_to: docs/superpowers/plans/

header:
  required:
    - Spec
    - Status
  status_values:
    - Not Started
    - In Progress
    - Deployed
    - Complete
    - Closed

manual_operations:
  enabled: true
  runbook: docs/runbooks/manual-operations.yaml
  sync_skill: sync-runbook

post_deploy:
  name: "Post-Deploy Checklist"
  type: manual
  steps:
    - "Expose externally (if user-facing) — add Traefik IngressRoute in apps/traefik/manifests/ingressroutes.yaml (with authentik-forwardauth if SSO required), add tile to homepage dashboard (master.cluster.derio.net) via apps/homepage/manifests/files/services.yaml, document domain+auth in plan and building blog post"
    - "Write building blog post — Use /blog-post skill"
    - "Write operating blog post — Use /blog-post skill"
    - "Update README — Run /update-readme"
    - "Sync runbook — Run /sync-runbook if plan has manual-operation blocks"
    - "Update plan status to Deployed/Complete"
  skip_when:
    - "fix/extension plans"
    - "meta/repo layer"
    - "investigation/audit plans"
    - "internal-only services (skip external-exposure step only)"

dispatch:
  target: github-issues
  owner: derio-net
  project_board: "Derio Ops"
  default_repo: derio-net/frank
  labels:
    agentic: vk-ready
    manual: manual
