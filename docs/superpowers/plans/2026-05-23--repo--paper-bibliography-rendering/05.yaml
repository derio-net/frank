tasks:
- number: 1
  title: Hard-delete the references frontmatter block
  steps:
  - id: P5.T1.S1
    text: |-
      Run this one-shot migration. It removes the `references:` block (and any indented list items beneath it) from each paper's frontmatter:

      ```bash
      python - <<'PY'
      import re
      from pathlib import Path

      # Match `references:` followed by either nothing (`references: []`)
      # or a YAML block-list (lines starting with whitespace + `-`).
      BLOCK = re.compile(
          r"^references:.*?(?=^\S|^---)",
          re.MULTILINE | re.DOTALL,
      )
      changed = []
      for idx in sorted(Path("blog/content/docs/papers").glob("*/index.md")):
          text = idx.read_text()
          fm_match = re.match(r"^---\n(.*?)\n---\n", text, re.DOTALL)
          if not fm_match:
              continue
          fm = fm_match.group(1)
          new_fm = BLOCK.sub("", fm).rstrip() + "\n"
          if new_fm != fm:
              new_text = "---\n" + new_fm + "---\n" + text[fm_match.end():]
              idx.write_text(new_text)
              changed.append(str(idx))
      print(f"removed references: block from {len(changed)} papers")
      for c in changed:
          print(f"  {c}")
      PY
      ```

      Expected: 17 papers updated.
  - id: P5.T1.S2
    text: |-
      Verify diffs:

      ```bash
      git diff blog/content/docs/papers/09-secrets-bootstrap/index.md | head -30
      ```

      Expected: only `references:` block removed from frontmatter. No other changes. The closing `---` of the frontmatter must still be intact.
- number: 2
