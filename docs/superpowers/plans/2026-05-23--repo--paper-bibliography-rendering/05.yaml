      ```bash
      grep -n "^references:\| references:" scripts/scaffold-paper.sh
      ```

      Expected: no output.
  - id: P5.T2.S2
    text: |-
      Edit `agents/rules/repo-papers.md`. Find the "Required fields" line in the Frontmatter schema section (it currently lists `references` as the last item). Remove just the trailing `, references` (and the comma before it). Verify:

      ```bash
