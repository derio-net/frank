      - Step 1 (expose externally): N/A — no new service.
      - Step 2 (building blog post): SKIP — meta improvement to existing series.
      - Step 3 (operating blog post): SKIP — same reason.
      - Step 4 (update README): SKIP — internal infra change.
      - Step 5 (sync runbook): SKIP — no manual-operation blocks in this plan.

      One action remains:

      - Step 6 (update plan status): set the plan's `Status:` to `Complete` in `_meta.yaml` (or wherever the status field surfaces — v2 plans track via `vk plan edit` or by editing the meta).
  - id: P6.T2.S2
    text: |-
      Mark plan complete:

      ```bash
      vk plan edit docs/superpowers/plans/2026-05-23--repo--paper-bibliography-rendering --complete
      ```

      (If `vk plan edit` does not support `--complete` directly, set the status field manually in `_meta.yaml` or via the per-phase tick-all flow.)

      Verify in the spec's Implementation Plans table that the row now shows the plan as complete:

      ```bash
      grep "paper-bibliography-rendering" docs/superpowers/specs/2026-05-22--repo--paper-bibliography-rendering-design.md
      ```
