tasks:
- number: 1
  title: Wire --check into the blog CI workflow
  steps:
  - id: P6.T1.S1
    text: |-
      Read `.github/workflows/deploy-blog.yml` to find the right insertion point — somewhere BEFORE the `hugo --minify` step, so a drift detection short-circuits the build:

      ```bash
      cat .github/workflows/deploy-blog.yml
      ```

      Identify the job that runs Hugo build. The `--check` step needs Python + PyYAML; add a setup-python step if not already present, then the check step.
  - id: P6.T1.S2
    text: |-
      Edit `.github/workflows/deploy-blog.yml` to add the drift check. Insert before the `hugo --minify` (or equivalent) step:

      ```yaml
            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.12'

            - name: Install dossier-sync deps
              run: pip install pyyaml

            - name: Check dossier ↔ blog/data/papers sync
              run: python scripts/sync-dossier-to-data.py --check
      ```

      (If `actions/setup-python` is already present elsewhere in the job, skip its block.)
  - id: P6.T1.S3
    text: |-
      Commit and push:

      ```bash
      git add .github/workflows/deploy-blog.yml
      git commit -m "ci(blog): fail on dossier ↔ data-file drift"
      git push origin HEAD
      ```

      Watch the workflow run:

      ```bash
      gh run watch
      ```

      Expected: the new "Check dossier ↔ blog/data/papers sync" step passes (exit 0).
  - id: P6.T1.S4
    text: |-
      Negative test (optional but worth it) — on a throwaway branch, tamper with one data file and verify CI fails with the expected diff:

      ```bash
      git checkout -b drift-negative-test
      echo "primary_sources: []" > blog/data/papers/09-secrets-bootstrap.yaml
      git add blog/data/papers/09-secrets-bootstrap.yaml
      git commit -m "test: intentional drift"
      git push -u origin drift-negative-test
      gh run watch
      ```

      Expected: the check step fails with stderr containing a unified diff for `09-secrets-bootstrap.yaml`. After verification, delete the branch:

      ```bash
      git checkout main
      git branch -D drift-negative-test
      git push origin :drift-negative-test
      ```
