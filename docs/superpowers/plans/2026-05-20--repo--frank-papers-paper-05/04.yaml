tasks:
- number: 1
  title: Generate per-paper cover image
  steps:
  - id: P4.T1.S1
    text: |-
      Add Paper 05 cover prompt to `blog/prompt_for_images.yaml`


      Add a new entry under the `# --- Papers Series Covers ---`
      section, after the most recent paper entry:

      ```yaml
        - key: paper-05-cover
          output: blog/content/docs/papers/05-gpu-scheduling/cover.png
          description: Paper 05 cover — Frank examining a single GPU card with two workload streams sharing time-slices
          prompt: >-
            Frank the server-hardware Frankenstein monster holds a
            single PCIe GPU card horizontally in his green-skinned
            hands, inspecting it through thin round reading glasses
            resting low on his nose. Above the card, two glowing
            data streams flow into the card's heatsink: one green
            inference workload stream, one blue training workload
            stream, sharing time-slices on the card's surface. The
            streams partition the card's surface into alternating
            green/blue zones. His expression is weighing — judging
            whether the partition will hold. He wears a thin black
            necktie. Warm overhead lamp on a dark background. RJ45
            neck bolts, green skin, messy black hair, rack-mount
            torso. No text in the image.
      ```
  - id: P4.T1.S2
    text: |-
      Generate the cover image


      ```bash
      set -a && source .env_common && set +a
      uv sync
      .venv/bin/python scripts/generate-all-images.py \
        -r blog/static/images/reference.png \
        --only paper-05-cover
      ```

      Expected: `blog/content/docs/papers/05-gpu-scheduling/cover.png`
      created, ≥50KB.

      If generation fails (Gemini API timeout, quota, etc.), fall
      back: `cp blog/static/images/reference.png
      blog/content/docs/papers/05-gpu-scheduling/cover.png` and tick
      step `--state - --note "Gemini fallback used; regen post-merge."`
  - id: P4.T2.S1
    text: |-
      Review draft for `TODO:<type>` diagram placeholders


      ```bash
      grep -n "TODO:" blog/content/docs/papers/05-gpu-scheduling/index.md
      ```

      Expected: no `TODO:` lines after Phase 3 draft work.
- number: 2
  title: Render Mermaid diagrams and verify they parse
  steps:
  - id: P4.T2.S2
    text: |-
      Verify Mermaid diagrams parse without errors in Hugo dev server


      ```bash
      cd blog && PATH=/usr/local/Cellar/go/1.26.2/bin:$PATH hugo --minify --buildDrafts 2>&1 | grep -E "^ERROR|^WARN" | head -10
      ls -lh public/docs/papers/05-gpu-scheduling/index.html
      ```

      Expected: zero ERROR lines; `index.html` exists and is ≥10 KB.
- number: 3
  title: Capture Grafana GPU-utilisation screenshot
  steps:
  - id: P4.T3.S1
    text: |-
      Capture a Grafana panel showing GPU utilisation on gpu-1


      Source: Grafana NVIDIA dashboard at 192.168.55.203 during a
      real inference workload, or `nvidia-smi` output from inside a
      GPU pod.

      Save to:
      ```
      blog/content/docs/papers/05-gpu-scheduling/gpu-utilisation.png
      ```

      If cluster access is unavailable, copy the 1×1 placeholder
      and rename with `-TODO.png` suffix:
      ```bash
      cp blog/content/docs/papers/14-progressive-delivery/argo-rollouts-canary-TODO.png \
         blog/content/docs/papers/05-gpu-scheduling/gpu-utilisation-TODO.png
      ```
      Tick the step `--state - --note "Cluster access unavailable
      from worktree."`
- number: 4
  title: Full Hugo build smoke-test
  steps:
  - id: P4.T4.S1
    text: |-
      Run the production Hugo build to assert zero errors


      ```bash
      cd blog && PATH=/usr/local/Cellar/go/1.26.2/bin:$PATH hugo --minify --buildDrafts 2>&1 | grep -E "^ERROR|^WARN" | head -10
      ls -lh public/docs/papers/05-gpu-scheduling/index.html
      ```
