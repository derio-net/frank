- number: 2
  title: Research the immutable-OS landscape
  steps:
  - id: P1.T2.S1
    text: |-
      Populate `docs/papers-dossiers/02-immutable-os/dossier.md` — vendors in scope


      Paper 02 maps the immutable-OS-for-Kubernetes-nodes vendor space.
      Anchor list (the dossier-construction subagent's final call after
      research):

      ```yaml
      ## Vendors in scope (≥3, typically 4–6)
      - name: Talos Linux
        positioning: "Sidero — API-driven immutable Linux for Kubernetes; no SSH, no shell, machine config as YAML."
        primary_url: "https://www.talos.dev"
      - name: Fedora CoreOS
        positioning: "Red Hat — Ignition-bootstrapped immutable Linux with transactional rpm-ostree updates."
        primary_url: "https://fedoraproject.org/coreos/"
      - name: Flatcar Container Linux
        positioning: "Microsoft (ex-Kinvolk) — CoreOS lineage continuation, dual-partition A/B updates, Ignition-based."
        primary_url: "https://www.flatcar.org/"
      - name: Bottlerocket
        positioning: "AWS — purpose-built container host, API-driven config, transactional updates, ECR/EKS aligned."
        primary_url: "https://aws.amazon.com/bottlerocket/"
      - name: Ubuntu Core
        positioning: "Canonical — fully snap-based immutable Ubuntu for appliances and edge; the IoT/embedded angle."
        primary_url: "https://ubuntu.com/core"
      - name: Ubuntu Server + Ansible (mutable baseline)
        positioning: "The status-quo default — general-purpose distro plus config-management overlay. The anti-immutable reference point."
        primary_url: "https://ubuntu.com/server"
      ```

      Frank's case study is Talos Linux (every node, control-plane and
      worker, on both Frank and the Hop edge cluster). The other five
      exist in the dossier so §3 can compare architectures and §6 can
      branch the decision tree.
  - id: P1.T2.S2
    text: |-
      Gather ≥5 primary sources spanning ≥3 distinct type values


      Required coverage: vendor architecture docs, at least one
      foundational reference (academic paper or canonical industry
      essay), and at least one practitioner postmortem or production
      rollout writeup. URL hints to chase:

      1. Talos design / "what is Talos" docs — type: `vendor-docs`
         (https://www.talos.dev/latest/learn-more/concepts/)
      2. Fedora CoreOS "How it works" + Ignition design docs — type:
         `vendor-docs`
         (https://docs.fedoraproject.org/en-US/fedora-coreos/)
      3. Bottlerocket design / SecurityScientist's "Anatomy of
         Bottlerocket" — type: `vendor-docs` or `paper`
         (https://github.com/bottlerocket-os/bottlerocket)
      4. Morris / ThoughtWorks — "ImmutableServer" essay — type:
         `paper` (https://martinfowler.com/bliki/ImmutableServer.html)
      5. A practitioner postmortem of a Talos production rollout —
         type: `postmortem` (search: "Talos Linux production lessons
         learned" — Sidero blog or a known operator's writeup)

      For each source, fill all fields: `title`, `type`, `url`,
      `quoted_passages` (≥1 direct quote per source), `relevance`.

      Verify all URLs are reachable before recording them — the gate
      validator will probe them.
  - id: P1.T2.S3
    text: |-
      Document ≥3 Frank artefacts spanning ≥2 distinct kind values


      Pull directly from the cluster repo. Suggested artefacts (final
      list is the dossier-construction subagent's call):

      1. `kind: yaml` — `patches/phase01-node-config/` — shows the
         full declarative machine-config story for Frank's 7 nodes
         (3× mini control-plane + gpu-1 + 2× raspi + pc-1) rendered
         as Talos ConfigPatches under Omni.
         `path_or_url: patches/phase01-node-config/`

      2. `kind: yaml` — `patches/phase04-gpu/` — shows how the GPU
         layer extends the base machine config with NVIDIA system
         extensions and udev rules, all going through the same
         declarative pipeline.
         `path_or_url: patches/phase04-gpu/`

      3. `kind: incident` — the `talosctl apply-config --config-patch`
         surprise: patches the base file, not the running config —
         all patches must be combined in one invocation. Source:
         `agents/rules/hop-gotchas.md` + the per-topic Hop file.
         `demonstrates: "Talos's immutability isn't a UX nicety — it
          forces you to treat machine config as a single source-of-
          truth render, not a series of incremental edits."`

      4. `kind: incident` — the Hop single-node cluster's
         `allowSchedulingOnControlPlanes: true` requirement. Default
         Talos posture refuses to schedule on control-planes; on a
         single-node cluster this manifests as "no pod ever enters
         Running" with no obvious signal.
         `path_or_url: agents/rules/hop-gotchas.md` (one-liner) +
         `clusters/hop/...` for the actual patch.

      5. `kind: incident` — the GPU Operator Talos validation fix.
         Off-the-shelf NVIDIA GPU Operator's init containers wait
         forever for `/run/nvidia/validations/toolkit-ready` because
         Talos disables the toolkit DaemonSet (driver + toolkit
         come from system extensions). Required its own plan.
         `path_or_url: docs/superpowers/specs/2026-03-10--gpu--operator-talos-fix-design.md`

      6. `kind: yaml` (optional) — `patches/phase01-node-config/100-cluster-allow-cp-scheduling.yaml` and the labelling patches per machine. Demonstrates that even node labels go through Git → Omni → Talos, not `kubectl label`.

      Pick at least 3, spanning ≥2 distinct `kind` values.
  - id: P1.T2.S4
    text: |-
      Record ≥1 named gap and ≥1 counter-argument


      Named gap (add to dossier):
      ```yaml
      ## Named gaps (≥1)
      - "No published TCO comparison of immutable-OS vs mutable-distro-
        plus-Ansible at homelab and small-team scale that accounts for
        both blast-radius cost (mutable: a single bad apt-get blows up
        a node) AND learning-curve cost (immutable: an entirely new
        mental model for day-2 ops). Vendor whitepapers benchmark
        update speed and security posture; community writeups focus on
        the 'cool factor' of API-driven OS. The single most useful
        number — 'hours per month spent on OS-level firefighting on
        each side, at N=5 nodes' — does not exist as published work."
      ```

      Counter-argument (add to dossier):
      ```yaml
      ## Counter-arguments considered (≥1)
      - "Mutable distros (Ubuntu Server, Debian, RHEL) plus a competent
        Ansible/Puppet setup is the path 90% of teams should take.
        Familiar tooling, broad community, no retraining, no
        special-case kernel-module dance. Why doesn't that win for
        Frank? Answer: same shape as Paper 00. Frank is a learning
        platform. The reason to run Talos is to encounter the
        `--config-patch` rebuild semantics, the single-node taint, the
        GPU validation surprise — first-hand. Mutable-plus-Ansible
        hides exactly the failure modes the cluster exists to teach.
        For a production team running familiar workloads on
        well-known hardware, the counter-argument wins; for Frank,
        that is the point."
      ```
