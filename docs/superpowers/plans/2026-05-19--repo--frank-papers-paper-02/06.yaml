      `https://blog.derio.net/frank/docs/papers/`.
  - id: P6.T1.S2
    text: |-
      Verify cross-link chips render bidirectionally


      The `papers-backlink.html` partial auto-renders a "→ Paper 02"
      chip on Building 02-foundation and Operating 01-cluster-nodes
      via `related_building` / `related_operating` frontmatter.

      ```bash
      curl -s https://blog.derio.net/frank/docs/building/02-foundation/ \
        | grep -i "paper 02\|immutable os"
      curl -s https://blog.derio.net/frank/docs/operating/01-cluster-nodes/ \
        | grep -i "paper 02\|immutable os"
      ```
  - id: P6.T1.S3
    text: |-
      Update the Papers section `_index.md`


      ```bash
      grep -n "Paper 04\|Paper 10\|Paper 11\|Paper 02" \
        blog/content/docs/papers/_index.md
      ```

      Append Paper 02 to the publish-order list:
      `00 → 10 → 04 → 11 → 14 → 06 → 07 → 02 → ...`
  - id: P6.T1.S4
    text: |-
      Update Building/Operating series overviews (optional)


      The Paper 02 backlink chip auto-renders on the Building
      02-foundation and Operating 01-cluster-nodes posts via
      frontmatter — no edits required. If the series overview has a
      "Further reading" section listing Papers, add Paper 02 there.
  - id: P6.T1.S5
    text: |-
      Write building/operating blog posts (skip for Papers)


      Papers are not new layer deployments — they review existing
      capabilities. The Building 02-foundation and Operating 01-
      cluster-nodes posts already exist (that's what `related_
      building` and `related_operating` point at). No new posts.

      *Skip — Papers reference existing Building/Operating posts via
      frontmatter; the cross-link chips do the work.*
  - id: P6.T1.S6
    text: |-
      Update README


      Run `/update-readme` to sync README.md. The Papers series is
      already referenced in README (from Paper 00's post-deploy);
      verify Paper 02 doesn't need a stack-list addition.

      If `/update-readme` produces no diff, mark this step skipped
      with reason "README is a stack snapshot — no Paper 02-specific
      row needed".
  - id: P6.T1.S7
    text: |-
      Sync runbook


      This plan contains no `# manual-operation` blocks — skip
      `/sync-runbook`.
  - id: P6.T1.S8
    text: |-
      Update plan status and log publish date


      Edit `_prose.md` Status line:

      ```
      **Status:** Complete (YYYY-MM-DD) — Paper 02 published; series Phase 1 continues.
      ```

      Update the spec's Implementation Plans table row for Paper 02.
