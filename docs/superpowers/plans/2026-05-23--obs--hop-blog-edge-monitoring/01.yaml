schema_version: 2
phase:
  number: 1
  title: Log plumbing — extend existing VictoriaLogs with LB IP, Caddy JSON, fluent-bit
    on Hop
  tag: agentic
  depends_on: []
  tracking_issue: null
tasks:
- number: 1
  title: Extend existing VictoriaLogs with a LoadBalancer Service + retention bump
  steps:
  - id: P1.T1.S1
    text: |-
      Confirm the existing VictoriaLogs deployment state before touching anything.

      ```bash
      kubectl -n monitoring get pods,svc,pvc -l app.kubernetes.io/instance=victoria-logs
      kubectl -n monitoring get configmap | grep -i victoria
      ```

      Expected: a Pod `victoria-logs-victoria-logs-single-server-*` Running, a Service `victoria-logs-victoria-logs-single-server` of type ClusterIP on port 9428, a PVC bound to a Longhorn volume ~20 Gi. Read the current values:

      ```bash
      cat apps/victoria-logs/values.yaml
      ```

      You will see retentionPeriod 14d, PVC 20Gi, service.type ClusterIP, service.port 9428. Do NOT replace this file; we extend it.
  - id: P1.T1.S2
    text: |-
      Edit `apps/victoria-logs/values.yaml`. Bump retention 14d → 30d and add a sibling LoadBalancer Service via the chart's `extraObjects:` top-level key (verified to exist in `vm/victoria-logs-single` 0.11.28 — the chart does NOT expose `server.extraServices`).

      Target end-state of `apps/victoria-logs/values.yaml`:

      ```yaml
      server:
        retentionPeriod: 30d
        persistentVolume:
          enabled: true
          size: 20Gi
          storageClass: longhorn
        service:
          type: ClusterIP
          port: 9428

      # Sibling Service exposed via Cilium L2 so Hop's fluent-bit can push
      # over the Tailscale subnet route to 192.168.55.0/24. The kube service
      # CIDR is NOT routable from Hop, so we need a real LB IP.
      extraObjects:
        - apiVersion: v1
          kind: Service
          metadata:
            name: victoria-logs-lb
            namespace: monitoring
            annotations:
              lbipam.cilium.io/ips: "192.168.55.225"
              lbipam.cilium.io/sharing-key: "victoria-logs-lb"
          spec:
            type: LoadBalancer
            selector:
              app.kubernetes.io/name: victoria-logs-single
              app.kubernetes.io/instance: victoria-logs
            ports:
              - name: http
                port: 9428
                targetPort: 9428
      ```

      **Before pushing, verify the selector matches the actual Pod labels:**

      ```bash
      kubectl get pod -n monitoring -l app.kubernetes.io/instance=victoria-logs --show-labels
      # The selector above must match a non-empty label set on the running Pod.
      ```

      And confirm `extraObjects` renders the sibling Service:

      ```bash
      helm template vm/victoria-logs-single --version 0.11.28 -f apps/victoria-logs/values.yaml | grep -B 1 -A 15 'name: victoria-logs-lb'
      ```
  - id: P1.T1.S3
    text: |-
      Commit and push. ArgoCD's automated sync picks up the change:

      ```bash
      git add apps/victoria-logs/values.yaml
      git commit -m "feat(obs): extend victoria-logs with lb ip + 30d retention"
      git push origin HEAD
      argocd app sync victoria-logs --port-forward --port-forward-namespace argocd
      argocd app wait victoria-logs --port-forward --port-forward-namespace argocd --health --timeout 300
      ```
  - id: P1.T1.S4
    text: |-
      Verify the new LB Service got the right IP and is reachable from within the cluster:

      ```bash
      kubectl -n monitoring get svc -l app.kubernetes.io/instance=victoria-logs
      # Expected: a second Service with EXTERNAL-IP 192.168.55.225 and TYPE LoadBalancer

      kubectl run -n monitoring --rm -it curl-test \
        --image=curlimages/curl \
        --overrides='{"spec":{"securityContext":{"runAsUser":100}}}' -- \
        curl -sf http://192.168.55.225:9428/metrics | head -3
      ```

      Expected: Prometheus-style metrics output. If pending EXTERNAL-IP, check Cilium LB IPAM has the `192.168.55.224-192.168.55.230` range allowed.
  - id: P1.T1.S5
    text: |-
      Register the new LB IP in `agents/rules/frank-infrastructure.md`. Append a row to the Frank Cluster Services table:

      ```
      | VictoriaLogs (LB) | 192.168.55.225 | Cilium L2 LoadBalancer (port 9428, cross-cluster ingest from Hop) |
      ```

      Insert in numeric IP order. Commit on the same branch:

      ```bash
      git add agents/rules/frank-infrastructure.md
      git commit -m "docs(obs): register victoria-logs lb ip 192.168.55.225"
      git push origin HEAD
      ```
- number: 2
  title: Extend Hop's AppProject sourceRepos to whitelist new chart repos
  steps:
  - id: P1.T2.S1
    text: |-
      Hop has a single AppProject `hop-infrastructure` (`clusters/hop/apps/root/templates/project.yaml`) with a narrow sourceRepos whitelist (`derio-net/frank.git`, `argoproj.github.io/argo-helm`). Phases 1, 3, and 4 introduce new Helm charts from three additional repos; without extending the whitelist, every chart-backed Application is rejected by ArgoCD with a project-validation error.

      Edit `clusters/hop/apps/root/templates/project.yaml`:

      ```yaml
      spec:
        description: Hop edge cluster infrastructure
        sourceRepos:
          - "https://github.com/derio-net/frank.git"
          - "https://argoproj.github.io/argo-helm"
          - "https://fluent.github.io/helm-charts"            # phase 1: fluent-bit
          - "https://crowdsecurity.github.io/helm-charts"     # phase 3: crowdsec
          - "https://falcosecurity.github.io/charts"          # phase 4: falco
      ```

      Commit and push:

      ```bash
      git add clusters/hop/apps/root/templates/project.yaml
      git commit -m "feat(obs): whitelist fluent/crowdsec/falco charts on hop AppProject"
      git push origin HEAD
      ```

      Verify on Hop:

      ```bash
      source .env_hop
      kubectl get appproject hop-infrastructure -n argocd -o jsonpath='{.spec.sourceRepos}' | jq
      # Expected: array containing all 5 repos
      ```

      **Every** Hop Application CR added by phases 1, 3, 4 must use `project: hop-infrastructure` (NOT `default`, which doesn't exist on Hop).
- number: 3
  title: Verify Tailscale subnet routing 192.168.55.225 from Hop
  steps:
  - id: P1.T3.S1
    text: |-
      The Tailscale subnet router on raspi nodes advertises `192.168.55.0/24` (per `docs/superpowers/specs/2026-03-21--edge--subnet-router-autoapproval-design.md`). Hop's Tailscale DaemonSet accepts advertised routes (verified at `clusters/hop/apps/headscale/manifests/tailscale-client.yaml`). Confirm the route is operational from Hop:

      ```bash
      source .env_hop
      kubectl run -n default --rm -it curl-frank \
        --image=curlimages/curl \
        --overrides='{"spec":{"securityContext":{"runAsUser":100}}}' -- \
        curl -sf http://192.168.55.225:9428/metrics | head -3
      ```

      Expected: VictoriaLogs metrics from Hop. If timeout, on Hop check the Tailscale DaemonSet pod's mesh status:

      ```bash
      kubectl -n headscale-system exec ds/tailscale -- tailscale status | head -10
      kubectl -n headscale-system exec ds/tailscale -- tailscale ping 192.168.55.225
      ```

      (Verify the actual Tailscale DaemonSet namespace/name in `clusters/hop/apps/headscale/manifests/` before running.)
- number: 4
  title: Switch Hop's Caddy to JSON access logs
  steps:
  - id: P1.T4.S1
    text: |-
      Read `clusters/hop/apps/caddy/manifests/configmap.yaml` to confirm current structure. Add a global `log access` directive at the top of the `data.Caddyfile` block:

      ```caddyfile
      {
        email admin@derio.net
        acme_dns cloudflare {env.CF_API_TOKEN}
        log access {
          output stdout
          format json
          level INFO
        }
      }
      ```

      Place before any site definitions.
  - id: P1.T4.S2
    text: |-
      Commit and push:

      ```bash
      git add clusters/hop/apps/caddy/manifests/configmap.yaml
      git commit -m "feat(obs): switch hop caddy to json access logs"
      git push origin HEAD
      ```

      Wait for Hop's ArgoCD sync (Hop's ArgoCD is separate from Frank's):

      ```bash
      source .env_hop
      kubectl -n argocd get application caddy -o jsonpath='{.status.sync.status}'  # Expected: Synced
      ```

      ConfigMap projection takes ~30–60s. Restart Caddy (note: existing strategy is `Recreate` per the hop-gotcha — hostPort + RollingUpdate would deadlock; do not change strategy):

      ```bash
      kubectl rollout restart deploy/caddy -n caddy-system
      kubectl rollout status deploy/caddy -n caddy-system --timeout 60s
      ```
  - id: P1.T4.S3
    text: |-
      Verify Caddy is emitting JSON access logs:

      ```bash
      kubectl logs -n caddy-system deploy/caddy --tail 20 | grep -E '"msg":"handled request"' | head -3
      ```

      Expected output shape:
      `{"level":"info","ts":..,"logger":"http.log.access","msg":"handled request","request":{"remote_ip":"...","host":"blog.derio.net","uri":"/frank/..."},"status":200,...}`

      From an external machine:

      ```bash
      curl -sI https://blog.derio.net/frank/ | head -1
      ```

      Confirm the corresponding access log line appears in Caddy's stdout.
- number: 5
  title: Deploy fluent-bit on Hop targeting Frank's VictoriaLogs LB
  steps:
  - id: P1.T5.S1
    text: |-
      Read Frank's existing fluent-bit config — we mirror it with one output URL change:

      ```bash
      cat apps/fluent-bit/values.yaml
      cat apps/root/templates/fluent-bit.yaml
      ```

      The proven pattern: chart `fluent/fluent-bit` version `0.56.0`, release `fluent-bit`, namespace `monitoring`, DaemonSet that tails `/var/log/containers/*.log` and writes via HTTP to the VictoriaLogs `/insert/jsonline` endpoint.
  - id: P1.T5.S2
    text: |-
      Create `clusters/hop/apps/fluent-bit/values.yaml`. Copy Frank's config verbatim except the output Host points at the LB IP:

      BEGIN clusters/hop/apps/fluent-bit/values.yaml
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

      config:
        inputs: |
          [INPUT]
              Name              tail
              Path              /var/log/containers/*.log
              multiline.parser  docker, cri
              Tag               kube.*
              Mem_Buf_Limit     5MB
              Skip_Long_Lines   On

        filters: |
          [FILTER]
              Name                kubernetes
              Match               kube.*
              Kube_URL            https://kubernetes.default.svc:443
              Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
              Kube_Tag_Prefix     kube.var.log.containers.
              Merge_Log           On
              Keep_Log            Off
              K8S-Logging.Parser  On
              K8S-Logging.Exclude On

        outputs: |
          [OUTPUT]
              Name            http
              Match           kube.*
              Host            192.168.55.225
              Port            9428
              URI             /insert/jsonline?_stream_fields=stream,kubernetes_pod_name,kubernetes_namespace_name,kubernetes_container_name&_msg_field=log&_time_field=time
              Format          json_lines
              Json_Date_Key   time
              Json_Date_Format iso8601
              Retry_Limit     False

      resources:
        requests:
          cpu: 10m
          memory: 40Mi
        limits:
          memory: 80Mi
      END clusters/hop/apps/fluent-bit/values.yaml
  - id: P1.T5.S3
    text: |-
      Create the Application CR by copying Frank's pattern. New file `clusters/hop/apps/root/templates/fluent-bit.yaml`:

      BEGIN clusters/hop/apps/root/templates/fluent-bit.yaml
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: fluent-bit
        namespace: argocd
        finalizers:
          - resources-finalizer.argocd.argoproj.io
      spec:
        project: hop-infrastructure
        sources:
          - repoURL: https://fluent.github.io/helm-charts
            chart: fluent-bit
            targetRevision: "0.56.0"
            helm:
              releaseName: fluent-bit
              valueFiles:
                - $values/clusters/hop/apps/fluent-bit/values.yaml
          - repoURL: {{ .Values.repoURL }}
            targetRevision: {{ .Values.targetRevision }}
            ref: values
        destination:
          server: {{ .Values.destination.server }}
          namespace: monitoring
        syncPolicy:
          automated:
            selfHeal: true
          syncOptions:
            - ServerSideApply=true
            - CreateNamespace=true
      END clusters/hop/apps/root/templates/fluent-bit.yaml

      Verify the `monitoring` namespace block — Hop doesn't currently have one. `CreateNamespace=true` will create it, but **without the PodSecurity label fluent-bit needs for hostPath mounts**. Per `agents/rules/hop-gotchas.md` (precedent for `caddy-system`/`headscale-system`), pre-create the namespace with the privileged label by adding `clusters/hop/apps/root/templates/ns-monitoring.yaml`:

      BEGIN clusters/hop/apps/root/templates/ns-monitoring.yaml
      apiVersion: v1
      kind: Namespace
      metadata:
        name: monitoring
        labels:
          pod-security.kubernetes.io/enforce: privileged
      END clusters/hop/apps/root/templates/ns-monitoring.yaml

      With this namespace pre-existing, the `CreateNamespace=true` syncOption is a no-op safety; the actual labelled namespace already exists.
  - id: P1.T5.S4
    text: |-
      Commit and push. Hop's ArgoCD picks it up:

      ```bash
      git add clusters/hop/apps/fluent-bit/ clusters/hop/apps/root/templates/fluent-bit.yaml
      git commit -m "feat(obs): deploy fluent-bit on hop shipping to frank vlogs"
      git push origin HEAD
      ```

      Wait for sync:

      ```bash
      source .env_hop
      kubectl get application fluent-bit -n argocd -o jsonpath='{.status.sync.status} {.status.health.status}'
      # Expected: Synced Healthy

      kubectl -n monitoring get pods -l app.kubernetes.io/name=fluent-bit -w
      # Expected: fluent-bit-* Pod Running on hop-1
      ```
  - id: P1.T5.S5
    text: |-
      Verify logs reach Frank's VictoriaLogs. From Frank:

      ```bash
      source .env
      kubectl exec -n monitoring deploy/grafana -- \
        curl -sG http://victoria-logs-victoria-logs-single-server.monitoring.svc.cluster.local:9428/select/logsql/query \
        --data-urlencode 'query=_time:5m _msg:caddy AND kubernetes_namespace_name:caddy-system' \
        --data-urlencode 'limit=5'
      ```

      Expected: at least 1 JSON line containing `"host":"blog.derio.net"`. If empty, check Hop's fluent-bit:

      ```bash
      source .env_hop
      kubectl logs -n monitoring ds/fluent-bit --tail 50 | grep -E 'error|http|connect'
      ```

      Common failures: cannot reach 192.168.55.225 (subnet route issue — see P1.T2), or the kubernetes filter's RBAC missing (chart usually creates the ServiceAccount + ClusterRoleBinding automatically; verify `kubectl -n monitoring get sa,clusterrolebinding | grep fluent-bit`).
  - id: P1.T5.S6
    text: |-
      **Memory budget check (Hop).** Mandatory exit step for every Hop-affecting phase per the spec.

      ```bash
      source .env_hop
      kubectl describe node hop-1 | grep -A 5 "Allocated resources"
      ```

      Expected memory limits < 85% of 3263780Ki (~2774 Mi). Pre-phase baseline was 73%; adding 80Mi fluent-bit limit moves it to ~75%. If actual % exceeds 85%, raise as a finding before phase 2.
