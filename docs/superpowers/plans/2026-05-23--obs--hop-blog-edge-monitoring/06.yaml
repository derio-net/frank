tasks:
- number: 1
  title: Write the Paper (obs-layer-specific, precedes the checklist)
  steps:
  - id: P6.T1.S1
    text: |-
      Use the `/papers` skill (per `agents/skills/papers/`). Working
      title: "Edge Observability — Watching Frank's Edge Without
      Watching Frank's Edge Burn". Slot number depends on what's
      shipped by paper-write time (likely Paper 21 or later).

      Scaffold:

      ```bash
      scripts/scaffold-paper.sh <NN> edge-observability
      ```

      Fill the dossier at
      `docs/papers-dossiers/<NN>-edge-observability/dossier.md` —
      vendors (CrowdSec, Falco, VictoriaMetrics/Logs, GoatCounter,
      Umami as counter-argument), primary sources, Frank artefacts
      (grafana screenshots, asciinema of surge-detection demo, this
      spec), named gaps, counter-arguments (Why not Wazuh? Why not
      Loki?).

      Pass dossier validation:

      ```bash
      python scripts/validate-dossier.py docs/papers-dossiers/<NN>-edge-observability/dossier.md
      ```
  - id: P6.T1.S2
    text: |-
      Fill all § sections in `blog/content/docs/papers/<NN>-edge-observability/index.md`.
      Generate the cover image via `blog/prompt_for_images.yaml` (see
      `agents/rules/repo-papers.md` cover prompt template).

      Run validators:

      ```bash
      python scripts/validate-papers.py
      cd blog && hugo --buildDrafts
      ```

      Both pass.
  - id: P6.T1.S3
    text: |-
      Set `draft: false`, `status: published`. Commit and push. The
      blog CI rebuilds; Hop's ArgoCD pulls the new image.
- number: 2
  title: Post-Deploy Checklist
  steps:
  - id: P6.T2.S1
    text: |-
      **Step 1: Expose externally (if user-facing).** Per `agents/rules/plan-post-deploy-checklist.md` step 1.

      Already handled in this plan:
      - GoatCounter admin UI exposed at `counter.cluster.derio.net` (mesh-only with Authentik forward-auth) — IngressRoute added in phase 2.2, tile added to homepage dashboard in phase 2.6.
      - GoatCounter ingest at `counter.derio.net` (public) — Caddy route added in phase 2.3, DNS configured in same step.

      ai-alert-helper is webhook-only (no public/mesh UI) — skip external exposure for it.

      Confirm the GoatCounter homepage tile is reachable from `master.cluster.derio.net` and the IngressRoute is healthy:

      ```bash
      curl -sI https://counter.cluster.derio.net | head -3
      curl -sI https://master.cluster.derio.net | head -1
      ```
  - id: P6.T2.S2
    text: |-
      **Step 2: Write building blog post.** Use the `/blog-post` skill.

      Path: `blog/content/docs/building/<NN>-edge-observability/`. Cover the build narrative:
      - Why collectors-on-Hop / backend-on-Frank emerged from the resource constraint.
      - Why VictoriaLogs over Loki (and why we extended the existing app rather than deploying a parallel one — call out the pre-flight inventory discipline this exposed).
      - Why GoatCounter over Umami.
      - What broke during deployment (likely: cross-cluster ClusterIP misconception, Authentik outpost-provider manual step, Falco noise rules on Talos, the LogsQL `quantile_over_time` gap that forced surge detection into Python).

      Update `blog/content/docs/building/00-overview/index.md` (Series Index + Capability Map) and `blog/layouts/shortcodes/cluster-roadmap.html` to add the new layer.

      Commit and push.
  - id: P6.T2.S3
    text: |-
      **Step 3: Write operating blog post.** Use the `/blog-post` skill.

      Path: `blog/content/docs/operating/<NN>-edge-observability/`. Cover day-to-day commands:
      - Query Grafana for blog traffic via Explore (LogsQL examples).
      - Force a CrowdSec decision (`cscli decisions add --ip ...`).
      - Unban an IP (`cscli decisions delete --ip ...`).
      - Tune a Falco rule (edit `customRules.talos_silence.yaml`, re-sync, watch event counts).
      - Suppress a Grafana alert temporarily.
      - Rotate the GoatCounter API token + reseed Infisical.
      - Restore GoatCounter from PVC backup (Longhorn snapshot path).

      Update the operating series index in `blog/content/docs/building/00-overview/index.md`.

      Commit and push.
  - id: P6.T2.S4
    text: |-
      **Step 4: Update README.** Run `/update-readme`. The skill syncs:
      - **Technology Stack:** add VictoriaLogs (extended), GoatCounter, CrowdSec, Falco, ai-alert-helper.
      - **Repository Structure:** add `apps/goatcounter/`, `apps/ai-alert-helper/`, `clusters/hop/apps/fluent-bit/`, `clusters/hop/apps/crowdsec/`, `clusters/hop/apps/falco/`.
      - **Service Access:** add `counter.cluster.derio.net`, `counter.derio.net`, the new LB IPs `192.168.55.224` and `192.168.55.225`.
      - **Current Status:** add the new obs layer entry.

      Commit and push.
  - id: P6.T2.S5
    text: |-
      **Step 5: Sync runbook.** Run `/sync-runbook`. The skill scans plan files for `# manual-operation` blocks and merges them into `docs/runbooks/manual-operations.yaml` (deduplicates by id, preserves status of existing entries).

      Expected new entries from this plan:
      - `obs-goatcounter-bootstrap-first-site` (phase 2 task 1)
      - `obs-goatcounter-authentik-outpost` (phase 2 task 2)
      - `obs-goatcounter-api-token-infisical` (phase 2 task 5)
      - `obs-dns-counter-derio-net` (phase 2 task 3)
      - `obs-crowdsec-community-blocklists` (phase 3 task 2)
      - `obs-crowdsec-bouncer-api-key` (phase 3 task 3)

      Verify well-formed:

      ```bash
      python scripts/validate-manual-operations.py 2>/dev/null || echo "validator missing — visual review"
      ```

      Commit and push.
  - id: P6.T2.S6
    text: |-
      **Step 6: Update plan status to `Deployed`.** Set the plan's status to `Deployed` (cluster workload).

      ```bash
      vk plan self-review docs/superpowers/plans/2026-05-23--obs--hop-blog-edge-monitoring
      ```

      Final action: announce the plan is Deployed and link the published Paper, building post, and operating post in chat.
