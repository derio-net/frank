      `comfyui-v0.24.0-pt2.10.0-cu128-stoa4` in both
      `apps/comfyui/manifests/deployment.yaml` and
      `apps/comfyui/manifests/job-model-download.yaml`.
  - id: P1.T1.S5
    text: |
      **Run assertion (GREEN) + commit.** Re-run the S1 check — expect exit
