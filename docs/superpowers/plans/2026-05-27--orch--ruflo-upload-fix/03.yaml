schema_version: 2
phase:
  number: 3
  title: Verify end-to-end (cluster + browser)
  tag: agentic
  depends_on:
  - 2
  tracking_issue: https://github.com/derio-net/frank/issues/453
tasks:
- number: 1
  title: Upload paths
  steps:
  - id: P3.T1.S1
    text: |-
      Image round-trip + READ-BACK. In the ChatUI (`ruflo.cluster.derio.net`) with `gemma-12b` selected and the per-model tools toggle on, attach an image and send. Expect a normal multimodal response, NO 500. Then re-open the conversation and confirm the image renders (exercises downloadFile.ts). Confirm clean logs:

      ```bash
      source .env
      kubectl -n ruflo-system logs deploy/ruflo -c ruflo --since=5m | grep -iE "upload.once|ERR_INVALID_ARG_TYPE|500|error" || echo "PASS: no upload errors"
      ```
  - id: P3.T1.S2
    text: |-
      Tool URL file-fetch: trigger a tool that fetches a file by URL and stores it; confirm no 500 and the file is usable. (Inline text-URL fetch already works — this is the file-storing path.)
  - id: P3.T1.S3
    text: |-
      Copy-on-fork: from a shared/continued conversation that has a file attachment, fork/continue it; confirm success (exercises conversation.ts `.pipe()`), no `downloadStream.on is not a function` / 500 in logs.
- number: 2
  title: Regression + broad smoke (154-commit bump)
  steps:
  - id: P3.T2.S1
    text: |-
      Plain chat against a local model still responds (no MCP). Confirm 200 on `/conversation/...`.
  - id: P3.T2.S2
    text: |-
      MCP/wasm regression: with the tools toggle on, RVAgent Local tools load; confirm NO `rejected.*wasm` / `all selected MCP servers rejected` warnings:

      ```bash
      kubectl -n ruflo-system logs deploy/ruflo -c ruflo --since=5m | grep -iE "rejected.*wasm|all selected MCP servers rejected" && echo FAIL || echo PASS
      ```
  - id: P3.T2.S3
    text: |-
      Broad smoke: model list loads (`/api/v2/models` 200), `/api/v2/feature-flags` 200, no new boot errors in the first 2m of pod logs. Confirm `[RuVocal] Database: /app/db/ruvocal.rvf.json` still present (RVF backend intact).
