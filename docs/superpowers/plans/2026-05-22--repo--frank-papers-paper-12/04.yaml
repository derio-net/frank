tasks:
- number: 1
  title: Generate per-paper cover image
  steps:
  - id: P4.T1.S1
    text: |-
      Add Paper 12 cover prompt to `blog/prompt_for_images.yaml`


      Add a new entry under the `# --- Papers Series Covers ---`
      section, after the most recent paper entry:

      ```yaml
        - key: paper-12-cover
          output: blog/content/docs/papers/12-multi-tenancy-vcluster/cover.png
          description: Paper 12 cover — Frank drawing concentric boundary rings around pod groups on a whiteboard
          prompt: >-
            Frank the server-hardware Frankenstein monster stands at a
            large dark whiteboard, marker in hand, drawing concentric
            boundary rings around three labelled groups of small pod
            icons. The innermost group is labelled "namespace", the
            middle ring "vcluster", the outermost ring "cluster". His
            expression is focused and weighing — the kind of person
            sizing up which boundary to draw, not picking a brand. He
            wears thin round reading glasses resting low on his nose
            and a thin black necktie. Warm overhead lamp on a dark
            background. RJ45 neck bolts, green skin, messy black
            hair, rack-mount torso. The whiteboard rings glow faintly
            white-blue. No text in the image other than the small
            ring labels and the pod icons.
      ```
  - id: P4.T1.S2
    text: |-
      Generate the cover image


      ```bash
      set -a && source .env_common && set +a
      uv sync
      .venv/bin/python scripts/generate-all-images.py \
        -r blog/static/images/reference.png \
        --only paper-12-cover
      ```

      Expected: `blog/content/docs/papers/12-multi-tenancy-vcluster/cover.png`
      created, ≥50KB.

      If generation fails for any reason (Gemini API timeout, quota,
      etc.), fall back: `cp blog/static/images/reference.png
      blog/content/docs/papers/12-multi-tenancy-vcluster/cover.png` and
      tick step `--state - --note "Gemini fallback used; regen
      post-merge."`

      Spot-check: Frank should have thin round reading glasses, thin
      black tie, focused/weighing expression, and the concentric-
      ring boundary metaphor should be recognisable. Up to 3
      regeneration attempts if the visual signature is missing.
- number: 2
  title: Render Mermaid diagrams and verify they parse
  steps:
  - id: P4.T2.S1
    text: |-
      Review draft for `TODO:<type>` diagram placeholders


      ```bash
      grep -n "TODO:" blog/content/docs/papers/12-multi-tenancy-vcluster/index.md
      ```

      Expected: no `TODO:` lines remaining after Phase 3 draft work
      (TL;DR remains pending — that is by design and lives outside
      the Mermaid scope).
  - id: P4.T2.S2
    text: |-
      Verify Mermaid diagrams parse without errors in Hugo dev server


      ```bash
      cd blog && PATH=/usr/local/Cellar/go/1.26.2/bin:$PATH hugo --minify --buildDrafts 2>&1 | grep -E "^ERROR|^WARN" | head -10
      ls -lh public/docs/papers/12-multi-tenancy-vcluster/index.html
      ```

      Expected: zero ERROR lines; `index.html` exists and is ≥10 KB.
- number: 3
  title: Capture vCluster runtime screenshot
  steps:
  - id: P4.T3.S1
    text: |-
      Capture a vCluster runtime screenshot showing real cluster state


      Two good candidates:

      1. Host-cluster view of the vcluster-experiments pod / SST / PVC:
         ```bash
         kubectl -n vcluster-experiments get pods,statefulset,pvc -o wide
         ```
         Screenshot the terminal output.

      2. Tenant view via `vcluster connect`:
         ```bash
         vcluster connect experiments -n vcluster-experiments
         kubectl get namespaces
         kubectl get nodes
         ```
         Screenshot the tenant-side `kubectl get namespaces` output
         (it shows ONLY the virtual cluster's namespaces — no
         host visibility, which is the whole point).

      Save to:
      ```
      blog/content/docs/papers/12-multi-tenancy-vcluster/vcluster-runtime.png
      ```

      If cluster access is unavailable, copy the 1×1 placeholder
      and rename with `-TODO.png` suffix:
      ```bash
      cp blog/content/docs/papers/11-identity-heterogeneous-stack/authentik-applications-TODO.png \
         blog/content/docs/papers/12-multi-tenancy-vcluster/vcluster-runtime-TODO.png
      ```
      Tick the step `--state - --note "Cluster access unavailable
      from worktree."`
- number: 4
  title: Full Hugo build smoke-test
  steps:
  - id: P4.T4.S1
    text: |-
      Run the production Hugo build to assert zero errors


      ```bash
      cd blog && PATH=/usr/local/Cellar/go/1.26.2/bin:$PATH hugo --minify --buildDrafts 2>&1 | grep -E "^ERROR|^WARN" | head -10
      ls -lh public/docs/papers/12-multi-tenancy-vcluster/index.html
      ```

      Expected: zero ERROR lines; `index.html` exists and is ≥10 KB.
