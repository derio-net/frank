- number: 3
  title: Draft all sections in order
  steps:
  - id: P3.T3.S1
    text: |-
      Draft §1 — The capability (200–350 words) + stack-position diagram


      The opening question: *when do you need K8s tenant boundaries
      stronger than namespaces but weaker than separate clusters —
      and what does each rung on that ladder actually cost in
      steady-state RAM, CPU, control-plane upgrade toil, and
      blast-radius math?* Position multi-tenancy in the stack:
      above the kernel (cgroups + namespaces), spanning K8s
      (Namespace + RBAC + NetworkPolicy + ResourceQuota + LimitRange
      + PodSecurityStandard), and below the application. The
      vendor space picks DIFFERENT layers to enforce at — that is
      the source of the categorical differences.

      Voice: Frank speaks as the cluster. No hedging. "Tenant"
      doesn't mean one thing — it means an agent pod, an experiment,
      an external user holding a kubeconfig. Each one needs a
      different boundary.

      Include one `flowchart LR` Mermaid diagram showing the stack
      position and the five layers tenant boundaries CAN sit at:

      ```
      flowchart LR
          K["Kernel (cgroups + ns)"] --> N["K8s Namespace"]
          N --> R["RBAC"]
          N --> NP["NetworkPolicy"]
          N --> Q["ResourceQuota + LimitRange"]
          N --> PSA["PodSecurityStandard"]
          N --> V["Virtual API server"]
          V --> RC["Real cluster per tenant"]
          style V fill:#eef
          style RC fill:#fee
      ```
  - id: P3.T3.S2
    text: |-
      Draft §2 — The landscape (400–600 words) + landscape quadrant + capability matrix


      Map the five-or-six vendors against two axes. Use `{{< papers/landscape >}}`:

      ```
      {{< papers/landscape axes="x:shared-control-plane↔per-tenant-control-plane,y:low-ops-floor↔high-ops-floor" >}}
          quadrantChart
              title Multi-tenancy — 2026
              x-axis Shared CP --> Per-tenant CP
              y-axis Low ops floor --> High ops floor
              quadrant-1 "Per-tenant CP · High ops"
              quadrant-2 "Shared CP · High ops"
              quadrant-3 "Shared CP · Low ops"
              quadrant-4 "Per-tenant CP · Low ops"
              Namespaces + RBAC: [0.05, 0.10]
              Capsule: [0.15, 0.20]
              vCluster: [0.65, 0.40]
              Kamaji: [0.70, 0.55]
              HyperShift: [0.80, 0.85]
              Cluster API per tenant: [0.95, 0.95]
      {{< /papers/landscape >}}
      ```

      Then the dense comparison via `{{< papers/capability-matrix >}}`:

      ```
      {{< papers/capability-matrix data="vendors" >}}
      ```

      Prose budget: 400–600 words. For each option, name what it
      optimises for in one phrase ("vCluster: a virtual control
      plane that fits in a Helm chart"; "Capsule: policy-as-code
      for the team that doesn't want a second API server"; "Cluster
      API: when the answer to 'I need a tenant' is 'they need a
      cluster'") and what it gives up to get there. Use
      `{{< papers/pullquote source="..." url="..." >}}` for at
      least one direct quote pulled from the dossier (likely the
      vCluster architecture doc or the K8s SIG-Multitenancy
      position paper).
  - id: P3.T3.S3
    text: |-
      Draft §3 — How each option handles the hard part (800–1400 words)


      The hard part: *what does the tenant boundary actually
      enforce, and what's the cost of that enforcement?* Every
      option has a categorically different answer; this section
      lays them out side-by-side with one `flowchart TD` per vendor
      in a shared visual language.

      Shared visual language (reuse across all diagrams):
      - Squares = controllers / servers
      - Rounded rectangles = K8s resources
      - Diamonds = decision points / auth gates
      - Cylinders = backing stores (etcd, SQLite, MySQL)
      - Dashed edges = control-plane / sync paths
      - Solid edges = runtime / tenant request paths

      Four architecture diagrams (one per tenancy *shape* — the
      individual vendors within a shape mostly differ by knob, not
      by topology):

      1. **Shared control plane (Namespaces + RBAC / Capsule).**
         One API server, one etcd; tenants are namespaces; isolation
         is policy. The diagram has ONE square (the API server),
         many rounded rectangles (per-tenant resources), and the
         diamonds are the admission webhooks that enforce policy.

      2. **Virtual control plane per tenant (vCluster).** Per-tenant
         StatefulSet running kube-apiserver + controller-manager +
         SQLite, syncing pods to the host cluster. Two squares per
         tenant (vCluster API server + syncer), one cylinder per
         tenant (SQLite on Longhorn PV).

      Example for vCluster:

      ```
      flowchart TD
          subgraph HOST["Host cluster (Frank)"]
              H_API["kube-apiserver"]
              H_ETCD[("host etcd")]
          end
          subgraph TENANT["vcluster-experiments namespace"]
              V_API["vcluster apiserver (StatefulSet)"]
              V_SQLITE[("SQLite on Longhorn PV")]
              V_SYNC["syncer"]
          end
          USER["Tenant user (kubeconfig)"] --> V_API
          V_API -.-> V_SQLITE
          V_API --> V_SYNC
          V_SYNC --> H_API
          H_API -.-> H_ETCD
      ```

      3. **Virtual control plane as Deployments (Kamaji).** Same
         shape as vCluster but the per-tenant control plane runs as
         Deployments managed by Kamaji, backed by a SHARED external
         datastore (kine over MySQL or etcd). Trade-off: one shared
         datastore to operate vs. per-tenant SQLite.

      4. **Real cluster per tenant (Cluster API).** Cluster API
         controllers materialize an entire cluster per tenant — own
         etcd, own kubelets, own nodes. Diagram has nested clusters,
         no shared host. This is what Hop actually is, just lifecycled
         by hand rather than by CAPI.

      For each diagram include 80–200 words of prose: what the
      controller does at runtime, what the per-tenant cost is in
      RAM/CPU/PVC, what the failure mode is when a tenant
      misbehaves, what the upgrade story is when the host K8s
      version bumps.
  - id: P3.T3.S4
    text: |-
      Draft §4 — What scale changes (300–600 words) + scale callouts


      Three scale axes that flip vendor rankings:

      1. **Tenant count vs. node RAM.** A 64-GiB mini hosts ~30
         idle vClusters at the SQLite floor (~300 MiB control plane
         + 5 GiB PV per tenant). Same node hosts unbounded Capsule
         tenants (zero per-tenant runtime floor). At 5 tenants,
         either answer fits. At 30 tenants, the namespace answer
         wins on cost; at 30 tenants who all want to install CRDs,
         the namespace answer doesn't exist as an option.

      2. **Control-plane upgrade story.** Host K8s 1.34 → 1.35:
         for namespace tenancy, every tenant gets the new minor at
         the same time. For vCluster, each tenant control plane is
         on its own clock — that's a feature (tenants test upgrades
         first) and a tax (you have N control planes to upgrade).
         For Cluster API per tenant, it's the same tax in a
         different colour.

      3. **Blast radius.** A misbehaving tenant pod hits the same
         cgroup limits regardless of tenancy shape — that's a
         kernel boundary, not a K8s one. A misbehaving tenant
         *CRD* (a webhook that crashes, a finalizer that blocks
         namespace deletion) is the case that bites: it freezes
         the SHARED control plane under namespace tenancy and
         only the per-tenant control plane under vCluster /
         Kamaji / CAPI.

      Cite ≥2 primary sources from the dossier (the K8s SIG-
      Multitenancy framework + a vCluster or Kamaji architecture
      doc for the per-tenant cost numbers). Do not editorialize
      past what the citations support — the named gap in the
      dossier is precisely that the public RAM/CPU floor curve
      doesn't exist.
  - id: P3.T3.S5
    text: |-
      Draft §5 — Frank's choice, and what happened (300–600 words) + scar callouts


      Frank chose vCluster (OSS, embedded SQLite, Longhorn-backed)
      under ArgoCD's App-of-Apps pattern as
      `apps/vclusters/<name>/values.yaml` + a per-instance
      Application CR. Template defaults carry the policy; per-
      instance overrides carry the exceptions. The first concrete
      vCluster is `experiments`, deployed as
      `vcluster-experiments` namespace with the template's
      ResourceQuota / LimitRange / NetworkPolicy enabled. Access
      is via `vcluster connect experiments -n vcluster-experiments`
      — a kubeconfig handoff that gives the tenant a full K8s API
      with zero host visibility.

      The scars came in unexpected places — and the biggest
      finding is the *near-absence* of scars in the gotcha
      registry. Use 1–3 `{{< papers/scar >}}` callouts. Suggested
      options:

      Scar 1 — the ArgoCD `ignoreDifferences` block on the
      vCluster StatefulSet:
      ```
      {{< papers/scar date="2026-03-11" >}}
      The vCluster Helm chart injects a `vClusterConfigHash`
      annotation on the StatefulSet template and omits several
      fields Kubernetes defaults (`whenScaled`,
      `revisionHistoryLimit`, `updateStrategy`). ArgoCD
      reconciles the omitted fields back to the chart's empty
      value, the apiserver re-defaults them, ArgoCD flags OOS,
      and the StatefulSet flaps OutOfSync forever. The fix is
      a four-line `ignoreDifferences` block on the per-instance
      Application CR. Small fix. Five-minute debug if you've
      seen it before; an hour if you haven't.
      {{< /papers/scar >}}
      ```

      Scar 2 — the chart-schema gotchas the original plan got
      wrong:
      ```
      {{< papers/scar date="2026-03-11" >}}
      The original plan called the policy block `isolation:` —
      the chart calls it `policies:`. It called the sync keys
      `configmaps:` and `persistentvolumeclaims:` — the chart
      takes `configMaps` and `persistentVolumeClaims`. It set
      `networking.service.type` — that field doesn't exist.
      Three schema violations, three template errors, three
      short cycles of `helm show values` against the real chart.
      The lesson: even with a stable upstream chart, the schema
      is the source of truth, not the design doc.
      {{< /papers/scar >}}
      ```

      Scar 3 — the structural finding (the multi-cluster pivot):
      ```
      {{< papers/scar date="2026-03-20" >}}
      Two weeks after vCluster shipped, the public-edge workload
      needed a home. The instinct was "spin up a vCluster for
      it." The instinct was wrong. The public edge needed its
      own etcd, its own kubelet, its own geography (Hetzner,
      not the home lab LAN), its own attack surface. Hop — a
      real Talos cluster on a Hetzner CX23 — got built instead,
      and the monorepo restructured to host two clusters under
      one repo. vCluster is one rung on the multi-tenancy
      ladder; the public-edge workload was a different ladder
      entirely. The Paper has to say so.
      {{< /papers/scar >}}
      ```

      Pick 2-3 scars from the above. Real dates only — pull from
      the original `2026-03-11--tenant--vcluster` archived plan,
      the `2026-03-20--repo--multi-cluster-restructure` plan, and
      the actual ArgoCD Application CR file
      (`apps/root/templates/vcluster-experiments.yaml`).

      Include ≥1 evidence artefact: either a screenshot of
      `kubectl -n vcluster-experiments get pods,statefulset,pvc`,
      a `vcluster connect` session showing the tenant's
      `kubectl get namespaces` view, or the
      `apps/vclusters/template/values.yaml` inlined as a code
      block.
  - id: P3.T3.S6
    text: |-
      Draft §6 — When Frank's answer doesn't generalize (200–400 words) + decision tree


      Be explicit about the four leaves. Frank's pick is one leaf;
      the others are real:

      ```
      flowchart TD
          A["One team, trusted tenants, low CRD churn?"] -- "Yes" --> L1["Namespaces + RBAC + NetworkPolicy"]
          A -- "No" --> B["Tenants need to install CRDs / cluster-scoped resources?"]
          B -- "No, but multi-team SaaS-style platform" --> L2["Capsule (policy-driven namespace tenancy)"]
          B -- "Yes, sandbox / experiment / per-user kubeconfig" --> L3["vCluster (Frank's pick)"]
          B -- "Yes, AND regulated / production isolation" --> L4["Separate cluster per tenant (CAPI / Talos)"]
      ```

      ≤4 visible leaves. The decision turns on three questions:
      *are your tenants trusted and homogeneous* (yes: namespaces
      win); *do they need to install CRDs / cluster-scoped
      resources* (yes: virtual control plane); *is the workload
      regulated or does blast-radius math demand kernel-level
      isolation* (yes: separate cluster). The Capsule leaf is for
      the SaaS-style platform team with strong policy-as-code
      culture and trusted-but-many tenants. The separate-cluster
      leaf is what Frank actually ran for Hop — vCluster isn't a
      general substitute for a second cluster, it's an answer to
      a different question.
  - id: P3.T3.S7
    text: |-
      Draft §7 — Roadmap & where this space is going (200–400 words)


      Three trends worth naming:

      1. **The virtual-control-plane shape is consolidating.**
         vCluster, Kamaji, and HyperShift all converged on
         "control plane as pods in a management cluster, data
         plane somewhere else." Loft (vCluster) and Red Hat
         (HyperShift) are betting that this becomes the default
         multi-tenancy shape for platform teams in 18–24 months.
         The OSS / commercial split lives in the data-plane and
         policy story, not the topology.

      2. **Cluster API is eating the per-tenant real-cluster
         story.** Hand-rolled "cluster per tenant" used to mean
         Terraform + bash. CAPI now spans AWS, Azure, vSphere,
         OpenStack, Talos, and bare-metal providers; the
         provisioning friction is dropping fast enough that the
         "separate cluster" leaf of the decision tree is getting
         cheaper. In 18 months the right answer for many regulated
         workloads will be CAPI + a tiny management cluster, not
         vCluster.

      3. **Namespace tenancy is getting better, slowly.** The
         K8s Multi-Tenancy WG's HierarchicalNamespaces (HNC) and
         the steady improvements to PSA, NetworkPolicy v2, and
         Cilium's tenant-aware policies are raising the ceiling
         of what shared-control-plane tenancy can do safely. The
         gap between "Capsule" and "vCluster" narrows for every
         tenancy use case that doesn't require a tenant-owned
         CRD.

      Optional timeline diagram or roadmap citations. Cite the
      dossier where possible.
  - id: P3.T3.S8
    text: |-
      Verify draft word count is within budget (2400–4200 words for a capability paper)


      ```bash
      # Count words in the paper body (excluding frontmatter)
      awk '/^---/{n++; if(n==2) found=1; next} found' \
        blog/content/docs/papers/12-multi-tenancy-vcluster/index.md \
        | wc -w
      ```

      Expected: 2400–4200 words. If under, expand §3 (per-vendor
      architecture is the section with most room to grow). If
      over, trim §3 first — that's where capability papers
      reliably sprawl past budget.
