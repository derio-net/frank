schema_version: 2
phase:
  number: 5
  title: Review + publish
  tag: manual
  depends_on:
  - 4
  tracking_issue: null
tasks:
- number: 1
  title: Voice pass and TL;DR
  steps:
  - id: P5.T1.S1
    text: |-
      **Human gate: author voice pass**


      Read the full draft. Check:
      - Frank speaks as the cluster — first-person plural ("we
        learned") or third-person cluster ("Frank chose vCluster,
        and Hop got built two weeks later") are both fine; distant
        academic voice is not.
      - Every scar callout uses a real incident with a real date.
        Cross-reference dates against the archived
        `2026-03-11--tenant--vcluster` plan, the
        `2026-03-20--repo--multi-cluster-restructure` plan, and the
        `apps/root/templates/vcluster-experiments.yaml` Application
        CR file.
      - The counter-argument ("namespaces + RBAC are fine for most
        teams") is addressed directly in §5 or §6 — not hedged
        away. The honest version says namespaces DO win for many
        teams.
      - §3 per-vendor architectures use shared visual language
        (same shapes, same edge types) — that's load-bearing for
        cross-shape comparison.
      - §6 decision tree has ≤4 leaves.
      - The multi-cluster pivot (Hop) is named explicitly in §5 or
        §6 — the Paper's most honest moment is "Frank's pick is
        vCluster for sandboxes AND a real second cluster for
        edge."
  - id: P5.T1.S2
    text: |-
      Write the TL;DR (≤150 words)


      Write last, after the body has stabilized. Aim for three
      short paragraphs:
      1. The capability question and the five-or-six-vendor
         landscape across three tenancy shapes (one sentence)
      2. Frank's answer (vCluster OSS + SQLite + Longhorn-PV under
         ArgoCD, with Hop as the parallel "real second cluster"
         answer to questions vCluster can't answer) (one sentence)
      3. When Frank's answer doesn't generalize — the decision tree
         in 1–2 sentences

      Count words:
      ```bash
      awk '/^tldr:/,/^[a-z]/' \
        blog/content/docs/papers/12-multi-tenancy-vcluster/index.md \
        | grep -v "^tldr:\|^[a-z]" | wc -w
      ```

      Expected: ≤150 words. Update the `tldr:` field in the
      frontmatter AND any TL;DR section body that mirrors it.
- number: 2
  title: Final checks and publish
  steps:
  - id: P5.T2.S1
    text: |-
      Run dossier gate one final time


      ```bash
      python scripts/validate-dossier.py docs/papers-dossiers/12-multi-tenancy-vcluster/dossier.md
      ```

      Expected: `DOSSIER GATE PASSED`.
  - id: P5.T2.S2
    text: |-
      Run full Hugo build and assert zero errors


      ```bash
      cd blog && PATH=/usr/local/Cellar/go/1.26.2/bin:$PATH hugo --buildDrafts 2>&1 | grep -E "^ERROR" | head -5
      ```

      Expected: no output (zero errors).
  - id: P5.T2.S3
    text: |-
      Set `draft: false` and `status: published`, run production build


      In `blog/content/docs/papers/12-multi-tenancy-vcluster/index.md`:
      - Change `draft: true` → `draft: false`
      - Change `status: drafting` → `status: published`

      Verify the paper appears in the production build (without `--buildDrafts`):

      ```bash
      cd blog && PATH=/usr/local/Cellar/go/1.26.2/bin:$PATH hugo --minify 2>&1 | tail -3
      ls public/docs/papers/12-multi-tenancy-vcluster/index.html
      ```

      Expected: `public/docs/papers/12-multi-tenancy-vcluster/index.html`
      exists.
  - id: P5.T2.S4
    text: |-
      Verify the dossier-link shortcode renders exactly once


      single.html auto-injects the dossier-link chip in the footer.
      If §5 or §7 also uses `{{< papers/dossier-link paper="..." >}}`
      inline, the chip renders twice. Choose one or the other:

      ```bash
      grep -n "papers/dossier-link" blog/content/docs/papers/12-multi-tenancy-vcluster/index.md
      ```

      Expected: zero matches (paper relies on automatic footer
      injection via `single.html`). If exactly one inline
      `{{< papers/dossier-link >}}` shortcode is found, the author
      must have explicitly disabled the automatic footer injection
      for this paper — verify by grepping the rendered page for
      the footer chip. If both render, see
      `agents/rules/repo-papers.md` § Dossier vs. shortcode.
  - id: P5.T2.S5
    text: |-
      Commit and push Paper 12


      The publish commit lands as part of the single-PR-six-commits
      cadence — one commit per phase, all pushed to branch
      `paper-12`. The PR stays open at the end for human review.

      ```bash
      git add \
        blog/content/docs/papers/12-multi-tenancy-vcluster/ \
        docs/papers-dossiers/12-multi-tenancy-vcluster/ \
        blog/prompt_for_images.yaml

      git commit -m "feat(papers): Paper 12 — Phase 5: Review + publish"
      git push
      ```
