- number: 1
  title: Scaffold Paper 11 bundle and dossier
  steps:
  - id: P1.T1.S1
    text: |-
      Run the scaffold script


      ```bash
      scripts/scaffold-paper.sh 11 identity-heterogeneous-stack
      ```

      Expected output:
      ```
      Scaffolded Paper 11:
        Hugo bundle:  blog/content/docs/papers/11-identity-heterogeneous-stack/
        Dossier:      docs/papers-dossiers/11-identity-heterogeneous-stack/dossier.md
      ```

      Verify both paths exist:
      ```bash
      ls blog/content/docs/papers/11-identity-heterogeneous-stack/index.md
