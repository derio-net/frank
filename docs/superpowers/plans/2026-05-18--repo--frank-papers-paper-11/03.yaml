- number: 2
  title: Draft all sections
  steps:
  - id: P3.T2.S1
    text: |-
      Draft §1 — The capability (200–350 words)


      Open with the question: when ten web UIs, three CLIs, and a
      gRPC backend all need identity — what sits in front of them?
      Frame the IdP as occupying a specific stack slot: between
      ingress and the application, alongside but not inside the
      ingress controller.

      Include one `flowchart LR` Mermaid diagram showing the
      stack-position of an IdP and the two interaction patterns
      (forward-auth for opaque services; OIDC for native-OIDC apps):

      ```
      flowchart LR
          U["User"] --> I["Ingress\n(Traefik)"]
          I -->|forward-auth| O["Outpost\n(Authentik proxy)"]
          O --> IdP["IdP\n(Authentik core)"]
          I -->|OIDC redirect| App["Native OIDC app\n(Grafana, ArgoCD)"]
          App --> IdP
          O --> App2["Opaque web UI\n(Longhorn, Hubble)"]
      ```

      Voice: Frank speaks as the cluster. The capability is framed
      as something Frank had to solve before he could expose
      anything beyond `kubectl port-forward` to a human.
  - id: P3.T2.S2
    text: |-
      Draft §2 — The landscape (400–600 words)


      Map the seven vendors. Use `{{< papers/landscape >}}`
      (Mermaid `quadrantChart`) with axes:
      - X: *forward-auth-only ↔ full IdP*
      - Y: *lightweight ↔ enterprise*

      Authelia plots bottom-left (forward-auth-only, lightweight).
      Authentik plots middle (does both, mid-weight). Keycloak
      plots top-right (full IdP, enterprise). Dex plots middle-
      right (full IdP, lightweight). Zitadel plots middle-top
      (full IdP, enterprise but cloud-native). Ory plots
      middle-right (full IdP, library-shaped). Pomerium plots
      far-left (forward-auth-only but enterprise-shaped).

      Use `{{< papers/capability-matrix data="vendors" >}}`. Create
      `blog/content/docs/papers/11-identity-heterogeneous-stack/data/vendors.yaml`:

      ```yaml
      features:
        - key: forward_auth
          label: Forward-auth (opaque apps)
        - key: oidc
          label: OIDC provider
        - key: saml
          label: SAML
        - key: federation
          label: Federates upstream IdPs
        - key: multi_tenant
          label: Multi-tenancy
        - key: declarative
          label: Declarative config (no UI required)
      vendors:
        - name: Authentik
          features:
            forward_auth: "yes"
            oidc: "yes"
            saml: "yes"
            federation: "yes"
            multi_tenant: "partial"
            declarative: "partial"
        - name: Keycloak
          features:
            forward_auth: "no"
            oidc: "yes"
            saml: "yes"
            federation: "yes"
            multi_tenant: "yes"
            declarative: "partial"
        - name: Dex
          features:
            forward_auth: "no"
            oidc: "yes"
            saml: "no"
            federation: "yes"
            multi_tenant: "no"
            declarative: "yes"
        - name: Zitadel
          features:
            forward_auth: "no"
            oidc: "yes"
            saml: "yes"
            federation: "yes"
            multi_tenant: "yes"
            declarative: "yes"
        - name: Authelia
          features:
            forward_auth: "yes"
            oidc: "partial"
            saml: "no"
            federation: "partial"
            multi_tenant: "no"
            declarative: "yes"
        - name: Ory
          features:
            forward_auth: "no"
            oidc: "yes"
            saml: "no"
            federation: "yes"
            multi_tenant: "yes"
            declarative: "yes"
        - name: Pomerium
          features:
            forward_auth: "yes"
            oidc: "partial"
            saml: "partial"
            federation: "yes"
            multi_tenant: "partial"
            declarative: "yes"
      ```

      Use `{{< papers/pullquote >}}` for at least one direct quote
      from the dossier's BeyondCorp paper (the IAP origin claim).
  - id: P3.T2.S3
    text: |-
      Draft §3 — How each option handles the hard part (800–1400 words)


      The hard part is the forward-auth fan-out plus the OIDC
      session story. For each vendor (or each vendor-pair where
      two share an architecture):
      - How forward-auth works (or why the vendor doesn't do it)
      - How OIDC sessions are stored and refreshed
      - How a new protected service is onboarded
      - The operational seams

      One `flowchart TD` per vendor, sharing visual language
      (same node shapes for "user", "proxy", "IdP", "session
      store"). Example for Authentik:

      ```
      flowchart TD
          U["User"] --> P["Proxy / Outpost\n(per-service ProxyProvider)"]
          P -->|cookie absent| L["Login flow"]
          L --> A["Authentik core"]
          A --> S["Session DB\n(Postgres)"]
          P -->|cookie present| V["Validate session"]
          V --> S
          P -->|allow| App["Protected app"]
      ```

      Repeat the pattern for Keycloak (no native forward-auth — must
      front with oauth2-proxy or Pomerium), Dex (federation-broker
      only — no session/login UI of its own), Zitadel
      (multi-tenant from day one, gRPC API for everything), and
      Authelia (forward-auth-only, file or LDAP backend).

      Watch the budget — §3 sprawl is the #1 reason a paper
      blows past 4200 words. If you hit 1400 here, cut a vendor
      from §3 and consolidate to a capability-matrix row in §2.
  - id: P3.T2.S4
    text: |-
      Draft §4 — What scale changes (300–600 words)


      Three forces that change with scale:
      1. **Forward-auth fan-out cost** — every request to a
         protected app hits the outpost. At 10 req/s per protected
         service across 12 services, that's 120 forward-auth calls
         per second. Each one terminates a session check against
         the IdP's session store.
      2. **Session store as a single point of failure** — Postgres
         (Authentik, Keycloak) vs SQLite (Authelia in small mode)
         vs embedded KV (Dex). Postgres dies → IdP dies → forward-
         auth dies → every protected service 502s.
      3. **Token rotation cost** — short-lived OIDC access tokens
         (5–15 min) mean every long-lived UI session refreshes
         regularly. Refresh storm during an IdP restart is real.

      Cite at least 2 primary sources from the dossier (the
      BeyondCorp paper has fan-out cost data; vendor docs have
      session-store recommendations).
  - id: P3.T2.S5
    text: |-
      Draft §5 — Frank's choice, and what happened (300–600 words)


      Return to Frank's choice: Authentik with the embedded
      outpost. Be honest about the operational tax. Three
      `{{< papers/scar >}}` callouts, with real dates pulled from
      commit history or `docs/runbooks/frank-gotchas/authentik.md`:

      ```
      {{< papers/scar date="<commit-date-of-first-forward-auth-service>" >}}
      Authentik blueprints can declare a ProxyProvider, but cannot
      assign that provider to the embedded outpost. Every new
      forward-auth-protected service requires a `kubectl exec`
      running Django ORM against the Authentik server:
      `outpost.providers.add(provider)`. A permanent operational
      tax on a cluster whose principle is "declarative everything".
      {{< /papers/scar >}}
      ```

      ```
      {{< papers/scar date="<commit-date-of-AUTHENTIK_HOST-fix>" >}}
      A new IngressRoute pointed at the outpost and 502'd on
      redirect. The outpost was advertising `0.0.0.0:9000` as its
      own URL because `AUTHENTIK_HOST` was unset. Fix: set
      `AUTHENTIK_HOST` in `global.env` in the Helm values. The
      Helm chart applies `global.env` to both server and worker
      pods — neither documented as a contract, nor flagged as a
      requirement; just the chart's structure.
      {{< /papers/scar >}}
      ```

      ```
      {{< papers/scar date="<commit-date-of-2026.x-migration>" >}}
      When 2026.x landed, every existing ProxyProvider blueprint
      failed validation: missing `invalidation_flow`, missing
      `signing_key` UUID, scalar `redirect_uris` where the API
      now expected an object. Schema-breaking releases are the
      dossier-tracked failure mode for self-hosted IdPs — you
      cannot pin to a major version forever because security
      patches stop.
      {{< /papers/scar >}}
      ```

      End the section with an Authentik admin-UI screenshot
      showing the applications + proxy providers list. Caption:
      *"Every row is a manual Django ORM step in the operator's
      shell history."*

      Resolve `<commit-date-of-...>` placeholders before publish
      by running:
      ```bash
      git log --oneline --follow \
        apps/authentik-extras/manifests/blueprints-cluster-proxy-providers.yaml \
        | tail -1
      git log --oneline -S "AUTHENTIK_HOST" \
        apps/authentik/values.yaml | head -5
      git log --oneline -S "invalidation_flow" | head -5
      ```
  - id: P3.T2.S6
    text: |-
      Draft §6 — When Frank's answer doesn't generalize (200–400 words)


      Be explicit about when Authentik is the wrong answer. Four
      leaves — exactly four, per the spec's §6 budget. Mermaid:

      ```
      flowchart TD
          Q["What's your auth shape?"]
          Q --> Q1["Already have AD/LDAP?\nForward-auth only?"]
          Q --> Q2["Heterogeneous stack?\nMix of OIDC + opaque?"]
          Q --> Q3["Enterprise federation?\nMultiple realms?\nCompliance?"]
          Q --> Q4["Already on a service mesh?\nWant zero-trust at proxy?"]
          Q1 --> A1["Authelia"]
          Q2 --> A2["Authentik (Frank's pick)"]
          Q3 --> A3["Keycloak"]
          Q4 --> A4["Pomerium"]
      ```

      One paragraph per leaf, no more. The temptation is to write
      five paragraphs per leaf and turn §6 into another §3 — don't.
  - id: P3.T2.S7
    text: |-
      Draft §7 — Roadmap & where this space is going (200–400 words)


      Three trends to name:
      1. **Passkeys / WebAuthn-first identity** — password forms
         are dying; the next generation of IdPs assumes hardware-
         backed credentials by default.
      2. **The slow death of SAML** — OIDC has won. SAML support
         is becoming a compliance-checkbox feature, not a primary
         protocol.
      3. **Identity-aware proxies eating the forward-auth pattern**
         — Pomerium-style proxies that combine SSO, mTLS, and
         authorization policy are slowly replacing the "outpost
         in front of every service" pattern.

      Cite at least one source from the dossier per trend
      (vendor roadmap docs, conference talk, or analyst report).
  - id: P3.T2.S8
    text: |-
      Verify draft word count is within budget (2400–4200 words for a capability paper)


      ```bash
      # Count words in the paper body (excluding frontmatter)
      awk '/^---/{n++; if(n==2) found=1; next} found' \
        blog/content/docs/papers/11-identity-heterogeneous-stack/index.md \
        | wc -w
      ```

      Expected: 2400–4200 words. If under, §3 is usually the
      section that wants more vendor coverage. If over, trim §3
      first (consolidate two vendors that share an architecture
      into one diagram), then §2.
