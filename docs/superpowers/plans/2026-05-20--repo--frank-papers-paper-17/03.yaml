- number: 3
  title: Draft all sections in order
  steps:
  - id: P3.T3.S1
    text: |-
      Draft §1 — The capability (200–350 words) + stack-position diagram


      The opening question: *if you want to run other people's (or
      your own) coding agents — Claude, Codex, opencode, hermes —
      on real infrastructure, with real network access and real
      source-checkout privileges, what runs them, what isolates them,
      and who orchestrates the fleet?* Position the capability in the
      stack: above the cluster (it consumes pods, PVs, network
      policies), below the LLM gateway (it calls LiteLLM through a
      virtual key), sibling to identity and auth.

      Voice: Frank speaks as the cluster. No hedging. The question
      is real, the answers diverge.

      Include one `flowchart LR` Mermaid diagram showing the stack
      position and the three jobs agent orchestration does:

      ```
      flowchart LR
          K["Kubernetes / vCluster"] --> W["Agent workstation"]
          W --> ISO["Isolation (namespace, PV, cgroup)"]
          W --> STATE["Persistent state (PV)"]
          W --> ACCESS["Access (sshd, mosh, web IDE)"]
          O["Orchestrator (board, dispatcher)"] --> W
          W -.-> LLM["LLM gateway"]
      ```
  - id: P3.T3.S2
    text: |-
      Draft §2 — The landscape (400–600 words) + landscape quadrant + capability matrix


      Map the six vendors against two axes. Use `{{< papers/landscape >}}`:

      ```
      {{< papers/landscape axes="x:laptop-or-shared-VM↔per-agent-pod,y:single-shell↔fleet-orchestrated" >}}
          quadrantChart
              title Agent orchestration & workstation — 2026
              x-axis "Shared workstation" --> "Per-agent pod"
              y-axis "Single shell" --> "Fleet orchestrated"
              quadrant-1 "Per-agent · Fleet"
              quadrant-2 "Shared · Fleet"
              quadrant-3 "Shared · Single shell"
              quadrant-4 "Per-agent · Single shell"
              "secure-agent-pod": [0.85, 0.35]
              "VibeKanban": [0.75, 0.85]
              "Paperclip + Sympozium": [0.65, 0.90]
              "Coder.com": [0.80, 0.80]
              "GitPod": [0.60, 0.55]
              "devcontainers / Codespaces": [0.40, 0.15]
      {{< /papers/landscape >}}
      ```

      Then the dense comparison via `{{< papers/capability-matrix >}}`:

      ```
      {{< papers/capability-matrix data="vendors" >}}
      ```

      Prose budget: 400–600 words. For each option, name what it
      optimises for in one phrase ("secure-agent-pod: per-PV state
      with an SSH front door"; "VibeKanban: ticket-driven fan-out
      to executor sessions"; "Coder.com: the managed answer to
      where the agent runs") and what it gives up to get there.
      Use `{{< papers/pullquote source="..." url="..." >}}` for at
      least one direct quote pulled from the dossier (likely the
      s6-overlay v3 or containers.dev quote).
  - id: P3.T3.S3
    text: |-
      Draft §3 — How each option handles the hard part (800–1400 words)


      The hard part: *running other people's (or your own) coding
      agents with real source-checkout privileges and real network
      access, on hardware you own, without one agent's mistakes
      becoming everyone's problem.* Each vendor has a different
      answer; this section lays them out side-by-side with one
      `flowchart TD` per vendor in a shared visual language.

      Suggested shapes (reuse across all diagrams):
      - Squares = controller / orchestrator components
      - Rounded rectangles = workstation pods / containers
      - Diamonds = decision / dispatch points (label assignment, ticket fan-out)
      - Cylinders = persistent state (PV, DB, object store)
      - Dashed edges = control / dispatch paths
      - Solid edges = pod lifecycle / data paths

      Five architecture diagrams (skip plain devcontainers — its
      "architecture" is the null hypothesis, which is the §6
      punchline).

      Example for secure-agent-pod:

      ```
      flowchart TD
          subgraph SAP["secure-agent-pod"]
              POD(("Pod (s6-overlay v3 non-root)"))
              S6{"suexec (PID 1)"}
              SSHD["sshd :22"]
              MOSH["mosh :60000-60015/UDP"]
              CLI(("agent CLI"))
              PV[("Longhorn PV /home/claude")]
          end
          USER["Human / agent operator"] -.-> SSHD
          USER -.-> MOSH
          SSHD --> CLI
          MOSH --> CLI
          CLI --> PV
          S6 --> SSHD
          S6 --> MOSH
      ```

      For each diagram include 80–200 words of prose: what the
      controller / pod does at task-start time, what the isolation
      boundary looks like, what the failure mode is when the
      boundary leaks (PID-namespace fight, cgroup drift, container-
      vs-sidecar surprise, missing key on rotation).
  - id: P3.T3.S4
    text: |-
      Draft §4 — What scale changes (300–600 words) + benchmark callouts


      Three scale axes that flip vendor rankings:

      1. **Number of concurrent agents.** Five concurrent Claude
         sessions on one workstation pod is fine — they share the
         same PV and tmux runs them all. Fifty is not. State the
         crossover: it is "one PV per human" up to maybe ten
         agents-per-human, then the dispatcher pattern
         (VibeKanban / Paperclip) becomes mandatory because you
         need to fan-out across pods.

      2. **Per-agent RAM floor.** A modern coding agent (Claude
         Code, opencode, hermes) holds 1–4 GB of working memory
         per active session; an idle session retains a smaller
         but non-zero floor due to file watchers, language
         servers, and embedded MCP servers. At ten concurrent
         agents this is a 30–60GB workstation; at fifty it is a
         dedicated GPU node. `VK_MAX_CONCURRENT_EXECUTIONS=4`
         does not bound the cgroup — only image-side resource
         reservations do (Frank's §5 scar).

      3. **Network egress per agent-hour.** A Claude session
         pulling tokens through the LLM gateway, plus a `gh`
         CLI pulling source, plus an npm install for the
         vk-relay sidecar, runs ~500MB-1GB per agent-hour on a
         busy day. At ten concurrent agents this is 10–20GB/h
         egress — well below a residential ISP cap, well above
         what hobbyist VPS plans bundle, and the price line
         where managed platforms start making sense.

      Cite ≥2 primary sources from the dossier (s6-overlay
      architecture + Coder.com or GitPod resource model). Do not
      editorialize past what the citations support.
  - id: P3.T3.S5
    text: |-
      Draft §5 — Frank's choice, and what happened (300–600 words) + scar callouts


      Frank's stack: **secure-agent-pod + VibeKanban + Paperclip +
      Sympozium**. Each layer was deployed in isolation; the
      orchestration emerged at the seams. Honest about the cost:
      every single scar listed below was discovered by stepping
      on it in production.

      Use 1–3 `{{< papers/scar >}}` callouts. Authoritative options
      from the gotcha registry:

      Scar 1 — vk-issue-bridge 30s MCP timeout zombies:
      ```
      {{< papers/scar date="2026-04-22" >}}
      vk-issue-bridge's MCP RPC has a 30-second timeout. When a
      long agent task overran it, the bridge crashed; the vk-local
      request handler's Future dropped; `Child::wait()` was
      cancelled; the setup/cleanup shell scripts ran to completion
      and exited, but the parent never reaped them. DB rows stuck
      `status='running'` forever; UI showed workspaces active with
      no output. The durable fix lives in `superpowers-for-vk`;
      the recovery is `kubectl exec -c vk-local -- kill -TERM 1`.
      {{< /papers/scar >}}
      ```

      Scar 2 — shareProcessNamespace fights s6 PID 1:
      ```
      {{< papers/scar date="2026-03-30" >}}
      We set `shareProcessNamespace: true` on a pod with
      s6-overlay v3 for cross-container debugging. s6's suexec
      must be PID 1; sharing the namespace fights that
      requirement. The pod failed to start in a non-obvious way.
      Replaced with a shared workspace volume +
      `kubectl exec -c <other>` for cross-container debugging.
      {{< /papers/scar >}}
      ```

      Scar 3 — vk-local 4Gi cgroup drift:
      ```
      {{< papers/scar date="2026-05-08" >}}
      vk-local was given `limits.memory: 4Gi` with
      `VK_MAX_CONCURRENT_EXECUTIONS=4`. Once the bridge started
      feeding 8+ cards, the cgroup blew past 4Gi — queued
      sessions retain memory, and new images drift the baseline.
      Concurrency limit doesn't bound the cgroup; only image-side
      resource reservation does. Keep at 8Gi until the bridge
      slot count is bound below the executor cap AND a soak
      under busy load proves the floor.
      {{< /papers/scar >}}
      ```

      Pick 2-3 scars from the above. Real dates only — pull from
      `agents/rules/frank-gotchas.md`.

      Include ≥1 evidence artefact: either a VK board screenshot
      or a snippet of `apps/secure-agent-pod/manifests/` inlined as
      a code block.
  - id: P3.T3.S6
    text: |-
      Draft §6 — When Frank's answer doesn't generalize (200–400 words) + decision tree


      Be explicit about the four leaves. Frank's answer is one
      leaf; the others are real:

      ```
      flowchart TD
          A["Solo dev, one agent?"] -- "Yes" --> L1["Laptop devcontainer / Codespaces"]
          A -- "No" --> B["Need policy + audit + RBAC?"]
          B -- "Yes, can pay" --> L2["Coder.com (managed)"]
          B -- "No, self-host" --> C["Fleet of agents on ticket-bridge?"]
          C -- "Yes" --> L3["secure-agent-pod + VibeKanban + Paperclip (Frank's pick)"]
          C -- "No, shared cloud IDE" --> L4["GitPod (self-host or managed)"]
      ```

      ≤4 visible leaves. The decision turns on two questions:
      *how many agents are running concurrently* (solo: laptop;
      fleet: pod-per-agent), and *who pays the orchestration
      tax* (a vendor, or your own ops time).
  - id: P3.T3.S7
    text: |-
      Draft §7 — Roadmap & where this space is going (200–400 words)


      Three trends worth naming:

      1. **MCP and the agent-control-plane are converging.** Model
         Context Protocol gives every agent a way to advertise
         tools to a controller, and every controller a way to
         dispatch work back. The bridge layer (vk-issue-bridge,
         Paperclip heartbeats) is starting to look like an MCP
         server in front of the workstation; in 18 months
         "orchestrator vs workstation" may be a single MCP
         deployment with two endpoints.

      2. **Per-PV pod is starting to lose to ephemeral firecracker
         microVMs.** Vercel Sandbox, Fly Machines, e2b — sub-second
         microVM boot makes "ephemeral workstation per task" cheap
         enough that the persistent-PV pattern only wins when
         state cost > spin-up cost. Frank's secure-agent-pod is on
         the wrong side of that trade for short tasks; on the
         right side for the long-running tmux+mosh sessions where
         state IS the point.

      3. **Agent-safety frameworks are real now.** Sandboxing, tool
         allowlists, network policies per agent — the controls
         that used to be ad-hoc are getting standardized. CNCF's
         work on the agent-safety SIG and the
         containers.dev `securityProfile` field are early signals.

      Optional roadmap citations. Cite the dossier where possible.
  - id: P3.T3.S8
    text: |-
      Verify draft word count is within budget (2400–4200 words for a capability paper)


      ```bash
      # Count words in the paper body (excluding frontmatter)
      awk '/^---/{n++; if(n==2) found=1; next} found' \
        blog/content/docs/papers/17-agentic-orchestration/index.md \
        | wc -w
      ```

      Expected: 2400–4200 words. If under, expand §3 (per-vendor
      architecture is the section with most room to grow). If
      over, trim §3 first — that's where capability papers
      reliably sprawl past budget.
