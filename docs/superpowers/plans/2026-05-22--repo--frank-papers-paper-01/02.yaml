tasks:
- number: 1
  title: Run validate-dossier.py and resolve failures
  steps:
  - id: P2.T1.S1
    text: |-
      Run the dossier gate validator


      ```bash
      python scripts/validate-dossier.py docs/papers-dossiers/01-heterogeneous-hardware/dossier.md
      ```

      Expected: `DOSSIER GATE PASSED: ...`

      If it fails, fix the reported issues:
      - `vendors_in_scope: need ≥3` → add more fleet shapes
      - `primary_sources: need ≥5` → add more sources
      - `primary_sources: need ≥3 distinct type values` → diversify source types
      - `URL not reachable` → find an alternative URL or use a Wayback snapshot
      - `frank_artefacts: need ≥3` → add more artefacts
      - `frank_artefacts: need ≥2 distinct kind values` → add a different kind
      - `named_gaps: need ≥1` → add a gap
      - `counter-arguments_considered: need ≥1` → add a counter-argument

      URL-recovery protocol: hard 90-second budget per dead URL.
      `curl -sIL` to confirm dead, search vendor's current canonical
      URL or a Wayback snapshot, swap citation for sibling source
      from same vendor/author if no working replacement found.

      Re-run until exit 0.
  - id: P2.T1.S2
    text: |-
      Human gate: author reviews named gaps and counter-arguments


      **This step requires human review.**

      The author (user) reads:
      1. `## Named gaps` — is the operator-overhead-per-node-class
         gap honest and specific? Does it point at a real hole
         in the literature rather than a vague disclaimer?
      2. `## Counter-arguments considered` — is the "homogenize-
         the-fleet" counter-argument addressed with the right
         framing (Frank is a learning platform — paying tuition
         on the heterogeneity scars is the point), AND is the
         "single beefy server + VMs" + "just buy AWS" third/
         fourth leaves treated as legitimate, not strawmen?

      When satisfied, update dossier status:
      ```yaml
      # In docs/papers-dossiers/01-heterogeneous-hardware/dossier.md frontmatter:
      status: ready
      ```
  - id: P2.T1.S3
    text: |-
      Commit the validated dossier


      Commit lands as part of the single-PR-six-commits cadence
      for Paper 01 — one commit per phase, all pushed to branch
      `paper-01`. No separate commit at this step.
