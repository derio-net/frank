        - name: Single beefy server + VMs
          features:
            identical_image: "yes"
            single_driver_matrix: "yes"
            per_node_class_cost: "no"
            arch_diversity: "no"
            gpu_diversity: "no"
            cloud_outsourced: "no"
            real_hardware_lessons: "no"
