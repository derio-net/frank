      liveness check is deferred to post-merge.

      Reference URL once live:
      `https://blog.derio.net/frank/docs/papers/01-heterogeneous-hardware/`
  - id: P6.T1.S2
    text: |-
      Verify cross-link chips render bidirectionally


      The `papers-backlink.html` partial auto-renders a
      "→ Paper 01" chip on Building 01-introduction and
      Operating 01-cluster-nodes via `related_building` /
      `related_operating` frontmatter. No edits needed —
      verify post-merge.

      Cross-series chip backlink verification is deferred to
      merge-time Hugo CI build (same posture as Papers 10, 04,
      11, 14, 09).
  - id: P6.T1.S3
    text: |-
      Update the Papers section `_index.md`


      Append Paper 01 to `blog/content/docs/papers/_index.md`
      in the publish-order list (if one exists) — Paper 01 is
      slot 17 in the decision-weight publish sequence:

      ```bash
      grep -n "Paper 02\|Paper 06\|Paper 07\|Paper 14\|Paper 09" blog/content/docs/papers/_index.md
      ```

      Add a list item for Paper 01 below the existing entries,
      matching the existing format. If `_index.md` uses
      `{{< papers-roadmap >}}` shortcode (auto-built from
      frontmatter), mark this step skipped with reason "auto-
      built from frontmatter — no manual list to update".
  - id: P6.T1.S4
    text: |-
      Update Building/Operating series overviews (optional)


      Building 01-introduction and Operating 01-cluster-nodes
      exist; the cross-series chip auto-renders from Paper 01
      frontmatter. No manual edit required to the post bodies
      themselves. If the series overview has a "Further reading"
      section listing Papers by capability, append Paper 01
      there.

      If no such section exists, mark this step skipped with
      reason "no series-overview Further-reading section to
      update".
  - id: P6.T1.S5
    text: |-
      Write building/operating blog posts (skip for Papers)


      Papers are not new layer deployments — they review existing
      capabilities. The Building 01-introduction and Operating
      01-cluster-nodes posts already exist (that's what
      `related_building` and `related_operating` point at). No
      new posts.

      *Skip — Papers reference existing Building/Operating
      posts via frontmatter; the cross-link chips do the work.*
  - id: P6.T1.S6
    text: |-
      Update README


      Run `/update-readme` or check manually. The Papers series
      is already referenced in README (from Paper 00's post-
      deploy); verify Paper 01 doesn't need a stack-list
      addition. README is a stack snapshot, not a publish log
      — most likely no row change is needed.

      If no diff is produced, mark this step skipped with reason
      "README is a stack snapshot — no Paper 01-specific row
      needed".
  - id: P6.T1.S7
    text: |-
      Sync runbook


      This plan contains no `# manual-operation` blocks — skip
      `/sync-runbook`.

      Confirm with:
      ```bash
      grep -c "# manual-operation" docs/superpowers/plans/2026-05-22--repo--frank-papers-paper-01/*.yaml \
        | grep -v ":0$" || echo "no manual-operation blocks"
      ```
  - id: P6.T1.S8
    text: |-
      Update plan status and log publish date


      Edit `docs/superpowers/plans/2026-05-22--repo--frank-papers-paper-01/_prose.md`:

      ```
      **Status:** Complete (YYYY-MM-DD) — Paper 01 draft published; PR open for human review.
      ```

      Update the spec's Implementation Plans table row for Paper
      01 (`docs/superpowers/specs/2026-04-15--repo--frank-papers-series-design.md`).
