      edits needed — verify the chips appear:

      ```bash
      curl -s https://blog.derio.net/frank/docs/building/05-gitops/ \
        | grep -i "paper 06\|gitops at small scale"
      curl -s https://blog.derio.net/frank/docs/operating/03-gitops/ \
        | grep -i "paper 06\|gitops at small scale"
      ```

      Expected: a "→ The decision-level view: Paper 06 — GitOps
      at Small Scale" chip is present on both pages.

      Also verify the forward-link chip ("→ Hands-on: Building
      05 / Operating 03") renders on the Paper 06 page itself.
  - id: P6.T1.S3
    text: |-
      Update the Papers section `_index.md` to link Paper 06


      ```bash
      grep -n "Paper 06\|gitops-at-small-scale" blog/content/docs/papers/_index.md
      ```

      Append a paragraph (or extend an existing one) pointing at
      the new Paper, following the pattern used by Papers 00,
      10, 04, 11, 14.
  - id: P6.T1.S4
    text: |-
      Update Building/Operating series overviews (optional)


      In `blog/content/docs/building/00-overview/index.md` (Series
      Index): the Paper 06 backlink chip auto-renders on the
      Building 05-gitops post, so no manual edit is required to
      the gitops post itself. If the series overview has a
      "Further reading" section listing Papers by capability, add
      Paper 06 there.

      Same check for `blog/content/docs/operating/00-overview/`
      (if present).
  - id: P6.T1.S5
    text: |-
      Write building/operating blog posts (skip for Papers)


      Papers are not new layer deployments — they review existing
      capabilities. The Building 05-gitops and Operating 03-gitops
      posts already exist (that's what `related_building` and
      `related_operating` point at). No new posts.

      *Skip — Papers reference existing Building/Operating posts
      via frontmatter; the cross-link chips do the work.*
  - id: P6.T1.S6
    text: |-
      Update README


      Run `/update-readme` to sync README.md. The Papers series
      is already referenced in README (from Paper 00's
      post-deploy); verify Paper 06 doesn't need a stack-list
      addition. README is a stack snapshot, not a publish log —
      most likely no row change is needed.

      If `/update-readme` produces no diff, mark this step
      skipped with reason "README is a stack snapshot — no
      Paper 06-specific row needed".
  - id: P6.T1.S7
    text: |-
      Sync runbook


      This plan contains no `# manual-operation` blocks — skip
      `/sync-runbook`.

      Confirm with:
      ```bash
      grep -c "# manual-operation" docs/superpowers/plans/2026-05-19--repo--frank-papers-paper-06/*.yaml \
        | grep -v ":0$" || echo "no manual-operation blocks"
      ```
  - id: P6.T1.S8
    text: |-
      Update plan status and log publish date


      Edit `docs/superpowers/plans/2026-05-19--repo--frank-papers-paper-06/_meta.yaml`:

      ```yaml
      status: Complete
      completed: 'YYYY-MM-DD'
      ```

      And update the `_prose.md` Status line:

      ```
      **Status:** Complete (YYYY-MM-DD) — Paper 06 published; series Phase 1 continues.
      ```

      Update the spec's Implementation Plans table row for
      Paper 06 to mark Complete + published.
