tasks:
- number: 1
  title: Replace the I22X-LAN patch template with the USB adapter template
  steps:
  - id: P1.T1.S1
    text: |
      Replace `patches/phase04-gpu/404-gpu1-i22x-lan.template.yaml` with `patches/phase04-gpu/404-gpu1-usb-25g-nic.template.yaml` as a non-applied Omni ConfigPatch template targeting gpu-1's machine UUID. It must bind `192.168.55.31/24` by `deviceSelector.hardwareAddr`, keep DHCP disabled, and document that `<USB_25G_MAC_ADDRESS>` must be replaced only after live discovery.
  - id: P1.T1.S2
    text: |
      Update `patches/phase04-gpu/README.md` so operators can find the USB 2.5G adapter template next to the existing `403` ASPM mitigation.
- number: 2
  title: Update gpu-1 operating docs
  steps:
  - id: P1.T2.S1
    text: |
      Update `docs/runbooks/frank-gotchas/gpu-1.md` to make the escalation state explicit: `pcie_aspm=off` suppresses the onboard Realtek flap, the PCIe I22X attempt did not fix it, and the next durable repair is moving `192.168.55.31` to a USB 2.5G adapter by MAC while leaving the Realtek port unplugged.
  - id: P1.T2.S2
    text: |
      Update `agents/rules/frank-gotchas.md` with the hot one-liner so future agents wait for and configure the USB 2.5G adapter rather than continuing the failed I22X path.
- number: 3
  title: Validate repo-prep changes
  steps:
  - id: P1.T3.S1
    text: |
      Run `scripts/validate-agent-config.sh` and `scripts/validate-plans.sh docs/superpowers/plans/2026-07-09--gpu--gpu-1-usb-25g-nic`. Fix any schema/path issues before completing the phase.
