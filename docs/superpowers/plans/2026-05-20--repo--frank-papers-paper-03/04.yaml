tasks:
- number: 1
  title: Generate per-paper cover image
  steps:
  - id: P4.T1.S1
    text: |-
      Add Paper 03 cover prompt to `blog/prompt_for_images.yaml`

      Add a new entry under the `# --- Papers Series Covers ---`
      section, after the most recent paper entry:

      ```yaml
        - key: paper-03-cover
          output: blog/content/docs/papers/03-ebpf-networking/cover.png
          description: Paper 03 cover — Frank tracing a glowing network packet through a row of eBPF hooks
          prompt: >-
            Frank the server-hardware Frankenstein monster traces a
            single glowing blue network packet with one green-skinned
            finger as it travels through a row of labelled eBPF kernel
            hooks (XDP, tc, socket) — no service-mesh sidecars in the
            picture. The hooks glow faintly from inside; the packet's
            trail is continuous and obviously kernel-level. His
            expression is focused and approving — this is one of the
            layers where the abstraction does its job. He wears thin
            small round reading glasses resting low on his face and a
            thin black necktie over a white button-down dress shirt.
            Warm overhead lamp light. Deep navy studio-style
            background. RJ45 neck bolts, green skin, messy black hair,
            rack-mount torso. The hook labels (XDP, tc, socket) and
            small kernel-stack labels are the ONLY text in the image —
            no captions or watermarks. ONE FIGURE — one single Frank.
            The framing communicates "kernel-level networking" rather
            than "service-mesh tax".
      ```
  - id: P4.T1.S2
    text: |-
      Generate the cover image

      ```bash
      set -a && source .env_common && set +a
      uv sync
      .venv/bin/python scripts/generate-all-images.py \
        -r blog/static/images/reference.png \
        --only paper-03-cover
      ```

      Expected: `blog/content/docs/papers/03-ebpf-networking/cover.png`
      created, ≥50KB.

      If generation fails for any reason (Gemini API timeout, quota,
      etc.), fall back: `cp blog/static/images/reference.png
      blog/content/docs/papers/03-ebpf-networking/cover.png` and
      tick step `--state - --note "Gemini fallback used; regen
      post-merge."`

      Spot-check: Frank should have thin round reading glasses, thin
      black tie, focused expression, and the packet-through-kernel-hooks
      metaphor should be recognisable. Up to 3 regeneration attempts
      if the visual signature is missing.
- number: 2
  title: Render Mermaid diagrams and verify they parse
  steps:
  - id: P4.T2.S1
    text: |-
      Review draft for `TODO:<type>` diagram placeholders

      ```bash
      grep -n "TODO:" blog/content/docs/papers/03-ebpf-networking/index.md
      ```

      Expected: no `TODO:` lines remaining after Phase 3 draft work
      (TL;DR remains pending — that is by design and lives outside
      the Mermaid scope).
  - id: P4.T2.S2
    text: |-
      Verify Mermaid diagrams parse without errors in Hugo dev server

      ```bash
      cd blog && PATH=/usr/local/Cellar/go/1.26.2/bin:$PATH hugo --minify --buildDrafts 2>&1 | grep -E "^ERROR|^WARN" | head -10
      ls -lh public/docs/papers/03-ebpf-networking/index.html
      ```

      Expected: zero ERROR lines; `index.html` exists and is ≥10 KB.
- number: 3
  title: Capture Hubble UI / Cilium screenshot
  steps:
  - id: P4.T3.S1
    text: |-
      Capture a Hubble UI screenshot showing real flow observability

      Source: Hubble UI at `http://192.168.55.202` showing a flow
      graph for a representative namespace (cilium, kube-system, or
      litellm).

      Procedure:
      ```bash
      # From a machine with cluster access:
      # 1. Open Hubble UI at http://192.168.55.202
      # 2. Select a namespace; capture the flow graph + recent flows
      # OR
      # 3. kubectl exec -n kube-system ds/cilium -- cilium-dbg status
      #    and screenshot the output
      ```

      Save to:
      ```
      blog/content/docs/papers/03-ebpf-networking/hubble-ui.png
      ```

      If cluster access is unavailable, copy the 1×1 placeholder
      and rename with `-TODO.png` suffix:
      ```bash
      cp blog/content/docs/papers/11-identity-heterogeneous-stack/authentik-applications-TODO.png \
         blog/content/docs/papers/03-ebpf-networking/hubble-ui-TODO.png
      ```
      Tick the step `--state - --note "Cluster access unavailable
      from worktree."`
- number: 4
  title: Full Hugo build smoke-test
  steps:
  - id: P4.T4.S1
    text: |-
      Run the production Hugo build to assert zero errors

      ```bash
      cd blog && PATH=/usr/local/Cellar/go/1.26.2/bin:$PATH hugo --minify --buildDrafts 2>&1 | grep -E "^ERROR|^WARN" | head -10
      ls -lh public/docs/papers/03-ebpf-networking/index.html
      ```

      Expected: zero ERROR lines; `index.html` exists and is ≥10 KB.
