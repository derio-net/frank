- number: 1
  title: Sync + restarts
  steps:
  - id: P3.T1.S1
    text: |-
      After PR merge: confirm ArgoCD synced `blackbox-exporter` and `grafana-alerting` apps ‚ÄĒ `kubectl get application -n argocd blackbox-exporter grafana-alerting -o wide`.
  - id: P3.T1.S2
    text: |-
      `kubectl rollout restart deployment/blackbox-exporter -n monitoring` (config is loaded at startup only; no reloader sidecar). Wait Ready.
  - id: P3.T1.S3
    text: |-
      Restart the Grafana pod (provisioning files are read at boot; subPath mounts never live-update). Wait Ready.
- number: 2
  title: Pipeline verification
  steps:
  - id: P3.T2.S1
    text: |-
      Verify metric in VictoriaMetrics: `probe_ssl_earliest_cert_expiry{canary="true"}` ‚Čą 1.428883199e9 and `probe_success{canary="true"}` == 1.
  - id: P3.T2.S2
    text: |-
      Verify provisioning via Grafana API: notification policy shows the two new first-position routes + `perma-mute` interval; rule `tls-cert-canary-absent` present with `health=ok`. Once the canary instances exist, also confirm via `/api/alertmanager/grafana/api/v2/alerts` that they are matched by the mute route (suppressed/muted state), not merely that the routes exist ‚ÄĒ the canary instances carry `grafana_folder="feature-health"`, so a route-match failure would double-route them to health-bridge (review finding).
  - id: P3.T2.S3
    text: |-
      Watch the canary instances of `tls-cert-expiring-14d` / `tls-cert-expiring-7d` reach `Pending` (‚Č§ ~1h) then `Firing` (‚Č§ ~2.5h) via `/api/prometheus/grafana/api/v1/rules`.
  - id: P3.T2.S4
    text: |-
      Confirm silence: no Telegram message for the canary instances; no new health-bridge comment on `frank-ops#8`; no new bug issue in `frank-ops`.
  - id: P3.T2.S5
    text: |-
      Watchdog negative check: `tls-cert-canary-absent` evaluates `Normal` (absent() returns empty while the metric flows). Optional ‚Č•3h destructive fire-test deferred per spec Test Plan step 9.
