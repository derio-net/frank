tasks:
- number: 1
  title: Generate per-paper cover image
  steps:
  - id: P4.T1.S1
    text: |-
      Add Paper 20 cover prompt to `blog/prompt_for_images.yaml`


      Read the top-of-file comment block first — it specifies the
      schema for each entry (key, series, torso_variant, mood,
      references, output, description, prompt). Add a new entry
      under the `# --- Papers Series Covers ---` section, after the
      most recent paper entry (mirror the shape of `paper-17-cover`
      and `paper-09-cover`):

      ```yaml
        - key: paper-20-cover
          torso_variant: 1
          mood: thoughtful
          references:
            - .reference-pool/papers/subjects/frank-white-shirt-black-tie-1.png
          output: blog/content/docs/papers/20-edge-clusters-public-exposure/cover.png
          description: Paper 20 cover — Frank at a coastline weighing tunnel vs ferry to a remote outpost
          prompt: >-
            Frank the server-hardware Frankenstein monster stands on a
            rocky coastline at twilight, looking across a narrow channel
            of water toward a small remote outpost on the far shore —
            the outpost rendered as a single-rack server hut with a
            warm lit window. A tall lighthouse rises behind him on his
            side of the channel, its rotating beacon casting a pale
            sweep across the water. In one green-skinned hand he holds
            a small folded blueprint showing two route options sketched
            in pencil — a thin dotted line labelled "tunnel" curving
            underneath the channel and a solid line labelled "ferry"
            crossing on top of the water. His expression is thoughtful
            and weighing, the kind of person deciding whether to bridge
            a real channel by infrastructure he controls or by someone
            else's tunnel. He wears thin small round reading glasses
            resting low on his face and a thin black necktie over a
            white button-down dress shirt. Cool overcast twilight light
            with a warm pinpoint of lamp-light from the distant
            outpost. RJ45 neck bolts, green skin, messy black hair,
            rack-mount torso. NO text in the image other than the small
            pencil labels "tunnel" and "ferry" on the blueprint — no
            extra captions or watermarks. ONE FIGURE — one single
            Frank. The framing communicates "deciding how to cross
            the public/private boundary" rather than "the answer is
            obvious".
      ```

      Choose a `torso_variant` and `mood` consistent with the
      previously-published Papers; `mood: thoughtful` matches the
      decision-weighing tone.
  - id: P4.T1.S2
    text: |-
      Generate the cover image


      ```bash
      set -a && source .env_common && set +a
      uv sync
      .venv/bin/python scripts/generate-all-images.py \
        -r blog/static/images/reference.png \
        --only paper-20-cover
      ```

      Expected: `blog/content/docs/papers/20-edge-clusters-public-exposure/cover.png`
      created, ≥50KB.

      If generation fails for any reason (Gemini API timeout, quota,
      etc.), fall back: `cp blog/static/images/reference.png
      blog/content/docs/papers/20-edge-clusters-public-exposure/cover.png`
      and tick step `--state - --note "Gemini fallback used; regen
      post-merge."`

      Spot-check: Frank should have thin round reading glasses, thin
      black tie, thoughtful expression, and the coastline / lighthouse
      / remote outpost metaphor should be recognisable. The two
      pencil labels "tunnel" and "ferry" on the blueprint are the
      only acceptable text. Up to 3 regeneration attempts if the
      visual signature is missing.
- number: 2
  title: Render Mermaid diagrams and verify they parse
  steps:
  - id: P4.T2.S1
    text: |-
      Review draft for `TODO:<type>` diagram placeholders


      ```bash
      grep -n "TODO:" blog/content/docs/papers/20-edge-clusters-public-exposure/index.md
      ```

      Expected: no `TODO:` lines remaining after Phase 3 draft work
      (TL;DR remains pending — that is by design and lives outside
      the Mermaid scope).
  - id: P4.T2.S2
    text: |-
      Verify Mermaid diagrams parse without errors in Hugo dev server


      ```bash
      cd blog && PATH=/usr/local/Cellar/go/1.26.2/bin:$PATH hugo --minify --buildDrafts 2>&1 | grep -E "^ERROR|^WARN" | head -10
      ls -lh public/docs/papers/20-edge-clusters-public-exposure/index.html
      ```

      Expected: zero ERROR lines; `index.html` exists and is ≥10 KB.
- number: 3
  title: Capture Caddy / Headscale live screenshot from Hop
  steps:
  - id: P4.T3.S1
    text: |-
      Capture a Caddy access log or Headscale netmap screenshot showing real Hop state


      Source options (pick one — Hop access is required):
      ```bash
      # Option A — Caddy access log showing a real TLS-terminated request
      # REQUIRED: Hop cluster context — never source .env (which targets Frank) before this.
      source .env_hop
      kubectl -n caddy-system logs deploy/caddy --tail=20
      # screenshot the terminal output, including the TLS handshake
      # and the upstream route (e.g., blog.derio.net/frank or
      # headscale.hop.derio.net)

      # Option B — Headscale netmap (mesh roster)
      kubectl -n headscale-system exec deploy/headscale -- headscale nodes list
      # screenshot the terminal output; mask any IPs / usernames that
      # are sensitive (the public Headscale endpoint IS public, but
      # mesh-only node names may be)

      # Option C — talosctl health on Hop
      export TALOSCONFIG=$(pwd)/clusters/hop/talosconfig/talosconfig
      talosctl -n $HOP_IP health
      # screenshot the etcd / apid / kubelet healthy output
      ```

      Save to:
      ```
      blog/content/docs/papers/20-edge-clusters-public-exposure/hop-evidence.png
      ```

      If Hop access is unavailable, copy the 1×1 placeholder and
      rename with `-TODO.png` suffix:
      ```bash
      cp blog/content/docs/papers/11-identity-heterogeneous-stack/authentik-applications-TODO.png \
         blog/content/docs/papers/20-edge-clusters-public-exposure/hop-evidence-TODO.png
      ```
      Tick the step `--state - --note "Hop access unavailable from
      worktree."`

      Mask any identifying tokens before sharing per the
      "masking identifiers in shared material" convention — never
      publish Headscale preauth keys, private mesh IPs, or
      personal SSH usernames.
- number: 4
  title: Full Hugo build smoke-test
  steps:
  - id: P4.T4.S1
    text: |-
      Run the production Hugo build to assert zero errors


      ```bash
      cd blog && PATH=/usr/local/Cellar/go/1.26.2/bin:$PATH hugo --minify --buildDrafts 2>&1 | grep -E "^ERROR|^WARN" | head -10
      ls -lh public/docs/papers/20-edge-clusters-public-exposure/index.html
      ```

      Expected: zero ERROR lines; `index.html` exists and is ≥10 KB.
