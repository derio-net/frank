schema_version: 2
phase:
  number: 5
  title: Review + publish
  tag: manual
  depends_on:
  - 4
  tracking_issue: null
tasks:
- number: 1
  title: Voice pass and TL;DR
  steps:
  - id: P5.T1.S1
    text: |-
      **Human gate: author voice pass**


      Read the full draft. Check:
      - Frank speaks as the cluster — first-person plural ("we
        learned") or third-person cluster ("Frank chose Headscale
        + a tiny VPS, and the single-node cluster wedged the
        first time Caddy rolled") are both fine; distant academic
        voice is not.
      - Every scar callout uses a real incident with a real date.
        Cross-reference dates against `agents/rules/hop-gotchas.md`
        and the comment blocks in `clusters/hop/apps/caddy/manifests/`
        and `clusters/hop/apps/headscale/manifests/`.
      - The counter-argument ("Cloudflare Tunnel is free, zero
        infra, free TLS — why a €5/mo VPS?") is addressed directly
        in §5 or §6 — not hedged away. The §6 decision tree must
        have a Cloudflare Tunnel leaf as a real winner for its
        case, not as a strawman.
      - §3 per-vendor architectures use shared visual language
        (same shapes, same edge types) — that's load-bearing for
        cross-vendor comparison.
      - §6 decision tree has ≤4 leaves.
      - Threat-model honesty about TLS termination: §3 and §5
        both name *who* terminates TLS (Cloudflare, Tailscale,
        Frank itself) and the prose acknowledges this as a real
        property worth pricing in, not a punchline.
  - id: P5.T1.S2
    text: |-
      Write the TL;DR (≤150 words)


      Write last, after the body has stabilized. Aim for three
      short paragraphs:
      1. The capability question and the five-vendor landscape
         (one sentence)
      2. Frank's answer (Headscale + Caddy on a Hetzner CX23
         single-node Talos cluster called Hop) and the scars
         (hostPort + RollingUpdate deadlock, Headplane v0.5
         ConfigMap, Tailscale kernel-mode) (one sentence)
      3. When Frank's answer doesn't generalize — the decision
         tree in 1–2 sentences (Cloudflare Tunnel is the right
         answer for 1–2 stateless services; Frank's answer wins
         when you want full data-plane ownership)

      Count words:
      ```bash
      awk '/^tldr:/,/^[a-z]/' \
        blog/content/docs/papers/20-edge-clusters-public-exposure/index.md \
        | grep -v "^tldr:\|^[a-z]" | wc -w
      ```

      Expected: ≤150 words. Update the `tldr:` field in the
      frontmatter AND any TL;DR section body that mirrors it.
- number: 2
  title: Final checks and publish
  steps:
  - id: P5.T2.S1
    text: |-
      Run dossier gate one final time


      ```bash
      python scripts/validate-dossier.py docs/papers-dossiers/20-edge-clusters-public-exposure/dossier.md
      ```

      Expected: `DOSSIER GATE PASSED`.
  - id: P5.T2.S2
    text: |-
      Run full Hugo build and assert zero errors


      ```bash
      cd blog && PATH=/usr/local/Cellar/go/1.26.2/bin:$PATH hugo --buildDrafts 2>&1 | grep -E "^ERROR" | head -5
      ```

      Expected: no output (zero errors).
  - id: P5.T2.S3
    text: |-
      Set `draft: false` and `status: published`, run production build


      In `blog/content/docs/papers/20-edge-clusters-public-exposure/index.md`:
      - Change `draft: true` → `draft: false`
      - Change `status: drafting` → `status: published`

      Verify the paper appears in the production build (without `--buildDrafts`):

      ```bash
      cd blog && PATH=/usr/local/Cellar/go/1.26.2/bin:$PATH hugo --minify 2>&1 | tail -3
      ls public/docs/papers/20-edge-clusters-public-exposure/index.html
      ```

      Expected: `public/docs/papers/20-edge-clusters-public-exposure/index.html`
      exists.
  - id: P5.T2.S4
    text: |-
      Verify the dossier-link shortcode renders exactly once


      single.html auto-injects the dossier-link chip in the footer.
      If §5 or §7 also uses `{{< papers/dossier-link paper="..." >}}`
      inline, the chip renders twice. Choose one or the other:

      ```bash
      grep -n "papers/dossier-link" blog/content/docs/papers/20-edge-clusters-public-exposure/index.md
      ```

      Expected: zero matches (rely on automatic injection) OR
      exactly one match (inline use, accepting that the footer
      auto-injection also runs — verify the rendered HTML has
      only one chip).
  - id: P5.T2.S5
    text: |-
      Commit and push Paper 20


      The publish commit lands as part of the single-PR-six-commits
      cadence — one commit per phase, all pushed to branch
      `paper-20`. The PR stays open at the end for human review.

      ```bash
      git add \
        blog/content/docs/papers/20-edge-clusters-public-exposure/ \
        docs/papers-dossiers/20-edge-clusters-public-exposure/ \
        blog/prompt_for_images.yaml

      git commit -m "feat(papers): Paper 20 — Phase 5: Review + publish"
      git push
      ```
