tasks:
- number: 1
  title: Run validate-dossier.py and resolve failures
  steps:
  - id: P2.T1.S1
    text: |-
      Run the dossier gate validator


      ```bash
      python scripts/validate-dossier.py docs/papers-dossiers/20-edge-clusters-public-exposure/dossier.md
      ```

      Expected: `DOSSIER GATE PASSED: ...`

      If it fails, fix the reported issues:
      - `vendors_in_scope: need ≥3` → add more vendors to the dossier
      - `primary_sources: need ≥5` → add more sources
      - `primary_sources: need ≥3 distinct type values` → diversify source types
      - `URL not reachable` → find an alternative URL or use a web archive link
      - `frank_artefacts: need ≥3` → add more artefacts
      - `frank_artefacts: need ≥2 distinct kind values` → add a different kind
      - `named_gaps: need ≥1` → add a gap
      - `counter-arguments_considered: need ≥1` → add a counter-argument

      URL-recovery protocol: hard 90-second budget per dead URL.
      `curl -sIL` to confirm dead, search vendor's current canonical
      URL or a Wayback snapshot, swap citation for sibling source
      from same vendor/author if no working replacement found.

      Re-run until exit 0.
  - id: P2.T1.S2
    text: |-
      Human gate: author reviews named gaps and counter-arguments


      **This step requires human review.**

      The author (user) reads:
      1. `## Named gaps` — is the "no homelab-scale edge benchmark"
         gap honest and specific? Does it point at a real hole in
         the literature (1 origin / 1 edge / 10 destinations, with
         TLS-termination location priced in) rather than a vague
         "vendors don't compare apples-to-apples" disclaimer?
      2. `## Counter-arguments considered` — is the "Cloudflare
         Tunnel is free, zero infra, free TLS — why a €5/mo VPS?"
         counter-argument addressed with the right framing (data-
         plane ownership, the mesh-control-plane chicken-and-egg,
         and what running an edge cluster teaches that a SaaS UI
         never can)?

      When satisfied, update dossier status:
      ```yaml
      # In docs/papers-dossiers/20-edge-clusters-public-exposure/dossier.md frontmatter:
      status: ready
      ```
  - id: P2.T1.S3
    text: |-
      Commit the validated dossier


      Commit will land with the rest of Phase 1 / Phase 2 work as
      part of the single-PR-six-commits cadence for Paper 20. No
      separate commit at this step.
