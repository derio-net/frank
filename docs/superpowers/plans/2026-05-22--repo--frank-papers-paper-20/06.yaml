      Update README


      Run `/update-readme` or check manually. The Papers series is
      already referenced in README (from Paper 00's post-deploy);
      verify Paper 20 doesn't need a stack-list addition. README is
      a stack snapshot, not a publish log — most likely no row
      change is needed (the Hop edge layer already appears).

      If no diff is produced, mark this step skipped with reason
      "README is a stack snapshot — no Paper 20-specific row needed".
  - id: P6.T1.S7
