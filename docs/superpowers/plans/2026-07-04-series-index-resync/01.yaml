      GREEN part 2 — vendor + regen: copy blog-craft@a7f2f7f tools/gen-layer-palette.py verbatim to blog/scripts/gen-layer-palette.py (registry-driven). Regenerate: `python blog/scripts/gen-layer-palette.py --config .blog-craft.yaml > blog/data/layer_palette.yaml`. Run pytest — parity (T1), consistency, and generator-identity all PASS. Confirm the diff of layer_palette.yaml vs the golden is ONLY additive `name:` fields + the removal of the 2 alias lines (inference/docs); 21 core colours unchanged.
