      RED: add a no-orphan-layer-key test — every `key:` in blog/data/roadmap.yaml and every `layer:` in blog/content/docs/**/index.md resolves to a code present in blog/data/layer_palette.yaml. Run pytest — FAILS on roadmap.yaml key:inference (line 129) and key:docs (line 302), which the alias-free regenerated palette no longer contains.
