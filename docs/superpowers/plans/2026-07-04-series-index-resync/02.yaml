  title: 'Update the #605 test to the standardized shape + full verification'
  steps:
  - id: P2.T3.S1
    text: |
      Update scripts/tests/test_series_index_adoption.py (#605) to the new shape: assert cards read the layer NAME from the palette data (.name), the seriesIndex.style param, and the card markup emitted by blog-craft's standardized shortcode (adjust the _CARD regex / assertions as needed). Run pytest scripts/tests/ — all green.
