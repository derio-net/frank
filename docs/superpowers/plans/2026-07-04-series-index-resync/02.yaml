  steps:
  - id: P2.T4.S1
    text: |
      Document frank's curated-update contract: add a short note (one-liner in agents/rules/frank-gotchas.md pointing at a per-topic body, OR a section in the blog runbook) listing the paths frank OWNS despite blog-craft classifying them framework/merged — papers-roadmap.html (frank-customized), .github/workflows/blog-ci.yml (frank has own CI), blog/README.md (none) — plus the DEFERRED harmless framework adds (.gitignore, .hookify.warn-hextra-weight-zero.md, static/images/.gitkeep), and the blog_craft_version: a7f2f7f pin. This makes the next update.py run predictable.
