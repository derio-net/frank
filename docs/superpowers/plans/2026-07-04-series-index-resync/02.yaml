      Verify zero visual change: `cd blog && hugo --minify` builds clean; build the rendered site before/after this branch and diff the building + operating section pages and the papers roster — assert the ONLY delta is the tag-layer font-weight 500→600. Any other delta (esp. from the roadmap.html replace) is a finding to resolve before proceeding.
