      ```
- number: 2
  title: Create `agents/skills/papers/SKILL.md` and update `AGENTS.md`
  steps:
  - id: P7.T2.S1
    text: |-
      Create `agents/skills/papers/SKILL.md`


      Mirrors `agents/skills/blog-post/SKILL.md` but scoped to Papers, enforcing
      the dossier gate and scaffold commands. Also registers it as a slash command.

      ```markdown
      # papers ‚ÄĒ Write a Frank Paper

      Use this skill when writing or continuing a Frank Paper. Enforces the
      dossier gate and correct section skeleton.

      ## When to use

      - Scaffolding a new paper (`scripts/scaffold-paper.sh`)
      - Filling a research dossier
      - Drafting paper sections
      - Generating per-paper cover image
      - Publishing (setting draft: false)

      ## Procedure

      1. **Check paper number and slug** ‚ÄĒ confirm they match the TOC in the spec
         (`docs/superpowers/specs/2026-04-15--repo--frank-papers-series-design.md`).

      2. **Scaffold if not yet created:**
         ```bash
         scripts/scaffold-paper.sh <NN> <slug>
         ```

      3. **Fill dossier** (`docs/papers-dossiers/NN-slug/dossier.md`):
         - ‚Č•3 vendors in scope
         - ‚Č•5 primary sources, ‚Č•3 distinct type values
         - All URLs reachable
         - ‚Č•3 Frank artefacts, ‚Č•2 distinct kind values
         - ‚Č•1 named gap
         - ‚Č•1 counter-argument

      4. **Gate:** `python scripts/validate-dossier.py docs/papers-dossiers/NN-slug/dossier.md`
         Must exit 0 before drafting begins.

      5. **Human gate:** Author reviews named gaps + counter-arguments.
         Mark dossier `status: ready` when satisfied.

      6. **Draft** ‚ÄĒ fill every `¬ß` section in `blog/content/docs/papers/NN-slug/index.md`.
         Section budgets:
         - TL;DR: ‚Č§150 words (write last)
         - ¬ß1: 200‚Äď350 words + 1 `flowchart LR`
         - ¬ß2: 400‚Äď600 words + `{{< papers/landscape >}}` + `{{< papers/capability-matrix >}}`
         - ¬ß3: 800‚Äď1400 words + 1 `flowchart TD` per vendor
         - ¬ß4: 300‚Äď600 words + charts or ‚Č•2 citations
         - ¬ß5: 300‚Äď600 words + ‚Č•1 `{{< papers/scar >}}`
         - ¬ß6: 200‚Äď400 words + `flowchart TD` ‚Č§4 leaves
         - ¬ß7: 200‚Äď400 words

      7. **Cover image** ‚ÄĒ add prompt to `blog/prompt_for_images.yaml` under
         `# --- Papers Series Covers ---`. Template:
         `"Frank examining [domain object] with a decision-maker expression
         (curious / skeptical / weighing), wearing his thin black tie and
         round reading glasses."`
         Generate: `scripts/generate-all-images.py --only <key>`

      8. **Review** ‚ÄĒ verify TL;DR ‚Č§150 words, voice pass, dossier-link renders.

      9. **Publish** ‚ÄĒ set `draft: false`, `status: published`.
         ```bash
         cd blog && hugo --minify
         git add blog/content/docs/papers/NN-slug/ docs/papers-dossiers/NN-slug/
         git commit -m "docs(repo): publish Paper NN ‚ÄĒ <title>"
         ```

      ## Rules

      - TL;DR is written last, after the body has stabilized.
      - Scar callouts (`{{< papers/scar >}}`) are used 1‚Äď3√ó per paper.
      - `{{< papers/dossier-link >}}` inline OR automatic injection ‚ÄĒ not both.
      - `related_building` and `related_operating` use paths relative to
        `blog/content/` (e.g., `docs/building/10-local-inference`).
      ```
