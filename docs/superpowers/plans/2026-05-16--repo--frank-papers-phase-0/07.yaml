- number: 1
  title: Create `agents/rules/repo-papers.md` and update `AGENTS.md`
  steps:
  - id: P7.T1.S1
    text: |-
      Create `agents/rules/repo-papers.md`


      This mirrors `agents/rules/repo-blog.md` but scoped to the Papers series,
      documenting the dossier gate, scaffold commands, frontmatter schema, and
      the single-source cross-linking design.

      ```markdown
      ## The Frank Papers ‚ÄĒ Series Rules

      Papers live at `blog/content/docs/papers/NN-slug/` (Hugo page bundles).
      Research dossiers live at `docs/papers-dossiers/NN-slug/dossier.md`.

      ### Paper lifecycle

      1. **Scaffold** ‚ÄĒ `scripts/scaffold-paper.sh <NN> <slug>`
         Creates the Hugo bundle skeleton and a dossier template.
      2. **Fill dossier** ‚ÄĒ edit `docs/papers-dossiers/NN-slug/dossier.md`
         until `scripts/validate-dossier.py` passes (‚Č•3 vendors, ‚Č•5 sources,
         ‚Č•3 artefacts, ‚Č•1 gap, ‚Č•1 counter-argument).
      3. **Author dossier** (human gate) ‚ÄĒ user reviews named gaps and
         counter-arguments; marks dossier `status: ready`.
      4. **Draft** ‚ÄĒ fill every `¬ß` section of the Hugo `index.md`.
      5. **Media** ‚ÄĒ Mermaid diagrams + cover image (use `/media` skill).
         Cover prompt: `"Frank examining [domain object] with a
         decision-maker expression, wearing his thin black tie and round
         reading glasses."` Add prompt to `blog/prompt_for_images.yaml`
         under `# --- Papers Series Covers ---` section; generate with
         `scripts/generate-all-images.py --only <key>`.
      6. **Review** ‚ÄĒ voice pass, TL;DR ‚Č§150 words, dossier-link renders.
      7. **Publish** ‚ÄĒ set `draft: false`, set `status: published`.

      ### Frontmatter schema

      Required fields: `title`, `date`, `draft`, `weight`, `series: papers`,
      `layer`, `paper_number`, `publish_order`, `status`, `tldr`, `tags`,
      `capabilities`, `related_building`, `related_operating`, `references`.

      ### Cross-linking (bidirectional, zero retrofit)

      The Paper's frontmatter is the single source of truth:
      - `related_building: "docs/building/10-local-inference"` ‚ÄĒ path
        relative to `blog/content/`
      - `related_operating: "docs/operating/07-inference"` ‚ÄĒ same

      `papers-backlink.html` renders a chip on Building/Operating posts at
      Hugo build time, querying pages with `series: papers`. No edits to
      existing posts needed.

      ### Dossier format

      Sections (YAML blocks under `##` headers):
      - `## Vendors in scope` ‚ÄĒ list with `name`, `positioning`, `primary_url`
      - `## Primary sources` ‚ÄĒ list with `title`, `type`, `url`, `quoted_passages`, `relevance`
      - `## Frank artefacts` ‚ÄĒ list with `kind`, `path_or_url`, `date`, `demonstrates`
      - `## Diagrams planned`
      - `## Named gaps`
      - `## Counter-arguments considered`

      Valid source `type` values: `vendor-docs`, `paper`, `postmortem`, `talk`,
      `benchmark`.
      Valid artefact `kind` values: `grafana-screenshot`, `asciinema`, `yaml`,
      `commit`, `incident`.

      ### Dossier vs. shortcode: avoid double-render

      `papers-forwardlinks.html` and a footer dossier chip are automatically
      injected by `single.html`. Do NOT also use `{{< papers/dossier-link >}}`
      inline in a Paper that relies on the automatic injection ‚ÄĒ it will render
      twice. Use the shortcode inline OR rely on automatic injection, not both.

      ### Diagram types by section

      | Section | Mermaid type |
      |---------|-------------|
      | ¬ß1 stack position | `flowchart LR` |
      | ¬ß2 vendor landscape | `quadrantChart` via `{{< papers/landscape >}}` |
      | ¬ß2 capability matrix | `{{< papers/capability-matrix >}}` |
      | ¬ß3 architecture comparison | `flowchart TD` per vendor |
      | ¬ß6 decision tree | `flowchart TD` ‚Č§4 leaves |

      ### Commands

      ```bash
      scripts/scaffold-paper.sh <NN> <slug>         # scaffold bundle + dossier
      python scripts/validate-dossier.py <dossier>  # gate check (exit 0 = pass)
      cd blog && hugo server --buildDrafts           # preview
      hugo --minify                                  # production build
      ```
      ```
