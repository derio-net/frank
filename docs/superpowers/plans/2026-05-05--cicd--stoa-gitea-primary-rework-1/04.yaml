schema_version: 2
phase:
  number: 4
  title: Wire per-repo CI to GitHub triggers + dual-status `finally`
  tag: agentic
  depends_on:
  - 2
  - 3
tasks:
- number: 1
  title: Rework `hum-ci` and `content-factory-ci` Pipelines
  steps:
  - id: P4.T1.S1
    text: |-
      Edit `apps/tekton/pipelines/hum-ci.yaml` — add dual-status `finally`


      Append a `finally` block to the Pipeline spec:

      ```yaml
      spec:
        # ... existing tasks ...
        finally:
          - name: github-status
            taskRef:
              name: github-status
            params:
              - name: repo
                value: agentic-stoa/hum
              - name: sha
                value: $(params.sha)   # propagated from trigger
              - name: state
                value: "$(tasks.status)"   # NOTE: 'Succeeded' / 'Failed' — but github-status param expects success/failure/etc; map via a helper task or expression
              - name: context
                value: tekton/ci
              - name: target_url
                value: "https://tekton.cluster.derio.net/#/namespaces/tekton-pipelines/pipelineruns/$(context.pipelineRun.name)"
              - name: description
                value: "hum-ci: $(tasks.status)"
          - name: gitea-status
            taskRef:
              name: gitea-status   # existing task
            params:
              - name: repo
                value: agentic-stoa/hum
              - name: sha
                value: $(params.sha)
              - name: state
                value: "$(tasks.status)"
              - name: context
                value: tekton/ci
              # gitea-status best-effort — if it fails, don't fail the pipeline
            onError: continue
      ```

      Note on `$(tasks.status)`: it returns `Succeeded`/`Failed`/`Completed` in Tekton 1.x. Need a small mapping step OR use Tekton's `whenExpressions` to drive multiple github-status invocations (one per state). The cleanest shape is a 2-line `param mapping` step. Capture this as a sub-decision when the manifest lands.
  - id: P4.T1.S2
    text: |-
      Same edit for `apps/tekton/pipelines/content-factory-ci.yaml`


      Mirror the `finally` block; substitute `agentic-stoa/content-factory` for the repo.
- number: 2
  title: Add `stoa-blog-ci` Pipeline (3rd repo)
  steps:
  - id: P4.T2.S1
    text: |-
      Create `apps/tekton/pipelines/stoa-blog-ci.yaml`


      Mirror `hum-ci.yaml`'s shape; substitute `agentic-stoa/stoa-blog` for the repo and adjust any repo-specific CI steps (TBD with operator — `stoa-blog` may have Hugo build steps similar to Frank's blog).
  - id: P4.T2.S2
    text: |-
      TriggerTemplate for stoa-blog


      Add to `apps/tekton/triggers/triggertemplate.yaml`:

      ```yaml
      ---
      apiVersion: triggers.tekton.dev/v1beta1
      kind: TriggerTemplate
      metadata:
        name: stoa-blog-ci-template
        namespace: tekton-pipelines
      spec:
        params:
          - name: sha
        resourcetemplates:
          - apiVersion: tekton.dev/v1
            kind: PipelineRun
            metadata:
              generateName: stoa-blog-ci-
            spec:
              pipelineRef:
                name: stoa-blog-ci
              params:
                - name: sha
                  value: $(tt.params.sha)
              # ... workspaces ...
      ```
- number: 3
  title: Add per-repo CI Triggers to `github-listener`
  steps:
  - id: P4.T3.S1
    text: |-
      Add `agentic-stoa-hum-github-ci` Trigger to `eventlistener-github.yaml`


      Edit `apps/tekton/triggers/eventlistener-github.yaml` — populate `spec.triggers`:

      ```yaml
      spec:
        triggers:
          - name: agentic-stoa-hum-github-pr
            interceptors:
              - ref:
                  name: "github"
                  kind: ClusterInterceptor
                params:
                  - name: "secretRef"
                    value:
                      secretName: stoa-github-webhook-secret
                      secretKey: secret
                  - name: "eventTypes"
                    value: ["pull_request"]
              - name: "cel"
                ref:
                  name: "cel"
                params:
                  - name: "filter"
                    value: "body.repository.full_name == 'agentic-stoa/hum' && body.action in ['opened', 'synchronize', 'reopened']"
                  - name: "overlays"
                    value:
                      - key: sha
                        expression: "body.pull_request.head.sha"
                      - key: pr_number
                        expression: "body.pull_request.number"
            bindings:
              - ref: github-pr-binding   # new TriggerBinding to add
            template:
              ref: hum-ci-template   # reuse parent plan's template; adjust to take sha+pr_number params
      ```

      The pull-sync needs to fire BEFORE the per-repo CI. Two ways: (a) a separate Trigger that calls github-pull-sync first then the per-repo CI runs because the new Gitea push fires gitea-listener (chained); (b) a single Pipeline that wraps pull-sync + per-repo CI as one PipelineRun. Option (b) is cleaner — collapse into one Pipeline, e.g. `agentic-stoa-pr-ci` that calls pull-sync + per-repo CI body in sequence.
  - id: P4.T3.S2
    text: |-
      Same Trigger for content-factory + stoa-blog


      Mirror the trigger spec; substitute repo names. CEL filter: `body.repository.full_name == 'agentic-stoa/content-factory'` etc.
- number: 4
  title: Remove the old per-repo CI Triggers from `gitea-listener`
  steps:
  - id: P4.T4.S1
    text: |-
      Delete `agentic-stoa-hum-ci` and `agentic-stoa-content-factory-ci` Triggers from `apps/tekton/triggers/eventlistener.yaml`


      Find and delete the two Trigger blocks under `gitea-listener`'s `spec.triggers`. Keep the `gitea-push` and any non-stoa Triggers in place (gitea-listener still serves Frank's own Gitea-CI flow).
- number: 5
  title: Commit + sync; verify pipelines + triggers wired correctly
  steps:
  - id: P4.T5.S1
    text: |-
      Commit + push


      ```bash
      git add apps/tekton/
      git commit -m 'feat(cicd): wire per-repo CI to github-listener; add stoa-blog-ci; dual-status finally (rework Phase 4)'
      git push
      ```
  - id: P4.T5.S2
    text: |-
      Verify wiring


      ```bash
      kubectl get pipeline -n tekton-pipelines | grep -E 'hum-ci|content-factory-ci|stoa-blog-ci|github-pull-sync'
      # Expect: 4 pipelines

      kubectl get el -n tekton-pipelines github-listener -o yaml | grep -c 'agentic-stoa'
      # Expect: ≥3 (per-repo Triggers)

      kubectl get el -n tekton-pipelines gitea-listener -o yaml | grep -c 'agentic-stoa'
      # Expect: 0 (all moved to github-listener)
      ```
