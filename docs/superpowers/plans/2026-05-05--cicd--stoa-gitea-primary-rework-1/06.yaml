- number: 1
  title: Add webhook on `agentic-stoa/hum`
  steps:
  - id: P6.T1.S1
    text: "Configure the webhook via GitHub UI\n\n\n```yaml\n# manual-operation\nid: github-webhook-stoa-hum\nlayer: cicd\napp: tekton\nplan: docs/superpowers/plans/2026-05-05--cicd--stoa-gitea-primary-rework-1.md\nwhen: After Phase 5 lands the main-sync Trigger; before Phase 7 smoke.\nwhy_manual: GitHub webhook config is per-repo UI work; no IaC for this in our setup.\ncommands: |\n  # GitHub UI: agentic-stoa/hum \u2192 Settings \u2192 Webhooks \u2192 Add webhook\n  # Payload URL:    https://webhooks.hop.derio.net/\n  # Content type:   application/json\n  # Secret:         <value of STOA_GITHUB_WEBHOOK_SECRET from Infisical>\n  # SSL verify:     enabled\n  # Events:         pull_request, push\n  # Active:         yes\nverify: |\n  - \"GitHub UI \u2192 repo Settings \u2192 Webhooks \u2192 Recent Deliveries shows a 200 from the initial 'ping' event\"\n  - \"kubectl logs -n tekton-pipelines deploy/el-github-listener --tail=20 shows a received event\"\nstatus: pending\n```"
