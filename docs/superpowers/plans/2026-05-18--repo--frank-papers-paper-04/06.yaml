tasks:
- number: 1
  title: Post-Deploy Checklist
  steps:
  - id: P6.T1.S1
    text: |-
      Verify external publish


      Paper 04 publishes on the existing public blog at `blog.derio.net/frank`.
      No new infrastructure needed. Verify it is live after CI deploys:

      ```bash
      curl -s https://blog.derio.net/frank/docs/papers/04-distributed-storage/ \
        | grep -i "distributed storage on bare metal"
      # Expected: page content with the Paper title
      ```

      Also verify the Paper appears in the Papers sidebar (auto-
      generated from page bundles) at
      `https://blog.derio.net/frank/docs/papers/`.
  - id: P6.T1.S2
    text: |-
      Verify cross-link chips render bidirectionally


      The `papers-backlink.html` partial auto-renders a "→ Paper 04"
      chip on Building 03-storage and Operating 02-storage-backups
      via `related_building` / `related_operating` frontmatter.
      No edits needed — verify the chips appear:

      ```bash
      curl -s https://blog.derio.net/frank/docs/building/03-storage/ \
        | grep -i "paper 04\|distributed storage on bare metal"
      curl -s https://blog.derio.net/frank/docs/operating/02-storage-backups/ \
        | grep -i "paper 04\|distributed storage on bare metal"
      ```

      Expected: a "→ The decision-level view: Paper 04 — Distributed
      Storage on Bare Metal" chip is present on both pages.

      Also verify the forward-link chip ("→ Hands-on: Building 03 /
      Operating 02") renders on the Paper 04 page itself:

      ```bash
      curl -s https://blog.derio.net/frank/docs/papers/04-distributed-storage/ \
        | grep -i "building 03\|operating 02"
      ```
  - id: P6.T1.S3
    text: |-
      Update the Papers section `_index.md` if needed


      `blog/content/docs/papers/_index.md` was updated by Paper 00 to
      point at the prologue. Paper 04 doesn't need its own paragraph
      there — the sidebar auto-generates from page bundles. But if
      the `_index.md` text needs refreshing (e.g., adding a "latest"
      note), do it here:

      ```bash
      # Optional — only if the _index.md content has gone stale.
      grep -n "First paper\|prologue\|Why Run Your Own" blog/content/docs/papers/_index.md
      ```

      If no update is needed, mark this step skipped with reason
      "no `_index.md` changes required — sidebar auto-generates from
      page bundles".
  - id: P6.T1.S4
    text: |-
      Update Building/Operating series overviews (optional)


      In `blog/content/docs/building/00-overview/index.md` (Series
      Index): the Paper 04 backlink chip auto-renders on the
      Building 03-storage post, so no manual edit is required to
      the storage post itself. If the series overview has a "Further
      reading" section listing Papers by capability, add Paper 04
      there.

      Same check for `blog/content/docs/operating/00-overview/`
      (if present).
  - id: P6.T1.S5
    text: |-
      Write building/operating blog posts (skip for Papers)


      Papers are not new layer deployments — they review existing
      capabilities. The Building 03-storage and Operating 02-storage-
      backups posts already exist (that's what `related_building`
      and `related_operating` point at). No new posts.

      *Skip — Papers reference existing Building/Operating posts via
      frontmatter; the cross-link chips do the work.*
  - id: P6.T1.S6
    text: |-
      Update README


      Run `/update-readme` to sync README.md. The Papers series is
      already referenced in README (from Paper 00's post-deploy);
      verify Paper 04 doesn't need a stack-list addition. README is
      a stack snapshot, not a publish log — most likely no row
      change is needed.

      If `/update-readme` produces no diff, mark this step skipped
      with reason "README is a stack snapshot — no Paper 04-specific
      row needed".
  - id: P6.T1.S7
    text: |-
      Sync runbook


      This plan contains no `# manual-operation` blocks — skip
      `/sync-runbook`.

      Confirm with:
      ```bash
      grep -c "# manual-operation" docs/superpowers/plans/2026-05-18--repo--frank-papers-paper-04/*.yaml \
        | grep -v ":0$" || echo "no manual-operation blocks"
      ```
  - id: P6.T1.S8
    text: |-
      Update plan status and log publish date


      Edit `docs/superpowers/plans/2026-05-18--repo--frank-papers-paper-04/_meta.yaml`:

      ```yaml
      status: Complete
      completed: 'YYYY-MM-DD'
      ```

      And update the `_prose.md` Status line:

      ```
      **Status:** Complete (YYYY-MM-DD) — Paper 04 published; series Phase 1 continues.
      ```

      Optionally use `vk plan spec-index` to refresh the
      Implementation Plans table:

      ```bash
      vk plan spec-index docs/superpowers/plans/2026-05-18--repo--frank-papers-paper-04 --yes
      ```
