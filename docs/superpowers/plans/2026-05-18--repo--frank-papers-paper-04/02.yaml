tasks:
- number: 1
  title: Run validate-dossier.py and resolve failures
  steps:
  - id: P2.T1.S1
    text: |-
      Run the dossier gate validator


      ```bash
      python scripts/validate-dossier.py docs/papers-dossiers/04-distributed-storage/dossier.md
      ```

      Expected: `DOSSIER GATE PASSED: ...`

      If it fails, fix the reported issues:
      - `vendors_in_scope: need ≥3` → add more vendors to the dossier
      - `primary_sources: need ≥5` → add more sources
      - `primary_sources: need ≥3 distinct type values` → diversify source types
      - `URL not reachable` → find an alternative URL or use a web archive link
      - `frank_artefacts: need ≥3` → add more artefacts
      - `frank_artefacts: need ≥2 distinct kind values` → add a different kind
      - `named_gaps: need ≥1` → add a gap
      - `counter-arguments_considered: need ≥1` → add a counter-argument

      Re-run until exit 0.
  - id: P2.T1.S2
    text: |-
      Human gate: author reviews named gaps and counter-arguments


      **This step requires human review.**

      The author (user) reads:
      1. `## Named gaps` — is the TCO-methodology gap honest and
         specific? Does it point at a real hole in the literature
         rather than a vague disclaimer?
      2. `## Counter-arguments considered` — is the "managed cloud
         storage erases the operational tax" counter-argument
         addressed with the right framing (Frank is a learning
         platform — encountering RWO/SSA/ESO scars first-hand is
         the point)?

      When satisfied, update dossier status:
      ```yaml
      # In docs/papers-dossiers/04-distributed-storage/dossier.md frontmatter:
      status: ready
      ```
  - id: P2.T1.S3
    text: |-
      Commit the validated dossier


      ```bash
      git add docs/papers-dossiers/04-distributed-storage/dossier.md
      git commit -m "docs(repo): Paper 04 research dossier — distributed storage on bare metal"
      ```
