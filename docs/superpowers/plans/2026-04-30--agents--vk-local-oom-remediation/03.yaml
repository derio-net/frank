schema_version: 2
phase:
  number: 3
  title: Housekeeping — npm cache + worktree prune
  tag: agentic
  depends_on: []
  tracking_issue: https://github.com/derio-net/frank/issues/154
tasks:
- number: 1
  title: Decide cron host
  steps:
  - id: P3.T1.S1
    text: |-
      Inspect `kali`'s supercronic crontab and the PVC mount layout. The default placement is `kali`'s supercronic crontab, since it already runs scheduled work and shares the agent-home PVC with `vk-local`. Confirm by reading the kali Dockerfile / `crontab` content in agent-images.


      *Confirmed:* `kali/config-templates/crontab.txt` is seeded to `$AGENT_HOME/.crontab` via `etc/cont-init.d/50-seed-config`, supercronic is supervised by s6 (`agent-shell-base/etc/services.d/supercronic/run`), and both containers share the `agent-home` PVC mounted at `/home/claude`. No CronJob fallback needed.

      If supercronic is unavailable in `kali` for any reason, fall back to a Kubernetes `CronJob` in `apps/secure-agent-pod/manifests/cronjob-housekeeping.yaml` mounting the same PVC.
- number: 2
  title: Implement the crons (agent-images repo)
  steps:
  - id: P3.T2.S1
    text: |-
      npm cache prune cron — shipped as [`kali/scripts/npm-cache-prune.sh`](https://github.com/derio-net/agent-images/blob/agents/vk-local-housekeeping-crons/kali/scripts/npm-cache-prune.sh). Crontab line: `0 4 * * 0 /opt/scripts/npm-cache-prune.sh >> __AGENT_HOME__/.willikins-agent/npm-cache-prune.log 2>&1`.
  - id: P3.T2.S2
    text: |-
      Worktree prune cron — shipped as [`kali/scripts/worktree-prune.sh`](https://github.com/derio-net/agent-images/blob/agents/vk-local-housekeeping-crons/kali/scripts/worktree-prune.sh). Iterates `$AGENT_HOME/repos/*/.git` (the canonical repo root on Frank — vibe-kanban worktrees under `/var/tmp/vibe-kanban/worktrees/` link back via gitdir files). Crontab line: `30 4 * * * /opt/scripts/worktree-prune.sh >> __AGENT_HOME__/.willikins-agent/worktree-prune.log 2>&1`.
  - id: P3.T2.S3
    text: |-
      Open PR in agent-images — [`derio-net/agent-images#34`](https://github.com/derio-net/agent-images/pull/34).
- number: 3
  title: Image-bumper picks up the new SHA
  steps:
  - id: P3.T3.S1
    text: |-
      Once Task 2's PR merges in agent-images, the existing image-bumper workflow opens a PR in this repo updating the image SHA in `apps/secure-agent-pod/manifests/deployment.yaml`. Merge that PR. ArgoCD syncs. The kali container restarts; supercronic loads the new crontab automatically (no extra restart needed — supercronic auto-reloads on file change, see `frank-gotchas.md`).
- number: 4
  title: Verify housekeeping is running
  steps:
  - id: P3.T4.S1
    text: |-
      After the first weekly window passes (or trigger manually inside the pod for verification: `kubectl -n secure-agent-pod exec -c kali deploy/secure-agent-pod -- supercronic -test /home/claude/.crontab`), inspect the log files:


      ```bash
      kubectl -n secure-agent-pod exec -c kali deploy/secure-agent-pod -- \
        ls -la /home/claude/.willikins-agent/npm-cache-prune.log \
               /home/claude/.willikins-agent/worktree-prune.log
      ```

      - [ ] **Step 2 (verify metric — depends on Phase 2):** Once Phase 2 is complete, query

      ```promql
      container_memory_working_set_bytes{namespace="secure-agent-pod", container="vk-local"} / 1024 / 1024
      ```

        in Grafana. Median should trend down toward 200–300 MiB once a session-idle period rolls over the prune cron.

