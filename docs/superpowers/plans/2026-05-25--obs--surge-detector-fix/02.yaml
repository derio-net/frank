            value: "50"
          - name: SURGE_VISITOR_FLOOR
            value: "10"
      END edit
  - id: P2.T4.S4
    text: |-
      Full suite green; this is the last code task before deploy:
      cd apps/ai-alert-helper/src && uv run pytest -q
