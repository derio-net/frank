- number: 3
  title: Draft all sections in order
  steps:
  - id: P3.T3.S1
    text: |-
      Draft §1 — The capability (200–350 words) + stack-position diagram


      The opening question: *if the cluster's persistent state
      vanishes tonight — corrupted volume, accidental
      `kubectl delete ns`, lost node, full site loss — who owns the
      restore, and against what artefact?* Position backup & DR in
      the stack: sibling to storage and secrets, downstream of every
      workload that holds state. Acknowledge that "backup" is doing
      several jobs at once — K8s API-object capture, volume-content
      capture, application-consistency hooks, off-cluster shipment,
      credential/secret restoration — and the vendor space splits on
      which of those jobs each option treats as primary, and which
      it punts on the assumption that you have a separate tool for it.

      Voice: Frank speaks as the cluster. No hedging. The question
      is real, and the answer depends entirely on how much of your
      cluster lives in git.

      Include one `flowchart LR` Mermaid diagram showing the stack
      position and the five jobs backup & DR does:

      ```
      flowchart LR
          G["GitOps (ArgoCD)"] --> A["API objects"]
          W["Workloads"] --> V["PVC volumes"]
          B["Backup & DR"] --> AC["API-object capture"]
          B --> VC["Volume capture"]
          B --> AH["App-consistency hooks"]
          B --> OS["Offsite shipment"]
          B --> CR["Credential restore"]
          A -.-> B
          V --> B
      ```
  - id: P3.T3.S2
    text: |-
      Draft §2 — The landscape (400–600 words) + landscape quadrant + capability matrix


      Map the six vendors against two axes. Use `{{< papers/landscape >}}`:

      ```
      {{< papers/landscape axes="x:volume-only↔application-aware,y:adds-control-plane↔no-control-plane" >}}
          quadrantChart
              title Backup & DR — 2026
              x-axis "Volume-only" --> "Application-aware"
              y-axis "Adds control plane" --> "No extra control plane"
              quadrant-1 "App-aware · No control plane"
              quadrant-2 "App-aware · Adds control plane"
              quadrant-3 "Volume-only · Adds control plane"
              quadrant-4 "Volume-only · No control plane"
              Velero: [0.55, 0.30]
              Longhorn (native): [0.20, 0.85]
              Kasten K10: [0.90, 0.20]
              TrilioVault: [0.85, 0.25]
              restic: [0.15, 0.95]
              rclone + cron: [0.10, 0.95]
      {{< /papers/landscape >}}
      ```

      Then the dense comparison via `{{< papers/capability-matrix >}}`:

      ```
      {{< papers/capability-matrix data="vendors" >}}
      ```

      Prose budget: 400–600 words. For each option, name what it
      optimises for in one phrase ("Velero: K8s API objects as
      first-class citizens, PVC data as a plugin"; "Longhorn: volume
      snapshots without a separate control plane"; "Kasten:
      application-consistent restore with the policy engine that
      production teams need"). Use `{{< papers/pullquote source="..."
      url="..." >}}` for at least one direct quote pulled from the
      dossier.
  - id: P3.T3.S9
    text: |-
      Verify quadrantChart coordinates do NOT collide


      The quadrantChart shortcode renders Mermaid v10+ which only
      shows ONE label per coordinate point. If two vendors share
      the same (x, y), Hugo's Mermaid render will drop one label
      silently. After authoring §2, verify uniqueness:

      ```bash
      grep -A 30 "{{< papers/landscape" blog/content/docs/papers/08-backup-dr/index.md \
        | grep -E ":\s*\[" | sort
      ```

      If any two coordinates are identical (e.g. restic and
      rclone+cron both at [0.10, 0.95]), nudge one by ≥0.05 on
      either axis so labels don't overlap. Example fix: restic at
      [0.15, 0.95], rclone+cron at [0.05, 0.90].
  - id: P3.T3.S3
    text: |-
      Draft §3 — How each option handles the hard part (800–1400 words)


      The hard part: capturing *application-consistent* state across
      the K8s API surface AND the volume contents, shipping it
      off-cluster, and restoring it in a sequence the workload can
      actually come up under. Each vendor has a different answer;
      this section lays them out side-by-side with one `flowchart TD`
      per vendor in a shared visual language.

      Suggested shapes (reuse across all diagrams):
      - Squares = controller/operator components
      - Rounded rectangles = K8s objects (Deployments, Backups, CRs)
      - Diamonds = decision points (hooks, schedules, restore gates)
      - Cylinders = backup storage (S3, NFS, vault)
      - Dashed edges = hook / control-plane paths
      - Solid edges = data flow (snapshot, restore)

      Four-to-six architecture diagrams (one per vendor that has a
      meaningfully different answer). Skip rclone+cron here — it
      doesn't have a "hard part", which is the §6 punchline.

      Example for Longhorn:

      ```
      flowchart TD
          subgraph LH["Longhorn (native)"]
              LM["longhorn-manager"]
              RJ{"RecurringJob (cron)"}
              BS["BackupStore engine"]
              SS(("VolumeSnapshot"))
          end
          BT[("S3 / R2 / NFS BackupTarget")]
          PVC(("PVC"))
          LM --> SS
          RJ -.-> LM
          SS --> BS
          BS --> BT
          PVC --> SS
      ```

      For each diagram include 80–200 words of prose: what triggers
      a backup, how application consistency is (or isn't) achieved,
      what the restore sequence looks like, and where the failure
      modes live.
  - id: P3.T3.S4
    text: |-
      Draft §4 — What scale changes (300–600 words) + benchmark callouts


      Three scale axes that flip vendor rankings:

      1. **Volume count and snapshot rate.** A 20-PVC cluster can
         run Longhorn daily snapshots at 02:00 and not notice. A
         2000-PVC cluster cannot — the snapshot fan-out competes
         with workload IO. State the crossover honestly: it's the
         point at which deduplication and incremental backup stop
         being optional.

      2. **Restore wall-clock at TB scale.** A 10 GB cluster
         restores from R2 in under an hour. A 10 TB cluster
         restores in days. Cite a benchmark or vendor doc on
         restic/Longhorn restore throughput. Note that the *order
         of magnitude that matters* for DR planning is "do we have
         a local-first NFS target?" — see Frank's NAS-target story
         (currently disabled by the Longhorn 1.11 bug).

      3. **Application-consistency hooks at production scale.**
         A handful of stateful apps can be quiesced by a CRD-aware
         operator (Postgres operator, MongoDB operator). At
         hundreds of stateful apps, the hooks become the bottleneck
         — and the gap between "we run pre-backup hooks" and "we
         verify the hooks ran successfully" is where Kasten and
         TrilioVault earn their licence fees.

      Cite ≥2 primary sources from the dossier (CNCF DR guide +
      restic deduplication docs). Do not editorialize past what the
      citations support.
  - id: P3.T3.S5
    text: |-
      Draft §5 — Frank's choice, and what happened (300–600 words) + scar callouts


      Frank chose Longhorn-native backup to Cloudflare R2. No
      Velero, deliberately — ArgoCD + git already restores every
      Kubernetes API object on the cluster in under ten minutes;
      the only thing it can't restore is *the contents of
      PersistentVolumes*. Longhorn's BackupTarget + RecurringJob
      CRDs handle that with no additional control plane. The cost:
      no application-aware hooks, no policy engine, no RBAC on
      restore. The trade made sense for a GitOps-first homelab.

      Use 1–3 `{{< papers/scar >}}` callouts. Authoritative options:

      Scar 1 — the SOPS-secrets-out-of-band requirement:
      ```
      {{< papers/scar date="2026-03-08" >}}
      The Secret that lets Longhorn talk to R2 is SOPS-encrypted
      and lives outside ArgoCD's managed path — ServerSideApply=true
      rejects the .sops field. Applied out-of-band with
      `sops --decrypt secrets/longhorn/r2-secret.yaml | kubectl
      apply -f -`. For DR this is load-bearing: the secret that
      lets the backup tool *read its own bucket* is itself a thing
      you must restore first. The disaster-recovery runbook has a
      "before you do anything else" header that no other procedure
      on Frank has. We are not Velero-restoring our way out of
      this; we are sops-decrypting our way back in.
      {{< /papers/scar >}}
      ```

      Scar 2 — the Longhorn 1.11 NFS mount-string bug:
      ```
      {{< papers/scar date="2026-03-08" >}}
      The original plan was dual-target: local NAS for fast
      restores, R2 for offsite. The NAS target showed
      AVAILABLE: false. The status condition: `mount.nfs4: remote
      share not in 'host:dir' format`. Longhorn's NFS driver
      generates `host/path` (with a slash) instead of `host:/path`
      (with a colon) — a violation of RFC 2224 in the mount
      command. Filed as GH #11412; fix targeted for Longhorn
      v1.13.0; no backport, no workaround. The NAS target is
      commented out in the manifest, waiting. The local-first
      restore axis is a roadmap item, not a current capability.
      {{< /papers/scar >}}
      ```

      Scar 3 — the RecurringJob schema gap:
      ```
      {{< papers/scar date="2026-03-08" >}}
      The original two RecurringJobs (`daily-nas` + `weekly-r2`)
      specified `spec.backupTargetName` to route each to a
      different target. ArgoCD rejected both with
      `.spec.backupTargetName: field not declared in schema`.
      Longhorn 1.11 has no per-job target selection — all
      RecurringJobs use the `default` BackupTarget. Filed as GH
      #11392 in July 2025; closed with no resolution and no
      timeline. The names `daily-nas` and `weekly-r2` are kept
      anyway, as documentation of *intent* — when the NAS target
      and `backupTargetName` both land, the routing snaps into
      shape.
      {{< /papers/scar >}}
      ```

      Pick 2-3 scars from the above. Real dates only — cross-
      reference with `blog/content/docs/building/08-backup/index.md`
      and `agents/rules/frank-gotchas.md`.

      Include ≥1 evidence artefact: either a Longhorn UI screenshot
      or `apps/longhorn/manifests/backup-target-default.yaml`
      inlined as a code block.
  - id: P3.T3.S6
    text: |-
      Draft §6 — When Frank's answer doesn't generalize (200–400 words) + decision tree


      Be explicit about the four leaves. Frank's answer is one
      leaf; the others are real:

      ```
      flowchart TD
          A["Can you reinstall from git?"] -- "Yes · dev / sandbox" --> L1["No backup — GitOps reapply"]
          A -- "No — production state matters" --> B["100% GitOps coverage of API objects?"]
          B -- "Yes · homelab / SRE-disciplined shop" --> L2["Longhorn-native + S3 (Frank's pick)"]
          B -- "No · need API-object capture + app-aware hooks" --> L3["Kasten K10 / TrilioVault"]
          B -- "Offline-resilient / paranoid" --> L4["restic to NAS + offsite encrypted copy"]
      ```

      ≤4 visible leaves. The decision turns on two questions: *can
      you reinstall from git at all* (dev/sandbox: yes, no backup
      needed beyond config), and *do you have GitOps coverage of
      your K8s API surface* (if yes, Longhorn-native is enough;
      if no, you need K8s-API-object capture and the application-
      aware hooks that come with it).
  - id: P3.T3.S7
    text: |-
      Draft §7 — Roadmap & where this space is going (200–400 words)


      Three trends worth naming:

      1. **CSI VolumeSnapshot is becoming the lingua franca.** The
         CSI snapshot API is settling as the cross-vendor primitive
         for point-in-time volume capture. Velero, Kasten, and
         TrilioVault all consume it; Longhorn produces it. The
         "which backup tool can talk to my storage?" question is
         narrowing as CSI conformance broadens.

      2. **Application-aware blueprints are converging on
         operators.** The Kasten K10 "Blueprint" model and the
         Velero "BackupItemAction" plugin model are both heading
         toward "ask the workload's CRD operator to quiesce
         itself" — Postgres operators, Mongo operators, etc.
         The split between "backup tool with hooks" and "operator
         that knows how to back itself up" is shrinking.

      3. **GitOps is eating the K8s-API-object half of the
         problem.** Teams with full ArgoCD/Flux coverage are
         increasingly skipping Velero's K8s-API capture entirely,
         treating git as the source of truth. The vendor pitch
         for "we back up your YAML" is weakening; the vendor pitch
         for "we restore your data in a sequence your workloads
         can come up under" is strengthening.

      Optional timeline diagram or roadmap citations. Cite the
      dossier where possible.
  - id: P3.T3.S8
    text: |-
      Verify draft word count is within budget (2400–4200 words for a capability paper)


      ```bash
      # Count words in the paper body (excluding frontmatter)
      awk '/^---/{n++; if(n==2) found=1; next} found' \
        blog/content/docs/papers/08-backup-dr/index.md \
        | wc -w
      ```

      Expected: 2400–4200 words. If under, expand §3 (per-vendor
      architecture is the section with most room to grow). If
      over, trim §3 first — that's where capability papers
      reliably sprawl past budget.
