- number: 2
  title: Research the backup & DR landscape
  steps:
  - id: P1.T2.S1
    text: |-
      Populate `docs/papers-dossiers/08-backup-dr/dossier.md` — vendors in scope


      Paper 08 maps the Kubernetes backup & DR vendor space. Suggested
      six-vendor landscape:

      ```yaml
      ## Vendors in scope (≥3, typically 4–6)
      - name: Velero
        positioning: "VMware/CNCF — K8s-native API-object backup with
          CSI/restic plugins for PVC data; the default answer when
          people say 'Kubernetes backup'."
        primary_url: "https://velero.io/docs/main/"
      - name: Longhorn (native backup target)
        positioning: "Rancher/CNCF — distributed block-storage with
          built-in BackupTarget + RecurringJob; volume-level snapshots
          shipped to S3 or NFS; no extra control plane."
        primary_url: "https://longhorn.io/docs/latest/snapshots-and-backups/"
      - name: Kasten K10 (by Veeam)
        positioning: "Commercial application-aware backup — policy
          engine, RBAC, audit trail, blueprint hooks for app-consistent
          snapshots; Veeam acquisition in 2020."
        primary_url: "https://docs.kasten.io/latest/"
      - name: TrilioVault for Kubernetes
        positioning: "Commercial application-centric backup — Trilio's
          K8s product; ITSM/SIEM integrations, multi-cloud DR
          orchestration."
        primary_url: "https://docs.trilio.io/kubernetes/"
      - name: restic
        positioning: "Filesystem-level content-addressed backup with
          deduplication; what Velero's File-System Backup mode uses
          under the hood for PVC content."
        primary_url: "https://restic.readthedocs.io/en/stable/"
      - name: rclone + cron (homemade)
        positioning: "The anti-pattern baseline — periodic file sync to
          S3, no API-object capture, no consistency guarantee, no
          restore tooling. Cheap until you need it."
        primary_url: "https://rclone.org/docs/"
      ```

      Frank's case study is Longhorn-native backup to Cloudflare R2;
      the other five exist in the dossier so §3 can compare
      architectures and §6 can branch the decision tree.
  - id: P1.T2.S2
    text: |-
      Gather ≥5 primary sources spanning ≥3 distinct type values


      Required coverage: vendor architecture docs, at least one
      foundational paper or comparison talk, and at least one real-
      world postmortem. URL hints to chase:

      1. Velero design / how-it-works — type: `vendor-docs`
         (https://velero.io/docs/main/how-velero-works/)
      2. Longhorn backup architecture — type: `vendor-docs`
         (https://longhorn.io/docs/latest/concepts/#3-backups-and-secondary-storage)
      3. restic design paper / data format — type: `paper` or
         `vendor-docs` (https://restic.readthedocs.io/en/stable/100_references.html)
      4. CNCF / practitioner DR-on-K8s guide — type: `paper` or
         `talk` — search CNCF blog for "Kubernetes disaster recovery"
      5. Frank's own running postmortem registry on the Longhorn /
         SOPS / R2 scars — type: `postmortem`
         (https://github.com/derio-net/frank/blob/main/agents/rules/frank-gotchas.md
         and blog/content/docs/building/08-backup/index.md)

      For each source, fill all fields: `title`, `type`, `url`,
      `quoted_passages` (≥1 direct quote per source), `relevance`.

      Verify all URLs are reachable before recording them — the gate
      validator will probe them.
  - id: P1.T2.S3
    text: |-
      Document ≥3 Frank artefacts spanning ≥2 distinct kind values


      Pull from the cluster repo and Frank's gotcha registry.
      Suggested artefacts:

      1. `kind: yaml` — `apps/longhorn/manifests/backup-target-default.yaml`
         — the live S3-to-R2 BackupTarget Frank actually runs.
         `demonstrates: "Frank's S3-to-R2 BackupTarget: spec.backupTargetURL =
          s3://frank-longhorn-backups@auto/ with credentialSecret
          referencing the out-of-band SOPS-applied Secret. The @auto
          region placeholder is what makes this work with R2's
          custom endpoint — the actual endpoint is in the Secret's
          AWS_ENDPOINTS field."`

      2. `kind: yaml` — `apps/longhorn/manifests/recurring-job-weekly.yaml`
         + `recurring-job-daily.yaml` — the daily + weekly schedule
         that protects every volume in the default group.
         `demonstrates: "Daily backup at 02:00 retaining 7 recovery
          points, weekly at 03:00 Sunday retaining 4. Both target the
          `default` BackupTarget because Longhorn 1.11 has no
          `backupTargetName` field on RecurringJob — confirmed CRD
          schema gap. Names `daily-nas` / `weekly-r2` encode the
          *intent* of the original two-target design, not the current
          routing."`

      3. `kind: incident` — the Longhorn 1.11 NFS mount-string bug
         that disabled the local NAS target. Source:
         `apps/longhorn/manifests/backup-target-nas.yaml` (stubbed
         out) + Longhorn GitHub issue #11412.
         `demonstrates: "Longhorn 1.11 NFS BackupTarget generates
          'host/path' instead of 'host:/path' in the mount.nfs4
          command, producing 'remote share not in host:dir format'
          errors. Filed as GH #11412 in August 2025; fix targeted
          for Longhorn v1.13.0. No backport, no workaround. The NAS
          target is commented out in the manifest, waiting for the
          fix to ship. This is why the §4 'local-first restore' axis
          is a roadmap item, not a current capability."`

      4. `kind: incident` — the SOPS-secrets-cannot-be-ArgoCD-managed
         story (also relevant for restore order). Source:
         `agents/rules/frank-gotchas.md → Storage / Secrets / SSA`
         and `secrets/longhorn/r2-secret.yaml`.
         `demonstrates: "SOPS-encrypted Secrets cannot be applied via
          ArgoCD with ServerSideApply=true — the schema validator
          rejects the .sops field. They live at secrets/longhorn/
          and are applied out-of-band with sops --decrypt | kubectl
          apply -f -. For DR this is load-bearing: the secret that
          lets Longhorn talk to R2 is itself a thing you must restore
          BEFORE any backup tool can read the bucket. The runbook
          has to enumerate these bootstrap secrets and the order
          they must be applied."`

      5. `kind: incident` (optional) — the RWO PVC + RollingUpdate
         deadlock referenced in `frank-gotchas.md`. Relevant because
         volume restore must respect `strategy: Recreate` to avoid
         the same deadlock during a recovery sequence.
         `demonstrates: "RWO PVC + RollingUpdate deadlocks: the new
          ReplicaSet cannot mount the volume while the old one still
          holds it. The DR-restore equivalent: restoring a volume
          into a workload whose Deployment uses RollingUpdate will
          fail to start. Restore procedures must scale workloads to
          0 first, restore the volume, then scale back up."`

      6. `kind: yaml` (optional) — the existing building-08 post as
         a structured artefact:
         `blog/content/docs/building/08-backup/index.md`.

      Pick at least 3, spanning ≥2 distinct `kind` values.
  - id: P1.T2.S4
    text: |-
      Record ≥1 named gap and ≥1 counter-argument


      Named gap (add to dossier):
      ```yaml
      ## Named gaps (≥1)
      - "No public benchmark exists on the *honest cost of a
        restore-from-scratch DR drill* at small-cluster scale — the
        hours-per-quarter spent enumerating bootstrap secrets,
        re-applying them in the correct order, waiting for Longhorn
        to re-attach replicas, sequencing workload scale-up to
        respect strategy: Recreate, verifying app state matches
        expectations. Published comparisons measure backup success
        rate, restore wall-clock for a single volume, or feature
        matrices (does Vendor X support application-aware hooks?).
        None measure 'how long does it take a competent operator who
        has never restored this cluster before to bring it back up
        from cold storage, and how many of the steps were
        re-discovered live during the drill?' The single most
        decision-relevant number for any backup choice — your actual
        RTO in practice, not in the marketing material — does not
        exist as published work."
      ```

      Counter-argument (add to dossier):
      ```yaml
      ## Counter-arguments considered (≥1)
      - "For a production cluster with regulated workloads (PII,
        PCI, HIPAA) or any team without 100% GitOps coverage of
        their Kubernetes API objects, Kasten K10 (or TrilioVault)
        is the correct answer — application-aware blueprints, RBAC
        on restore operations, audit trail, multi-cluster DR
        orchestration. Why doesn't that win for Frank? Answer:
        same shape as Paper 14. Frank is fully GitOps-managed;
        every Deployment, Service, ConfigMap, and CRD is in git
        and restored by ArgoCD in under ten minutes. The K8s API-
        object backup that Velero or Kasten provides duplicates
        work that ArgoCD already does. What's left to protect is
        PVC contents and a small set of bootstrap secrets — both
        of which Longhorn's native backup target plus a documented
        out-of-band SOPS-apply step handle, at a cost of zero
        additional control-plane components. For a team without
        GitOps coverage, that calculus inverts and Kasten wins on
        the merits."
      ```
