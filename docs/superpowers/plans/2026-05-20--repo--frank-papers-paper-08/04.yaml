tasks:
- number: 1
  title: Generate per-paper cover image
  steps:
  - id: P4.T1.S1
    text: |-
      Add Paper 08 cover prompt to `blog/prompt_for_images.yaml`


      Add a new entry under the `# --- Papers Series Covers ---`
      section, after the most recent paper entry:

      ```yaml
        - key: paper-08-cover
          # Same convention as paper-00 / 04 / 10 / 11 / 14 covers:
          # only reference.png anchors style; the Papers signature
          # (glasses + tie + dress shirt) is explicit below.
          output: blog/content/docs/papers/08-backup-dr/cover.png
          description: Paper 08 cover — Frank watching a labelled snapshot parcel float off-cluster to an archive box
          prompt: >-
            Frank the server-hardware Frankenstein monster stands in
            front of a server rack from which a glowing data parcel
            labelled "snapshot-2026-05-20" is floating up and away,
            travelling along a faint amber arc toward an off-cluster
            archive box drawn on the far side of the frame. One
            green-skinned hand is extended as if releasing the
            parcel; the other holds a small clipboard with a tiny
            retention-schedule list visible on it (daily / weekly).
            His expression is cautious and weighing — the part of
            the stack you only know works after you've restored
            from scratch. He wears small circular wire-rim reading
            glasses resting low on his face and a thin black
            necktie over a white button-down dress shirt. Warm
            overhead work-lamp light. Deep navy studio-style
            background. RJ45 neck bolts, green skin, messy black
            hair, rack-mount torso. The ONLY text in the image is
            the words "snapshot-2026-05-20" on the parcel and
            "daily / weekly" on the clipboard — no captions or
            watermarks. ONE FIGURE — one single Frank. The framing
            communicates "shipping the snapshot off-cluster, knowing
            the restore is the part you haven't tested" rather than
            "backup is solved".
      ```
  - id: P4.T1.S2
    text: |-
      Generate the cover image


      ```bash
      set -a && source .env_common && set +a
      uv sync
      .venv/bin/python scripts/generate-all-images.py \
        -r blog/static/images/reference.png \
        --only paper-08-cover
      ```

      Expected: `blog/content/docs/papers/08-backup-dr/cover.png`
      created, ≥50KB.

      If generation fails for any reason (Gemini API timeout,
      quota, etc.), fall back: `cp blog/static/images/reference.png
      blog/content/docs/papers/08-backup-dr/cover.png` and tick
      step `--state - --note "Gemini fallback used; regen
      post-merge."`

      Spot-check: Frank should have small round reading glasses,
      thin black tie, weighing expression, and the snapshot-parcel
      / archive-box metaphor should be recognisable. Up to 3
      regeneration attempts if the visual signature is missing.
- number: 2
  title: Render Mermaid diagrams and verify they parse
  steps:
  - id: P4.T2.S1
    text: |-
      Review draft for `TODO:<type>` diagram placeholders


      ```bash
      grep -n "TODO:" blog/content/docs/papers/08-backup-dr/index.md
      ```

      Expected: no `TODO:` lines remaining after Phase 3 draft
      work (TL;DR remains pending — that is by design and lives
      outside the Mermaid scope).
  - id: P4.T2.S2
    text: |-
      Verify Mermaid diagrams parse without errors in Hugo dev server


      ```bash
      cd blog && PATH=/usr/local/Cellar/go/1.26.2/bin:$PATH hugo --minify --buildDrafts 2>&1 | grep -E "^ERROR|^WARN" | head -10
      ls -lh public/docs/papers/08-backup-dr/index.html
      ```

      Expected: zero ERROR lines; `index.html` exists and is ≥10 KB.
- number: 3
  title: Capture Longhorn UI / R2 backup screenshot
  steps:
  - id: P4.T3.S1
    text: |-
      Capture a backup screenshot showing real backups in R2


      Source: Longhorn UI Backup page at `http://192.168.55.201/#/backup`
      showing recent daily/weekly recovery points, OR a Grafana
      panel showing volume-backup success rate, OR the R2 bucket
      listing.

      Save to:
      ```
      blog/content/docs/papers/08-backup-dr/longhorn-r2-backups.png
      ```

      If cluster access is unavailable, copy the 1×1 placeholder
      and rename with `-TODO.png` suffix:
      ```bash
      cp blog/content/docs/papers/14-progressive-delivery/argo-rollouts-canary-TODO.png \
         blog/content/docs/papers/08-backup-dr/longhorn-r2-backups-TODO.png
      ```
      Tick the step `--state - --note "Cluster access unavailable
      from worktree."`
- number: 4
  title: Full Hugo build smoke-test
  steps:
  - id: P4.T4.S1
    text: |-
      Run the production Hugo build to assert zero errors


      ```bash
      cd blog && PATH=/usr/local/Cellar/go/1.26.2/bin:$PATH hugo --minify --buildDrafts 2>&1 | grep -E "^ERROR|^WARN" | head -10
      ls -lh public/docs/papers/08-backup-dr/index.html
      ```

      Expected: zero ERROR lines; `index.html` exists and is ≥10 KB.
