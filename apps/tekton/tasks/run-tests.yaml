# Runs a configurable test command in the cloned workspace
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: run-tests
  namespace: tekton-pipelines
spec:
  params:
    - name: test-command
      type: string
      default: "echo 'No tests configured'"
      description: "Command to run for testing"
  workspaces:
    - name: source
      description: "The git repo"
  steps:
    - name: test
      image: alpine:3.20
      workingDir: $(workspaces.source.path)
      env:
        - name: TEST_CMD
          value: $(params.test-command)
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 512Mi
      command: ["/bin/sh", "-e", "-c"]
      args:
        - |
          echo "Running tests..."
          eval "$TEST_CMD"
          echo "Tests passed."
