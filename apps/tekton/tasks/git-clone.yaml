# Minimal git-clone task for Frank CI/CD
# Replaces the deprecated v1beta1 catalog task with a slim v1 version
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/version: "1.0"
  annotations:
    tekton.dev/categories: Git
    tekton.dev/displayName: "git clone"
spec:
  description: >-
    Clones a git repository into the output workspace.
  workspaces:
    - name: output
      description: The git repo will be cloned onto the volume backing this Workspace.
  params:
    - name: url
      description: Repository URL to clone from.
      type: string
    - name: revision
      description: Revision to checkout. (branch, tag, sha, ref, etc...)
      type: string
      default: ""
    - name: depth
      description: Perform a shallow clone, fetching only the most recent N commits.
      type: string
      default: "1"
    - name: subdirectory
      description: Subdirectory inside the output Workspace to clone the repo into.
      type: string
      default: ""
    - name: deleteExisting
      description: Clean out the contents of the destination directory if it already exists before cloning.
      type: string
      default: "true"
  results:
    - name: commit
      description: The precise commit SHA that was fetched by this Task.
    - name: url
      description: The precise URL that was fetched by this Task.
  steps:
    - name: clone
      image: alpine/git:2.47.2
      computeResources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1Gi
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        runAsUser: 65534
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
      script: |
        #!/bin/sh
        set -eu

        # Workspace may be owned by root (PVC); safe.directory avoids "dubious ownership" error
        git config --global --add safe.directory '*'

        CHECKOUT_DIR="$(workspaces.output.path)/$(params.subdirectory)"

        if [ "$(params.deleteExisting)" = "true" ] && [ -d "${CHECKOUT_DIR}" ]; then
          rm -rf "${CHECKOUT_DIR:?}"/*
          rm -rf "${CHECKOUT_DIR}"/.[!.]*
          rm -rf "${CHECKOUT_DIR}"/..?*
        fi

        git clone --depth "$(params.depth)" \
          "$(params.url)" "${CHECKOUT_DIR}"

        if [ -n "$(params.revision)" ]; then
          cd "${CHECKOUT_DIR}"
          git fetch --depth "$(params.depth)" origin "$(params.revision)"
          git checkout "$(params.revision)"
        fi

        cd "${CHECKOUT_DIR}"
        RESULT_SHA="$(git rev-parse HEAD)"
        printf "%s" "${RESULT_SHA}" > "$(results.commit.path)"
        printf "%s" "$(params.url)" > "$(results.url.path)"
