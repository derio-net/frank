# Builds a container image and pushes to Zot
# Default: Kaniko (no Docker daemon required, Talos-compatible)
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-push
  namespace: tekton-pipelines
spec:
  params:
    - name: image
      type: string
      description: "Full image reference (e.g., 192.168.55.210:5000/myapp:latest)"
    - name: dockerfile
      type: string
      default: "Dockerfile"
    - name: context
      type: string
      default: "."
  results:
    - name: IMAGE_DIGEST
      description: "Digest of the built image (e.g., sha256:abc123)"
  workspaces:
    - name: source
      description: "The git repo with Dockerfile"
    - name: dockerconfig
      description: "Docker config.json for registry auth"
  steps:
    - name: build-and-push
      image: gcr.io/kaniko-project/executor:v1.23.2
      computeResources:
        requests:
          cpu: 500m
          memory: 512Mi
        limits:
          memory: 4Gi
      args:
        - "--dockerfile=$(params.dockerfile)"
        - "--context=$(workspaces.source.path)/$(params.context)"
        - "--destination=$(params.image)"
        - "--digest-file=$(results.IMAGE_DIGEST.path)"
        - "--skip-tls-verify"
      env:
        - name: DOCKER_CONFIG
          value: $(workspaces.dockerconfig.path)
