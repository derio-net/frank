# Receives Gitea webhooks, validates HMAC signature, routes to trigger
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: gitea-listener
  namespace: tekton-pipelines
spec:
  serviceAccountName: tekton-triggers-sa
  triggers:
    - name: gitea-push
      interceptors:
        # Gitea sends X-Gitea-Event (not X-GitHub-Event), so the github
        # ClusterInterceptor silently drops Gitea webhooks. Use CEL instead.
        # HMAC validation is omitted — EventListener is ClusterIP-only,
        # not exposed outside the cluster.
        - ref:
            name: "cel"
          params:
            - name: "filter"
              value: >-
                header.match('X-Gitea-Event', 'push') &&
                !body.repository.full_name.startsWith('agentic-stoa/')
            - name: "overlays"
              value:
                - key: branch_name
                  expression: "body.ref.split('/')[2]"
        - ref:
            name: "cel"
          params:
            - name: "filter"
              value: >-
                extensions.branch_name != ''
      bindings:
        - ref: gitea-push-binding
      template:
        ref: gitea-pipeline-template
    # NOTE 2026-05-13 (rework Phase 4): the per-repo agentic-stoa CI triggers
    # (agentic-stoa-hum-ci, agentic-stoa-content-factory-ci) moved out of this
    # gitea-listener to the new github-listener (apps/tekton/triggers/
    # eventlistener-github.yaml). Their inline TriggerTemplates (hum-ci-
    # template, content-factory-ci-template) below are also removed —
    # eventlistener-github.yaml ships replacement github-aware versions
    # (hum-ci-github-template etc) that map github webhook payload fields
    # to the new pipeline param shape (github-repo, gitea-repo, sha, ref-to).
    # Frank's own gitea-push trigger (above, with the !startsWith filter)
    # stays here unchanged.
  resources:
    kubernetesResource:
      spec:
        template:
          spec:
            nodeSelector:
              kubernetes.io/hostname: pc-1
# Per-repo agentic-stoa TriggerTemplates (hum-ci-template, content-factory-ci-
# template) were removed 2026-05-13 (rework Phase 4); replacement github-aware
# versions ship in eventlistener-github.yaml. See the NOTE in the gitea-listener
# triggers block above for context.
