# Receives Gitea webhooks, validates HMAC signature, routes to trigger
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: gitea-listener
  namespace: tekton-pipelines
spec:
  serviceAccountName: tekton-triggers-sa
  triggers:
    - name: gitea-push
      interceptors:
        # Gitea sends X-Gitea-Event (not X-GitHub-Event), so the github
        # ClusterInterceptor silently drops Gitea webhooks. Use CEL instead.
        # HMAC validation is omitted — EventListener is ClusterIP-only,
        # not exposed outside the cluster.
        - ref:
            name: "cel"
          params:
            - name: "filter"
              value: >-
                header.match('X-Gitea-Event', 'push') &&
                !body.repository.full_name.startsWith('agentic-stoa/')
            - name: "overlays"
              value:
                - key: branch_name
                  expression: "body.ref.split('/')[2]"
        - ref:
            name: "cel"
          params:
            - name: "filter"
              value: >-
                extensions.branch_name != ''
      bindings:
        - ref: gitea-push-binding
      template:
        ref: gitea-pipeline-template
    - name: agentic-stoa-hum-ci
      interceptors:
        - ref:
            name: "cel"
          params:
            - name: "filter"
              value: >-
                header.match('X-Gitea-Event', 'push') &&
                body.repository.full_name == 'agentic-stoa/hum'
            - name: "overlays"
              value:
                - key: branch_name
                  expression: "body.ref.split('/')[2]"
        - ref:
            name: "cel"
          params:
            - name: "filter"
              value: >-
                extensions.branch_name != ''
      bindings:
        - ref: gitea-push-binding
      template:
        ref: hum-ci-template
    - name: agentic-stoa-content-factory-ci
      interceptors:
        - ref:
            name: "cel"
          params:
            - name: "filter"
              value: >-
                header.match('X-Gitea-Event', 'push') &&
                body.repository.full_name == 'agentic-stoa/content-factory'
            - name: "overlays"
              value:
                - key: branch_name
                  expression: "body.ref.split('/')[2]"
        - ref:
            name: "cel"
          params:
            - name: "filter"
              value: >-
                extensions.branch_name != ''
      bindings:
        - ref: gitea-push-binding
      template:
        ref: content-factory-ci-template
  resources:
    kubernetesResource:
      spec:
        template:
          spec:
            nodeSelector:
              kubernetes.io/hostname: pc-1
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: hum-ci-template
  namespace: tekton-pipelines
spec:
  # `branch` is supplied by gitea-push-binding but unused here — the hum-ci
  # Pipeline takes only repo-url/revision/repo-full-name. Tekton silently
  # accepts the extra binding param; we just don't declare it.
  params:
    - name: repo-url
    - name: revision
    - name: repo-full-name
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: hum-ci-
        namespace: tekton-pipelines
      spec:
        pipelineRef:
          name: hum-ci
        params:
          - name: repo-url
            value: $(tt.params.repo-url)
          - name: revision
            value: $(tt.params.revision)
          - name: repo-full-name
            value: $(tt.params.repo-full-name)
        taskRunTemplate:
          podTemplate:
            securityContext:
              fsGroup: 65534
        workspaces:
          - name: shared-workspace
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                storageClassName: longhorn-cicd
                resources:
                  requests:
                    storage: 2Gi
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: content-factory-ci-template
  namespace: tekton-pipelines
spec:
  # `branch` is supplied by gitea-push-binding but unused here — see hum-ci-template.
  params:
    - name: repo-url
    - name: revision
    - name: repo-full-name
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: content-factory-ci-
        namespace: tekton-pipelines
      spec:
        pipelineRef:
          name: content-factory-ci
        params:
          - name: repo-url
            value: $(tt.params.repo-url)
          - name: revision
            value: $(tt.params.revision)
          - name: repo-full-name
            value: $(tt.params.repo-full-name)
        taskRunTemplate:
          podTemplate:
            securityContext:
              fsGroup: 65534
        workspaces:
          - name: shared-workspace
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                storageClassName: longhorn-cicd
                resources:
                  requests:
                    storage: 2Gi
