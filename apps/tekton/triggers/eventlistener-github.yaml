apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: github-listener
  namespace: tekton-pipelines
spec:
  serviceAccountName: tekton-triggers-sa
  triggers:
    # ──────────────────────────────────────────────────────────────────
    # Per-repo CI triggers (Phase 4) — fire on PR opened/synchronized/
    # reopened. Each trigger calls the matching <repo>-ci Pipeline,
    # which inlines pull-and-push (GitHub→Gitea) + repo-specific test
    # body + dual-status finally (github + gitea).
    # ──────────────────────────────────────────────────────────────────
    - name: agentic-stoa-hum-pr
      interceptors:
        - name: github
          ref: {name: github, kind: ClusterInterceptor}
          params:
            - name: secretRef
              value:
                secretName: stoa-github-webhook-secret
                secretKey: secret
            - name: eventTypes
              value: ["pull_request"]
        - name: cel
          ref: {name: cel}
          params:
            - name: filter
              value: >-
                body.repository.full_name == 'agentic-stoa/hum' &&
                body.action in ['opened', 'synchronize', 'reopened']
            - name: overlays
              value:
                - {key: sha, expression: "body.pull_request.head.sha"}
                - {key: ref_to, expression: "'refs/heads/sync-pr-' + string(body.pull_request.number)"}
      bindings:
        - name: github-repo
          value: "agentic-stoa/hum"
        - name: gitea-repo
          value: "agentic-stoa/hum"
        - name: sha
          value: $(extensions.sha)
        - name: ref-to
          value: $(extensions.ref_to)
      template:
        ref: hum-ci-github-template

    - name: agentic-stoa-content-factory-pr
      interceptors:
        - name: github
          ref: {name: github, kind: ClusterInterceptor}
          params:
            - name: secretRef
              value:
                secretName: stoa-github-webhook-secret
                secretKey: secret
            - name: eventTypes
              value: ["pull_request"]
        - name: cel
          ref: {name: cel}
          params:
            - name: filter
              value: >-
                body.repository.full_name == 'agentic-stoa/content-factory' &&
                body.action in ['opened', 'synchronize', 'reopened']
            - name: overlays
              value:
                - {key: sha, expression: "body.pull_request.head.sha"}
                - {key: ref_to, expression: "'refs/heads/sync-pr-' + string(body.pull_request.number)"}
      bindings:
        - {name: github-repo, value: "agentic-stoa/content-factory"}
        - {name: gitea-repo,  value: "agentic-stoa/content-factory"}
        - {name: sha,         value: $(extensions.sha)}
        - {name: ref-to,      value: $(extensions.ref_to)}
      template:
        ref: content-factory-ci-github-template

    - name: agentic-stoa-stoa-blog-pr
      interceptors:
        - name: github
          ref: {name: github, kind: ClusterInterceptor}
          params:
            - name: secretRef
              value:
                secretName: stoa-github-webhook-secret
                secretKey: secret
            - name: eventTypes
              value: ["pull_request"]
        - name: cel
          ref: {name: cel}
          params:
            - name: filter
              value: >-
                body.repository.full_name == 'agentic-stoa/stoa-blog' &&
                body.action in ['opened', 'synchronize', 'reopened']
            - name: overlays
              value:
                - {key: sha, expression: "body.pull_request.head.sha"}
                - {key: ref_to, expression: "'refs/heads/sync-pr-' + string(body.pull_request.number)"}
      bindings:
        - {name: github-repo, value: "agentic-stoa/stoa-blog"}
        - {name: gitea-repo,  value: "agentic-stoa/stoa-blog"}
        - {name: sha,         value: $(extensions.sha)}
        - {name: ref-to,      value: $(extensions.ref_to)}
      template:
        ref: stoa-blog-ci-github-template

    # ──────────────────────────────────────────────────────────────────
    # Push-to-main trigger (Phase 5) — single trigger for all 4 repos.
    # Fires github-pull-sync (just the pull-and-push, no CI) so Gitea's
    # main branch catches up to GitHub's after a PR is merged.
    # `companies` (added 2026-06-04, gh #444) has no CI pipeline — its mirror
    # feeds the live-mirror-sync EventListener (stoa-live-mirror-sync app).
    # ──────────────────────────────────────────────────────────────────
    - name: agentic-stoa-main-sync
      interceptors:
        - name: github
          ref: {name: github, kind: ClusterInterceptor}
          params:
            - name: secretRef
              value:
                secretName: stoa-github-webhook-secret
                secretKey: secret
            - name: eventTypes
              value: ["push"]
        - name: cel
          ref: {name: cel}
          params:
            - name: filter
              value: >-
                body.repository.full_name in ['agentic-stoa/hum', 'agentic-stoa/content-factory', 'agentic-stoa/stoa-blog', 'agentic-stoa/companies', 'agentic-stoa/cnc-fr', 'agentic-stoa/cnc-frd', 'agentic-stoa/cnc-fru']
                && body.ref == 'refs/heads/main'
            - name: overlays
              value:
                - {key: repo_full_name, expression: "body.repository.full_name"}
                - {key: sha, expression: "body.after"}
      bindings:
        - {name: github-repo, value: $(extensions.repo_full_name)}
        - {name: gitea-repo,  value: $(extensions.repo_full_name)}
        - {name: sha,         value: $(extensions.sha)}
        - {name: ref-to,      value: "refs/heads/main"}
      template:
        ref: agentic-stoa-main-sync-template
    # CNC source mirrors and CI. The image build remains in each CNC repo's
    # GitHub workflow; this listener mirrors and tests the exact SHA.
    - name: agentic-stoa-cnc-fr-pr
      interceptors:
        - name: github
          ref: {name: github, kind: ClusterInterceptor}
          params:
            - {name: secretRef, value: {secretName: stoa-github-webhook-secret, secretKey: secret}}
            - {name: eventTypes, value: [pull_request]}
        - name: cel
          ref: {name: cel}
          params:
            - name: filter
              value: body.repository.full_name == 'agentic-stoa/cnc-fr' && body.action in ['opened', 'synchronize', 'reopened']
            - name: overlays
              value:
                - {key: sha, expression: "body.pull_request.head.sha"}
                - {key: ref_to, expression: "'refs/heads/sync-pr-' + string(body.pull_request.number)"}
      bindings:
        - {name: github-repo, value: agentic-stoa/cnc-fr}
        - {name: gitea-repo, value: agentic-stoa/cnc-fr}
        - {name: sha, value: $(extensions.sha)}
        - {name: ref-to, value: $(extensions.ref_to)}
        - {name: test-image, value: golang:1.24-alpine}
        - {name: test-command, value: go test ./...}
      template: {ref: cnc-fr-ci-template}
    - name: agentic-stoa-cnc-frd-pr
      interceptors:
        - name: github
          ref: {name: github, kind: ClusterInterceptor}
          params:
            - {name: secretRef, value: {secretName: stoa-github-webhook-secret, secretKey: secret}}
            - {name: eventTypes, value: [pull_request]}
        - name: cel
          ref: {name: cel}
          params:
            - name: filter
              value: body.repository.full_name == 'agentic-stoa/cnc-frd' && body.action in ['opened', 'synchronize', 'reopened']
            - name: overlays
              value:
                - {key: sha, expression: "body.pull_request.head.sha"}
                - {key: ref_to, expression: "'refs/heads/sync-pr-' + string(body.pull_request.number)"}
      bindings:
        - {name: github-repo, value: agentic-stoa/cnc-frd}
        - {name: gitea-repo, value: agentic-stoa/cnc-frd}
        - {name: sha, value: $(extensions.sha)}
        - {name: ref-to, value: $(extensions.ref_to)}
        - {name: test-image, value: golang:1.24-alpine}
        - {name: test-command, value: go test ./...}
      template: {ref: cnc-frd-ci-template}
    - name: agentic-stoa-cnc-fru-pr
      interceptors:
        - name: github
          ref: {name: github, kind: ClusterInterceptor}
          params:
            - {name: secretRef, value: {secretName: stoa-github-webhook-secret, secretKey: secret}}
            - {name: eventTypes, value: [pull_request]}
        - name: cel
          ref: {name: cel}
          params:
            - name: filter
              value: body.repository.full_name == 'agentic-stoa/cnc-fru' && body.action in ['opened', 'synchronize', 'reopened']
            - name: overlays
              value:
                - {key: sha, expression: "body.pull_request.head.sha"}
                - {key: ref_to, expression: "'refs/heads/sync-pr-' + string(body.pull_request.number)"}
      bindings:
        - {name: github-repo, value: agentic-stoa/cnc-fru}
        - {name: gitea-repo, value: agentic-stoa/cnc-fru}
        - {name: sha, value: $(extensions.sha)}
        - {name: ref-to, value: $(extensions.ref_to)}
        - {name: test-image, value: node:22-alpine}
        - {name: test-command, value: npm ci && npm test}
      template: {ref: cnc-fru-ci-template}
    # A repository_dispatch from the CNC release workflow starts promotion.
    # It is intentionally not a package webhook: the release workflow is the
    # authority that knows which cnc-frd/cnc-fru tags are a compatible set.
    - name: cnc-image-promotion
      interceptors:
        - name: github
          ref: {name: github, kind: ClusterInterceptor}
          params:
            - {name: secretRef, value: {secretName: stoa-github-webhook-secret, secretKey: secret}}
            - {name: eventTypes, value: [repository_dispatch]}
        - name: cel
          ref: {name: cel}
          params:
            - name: filter
              value: body.repository.full_name == 'agentic-stoa/cnc-frd' && body.action == 'cnc-image-ready'
            - name: overlays
              value:
                - {key: cncd_tag, expression: "body.client_payload.cncd_tag"}
                - {key: fru_tag, expression: "body.client_payload.fru_tag"}
      bindings:
        - {name: cncd-tag, value: $(extensions.cncd_tag)}
        - {name: fru-tag, value: $(extensions.fru_tag)}
      template: {ref: cnc-promotion-template}
  resources:
    kubernetesResource:
      spec:
        template:
          spec:
            nodeSelector:
              kubernetes.io/hostname: pc-1
---
apiVersion: v1
kind: Service
metadata:
  name: el-github-listener-lb
  namespace: tekton-pipelines
  annotations:
    lbipam.cilium.io/ips: "192.168.55.223"
spec:
  type: LoadBalancer
  selector:
    eventlistener: github-listener
  ports:
    - {name: http, port: 8080, targetPort: 8080, protocol: TCP}
---
# ────────────────────────────────────────────────────────────────────────
# TriggerTemplates for the per-repo CI Pipelines (Phase 4).
# Each scaffolds a PipelineRun with shared-workspace (PVC) + ssh-creds
# (Secret bound to stoa-bot-ssh-key for the pull-and-push step).
# ────────────────────────────────────────────────────────────────────────
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: hum-ci-github-template
  namespace: tekton-pipelines
spec:
  params:
    - name: github-repo
    - name: gitea-repo
    - name: sha
    - name: ref-to
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: hum-ci-
        namespace: tekton-pipelines
      spec:
        pipelineRef:
          name: hum-ci
        params:
          - {name: github-repo, value: $(tt.params.github-repo)}
          - {name: gitea-repo,  value: $(tt.params.gitea-repo)}
          - {name: sha,         value: $(tt.params.sha)}
          - {name: ref-to,      value: $(tt.params.ref-to)}
        taskRunTemplate:
          podTemplate:
            securityContext:
              fsGroup: 65534
            nodeSelector:
              kubernetes.io/hostname: pc-1
        workspaces:
          - name: shared-workspace
            volumeClaimTemplate:
              spec:
                accessModes: [ReadWriteOnce]
                storageClassName: longhorn-cicd
                resources:
                  requests: {storage: 5Gi}
          - name: ssh-creds
            secret:
              secretName: stoa-bot-ssh-key
              defaultMode: 0600
---
