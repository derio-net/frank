kind: TriggerTemplate
metadata:
  name: content-factory-ci-github-template
  namespace: tekton-pipelines
spec:
  params:
    - name: github-repo
    - name: gitea-repo
    - name: sha
    - name: ref-to
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: content-factory-ci-
        namespace: tekton-pipelines
      spec:
        pipelineRef: {name: content-factory-ci}
        params:
          - {name: github-repo, value: $(tt.params.github-repo)}
          - {name: gitea-repo,  value: $(tt.params.gitea-repo)}
          - {name: sha,         value: $(tt.params.sha)}
          - {name: ref-to,      value: $(tt.params.ref-to)}
        taskRunTemplate:
          podTemplate:
            securityContext: {fsGroup: 65534}
            nodeSelector: {kubernetes.io/hostname: pc-1}
        workspaces:
          - name: shared-workspace
            volumeClaimTemplate:
              spec:
                accessModes: [ReadWriteOnce]
                storageClassName: longhorn-cicd
                resources: {requests: {storage: 5Gi}}
          - name: ssh-creds
            secret: {secretName: stoa-bot-ssh-key, defaultMode: 0600}
---
