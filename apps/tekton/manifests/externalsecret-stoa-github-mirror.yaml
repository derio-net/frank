# agentic-stoa CI/mirror GitHub credential.
#
# Now sourced from the stoa-fr-automation GitHub App (ClusterGenerator
# github-app-stoa) instead of the clawdia-era PAT in Infisical
# (/agentic-stoa/STOA_GITHUB_MIRROR_TOKEN — retire it after this lands). ESO
# mints a short-lived (~1h) installation token; the generator emits key `token`,
# which is exactly what the tekton pipelines (hum-ci, content-factory-ci,
# stoa-blog-ci, github-pull-sync, github-status) already read from this Secret —
# so no consumer changes. refreshInterval 45m keeps a margin under the 1h TTL;
# tekton tasks read the Secret per run, so each run gets a current token.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: stoa-github-mirror
  namespace: tekton-pipelines
spec:
  refreshInterval: 45m
  target:
    name: stoa-github-mirror
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: github-app-stoa
