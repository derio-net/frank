apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: stoa-github-webhook-secret
  namespace: tekton-pipelines
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: stoa-github-webhook-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: secret
      remoteRef:
        # HMAC secret shared between GitHub webhook config (Phase 6) and
        # Tekton's `github` interceptor on the github-listener EventListener
        # (Phase 2). Absolute path because the `infisical` ClusterSecretStore
        # is scoped to / and stoa-org secrets live under /agentic-stoa.
        key: /agentic-stoa/STOA_GITHUB_WEBHOOK_SECRET
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
