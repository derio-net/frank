apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cosign-key
  namespace: tekton-pipelines
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: cosign-key
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: cosign.key
      remoteRef:
        key: COSIGN_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
