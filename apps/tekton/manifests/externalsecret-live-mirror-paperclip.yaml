# Paperclip fire-webhook credentials for the live-mirror-sync chain (gh #444).
# Consumed by the upstream `fire-paperclip-webhook` Task (Stoa-canonical,
# applied by the stoa-live-mirror-sync Application): `fireUrl` is the
# cluster-internal routine-trigger endpoint, `webhookSecret` the HMAC-SHA256
# signing secret (delivered out-of-band by Stoa's CTO — Infisical only, never
# in git/issues/chat). Key names are the upstream Task's contract — do not
# rename.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: live-mirror-paperclip
  namespace: tekton-pipelines
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: live-mirror-paperclip
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: fireUrl
      remoteRef:
        # Absolute path: stoa-org secrets live under /agentic-stoa (see
        # externalsecret-stoa-github-mirror.yaml for the rationale).
        key: /agentic-stoa/STOA_LIVE_MIRROR_FIRE_URL
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: webhookSecret
      remoteRef:
        key: /agentic-stoa/STOA_LIVE_MIRROR_HMAC_SECRET
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
