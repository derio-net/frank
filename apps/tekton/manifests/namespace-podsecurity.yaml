# Relax PodSecurity from "restricted" to "baseline" for tekton-pipelines
# Required: Kaniko builds run as root (no daemon, but needs filesystem access)
# baseline still blocks: privileged, hostNetwork, hostPID, hostIPC
apiVersion: v1
kind: Namespace
metadata:
  name: tekton-pipelines
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
