# Shared secret between the Gitea webhook on the agentic-stoa/companies mirror
# and the live-mirror-sync EventListener's `github` interceptor (gh #444).
# Minted locally (openssl rand -hex 32); the same value is configured on the
# Gitea webhook form — wired LAST in the bring-up ordering (see the plan's
# Phase 3). Secret/key names are the upstream EventListener's contract — do
# not rename.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: live-mirror-gitea-webhook
  namespace: tekton-pipelines
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: live-mirror-gitea-webhook
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: webhookSecret
      remoteRef:
        # Absolute path: stoa-org secrets live under /agentic-stoa.
        key: /agentic-stoa/STOA_LIVE_MIRROR_GITEA_WEBHOOK_SECRET
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
