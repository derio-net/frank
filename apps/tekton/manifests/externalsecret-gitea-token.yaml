apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-api-token
  namespace: tekton-pipelines
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: gitea-api-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: GITEA_API_TOKEN
