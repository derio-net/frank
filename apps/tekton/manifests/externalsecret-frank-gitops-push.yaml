# derio-net installation token for the CNC promotion pipeline's push to
# derio-net/frank (the GitOps repo). The mirror token (stoa-github-mirror) is
# minted from the AGENTIC-STOA installation (github-app-stoa) — it can read the
# agentic-stoa cnc-* sources but CANNOT push to derio-net/frank. This ES mints a
# short-lived (~1h) token from the DERIO-NET installation (github-app-derio,
# installID 138773908) so the promote tasks can commit the image-tag bumps.
#
# PREREQUISITE: the derio-net GitHub App install must have contents:write on
# derio-net/frank. The promotion Pipeline fails closed if it cannot push.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: frank-gitops-push
  namespace: tekton-pipelines
spec:
  refreshInterval: 45m
  target:
    name: frank-gitops-push
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: github-app-derio
