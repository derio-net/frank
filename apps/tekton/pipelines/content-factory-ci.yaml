# CI for agentic-stoa/content-factory: pull from GitHub → push to Gitea →
# pip install + pytest → dual-status to both GitHub and Gitea.
#
# Reworked 2026-05-13 — see hum-ci.yaml header for design context.
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: content-factory-ci
  namespace: tekton-pipelines
spec:
  params:
    - {name: github-repo, type: string}
    - {name: gitea-repo,  type: string}
    - {name: sha,         type: string}
    - {name: ref-to,      type: string}
  workspaces:
    - name: shared-workspace
    - name: ssh-creds
  tasks:
    - name: pull-and-push
      workspaces:
        - {name: source, workspace: shared-workspace}
        - {name: ssh,    workspace: ssh-creds}
      taskSpec:
        params:
          - {name: github-repo, type: string}
          - {name: gitea-repo,  type: string}
          - {name: sha,         type: string}
          - {name: ref-to,      type: string}
        workspaces:
          - {name: source}
          - {name: ssh, mountPath: /workspace/ssh-creds}
        steps:
          - name: pull-and-push
            image: alpine/git:2.47.2
            computeResources:
              requests: {cpu: 100m, memory: 128Mi}
              limits:   {memory: 1Gi}
            securityContext:
              allowPrivilegeEscalation: false
              runAsNonRoot: true
              runAsUser: 65534
              capabilities: {drop: ["ALL"]}
              seccompProfile: {type: RuntimeDefault}
            env:
              - {name: HOME, value: /tekton/home}
              - name: GITHUB_TOKEN
                valueFrom:
                  secretKeyRef: {name: stoa-github-mirror, key: token}
            script: |
              #!/bin/sh
              set -eu
              mkdir -p "$HOME/.ssh"
              cp /workspace/ssh-creds/id_rsa "$HOME/.ssh/id_rsa"
              chmod 600 "$HOME/.ssh/id_rsa"
              git config --global --add safe.directory '*'
              cd "$(workspaces.source.path)"
              git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/$(params.github-repo).git" repo
              cd repo
              REPO_NAME="$(echo "$(params.gitea-repo)" | awk -F/ '{print $NF}')"
              ORG_NAME="$(echo "$(params.gitea-repo)" | awk -F/ '{print $1}')"
              git remote remove gitea 2>/dev/null || true
              git remote add gitea "ssh://git@192.168.55.209:2222/${ORG_NAME}/${REPO_NAME}.git"
              echo "Pushing $(params.sha) → gitea:$(params.ref-to)"
              GIT_SSH_COMMAND="ssh -i $HOME/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR" \
                git push --force gitea "$(params.sha):$(params.ref-to)"
              echo "OK"
      params:
        - {name: github-repo, value: "$(params.github-repo)"}
        - {name: gitea-repo,  value: "$(params.gitea-repo)"}
        - {name: sha,         value: "$(params.sha)"}
        - {name: ref-to,      value: "$(params.ref-to)"}
    - name: test
      runAfter: [pull-and-push]
      workspaces:
        - {name: source, workspace: shared-workspace}
      taskSpec:
        workspaces:
          - {name: source}
        steps:
          - name: pytest
            image: python:3.13-slim
            workingDir: $(workspaces.source.path)/repo
            securityContext:
              allowPrivilegeEscalation: false
              runAsNonRoot: true
              runAsUser: 65534
              capabilities: {drop: ["ALL"]}
              seccompProfile: {type: RuntimeDefault}
            env:
              - {name: HOME, value: /tekton/home}
              - {name: PIP_CACHE_DIR, value: /tekton/home/.pip-cache}
              - {name: PIP_DISABLE_PIP_VERSION_CHECK, value: "1"}
              - {name: PYTHONDONTWRITEBYTECODE, value: "1"}
            computeResources:
              requests: {cpu: 500m, memory: 512Mi}
              limits:   {memory: 2Gi}
            script: |
              #!/bin/sh
              set -eu
              # content-factory's tests/test_quality_check_sh.py shells out to
              # `jq`, which python:3.13-slim doesn't ship. We run as UID 65534
              # so apt-get isn't an option — drop a static jq binary into
              # HOME/bin and prepend to PATH. Pinned version so CI is
              # reproducible. (2026-05-13 rework smoke discovery.)
              mkdir -p "$HOME/bin"
              JQ_VERSION=1.7.1
              JQ_URL="https://github.com/jqlang/jq/releases/download/jq-${JQ_VERSION}/jq-linux-amd64"
              # python:3.13-slim has wget but not curl; use python's stdlib
              # urllib via a one-liner — most reliable.
              python -c "import urllib.request; urllib.request.urlretrieve('$JQ_URL', '$HOME/bin/jq')"
              chmod +x "$HOME/bin/jq"
              export PATH="$HOME/bin:$PATH"
              jq --version

              python -m venv /tekton/home/venv
              . /tekton/home/venv/bin/activate
              if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
              if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
              # Run pytest; treat exit 5 (no tests collected) as success
              # so a repo without tests doesn't fail CI.
              pytest -v || [ $? -eq 5 ]
  finally:
    - name: github-status-success
      when: [{input: $(tasks.status), operator: in, values: ["Succeeded", "Completed"]}]
      taskRef: {name: github-status}
      params:
        - {name: repo-full-name, value: $(params.github-repo)}
        - {name: revision,       value: $(params.sha)}
        - {name: state,          value: "success"}
        - {name: description,    value: "All checks passed"}
        - {name: context,        value: "tekton/ci"}
    - name: github-status-failure
      when: [{input: $(tasks.status), operator: notin, values: ["Succeeded", "Completed"]}]
      taskRef: {name: github-status}
      params:
        - {name: repo-full-name, value: $(params.github-repo)}
        - {name: revision,       value: $(params.sha)}
        - {name: state,          value: "failure"}
        - {name: description,    value: "CI failed"}
        - {name: context,        value: "tekton/ci"}
    # gitea-status: best-effort secondary, see hum-ci comment.
    - name: gitea-status-success
      when: [{input: $(tasks.status), operator: in, values: ["Succeeded", "Completed"]}]
      onError: continue
      taskRef: {name: gitea-status}
      params:
        - {name: repo-full-name, value: $(params.gitea-repo)}
        - {name: revision,       value: $(params.sha)}
        - {name: state,          value: "success"}
        - {name: description,    value: "All checks passed"}
        - {name: context,        value: "tekton/ci"}
    - name: gitea-status-failure
      when: [{input: $(tasks.status), operator: notin, values: ["Succeeded", "Completed"]}]
      onError: continue
      taskRef: {name: gitea-status}
      params:
        - {name: repo-full-name, value: $(params.gitea-repo)}
        - {name: revision,       value: $(params.sha)}
        - {name: state,          value: "failure"}
        - {name: description,    value: "CI failed"}
        - {name: context,        value: "tekton/ci"}
