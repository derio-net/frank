# CI for agentic-stoa/hum: npm install + typecheck + test across workspaces.
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: hum-ci
  namespace: tekton-pipelines
spec:
  params:
    - name: repo-url
      type: string
    - name: revision
      type: string
    - name: repo-full-name
      type: string
  workspaces:
    - name: shared-workspace
  tasks:
    - name: clone
      taskRef:
        name: git-clone
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.revision)
      workspaces:
        - name: output
          workspace: shared-workspace
    - name: test
      runAfter: ["clone"]
      workspaces:
        - name: source
          workspace: shared-workspace
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: npm-test
            image: node:22-alpine
            workingDir: $(workspaces.source.path)
            securityContext:
              allowPrivilegeEscalation: false
              runAsNonRoot: true
              runAsUser: 1000
              capabilities:
                drop: ["ALL"]
              seccompProfile:
                type: RuntimeDefault
            env:
              - name: HOME
                value: /tekton/home
              - name: npm_config_cache
                value: /tekton/home/.npm
            computeResources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                memory: 2Gi
            script: |
              #!/bin/sh
              set -eu
              run_in() {
                d="$1"
                echo "=== $d ==="
                cd "$d"
                if [ -f package-lock.json ]; then npm ci; else npm install; fi
                npm pkg get scripts.typecheck >/dev/null 2>&1 && npm run typecheck || echo "no typecheck script in $d"
                npm pkg get scripts.test >/dev/null 2>&1 && npm test || echo "no test script in $d"
                cd - >/dev/null
              }
              run_in .
              for ws in backend shared; do
                [ -f "$ws/package.json" ] && run_in "$ws"
              done
  finally:
    - name: report-success
      when:
        - input: $(tasks.status)
          operator: in
          values: ["Succeeded", "Completed"]
      taskRef:
        name: gitea-status
      params:
        - name: repo-full-name
          value: $(params.repo-full-name)
        - name: revision
          value: $(params.revision)
        - name: state
          value: "success"
        - name: description
          value: "All checks passed"
        - name: context
          value: "tekton/ci"
    - name: report-failure
      when:
        - input: $(tasks.status)
          operator: notin
          values: ["Succeeded", "Completed"]
      taskRef:
        name: gitea-status
      params:
        - name: repo-full-name
          value: $(params.repo-full-name)
        - name: revision
          value: $(params.revision)
        - name: state
          value: "failure"
        - name: description
          value: "CI failed"
        - name: context
          value: "tekton/ci"
