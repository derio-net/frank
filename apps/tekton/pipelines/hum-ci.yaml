# CI for agentic-stoa/hum: npm install + typecheck + test across workspaces.
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: hum-ci
  namespace: tekton-pipelines
spec:
  params:
    - name: repo-url
      type: string
    - name: revision
      type: string
    - name: repo-full-name
      type: string
  workspaces:
    - name: shared-workspace
  tasks:
    - name: clone
      taskRef:
        name: git-clone
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.revision)
      workspaces:
        - name: output
          workspace: shared-workspace
    - name: test
      runAfter: ["clone"]
      workspaces:
        - name: source
          workspace: shared-workspace
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: npm-test
            image: node:22-alpine
            workingDir: $(workspaces.source.path)
            securityContext:
              allowPrivilegeEscalation: false
              runAsNonRoot: true
              # Match git-clone (UID 65534) to avoid cross-UID handoff on the
              # shared RWO PVC. fsGroup (set on the TriggerTemplate's PodTemplate)
              # also = 65534, so writes by either step are group-readable.
              runAsUser: 65534
              capabilities:
                drop: ["ALL"]
              seccompProfile:
                type: RuntimeDefault
            env:
              - name: HOME
                value: /tekton/home
              - name: npm_config_cache
                value: /tekton/home/.npm
            computeResources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                memory: 2Gi
            script: |
              #!/bin/sh
              # `set -eu` doesn't propagate into && / || chains, so use explicit
              # if/else around `npm run typecheck` / `npm test` — otherwise a
              # real type-error or test-failure (exit 1) takes the `|| echo`
              # branch and the run continues green. `npm pkg get` exits 0 even
              # for missing keys, returning literal "{}", so check the value.
              set -eu
              has_script() {
                [ "$(npm pkg get "scripts.$1" 2>/dev/null)" != "{}" ]
              }
              run_in() {
                d="$1"
                echo "=== $d ==="
                cd "$d"
                if [ -f package-lock.json ]; then npm ci; else npm install; fi
                if has_script typecheck; then
                  npm run typecheck
                else
                  echo "no typecheck script in $d"
                fi
                if has_script test; then
                  npm test
                else
                  echo "no test script in $d"
                fi
                cd - >/dev/null
              }
              run_in .
              for ws in backend shared; do
                [ -f "$ws/package.json" ] && run_in "$ws"
              done
  finally:
    - name: report-success
      when:
        - input: $(tasks.status)
          operator: in
          values: ["Succeeded", "Completed"]
      taskRef:
        name: gitea-status
      params:
        - name: repo-full-name
          value: $(params.repo-full-name)
        - name: revision
          value: $(params.revision)
        - name: state
          value: "success"
        - name: description
          value: "All checks passed"
        - name: context
          value: "tekton/ci"
    - name: report-failure
      when:
        - input: $(tasks.status)
          operator: notin
          values: ["Succeeded", "Completed"]
      taskRef:
        name: gitea-status
      params:
        - name: repo-full-name
          value: $(params.repo-full-name)
        - name: revision
          value: $(params.revision)
        - name: state
          value: "failure"
        - name: description
          value: "CI failed"
        - name: context
          value: "tekton/ci"
