# CI for agentic-stoa/stoa-blog: pull from GitHub → push to Gitea → Hugo build
# smoke check → dual-status to both GitHub and Gitea.
#
# stoa-blog is a Hugo blog (the operator's writing surface). CI here is a
# minimal smoke — `hugo --minify --quiet` exits 0 if the site builds cleanly.
# Operator should evolve this body as the blog acquires real CI needs
# (linkcheck, image optimization, broken-shortcode detection, etc.).
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: stoa-blog-ci
  namespace: tekton-pipelines
spec:
  params:
    - {name: github-repo, type: string}
    - {name: gitea-repo,  type: string}
    - {name: sha,         type: string}
    - {name: ref-to,      type: string}
  workspaces:
    - name: shared-workspace
    - name: ssh-creds
  tasks:
    - name: pull-and-push
      workspaces:
        - {name: source, workspace: shared-workspace}
        - {name: ssh,    workspace: ssh-creds}
      taskSpec:
        params:
          - {name: github-repo, type: string}
          - {name: gitea-repo,  type: string}
          - {name: sha,         type: string}
          - {name: ref-to,      type: string}
        workspaces:
          - {name: source}
          - {name: ssh, mountPath: /workspace/ssh-creds}
        steps:
          - name: pull-and-push
            image: alpine/git:2.47.2
            computeResources:
              requests: {cpu: 100m, memory: 128Mi}
              limits:   {memory: 1Gi}
            securityContext:
              allowPrivilegeEscalation: false
              runAsNonRoot: true
              runAsUser: 65534
              capabilities: {drop: ["ALL"]}
              seccompProfile: {type: RuntimeDefault}
            env:
              - {name: HOME, value: /tekton/home}
              - name: GITHUB_TOKEN
                valueFrom:
                  secretKeyRef: {name: stoa-github-mirror, key: token}
            script: |
              #!/bin/sh
              set -eu
              mkdir -p "$HOME/.ssh"
              cp /workspace/ssh-creds/id_rsa "$HOME/.ssh/id_rsa"
              chmod 600 "$HOME/.ssh/id_rsa"
              git config --global --add safe.directory '*'
              cd "$(workspaces.source.path)"
              git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/$(params.github-repo).git" repo
              cd repo
              REPO_NAME="$(echo "$(params.gitea-repo)" | awk -F/ '{print $NF}')"
              ORG_NAME="$(echo "$(params.gitea-repo)" | awk -F/ '{print $1}')"
              git remote remove gitea 2>/dev/null || true
              git remote add gitea "ssh://git@192.168.55.209:2222/${ORG_NAME}/${REPO_NAME}.git"
              echo "Pushing $(params.sha) → gitea:$(params.ref-to)"
              GIT_SSH_COMMAND="ssh -i $HOME/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR" \
                git push --force gitea "$(params.sha):$(params.ref-to)"
              echo "OK"
      params:
        - {name: github-repo, value: "$(params.github-repo)"}
        - {name: gitea-repo,  value: "$(params.gitea-repo)"}
        - {name: sha,         value: "$(params.sha)"}
        - {name: ref-to,      value: "$(params.ref-to)"}
    - name: hugo-build
      runAfter: [pull-and-push]
      workspaces:
        - {name: source, workspace: shared-workspace}
      taskSpec:
        workspaces:
          - {name: source}
        steps:
          - name: hugo-build
            # Match Frank's own blog Dockerfile (blog/Dockerfile) for image
            # consistency. The gohugoio image is built from the upstream
            # release, includes Hugo Extended (sass), and ships on GHCR.
            image: ghcr.io/gohugoio/hugo:v0.157.0
            workingDir: $(workspaces.source.path)/repo
            securityContext:
              allowPrivilegeEscalation: false
              runAsNonRoot: true
              runAsUser: 65534
              capabilities: {drop: ["ALL"]}
              seccompProfile: {type: RuntimeDefault}
            env:
              - {name: HOME, value: /tekton/home}
            computeResources:
              requests: {cpu: 500m, memory: 512Mi}
              limits:   {memory: 2Gi}
            script: |
              #!/bin/sh
              set -eu
              # Hextra Hugo Module — fetch deps (uses Go mod cache under HOME)
              if [ -f go.mod ]; then hugo mod get -u; fi
              # Build the site; --minify catches more rendering errors than --quiet
              hugo --minify --quiet
              # Sanity: at least one page generated
              [ "$(find public -name '*.html' | wc -l)" -gt 0 ] && echo "OK ($(find public -name '*.html' | wc -l) pages)"
  finally:
    - name: github-status-success
      when: [{input: $(tasks.status), operator: in, values: ["Succeeded", "Completed"]}]
      taskRef: {name: github-status}
      params:
        - {name: repo-full-name, value: $(params.github-repo)}
        - {name: revision,       value: $(params.sha)}
        - {name: state,          value: "success"}
        - {name: description,    value: "Hugo build clean"}
        - {name: context,        value: "tekton/ci"}
    - name: github-status-failure
      when: [{input: $(tasks.status), operator: notin, values: ["Succeeded", "Completed"]}]
      taskRef: {name: github-status}
      params:
        - {name: repo-full-name, value: $(params.github-repo)}
        - {name: revision,       value: $(params.sha)}
        - {name: state,          value: "failure"}
        - {name: description,    value: "Hugo build failed"}
        - {name: context,        value: "tekton/ci"}
    # gitea-status: best-effort secondary, see hum-ci comment.
    - name: gitea-status-success
      when: [{input: $(tasks.status), operator: in, values: ["Succeeded", "Completed"]}]
      onError: continue
      taskRef: {name: gitea-status}
      params:
        - {name: repo-full-name, value: $(params.gitea-repo)}
        - {name: revision,       value: $(params.sha)}
        - {name: state,          value: "success"}
        - {name: description,    value: "Hugo build clean"}
        - {name: context,        value: "tekton/ci"}
    - name: gitea-status-failure
      when: [{input: $(tasks.status), operator: notin, values: ["Succeeded", "Completed"]}]
      onError: continue
      taskRef: {name: gitea-status}
      params:
        - {name: repo-full-name, value: $(params.gitea-repo)}
        - {name: revision,       value: $(params.sha)}
        - {name: state,          value: "failure"}
        - {name: description,    value: "Hugo build failed"}
        - {name: context,        value: "tekton/ci"}
