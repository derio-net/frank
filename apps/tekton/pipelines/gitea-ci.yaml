# Main CI pipeline triggered by Gitea webhooks
# Stages: clone → test → build/push → cosign sign → report status
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: gitea-ci
  namespace: tekton-pipelines
spec:
  params:
    - name: repo-url
      type: string
    - name: revision
      type: string
    - name: repo-full-name
      type: string
    - name: branch
      type: string
    - name: test-command
      type: string
      default: "echo 'No tests configured — pipeline works!'"
    - name: image
      type: string
      default: ""
      description: "Image to build and push (empty = skip build)"
  workspaces:
    - name: shared-workspace
    - name: docker-credentials
      optional: true
      description: "Docker config.json for registry auth (bound to zot-push-creds Secret)"
  tasks:
    - name: clone
      taskRef:
        kind: Task
        name: git-clone
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.revision)
      workspaces:
        - name: output
          workspace: shared-workspace
    - name: test
      runAfter: ["clone"]
      taskRef:
        kind: Task
        name: run-tests
      params:
        - name: test-command
          value: $(params.test-command)
      workspaces:
        - name: source
          workspace: shared-workspace
    - name: build-push
      runAfter: ["test"]
      when:
        - input: $(params.image)
          operator: notin
          values: [""]
      taskRef:
        kind: Task
        name: build-push
      params:
        - name: image
          value: $(params.image)
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: dockerconfig
          workspace: docker-credentials
    # Sign by digest (not tag) to prevent TOCTOU — the digest is captured
    # by Kaniko's --digest-file during the build-push step
    - name: sign
      runAfter: ["build-push"]
      when:
        - input: $(params.image)
          operator: notin
          values: [""]
      taskRef:
        kind: Task
        name: cosign-sign
      params:
        - name: image
          value: "$(params.image)@$(tasks.build-push.results.IMAGE_DIGEST)"
  finally:
    - name: report-success
      when:
        # "Completed" = all tasks succeeded or were skipped via when clauses
        # "Succeeded" = all tasks ran and succeeded (no skips)
        - input: $(tasks.status)
          operator: in
          values: ["Succeeded", "Completed"]
      taskRef:
        kind: Task
        name: gitea-status
      params:
        - name: repo-full-name
          value: $(params.repo-full-name)
        - name: revision
          value: $(params.revision)
        - name: state
          value: "success"
        - name: description
          value: "All checks passed"
    - name: report-failure
      when:
        - input: $(tasks.status)
          operator: notin
          values: ["Succeeded", "Completed"]
      taskRef:
        kind: Task
        name: gitea-status
      params:
        - name: repo-full-name
          value: $(params.repo-full-name)
        - name: revision
          value: $(params.revision)
        - name: state
          value: "failure"
        - name: description
          value: "Pipeline failed"
