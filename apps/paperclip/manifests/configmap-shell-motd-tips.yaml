# Mounted as /etc/profile.d/60-paperclip-shell-tips.sh in the paperclip-shell
# sidecar (subPath of a single file). Sourced after the image-baked
# /etc/profile.d/50-paperclip-shell-motd.sh, so the reconcile summary still
# prints first; this script appends the paperclip-specific install pattern
# that operators consistently forget across long gaps. Lives in the frank
# repo (not the agent-shell-base image) because the recipe references
# paperclip-only paths (/paperclip/agent-bin/, deployment.yaml's PATH env)
# that don't generalize to other shell sidecars (ruflo, etc.).
apiVersion: v1
kind: ConfigMap
metadata:
  name: paperclip-shell-motd-tips
  namespace: paperclip-system
  labels:
    app.kubernetes.io/name: paperclip
    app.kubernetes.io/component: shell-tips
data:
  60-paperclip-shell-tips.sh: |
    # Mounted from apps/paperclip/manifests/configmap-shell-motd-tips.yaml.
    # Prints the paperclip CLI install pattern on interactive login. Edit
    # the source ConfigMap (not this in-pod file) — subPath mounts don't
    # hot-reload, so changes ship via the next deployment roll.
    [ -n "$PS1" ] || return 0
    cat <<'TIPS'

    ─── paperclip CLI install reminder ──────────────────────────────────────
     Install for the *paperclip server* (Test environment + runtime spawns
     happen INSIDE the paperclip container, NOT here in paperclip-shell):
         npm install --prefix /paperclip/agent-bin <pkg>
     paperclip's PATH is suffixed with /paperclip/agent-bin/node_modules/.bin
     via apps/paperclip/manifests/deployment.yaml. Image-baked /usr/local/bin
     binaries still win; the PVC fills gaps (e.g. @google/gemini-cli) only.

     Install for *this shell* (operator SSH use): edit
     apps/paperclip/manifests/configmap-shell-inventory.yaml (declarative;
     reconciled by paperclip-shell-reconcile at boot and on demand).
    ─────────────────────────────────────────────────────────────────────────
    TIPS
    # Print LiteLLM-backed-agents tip only when one or both CLIs are absent.
    # opencode is image-baked (/usr/local/bin/opencode), but the PVC install
    # is the operator-reconciled copy — its absence signals a cold/wiped PVC
    # that needs a reconcile. hermes is PVC-only (shim at /paperclip/agent-bin/bin/).
    if [ ! -x /paperclip/agent-bin/node_modules/.bin/opencode ] || \
       [ ! -x /paperclip/agent-bin/bin/hermes ]; then
      cat <<'LITELLM_TIPS'

    ─── LiteLLM-backed agents (one or both CLIs missing — run reconcile) ───
     Frank's local LLM gateway (LiteLLM → Ollama on gpu-1) is wired into
     Paperclip via two adapters. Both need a one-time install on the PVC:

       opencode_local  — opencode CLI; config via opencode.json (ConfigMap):
                         XDG_CONFIG_HOME=/etc/paperclip/opencode-base
                         Model shape:    litellm/qwen-coder-14b
                         Install check:  ls /paperclip/agent-bin/node_modules/.bin/opencode
                         Reconcile:      paperclip-shell-reconcile

       hermes_local    — Hermes Agent (Nous Research, Python, v2026.4.16).
                         Provider: ollama-cloud (OLLAMA_BASE_URL → LiteLLM).
                         HERMES_HOME:    /paperclip/agent-bin/.hermes/
                         Config seeded by hermes-init initContainer each boot.
                         Model shape:    --provider ollama-cloud --model <alias>
                         Aliases:        qwen-coder-14b, qwen-think-14b,
                                         mistral-small-24b, qwen36-a3b,
                                         qwen36-a3b-nothin, gemma-12b
                         Install check:  ls /paperclip/agent-bin/bin/hermes
                         Reconcile:      paperclip-shell-reconcile

     Hire: Paperclip UI at http://192.168.55.212:3100 or paperclip-create-agent
     skill. Both adapters need only adapterConfig.model — no per-agent env.
     Full runbook:
       docs/runbooks/frank-gotchas/paperclip-ruflo.md#litellm-backed-agents
    ─────────────────────────────────────────────────────────────────────────
    LITELLM_TIPS
    fi
