apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperclip
  namespace: paperclip-system
  labels:
    app.kubernetes.io/name: paperclip
    app.kubernetes.io/component: server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: paperclip
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paperclip
        app.kubernetes.io/component: server
    spec:
      # cont-finish.d (s6 shutdown) saves the shell sidecar's tmux state
      # and similar housekeeping. Mirrors secure-agent-pod / ruflo grace.
      terminationGracePeriodSeconds: 45
      # Pinned to gpu-1: the 2Gi limit (bumped from 1Gi in 1306b38) was still
      # OOM-killing under load, so we move to a 12Gi limit on the node with
      # 128GB headroom rather than push the control-plane minis (64GB each).
      # No GPU is requested — gpu-1 is also our biggest CPU/RAM box and is
      # currently only ~20% requested. The nvidia.com/gpu:NoSchedule
      # toleration mirrors the cluster's defensive idiom (ollama, n8n,
      # openrgb, secure-agent-pod) so paperclip survives any future re-assert
      # of the gpu-only taint.
      nodeSelector:
        kubernetes.io/hostname: gpu-1
      tolerations:
        - key: nvidia.com/gpu
          effect: NoSchedule
      securityContext:
        fsGroup: 1000
      # NOTE: `shareProcessNamespace: true` was in the original Phase 2 plan
      # so the shell sidecar could `ps -ef` paperclip's tree, but it's
      # incompatible with the agent-shell-base s6-overlay v3 init under
      # `runAsNonRoot`: `s6-overlay-suexec: fatal: can only run as pid 1`.
      # With the shared namespace the second container's entrypoint is not
      # pid 1, so s6 bails before any service starts. Same trade-off ruflo
      # made (see PR #196): we forgo the cross-container `ps` for a working
      # sshd; the shell still gets full visibility into `/paperclip` (the
      # actual debugging surface) via the shared PVC.
      containers:
        - name: paperclip
          # Upstream public image. Pinned by digest-equivalent sha tag.
          # sha-c445e59 is release v2026.512.0 (2026-05-12) — the first
          # tagged release after the gemini-cli 0.38 parser fixes
          # (#5143, #5273) and the bridge for `latest` floats past it.
          # Tag scheme is upstream's: only `latest` (master HEAD),
          # `canary`, and `sha-<short>` are published — no semver image
          # tags. We pin to the sha for traceability: v2026.512.0 →
          # commit c445e5925628d11bf59d52604b8aa63a6e9aa800.
          # Manifest digest: sha256:40f1364fae014a50ad32d47a5f6ba8c267a9e8671d8f4f3dfb205f39bc21039b
          # Bumped from sha-9578dc3 (sha256:16b22f130abc60f845d28b52e0dc94bd3f1e58897d09d3c8497e64e53e67b534).
          image: ghcr.io/paperclipai/paperclip:sha-c445e59
          ports:
            - name: http
              containerPort: 3100
              protocol: TCP
          envFrom:
            - configMapRef:
                name: paperclip-config
            - secretRef:
                name: paperclip-llm-key
            - secretRef:
                name: paperclip-auth
            - secretRef:
                name: paperclip-brave
                optional: true
            - secretRef:
                name: paperclip-resend
                optional: true
          env:
            # Paperclip's "Test environment" (and every other agent-CLI
            # invocation paperclip spawns at runtime) runs in *this*
            # container, NOT in the paperclip-shell sidecar. The two
            # containers don't share rootfs and `shareProcessNamespace`
            # is false (see comment above). The only cross-container
            # seam is the `paperclip-data` PVC mounted at /paperclip in
            # both. Operator-installed agent CLIs live on that PVC at
            # /paperclip/agent-bin/, populated via:
            #   npm install --prefix /paperclip/agent-bin <pkg>
            # from paperclip-shell. Suffix (not prefix) so image-baked
            # binaries at /usr/local/bin still win — paperclip's pinned
            # codex stays authoritative; we only fill gaps (gemini).
            # TODO: lift this install from operator-imperative to a
            # declarative initContainer so PVC wipe regenerates state.
            - name: PATH
              value: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/paperclip/agent-bin/node_modules/.bin"
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: paperclip-db-postgresql
                  key: password
            - name: DATABASE_URL
              value: "postgres://paperclip:$(PG_PASSWORD)@paperclip-db-postgresql.paperclip-system.svc:5432/paperclip"
          volumeMounts:
            - name: data
              mountPath: /paperclip
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 12Gi
              cpu: "1"
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15

        # ----- paperclip-shell (interactive maintainer sidecar) ------
        # Operator's SSH+Mosh entry point. Independent home PVC keeps
        # mise/cargo/pipx state across pod restarts. The cont-init.d
        # inventory installer reconciles the operator's declared toolset
        # against the home PVC at boot. Image SHA pinned to agent-images
        # main HEAD (8af0d08) — see plan Deployment Notes.
        - name: paperclip-shell
          image: ghcr.io/derio-net/paperclip-shell:b5be10c0e59f0bc9442d92d388c2dbbc52deec4c
          imagePullPolicy: IfNotPresent
          ports:
            - { name: ssh,         containerPort: 2222,  protocol: TCP }
            - { name: mosh-60000,  containerPort: 60000, protocol: UDP }
            - { name: mosh-60001,  containerPort: 60001, protocol: UDP }
            - { name: mosh-60002,  containerPort: 60002, protocol: UDP }
            - { name: mosh-60003,  containerPort: 60003, protocol: UDP }
            - { name: mosh-60004,  containerPort: 60004, protocol: UDP }
            - { name: mosh-60005,  containerPort: 60005, protocol: UDP }
            - { name: mosh-60006,  containerPort: 60006, protocol: UDP }
            - { name: mosh-60007,  containerPort: 60007, protocol: UDP }
            - { name: mosh-60008,  containerPort: 60008, protocol: UDP }
            - { name: mosh-60009,  containerPort: 60009, protocol: UDP }
            - { name: mosh-60010,  containerPort: 60010, protocol: UDP }
            - { name: mosh-60011,  containerPort: 60011, protocol: UDP }
            - { name: mosh-60012,  containerPort: 60012, protocol: UDP }
            - { name: mosh-60013,  containerPort: 60013, protocol: UDP }
            - { name: mosh-60014,  containerPort: 60014, protocol: UDP }
            - { name: mosh-60015,  containerPort: 60015, protocol: UDP }
          env:
            # Consumed by the s6 cont-init.d scripts in paperclip-shell
            # (agent-images/paperclip-shell/rootfs/etc/cont-init.d/) to
            # set the user the sshd serves. Default in the image is
            # `agent`; we set it explicitly so the deployment is the
            # source of truth if the image default ever changes.
            - name: PAPERCLIP_SHELL_USER
              value: "agent"
            # 1h (vs upstream 168h default) — see service-shell.yaml
            # for the 16-port-range coupling rationale.
            - name: MOSH_SERVER_NETWORK_TMOUT
              value: "3600"
          envFrom:
            # Telegram bot creds for notify-telegram.sh. `optional: true`
            # per frank-gotchas.md: an ESO sync hiccup would otherwise
            # CreateContainerConfigError instead of letting the shell
            # boot without alerts. The notify helper is fail-silent if
            # the env vars are missing.
            - secretRef:
                name: paperclip-shell-alerts
                optional: true
          volumeMounts:
            - { name: shell-home,      mountPath: /home/agent }
            - { name: data,            mountPath: /paperclip }
            - { name: shell-ssh-keys,  mountPath: /etc/ssh-keys, readOnly: true }
            - { name: shell-inventory, mountPath: /etc/paperclip-shell, readOnly: true }
            # Single-file subPath mount alongside the image-baked
            # /etc/profile.d/50-paperclip-shell-motd.sh (reconcile summary).
            # Prints the paperclip CLI install pattern on interactive login.
            - name: shell-motd-tips
              mountPath: /etc/profile.d/60-paperclip-shell-tips.sh
              subPath: 60-paperclip-shell-tips.sh
              readOnly: true
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 8Gi
          readinessProbe:
            tcpSocket: { port: ssh }
            initialDelaySeconds: 10
            periodSeconds: 30
          livenessProbe:
            tcpSocket: { port: ssh }
            initialDelaySeconds: 30
            periodSeconds: 60
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: paperclip-data
        - name: shell-home
          persistentVolumeClaim:
            claimName: paperclip-shell-home
        - name: shell-ssh-keys
          # SOPS-managed bootstrap secret in secrets/paperclip/. See the
          # README there for rotation. ESO-via-Infisical was the original
          # plan, but agent-ssh-keys (the analogous secret on
          # secure-agent-pod) and ruflo-shell-ssh-keys are SOPS-bootstrap,
          # so paperclip follows the same pattern.
          secret:
            secretName: paperclip-shell-ssh-keys
            optional: true
            defaultMode: 0400
        - name: shell-inventory
          configMap:
            name: paperclip-shell-inventory
        - name: shell-motd-tips
          configMap:
            name: paperclip-shell-motd-tips
            defaultMode: 0644
