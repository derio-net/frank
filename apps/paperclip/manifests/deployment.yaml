apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperclip
  namespace: paperclip-system
  labels:
    app.kubernetes.io/name: paperclip
    app.kubernetes.io/component: server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: paperclip
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paperclip
        app.kubernetes.io/component: server
    spec:
      nodeSelector:
        zone: core
      securityContext:
        fsGroup: 1000
      imagePullSecrets:
        - name: paperclip-ghcr
      containers:
        - name: paperclip
          image: ghcr.io/derio-net/paperclip:v2026.325.0-derio.0
          ports:
            - name: http
              containerPort: 3100
              protocol: TCP
          envFrom:
            - configMapRef:
                name: paperclip-config
            - secretRef:
                name: paperclip-llm-key
            - secretRef:
                name: paperclip-auth
            - secretRef:
                name: paperclip-anthropic
                optional: true
          env:
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: paperclip-db-postgresql
                  key: password
            - name: DATABASE_URL
              value: "postgres://paperclip:$(PG_PASSWORD)@paperclip-db-postgresql.paperclip-system.svc:5432/paperclip"
          volumeMounts:
            - name: data
              mountPath: /paperclip
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: "1"
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: paperclip-data
