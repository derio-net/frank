# Syncs GHCR PAT from Infisical and formats as Docker registry credential.
# Required to pull ghcr.io/derio-net/paperclip (private image).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperclip-ghcr
  namespace: paperclip-system
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: paperclip-ghcr
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"username":"clawdia-ai-assistant","password":"{{ .GHCR_PAT }}"}}}
  data:
    - secretKey: GHCR_PAT
      remoteRef:
        key: GHCR_PAT
