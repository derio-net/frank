# Syncs LiteLLM API key from Infisical and merges with static base URL.
# Paperclip uses the OpenAI SDK internally — setting OPENAI_BASE_URL
# routes all model calls through the in-cluster LiteLLM gateway.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperclip-llm-key
  namespace: paperclip-system
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: paperclip-llm-key
    creationPolicy: Owner
    template:
      data:
        OPENAI_API_KEY: "{{ .OPENAI_API_KEY }}"
        OPENAI_BASE_URL: "http://litellm.litellm.svc:4000"
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: PAPERCLIP_LITELLM_KEY
