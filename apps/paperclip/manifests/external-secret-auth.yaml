# Syncs BETTER_AUTH_SECRET from Infisical.
# Required for Paperclip session signing — app won't start without it.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperclip-auth
  namespace: paperclip-system
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: paperclip-auth
    creationPolicy: Owner
  data:
    - secretKey: BETTER_AUTH_SECRET
      remoteRef:
        key: PAPERCLIP_AUTH_SECRET
