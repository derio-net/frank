# Layer-2 inventory for the paperclip-shell sidecar.
# `cont-init.d` reconciles this against installed tools at boot, then
# again whenever the operator runs `paperclip-shell-reconcile`.
#
# Phase 4 of the orch--paperclip-shell-sidecar plan populates these
# arrays with the operator's expected toolset. For the initial deploy
# we ship empty arrays so the reconcile is a no-op and the pod boots
# cleanly.
apiVersion: v1
kind: ConfigMap
metadata:
  name: paperclip-shell-inventory
  namespace: paperclip-system
data:
  inventory.yaml: |
    # Layer-2 declarations — installed at boot via cont-init.d.
    # See docs/superpowers/specs/2026-05-02--orch--paperclip-shell-sidecar-design.md
    #
    # Phase 4 initial operator toolset. Order matters at install time:
    #   - mise installs runtimes first (node, python, rust)
    #   - npm-global needs node on PATH (via mise shims)
    #   - cargo section needs rust on PATH (via mise shims)
    # The reconcile script prepends mise shims to PATH on each run, so a
    # cold boot with this whole inventory installs in a single pass.
    #
    # CAVEAT — until derio-net/agent-images#56 lands, the npm-global section
    # will fail with EACCES on a fresh PV because `mise install` does not
    # activate runtimes (the mise shim falls through to system /usr/bin/npm).
    # Workaround: SSH in once and run `mise use -g node@20 rust@stable`,
    # then re-run `paperclip-shell-reconcile`. See plan Deployment Notes
    # 2026-05-03 P4.T2 rows for the full diagnostic.
    mise:
      - python@3.12
      - node@20
      - rust@stable
    npm-global:
      - "@anthropic-ai/claude-code"
      - "@openai/codex"
    pipx:
      - black
      - ruff
    cargo:
      - ripgrep
      - eza
    removed:
      mise: []
      npm-global: []
      pipx: []
      cargo: []
    # paperclip-shared: packages installed onto the shared /paperclip PVC
    # (not the shell sidecar's home PVC). The reconcile script does not yet
    # handle this section — it requires an agent-images change to grow the
    # handler in cont-init.d/. Until then, the operator-imperative install
    # from Phase 1 (npm install --prefix /paperclip/agent-bin opencode-ai)
    # remains the working installer. This entry declares intent so the next
    # PVC wipe surfaces what needs re-installing.
    # Deviation: P2.T3.S1 — reconcile handler deferred to agent-images PR.
    paperclip-shared:
      npm:
        - opencode-ai
    # uv-based installs — reconcile script does not yet handle the 'uv' section;
    # these entries document the install steps for hermes-agent and serve as
    # the declarative record for PVC-wipe recovery. Run manually from paperclip-shell
    # until derio-net/agent-images adds reconcile-script support for this section.
    # Deviation captured in plan 2026-05-17--orch--paperclip-litellm-agents P3.T3.S1.
    #
    # Install commands (run from paperclip-shell):
    #   UV_PYTHON_INSTALL_DIR=/paperclip/agent-bin/python \
    #     /paperclip/agent-bin/bin/uv venv --python 3.12 /paperclip/agent-bin/hermes-agent/venv
    #   /paperclip/agent-bin/bin/uv pip install \
    #     --python /paperclip/agent-bin/hermes-agent/venv/bin/python \
    #     'hermes-agent @ git+https://github.com/NousResearch/hermes-agent.git@v2026.4.16'
    #   ln -sf /paperclip/agent-bin/hermes-agent/venv/bin/hermes /paperclip/agent-bin/bin/hermes
    uv:
      - id: hermes-agent
        pin: "git+https://github.com/NousResearch/hermes-agent.git@v2026.4.16"
        venv: /paperclip/agent-bin/hermes-agent/venv
        python_install_dir: /paperclip/agent-bin/python
        shim: /paperclip/agent-bin/bin/hermes
