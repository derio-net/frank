# Argo Rollouts Recreate strategy required: paperclip uses RWO PVC (ReadWriteOnce)
# which cannot be mounted by multiple pods simultaneously. RollingUpdate would deadlock
# (new pod can't mount PVC while old pod holds it). Recreate terminates old pod before
# starting new one, breaking the deadlock.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: paperclip
  namespace: paperclip-system
  labels:
    app.kubernetes.io/name: paperclip
    app.kubernetes.io/component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: paperclip
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paperclip
        app.kubernetes.io/component: server
    spec:
      nodeSelector:
        zone: core
      securityContext:
        fsGroup: 1000
      imagePullSecrets:
        - name: paperclip-ghcr
      containers:
        - name: paperclip
          image: ghcr.io/derio-net/paperclip:v0.3.2
          ports:
            - name: http
              containerPort: 3100
              protocol: TCP
          envFrom:
            - configMapRef:
                name: paperclip-config
            - secretRef:
                name: paperclip-llm-key
            - secretRef:
                name: paperclip-auth
            - secretRef:
                name: paperclip-anthropic
                optional: true
          env:
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: paperclip-db-postgresql
                  key: password
            - name: DATABASE_URL
              value: "postgres://paperclip:$(PG_PASSWORD)@paperclip-db-postgresql.paperclip-system.svc:5432/paperclip"
          volumeMounts:
            - name: data
              mountPath: /paperclip
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: "1"
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: paperclip-data
  strategy:
    recreate: {}
