# Syncs Google Gemini API key from Infisical for use by Paperclip agents
# that call Gemini models directly (e.g. via the Gemini SDK / MCP server,
# or as a model option alongside the OpenRouter-routed default).
# Marked `optional: true` on the Deployment's secretRef so a missing or
# lagging sync does not block rollouts — same rule as the paperclip-brave
# and paperclip-resend secrets.
# See frank-gotchas.md for the optional-secretRef pattern rationale.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperclip-gemini
  namespace: paperclip-system
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: paperclip-gemini
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # In-cluster env var uses the standard `GEMINI_API_KEY` name expected
    # by the Google Gemini SDKs and MCP servers; sourced from the
    # `GEMINI_API_KEY` Infisical entry (same name — shared with
    # secure-agent-pod).
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: GEMINI_API_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
