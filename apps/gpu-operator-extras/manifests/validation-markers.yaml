# Fake validation markers for Talos Linux.
# The GPU Operator's toolkit and driver DaemonSets are disabled (Talos provides
# them via system extensions), but other DaemonSets have hardcoded init containers
# that poll for /run/nvidia/validations/{toolkit,driver}-ready.  The validator
# DaemonSet is also disabled (node label) because its nvidia-validator binary has
# hardcoded paths incompatible with Talos.  This DaemonSet creates and maintains
# the expected marker files so all init containers unblock.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-validation-markers
  namespace: gpu-operator
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nvidia-validation-markers
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nvidia-validation-markers
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: marker
          image: busybox:1.37
          securityContext:
            privileged: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              dir=/host-run/nvidia/validations
              mkdir -p "$dir"
              touch "$dir/driver-ready" "$dir/toolkit-ready"
              echo "Validation markers created"
              # Re-touch every 30s in case another component removes them
              while true; do
                touch "$dir/driver-ready" "$dir/toolkit-ready"
                sleep 30
              done
          resources:
            requests:
              cpu: 1m
              memory: 4Mi
            limits:
              memory: 16Mi
          volumeMounts:
            - name: host-run
              mountPath: /host-run
      volumes:
        - name: host-run
          hostPath:
            path: /run
            type: Directory
