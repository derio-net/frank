apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
  labels:
    app: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      nodeSelector:
        zone: edge
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:v1.12.1
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "master.cluster.derio.net"
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: config-services
              mountPath: /app/config/services.yaml
              subPath: services.yaml
            - name: config-settings
              mountPath: /app/config/settings.yaml
              subPath: settings.yaml
            - name: config-bookmarks
              mountPath: /app/config/bookmarks.yaml
              subPath: bookmarks.yaml
      volumes:
        - name: config-services
          configMap:
            name: homepage-services
        - name: config-settings
          configMap:
            name: homepage-settings
        - name: config-bookmarks
          configMap:
            name: homepage-bookmarks
