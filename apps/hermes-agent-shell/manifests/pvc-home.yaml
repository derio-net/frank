apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-agent-shell-home
  namespace: hermes-agent-shell
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      # REPURPOSED (2026-07-09 migration): this is the SAME PVC that today holds
      # /home/agent in the single-container pod. In the two-container model it is
      # reused (not deleted) as the tool-home volume mounted at /opt/data/home —
      # .ssh, .gitconfig, .config/gh, and the compat .hermes.md. Its
      # pre-migration contents are seeded into the new /opt/data layout in
      # Phase 2 before it is re-pointed. Keeping the name preserves the bound
      # Longhorn volume (no reprovision). 20Gi unchanged.
      storage: 20Gi
