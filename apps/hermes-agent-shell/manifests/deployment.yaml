apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent-shell
  namespace: hermes-agent-shell
  labels:
    app: hermes-agent-shell
spec:
  replicas: 1
  strategy:
    type: Recreate  # RWO PVCs — cannot mount on two pods simultaneously
  selector:
    matchLabels:
      app: hermes-agent-shell
  template:
    metadata:
      labels:
        app: hermes-agent-shell
    spec:
      # The main container's own s6-overlay runs shutdown housekeeping; the
      # sidecar's sshd terminates fast. 45s mirrors the family.
      terminationGracePeriodSeconds: 45
      # Pinned to gpu-1 — Frank's largest CPU/RAM box (same reason paperclip /
      # secure-agent-pod sit there). NO GPU requested: hermes inference is
      # remote via the in-cluster LiteLLM gateway. The nvidia.com/gpu:NoSchedule
      # toleration mirrors the cluster's defensive idiom so the pod survives any
      # future re-assert of the gpu-only taint.
      nodeSelector:
        kubernetes.io/hostname: gpu-1
      tolerations:
        - key: nvidia.com/gpu
          effect: NoSchedule
      securityContext:
        # fsGroup lines both containers' GID up with the shared /opt/data PVCs.
        #
        # VERIFIED 2026-07-09 (igor, throwaway disposable pod running the exact
        # official image, then torn down): the strict runAsNonRoot:1000 +
        # cap-drop:ALL posture this family usually uses DOES NOT WORK for the
        # official nousresearch/hermes-agent MAIN container, which is built to run
        # as ROOT with its own s6-overlay supervision tree:
        #   • non-root 1000 + cap-drop:ALL → s6 preinit `fatal: /run belongs to
        #     uid 0 … lacking the privileges to fix it` (exit 100).
        #   • root + cap-drop:ALL → s6-applyuidgid `fatal: unable to set
        #     supplementary group list: Operation not permitted` + supervise-perms
        #     chown failures (exit 111). The image drops to its internal `hermes`
        #     user (UID 10000) via s6-setuidgid, which needs SETUID/SETGID/CHOWN
        #     from the DEFAULT cap set.
        #   • root + DEFAULT caps → boots clean (all s6-rc services start).
        # Under PSA `baseline` we cannot drop-ALL-then-add-back those caps
        # (baseline only permits ADDING NET_BIND_SERVICE), so the resolved posture
        # is: MAIN container runs as root with the default cap set (see its own
        # securityContext below); the internal workload still ends up as UID 1000
        # via HERMES_UID/HERMES_GID env (image-blessed remap). The SIDECAR is a
        # different image (custom foreground sshd, no s6) and DOES run strict as
        # 1000 + cap-drop:ALL — validated in agent-images CI + locally.
        fsGroup: 1000
      containers:
        # ── main service container: official Hermes, unmodified ──────────────
        - name: hermes
          # Official image pulled directly from Docker Hub (decision 2, no
          # agent-images build layer on top). Pinned to the latest published
          # versioned tag as of 2026-07-09 (NOT `latest`/`main`). Confirm the
          # auto-continue behaviour (spec Open Risks / frank#496) against this
          # tag before cutover — the custom image's git-apply patch is NOT here.
          image: docker.io/nousresearch/hermes-agent:v2026.7.7.2
          imagePullPolicy: IfNotPresent
          # Entrypoint inherited from the image: `/init /opt/hermes/docker/
          # main-wrapper.sh` (s6-overlay). VERIFIED 2026-07-09 (igor, throwaway
          # pod): with NO args the wrapper execs the INTERACTIVE `hermes` TUI,
          # which exits cleanly the moment it finds no TTY on stdin — in a K8s pod
          # (no TTY) that means the container exits → CrashLoopBackOff. The gateway
          # is NOT the default. `args: [gateway, run]` routes through the wrapper
          # to `hermes gateway run`, which the image auto-redirects to its
          # supervised s6 `main-hermes` service (auto-restart, plus the supervised
          # `dashboard` service when HERMES_DASHBOARD=1) and stays up. Confirmed:
          # `→ gateway is now running under s6 supervision`.
          args: ["gateway", "run"]
          env:
            - name: HERMES_HOME
              value: /opt/data
            # Dashboard is opt-in in the official image; enable it (decision 3).
            # NB (Phase-3 blocker, VERIFIED 2026-07-09): this v0.18.2 image
            # HARD-REFUSES to bind the dashboard (9119) to any non-loopback
            # interface unless an auth provider is configured ("There is no
            # unauthenticated public-bind option — bind 127.0.0.1 and tunnel in").
            # So the Traefik IngressRoute + authentik-forwardauth plan is NOT
            # sufficient on its own: Phase 3 must ALSO configure a dashboard auth
            # provider (dashboard.basic_auth in config.yaml, or `hermes dashboard
            # register`) in the migrated /opt/data, or the dashboard never binds
            # for Traefik to reach. Likewise 8642/9119 did not bind at all in a
            # fresh (unseeded, credential-less) boot — the probes below are
            # UNVERIFIED against migrated state and must be reconfirmed in Phase 3.
            - name: HERMES_DASHBOARD
              value: "1"
            # Image-blessed ownership remap: the official image's internal `hermes`
            # user is UID/GID 10000. Setting these makes the s6 boot (running as
            # root) remap that user to 1000 and chown /opt/data, so shared-PVC
            # files line up with the UID-1000 SSH sidecar. This is the supported
            # alternative to `--user` (which the wrapper explicitly rejects for
            # arbitrary UIDs). Verified 2026-07-09: /opt/data ends up 1000:1000.
            - name: HERMES_UID
              value: "1000"
            - name: HERMES_GID
              value: "1000"
          envFrom:
            # BYOK inference auth (OPENAI_BASE_URL + OPENAI_API_KEY). optional:
            # true so the pod boots before the manual bootstrap mints
            # HERMES_LITELLM_KEY and ESO syncs this secret.
            - secretRef:
                name: hermes-agent-shell-llm
                optional: true
            # Telegram creds for any notify helpers. optional per the
            # envFrom.secretRef gotcha — an ESO hiccup must not block boot.
            - secretRef:
                name: hermes-agent-shell-alerts
                optional: true
          ports:
            - name: api
              containerPort: 8642  # Hermes gateway / OpenAI-compatible API
              protocol: TCP
            - name: dashboard
              containerPort: 9119  # Hermes web dashboard (HERMES_DASHBOARD=1)
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: home
              mountPath: /opt/data/home
            - name: repos
              mountPath: /opt/data/home/repos
            # fetch-text context-hygiene helper — SOUL.md steers the gateway
            # here, so the MAIN container needs it on PATH. subPath single-file
            # mount; script edits need a pod restart (kubelet never live-updates
            # subPath mounts).
            - name: fetch-text
              mountPath: /usr/local/bin/fetch-text
              subPath: fetch-text
              readOnly: true
          securityContext:
            # MUST run as root with the DEFAULT cap set — see the pod-level
            # securityContext comment above for the verified reasoning (the image
            # boots its s6-overlay as root and drops to its own UID-10000 `hermes`
            # user via s6-setuidgid, which needs SETUID/SETGID/CHOWN). runAsNonRoot
            # + cap-drop:ALL both break s6 init; PSA `baseline` permits this root
            # posture. The workload itself still runs as UID 1000 after the
            # HERMES_UID/HERMES_GID remap above, so this is "root to init, 1000 to
            # work", not "root all the way down". No cap-drop / no runAsNonRoot.
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: true
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              # Gateway + the embedded Hindsight stack (Postgres 18 + hindsight-
              # api, both spawned by `hermes gateway run` — Phase 0 finding) +
              # Playwright. 8Gi retained from the current pod (the `claude
              # install` OOM headroom note historically, and now the extra
              # Hindsight/PG resident set).
              cpu: "2"
              memory: 8Gi
          readinessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 30
            periodSeconds: 30
          livenessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 120  # gateway + embedded PG init can be slow
            periodSeconds: 60
        # ── SSH sidecar: thin terminal-access container ─────────────────────
        - name: ssh
          # New agent-images dir hermes-agent-shell-ssh/, built FROM the SAME
          # official tag + sshd/mosh/tmux. Pinned to the first REAL published
          # build (agent-images branch feat/hermes-agent-shell-ssh, run
          # 28999391005, digest sha256:24f5a9ffc16c…). This is a BRANCH-build SHA:
          # once agent-images#136 merges to main, that repo's build + the frank
          # agent-images-bump workflow (hermes-agent-shell-ssh is now in its
          # AGENT_IMAGES list) will re-pin this to the main-merge SHA automatically
          # BEFORE this PR merges. Do NOT merge/sync ahead of that.
          image: ghcr.io/derio-net/hermes-agent-shell-ssh:6991631d7e556ed69b156514691418a85304a039
          imagePullPolicy: IfNotPresent
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: HOME
              value: /opt/data/home
            # Mosh default is 168h (7d) — too long for a 16-port range. 1h reaps
            # stuck servers fast enough to keep ports available.
            - name: MOSH_SERVER_NETWORK_TMOUT
              value: "3600"
          envFrom:
            # Same BYOK auth so `hermes` invoked from the SSH shell reaches
            # LiteLLM. The 35-…-byok-env.sh profile.d shim re-exports these into
            # the interactive login shell (sshd scrubs PID 1's environ).
            - secretRef:
                name: hermes-agent-shell-llm
                optional: true
            - secretRef:
                name: hermes-agent-shell-alerts
                optional: true
          ports:
            - name: ssh
              containerPort: 2222  # Non-root sshd; Service maps 22→2222
              protocol: TCP
            - { name: mosh-60032, containerPort: 60032, protocol: UDP }
            - { name: mosh-60033, containerPort: 60033, protocol: UDP }
            - { name: mosh-60034, containerPort: 60034, protocol: UDP }
            - { name: mosh-60035, containerPort: 60035, protocol: UDP }
            - { name: mosh-60036, containerPort: 60036, protocol: UDP }
            - { name: mosh-60037, containerPort: 60037, protocol: UDP }
            - { name: mosh-60038, containerPort: 60038, protocol: UDP }
            - { name: mosh-60039, containerPort: 60039, protocol: UDP }
            - { name: mosh-60040, containerPort: 60040, protocol: UDP }
            - { name: mosh-60041, containerPort: 60041, protocol: UDP }
            - { name: mosh-60042, containerPort: 60042, protocol: UDP }
            - { name: mosh-60043, containerPort: 60043, protocol: UDP }
            - { name: mosh-60044, containerPort: 60044, protocol: UDP }
            - { name: mosh-60045, containerPort: 60045, protocol: UDP }
            - { name: mosh-60046, containerPort: 60046, protocol: UDP }
            - { name: mosh-60047, containerPort: 60047, protocol: UDP }
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: home
              mountPath: /opt/data/home
            - name: repos
              mountPath: /opt/data/home/repos
            # SSH host + authorized keys — SOPS-managed Secret, sidecar only.
            - name: ssh-keys
              mountPath: /etc/ssh-keys
              readOnly: true
            # BYOK-env profile.d shim (single-file subPath) — re-exports the
            # scrubbed OPENAI_* into the login shell.
            - name: byok-env
              mountPath: /etc/profile.d/35-hermes-agent-shell-byok-env.sh
              subPath: 35-hermes-agent-shell-byok-env.sh
              readOnly: true
            - name: fetch-text
              mountPath: /usr/local/bin/fetch-text
              subPath: fetch-text
              readOnly: true
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              # Thin: sshd + mosh + occasional `hermes` CLI passthrough. The
              # heavy runtime lives in the main container.
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: ssh
            initialDelaySeconds: 10
            periodSeconds: 30
          livenessProbe:
            tcpSocket:
              port: ssh
            initialDelaySeconds: 30
            periodSeconds: 60
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-agent-shell-data
        - name: home
          persistentVolumeClaim:
            claimName: hermes-agent-shell-home
        - name: repos
          persistentVolumeClaim:
            claimName: hermes-agent-shell-repos
        - name: ssh-keys
          # SOPS-managed bootstrap secret in secrets/hermes-agent-shell/.
          # optional: true (paperclip/ruflo pattern) so the pod boots before the
          # bootstrap lands; sshd just accepts no keys until then.
          secret:
            secretName: hermes-agent-shell-ssh-keys
            optional: true
            defaultMode: 0400
        - name: byok-env
          configMap:
            name: hermes-agent-shell-env
            defaultMode: 0644
        - name: fetch-text
          configMap:
            name: hermes-agent-shell-fetch-text
            defaultMode: 0755
