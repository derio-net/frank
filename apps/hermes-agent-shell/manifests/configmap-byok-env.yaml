# BYOK-env (and fr host-worktree) profile.d shim for the hermes-agent-shell pod.
#
# WHY THIS EXISTS (the load-bearing part of this deploy):
# agent-shell-base's sshd runs `UsePAM no` with no `PermitUserEnvironment`
# (agent-images/agent-shell-base/sshd_config), so the K8s-injected container
# env — OPENAI_BASE_URL / OPENAI_API_KEY (BYOK inference), plus
# FR_ISOLATION_TARGET (super-fr host-worktree isolation mode, frank#686), all
# set on PID 1 by the Deployment — is scrubbed from the interactive SSH/Mosh
# login shell. The "sshd scrubs container env on login" gotcha
# (docs/runbooks/frank-gotchas/agent-shells.md). Since this pod's whole job is
# running `hermes` interactively over SSH, hermes launched from the shell would
# silently fail to reach LiteLLM, and the image's own 50-…-motd.sh would print
# "OPENAI_BASE_URL not set" on every login despite this manifest setting it;
# likewise fr-goal / fr-brainstorming / fr-debugging would fall back to
# devcontainer mode and fail without FR_ISOLATION_TARGET in the login shell.
#
# Fix without an agent-images change: mount this drop-in into /etc/profile.d via
# subPath (same mechanism paperclip uses for its 60-…-tips.sh). It re-exports
# the vars from /proc/1/environ — readable because the whole container runs
# as UID 1000, so PID 1 is the same UID; this is the escape hatch the gotcha
# names. Numbered 35- so it runs before the 50- auth-status MOTD.
#
# CAVEAT (live-verified 2026-07-24, post-#687 smoke test): in THIS pod's ssh
# sidecar the /proc/1/environ escape hatch is DEAD — PID 1 is sshd itself
# (hermes-agent-shell-ssh has no s6 init), and OpenSSH overwrites its
# argv/environ region with the process title ("sshd: … [listener] …"), so
# /proc/1/environ returns proctitle bytes, not the env. The loop below is
# therefore vacuous here (kept: it documents intent and works wherever an
# init preserves environ, e.g. secure-agent-pod's kali under s6).
# FR_ISOLATION_TARGET is a STATIC value, so it gets a literal fallback export
# below — keep it equal to the Deployment env (pinned by
# scripts/tests/test_fr_isolation_target_env.py). The DYNAMIC BYOK vars
# (OPENAI_BASE_URL/OPENAI_API_KEY) cannot be fixed this way and are broken in
# ssh-sidecar login shells — tracked separately (see the agent-shells gotcha).
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-agent-shell-env
  namespace: hermes-agent-shell
data:
  35-hermes-agent-shell-byok-env.sh: |
    # Re-export BYOK + fr host-worktree env scrubbed by sshd (UsePAM no, no
    # PermitUserEnvironment). Login shells only; non-interactive
    # `ssh host -- cmd` skips profile.d — use `kubectl exec` for that.
    if [ -r /proc/1/environ ]; then
        for _hv in OPENAI_BASE_URL OPENAI_API_KEY FR_ISOLATION_TARGET; do
            eval "_hcur=\${$_hv:-}"
            if [ -z "$_hcur" ]; then
                _hval=$(tr '\0' '\n' < /proc/1/environ | sed -n "s/^${_hv}=//p" | head -n1)
                [ -n "$_hval" ] && export "$_hv=$_hval"
            fi
        done
        unset _hv _hcur _hval
    fi
    # Static fallback: sshd is PID 1 in this sidecar and clobbers
    # /proc/1/environ with its proctitle, so the loop above never fires here.
    # FR_ISOLATION_TARGET is static config, not a secret — export the literal.
    # MUST match the Deployment's env value (guard-tested).
    [ -z "${FR_ISOLATION_TARGET:-}" ] && export FR_ISOLATION_TARGET=worktree
