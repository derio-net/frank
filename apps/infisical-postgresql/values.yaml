# fullnameOverride ensures the service is named "postgresql" so the
# infisical-db-uri connection string (postgresql://...@postgresql:5432/...) resolves.
fullnameOverride: "postgresql"

architecture: standalone

# Use the same image mirror that Infisical's own infisical-standalone chart uses.
# docker.io/bitnami/postgresql images are unavailable; mirror.gcr.io is the working mirror.
image:
  registry: mirror.gcr.io
  repository: bitnamilegacy/postgresql

auth:
  username: infisical
  database: infisicalDB
  # Passwords sourced from SOPS bootstrap secret.
  # Keys: postgres-password (admin), password (infisical user)
  existingSecret: infisical-secrets

primary:
  persistence:
    size: 5Gi
    storageClass: longhorn
