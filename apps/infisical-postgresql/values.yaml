# fullnameOverride ensures the service is named "postgresql" so the
# infisical-db-uri connection string (postgresql://...@postgresql:5432/...) resolves.
fullnameOverride: "postgresql"

architecture: standalone

# Pin to the image that was confirmed working in the bundled infisical-standalone chart.
# Bitnami's newer tags (17.x) are not available on docker.io at this time.
image:
  registry: registry-1.docker.io
  tag: "16.2.0-debian-11-r16"

auth:
  username: infisical
  database: infisicalDB
  # Passwords sourced from SOPS bootstrap secret.
  # Keys: postgres-password (admin), password (infisical user)
  existingSecret: infisical-secrets

primary:
  persistence:
    size: 5Gi
    storageClass: longhorn
