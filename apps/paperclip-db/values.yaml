# Bitnami PostgreSQL for Paperclip AI orchestrator
# Phase 14 — experimental deployment
# Mirrors infisical-postgresql pattern with Paperclip-specific config

architecture: standalone

# docker.io/bitnami/postgresql images are unavailable; use the same GCR mirror
# as infisical-postgresql (the working pattern in this cluster).
image:
  registry: mirror.gcr.io
  repository: bitnamilegacy/postgresql

auth:
  username: paperclip
  database: paperclip
  # Password auto-generated by chart, stored in paperclip-db-postgresql Secret

primary:
  persistence:
    size: 5Gi
    storageClass: longhorn
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 256Mi
      cpu: 250m

metrics:
  # Disabled — Bitnami postgres-exporter tag is purged from Docker Hub
  enabled: false
