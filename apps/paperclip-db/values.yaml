# Bitnami PostgreSQL for Paperclip AI orchestrator
# Phase 14 — experimental deployment
# Mirrors infisical-postgresql pattern with Paperclip-specific config

architecture: standalone

auth:
  username: paperclip
  database: paperclip
  # Password auto-generated by chart, stored in paperclip-db-postgresql Secret

primary:
  persistence:
    size: 5Gi
    storageClass: longhorn
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 256Mi
      cpu: 250m

metrics:
  enabled: true
