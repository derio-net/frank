apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gpu-operator
  namespace: argocd
  # Only resources-finalizer is valid here. post-delete-finalizer variants
  # were added ad-hoc to the cluster and will be removed by ArgoCD on sync.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: infrastructure
  sources:
    - repoURL: https://helm.ngc.nvidia.com/nvidia
      chart: gpu-operator
      targetRevision: "v25.10.1"
      helm:
        releaseName: gpu-operator
        valueFiles:
          - $values/apps/gpu-operator/values.yaml
    - repoURL: {{ .Values.repoURL }}
      targetRevision: {{ .Values.targetRevision }}
      ref: values
  destination:
    server: {{ .Values.destination.server }}
    namespace: gpu-operator
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  # The GPU Operator webhook defaults dozens of ClusterPolicy sub-fields that
  # we intentionally leave unset in values.yaml (driver off, toolkit off,
  # CDI off — Talos handles the driver stack). Fighting the webhook field
  # by field isn't worth it; ignoring the entire /spec keeps the chart's
  # intended config in place without churning on operator-added defaults.
  ignoreDifferences:
    - group: nvidia.com
      kind: ClusterPolicy
      name: cluster-policy
      jsonPointers:
        - /spec
