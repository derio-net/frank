apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tekton-pipelines
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: {{ .Values.repoURL }}
    targetRevision: {{ .Values.targetRevision }}
    path: apps/tekton/vendor/pipelines
  destination:
    server: {{ .Values.destination.server }}
    namespace: tekton-pipelines
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  # Vendored Tekton release.yaml CRDs diff against live ones on metadata fields
  # that aren't in the vendored file (controller-gen annotation,
  # last-applied-configuration). Apply succeeds but comparison immediately
  # re-flags. Ignoring metadata keeps the schema in sync while silencing noise.
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /metadata/labels
        - /metadata/annotations
        - /spec/preserveUnknownFields
