apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-rollouts
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: infrastructure
  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-rollouts
      targetRevision: "2.40.6"
      helm:
        releaseName: argo-rollouts
        valueFiles:
          - $values/apps/argo-rollouts/values.yaml
    - repoURL: {{ .Values.repoURL }}
      targetRevision: {{ .Values.targetRevision }}
      ref: values
  destination:
    server: {{ .Values.destination.server }}
    namespace: argo-rollouts
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
  # CRDs from the argo-rollouts chart carry labels/annotations rendered by the chart
  # that the cluster-side CRDs don't match (rendered with a newer chart's default
  # label set vs. the CRDs from when they were first applied). Apply/serverside-apply
  # succeeds each sync but the three-way diff immediately flags them again. Ignoring
  # metadata fields keeps the schema in sync while silencing the noise.
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /metadata/labels
        - /metadata/annotations
        - /spec/preserveUnknownFields
