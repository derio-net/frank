apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
  # Only resources-finalizer is valid here. pre-delete-finalizer variants
  # were added ad-hoc to the cluster and will be removed by ArgoCD on sync.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  sources:
    - repoURL: https://charts.longhorn.io
      chart: longhorn
      # 1.11.2: fixes the v1.11.0 instance-manager anonymous-heap leak
      # (proxy connection leak, longhorn#12575) that wedged raspi-1 on
      # 2026-06-04 and loaded mini-1/gpu-1 with 48/72 GiB of leaked heap.
      # NOTE: running engines stay on the old engine image until each
      # volume is live-upgraded; old IMs (and their heap) retire only then.
      targetRevision: "1.11.2"
      helm:
        releaseName: longhorn
        valueFiles:
          - $values/apps/longhorn/values.yaml
    - repoURL: {{ .Values.repoURL }}
      targetRevision: {{ .Values.targetRevision }}
      ref: values
  destination:
    server: {{ .Values.destination.server }}
    namespace: longhorn-system
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
