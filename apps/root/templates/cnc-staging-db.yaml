apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnc-staging-db
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  sources:
    - repoURL: registry-1.docker.io/bitnamicharts
      chart: postgresql
      targetRevision: "14.1.10"
      helm:
        releaseName: cnc-staging-db
        valueFiles: [$values/apps/cnc-staging-db/values.yaml]
    - repoURL: {{ .Values.repoURL }}
      targetRevision: {{ .Values.targetRevision }}
      ref: values
  destination:
    name: cnc-staging
    namespace: cnc-staging
  syncPolicy:
    automated: {selfHeal: true}
    syncOptions: [ServerSideApply=true, CreateNamespace=true, RespectIgnoreDifferences=true]
  ignoreDifferences:
    - kind: Secret
      jsonPointers: [/data]
