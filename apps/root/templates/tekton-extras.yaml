apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tekton-extras
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: {{ .Values.repoURL }}
    targetRevision: {{ .Values.targetRevision }}
    path: apps/tekton
    directory:
      recurse: true
      exclude: "vendor/**"
  destination:
    server: {{ .Values.destination.server }}
    namespace: tekton-pipelines
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - kind: Secret
      jsonPointers:
        - /data
    # Tekton defaults embedded taskSpecs with empty metadata/spec and empty
    # computeResources maps. Ignore only those empty defaults, not real step
    # images, scripts, params, or non-empty resource requests/limits.
    - group: tekton.dev
      kind: Pipeline
      namespace: tekton-pipelines
      jqPathExpressions:
        - '.spec.tasks[]?.taskSpec.metadata | select(. == {})'
        - '.spec.tasks[]?.taskSpec.spec | select(. == null)'
        - '.spec.tasks[]?.taskSpec.stepTemplate.computeResources | select(. == {})'
        - '.spec.tasks[]?.taskSpec.steps[]?.computeResources | select(. == {})'
        - '.spec.tasks[]?.taskRef.kind | select(. == "Task")'
    - group: tekton.dev
      kind: Task
      namespace: tekton-pipelines
      jqPathExpressions:
        - '.spec.results[]?.type | select(. == "string")'
    - group: triggers.tekton.dev
      kind: EventListener
      namespace: tekton-pipelines
      jqPathExpressions:
        - '.spec.namespaceSelector | select(. == {})'
        - '.spec.resources.kubernetesResource.spec.template.metadata.creationTimestamp | select(. == null)'
        - '.spec.resources.kubernetesResource.spec.template.spec.containers | select(. == null)'
        # NEVER add array-item expressions (.spec.triggers[]?...) here: with
        # RespectIgnoreDifferences=true they make ArgoCD carry the LIVE
        # triggers array into every apply, silently freezing trigger updates
        # while syncs report Succeeded (Jun 13 → Jul 20 incident — the cnc and
        # gitea-actions triggers never went live). Defaulted per-item fields
        # (bindings kind, cel ref kind) are instead set explicitly in the EL
        # manifests so they produce no drift.
