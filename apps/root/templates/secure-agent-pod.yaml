apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secure-agent-pod
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-sync-running.webhook: telegram
    notifications.argoproj.io/subscribe.on-sync-succeeded.webhook: telegram
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: {{ .Values.repoURL }}
    targetRevision: {{ .Values.targetRevision }}
    path: apps/secure-agent-pod/manifests
  destination:
    server: {{ .Values.destination.server }}
    namespace: secure-agent-pod
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - kind: Secret
      jsonPointers:
        - /data
