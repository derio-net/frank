apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sympozium-extras
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: {{ .Values.repoURL }}
    targetRevision: {{ .Values.targetRevision }}
    path: apps/sympozium-extras/manifests
  destination:
    server: {{ .Values.destination.server }}
    namespace: sympozium-system
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - kind: Service
      jsonPointers:
        - /spec/selector
    # Sympozium reconciles disabled PersonaPacks and normalizes these fields
    # while leaving status.phase=Inactive. Keep ArgoCD from self-healing forever.
    - group: sympozium.ai
      kind: PersonaPack
      namespace: sympozium-system
      jsonPointers:
        - /spec/enabled
        - /spec/authRefs
