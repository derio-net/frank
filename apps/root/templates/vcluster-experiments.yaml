apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vcluster-experiments
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  sources:
    - repoURL: https://charts.loft.sh
      chart: vcluster
      targetRevision: "0.32.1"
      helm:
        releaseName: experiments
        valueFiles:
          # Template first (base defaults), then instance overrides
          - $values/apps/vclusters/template/values.yaml
          - $values/apps/vclusters/experiments/values.yaml
    - repoURL: {{ .Values.repoURL }}
      targetRevision: {{ .Values.targetRevision }}
      ref: values
  destination:
    server: {{ .Values.destination.server }}
    namespace: vcluster-experiments
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - kind: Secret
      jsonPointers:
        - /data
    # vCluster and Kubernetes inject runtime/defaulted StatefulSet fields.
    # Ignore only those fields so chart-owned spec still reconciles normally.
    - group: apps
      kind: StatefulSet
      name: experiments
      namespace: vcluster-experiments
      jsonPointers:
        - /spec/template/metadata/annotations/vClusterConfigHash
        - /spec/template/metadata/annotations/kubectl.kubernetes.io~1restartedAt
        - /spec/persistentVolumeClaimRetentionPolicy/whenDeleted
        - /spec/persistentVolumeClaimRetentionPolicy/whenScaled
        - /spec/revisionHistoryLimit
        - /spec/updateStrategy
