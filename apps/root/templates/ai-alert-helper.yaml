apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-alert-helper
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: {{ .Values.repoURL }}
    targetRevision: {{ .Values.targetRevision }}
    # Kustomize root (NOT the bare manifests dir): kustomization.yaml
    # enumerates the manifests and generates the hash-suffixed analyst-skill
    # ConfigMap from skill/SKILL.md.
    path: apps/ai-alert-helper
  destination:
    server: {{ .Values.destination.server }}
    namespace: ai-alert-helper-system
  syncPolicy:
    automated:
      # prune:true is REQUIRED by the configMapGenerator — every SKILL.md
      # edit creates a new hash-suffixed ConfigMap and the superseded one
      # must be garbage-collected. Safe because kustomization.yaml
      # enumerates all resources (kustomize-build diff gate, 2026-06-04:
      # build emits exactly the 4 live resources + the generated CM).
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
