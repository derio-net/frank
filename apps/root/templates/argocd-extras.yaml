apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-extras
  namespace: argocd
  annotations:
    # Sync before consumers: this app materializes the repo-stoa-companies
    # credential that stoa-live-mirror-sync needs to clone its source repo —
    # the wave tidies the first-sync window (same pattern as cert-manager).
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: {{ .Values.repoURL }}
    targetRevision: {{ .Values.targetRevision }}
    path: apps/argocd-extras/manifests
  destination:
    server: {{ .Values.destination.server }}
    namespace: argocd
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - kind: Secret
      namespace: argocd
      jsonPointers:
        - /data
