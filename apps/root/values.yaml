# Git repo containing Helm values for each app
repoURL: https://github.com/derio-net/frank.git
targetRevision: main

# Cluster destination
destination:
  server: https://kubernetes.default.svc

# Note: Application templates do NOT set automated.prune explicitly — the
# schema default (false) is our project-wide convention (manual pruning only,
# see .claude/rules/frank-argocd.md). ArgoCD normalizes explicit `prune: false`
# to absent, which caused permanent drift on the root Application until we
# dropped the line from the templates.
