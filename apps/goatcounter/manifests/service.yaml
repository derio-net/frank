apiVersion: v1
kind: Service
metadata:
  name: goatcounter
  namespace: goatcounter-system
  labels:
    app.kubernetes.io/name: goatcounter
  annotations:
    # Cilium L2 LoadBalancer. The IP is needed so Hop's Caddy can reverse-
    # proxy counter.derio.net over the Tailscale subnet route to
    # 192.168.55.0/24. See agents/rules/frank-infrastructure.md.
    lbipam.cilium.io/ips: "192.168.55.224"
    lbipam.cilium.io/sharing-key: "goatcounter"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: goatcounter
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
