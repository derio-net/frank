# n8n-01 workflow automation on gpu-1
# Single-user instance; auth gated by Authentik forward-auth
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-01
  namespace: n8n-01
  labels:
    app.kubernetes.io/name: n8n-01
    app.kubernetes.io/component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n-01
      app.kubernetes.io/component: server
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: n8n-01
        app.kubernetes.io/component: server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5678"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        kubernetes.io/hostname: gpu-1
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      securityContext:
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
      containers:
        - name: n8n
          image: docker.io/n8nio/n8n:2.13.4
          ports:
            - name: http
              containerPort: 5678
              protocol: TCP
          env:
            - name: DB_TYPE
              value: postgresdb
            - name: DB_POSTGRESDB_HOST
              value: n8n-01-postgresql
            - name: DB_POSTGRESDB_PORT
              value: "5432"
            - name: DB_POSTGRESDB_DATABASE
              value: n8n
            - name: DB_POSTGRESDB_USER
              value: n8n
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: n8n-01-secrets
                  key: password
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-01-secrets
                  key: encryption-key
            - name: N8N_METRICS
              value: "true"
            - name: N8N_METRICS_PREFIX
              value: "n8n_"
            - name: N8N_HOST
              value: "0.0.0.0"
            - name: N8N_PORT
              value: "5678"
            - name: WEBHOOK_URL
              value: "https://n8n-01.frank.derio.net/"
            - name: N8N_SECURE_COOKIE
              value: "false"
            # The stoa workflow's httpRequest node posts to
            # $AGENT_SIDECAR_URL/session/send — the multi-agent-shell sidecar's
            # HTTP server on pod-localhost (same pod, shared netns).
            - name: AGENT_SIDECAR_URL
              value: "http://localhost:8765"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /home/node/.n8n
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
        # multi-agent-shell sidecar — hosts the persistent, operator-attachable
        # `claude` session that n8n drives (never `claude -p`). Subscription
        # OAuth only: NO API keys here; the credential lands on the agent-home
        # PVC at first `claude login` (MO-4). s6-overlay v3 runs sshd + tmux.
        - name: multi-agent-shell
          image: ghcr.io/derio-net/multi-agent-shell:1d5613960ba397b92d13c195e869f3c74c2b1c4c
          env:
            - name: HOME
              value: /home/agent
            # Disable tmux-continuum auto-restore (Fix B / agent-shell-base): the
            # driver owns sessions; continuum must not resurrect dead bash shells.
            - name: AGENT_TMUX_RESTORE
              value: "off"
          resources:
            requests:
              cpu: "1000m"
              memory: 2Gi
            limits:
              memory: 8Gi
          volumeMounts:
            - name: agent-home
              mountPath: /home/agent
            - name: agent-session-bootstrap
              mountPath: /opt/stoa-bootstrap
            - name: agent-session-driver
              mountPath: /opt/stoa-bin
          # Ensure the persistent stoa script-gen tmux session on (re)start.
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - /opt/stoa-bootstrap/session-bootstrap.sh
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: n8n-01-data
        - name: agent-home
          persistentVolumeClaim:
            claimName: n8n-01-agent-home
        - name: agent-session-bootstrap
          configMap:
            name: agent-session-bootstrap
            defaultMode: 0755
        - name: agent-session-driver
          configMap:
            name: agent-session-driver
            defaultMode: 0755
