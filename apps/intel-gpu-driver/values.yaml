# Intel GPU Resource Driver — DRA driver for mini-{1..3} Intel Arc iGPU
# Exposes Intel GPU via Dynamic Resource Allocation (K8s 1.32+ GA)
# Workloads use ResourceClaim / ResourceClaimTemplate instead of resources.limits

# Use v0.9.1 binary (supports resource.k8s.io/v1 — required for K8s 1.35)
# Chart structure vendored from 0.7.0 with API version patches
image:
  repository: ghcr.io/intel/intel-resource-drivers-for-kubernetes
  name: intel-gpu-resource-driver
  tag: "v0.9.1"

kubeletPlugin:
  # Only run the kubelet plugin DaemonSet on nodes with Intel iGPU
  nodeSelector:
    accelerator: intel-igpu
  # Default tolerations already cover control-plane nodes (mini-{1..3} are control-plane)

# Node Feature Discovery not needed — labels managed via Omni/Talos directly
nfd:
  enabled: false
