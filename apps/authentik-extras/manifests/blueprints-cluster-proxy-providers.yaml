# Authentik Blueprint: Cluster Proxy Providers for *.cluster.derio.net
# Forward-auth for in-cluster Traefik ingress (in-cluster-ingress plan).
# Spec: docs/superpowers/specs/2026-03-29--net--in-cluster-ingress-design.md
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints-cluster-proxy-providers
  namespace: authentik
  labels:
    app.kubernetes.io/component: blueprint
data:
  cluster-proxy-providers.yaml: |
    # yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
    version: 1
    metadata:
      name: Proxy Providers for cluster.derio.net Services
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      # Grafana (cluster) proxy provider
      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers:
          name: Grafana (cluster)
        id: provider-grafana-cluster
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          authentication_flow: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: forward_single
          external_host: https://grafana.cluster.derio.net

      - model: authentik_core.application
        state: present
        identifiers:
          slug: grafana-cluster
        attrs:
          name: Grafana (cluster)
          provider: !KeyOf provider-grafana-cluster
          meta_launch_url: https://grafana.cluster.derio.net

      # Longhorn UI (cluster) proxy provider
