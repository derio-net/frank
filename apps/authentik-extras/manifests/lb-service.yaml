# LoadBalancer Service for Authentik server
# Exposed at auth.frank.derio.net via Traefik on raspi-omni (port 9000)
apiVersion: v1
kind: Service
metadata:
  name: authentik-server-lb
  namespace: authentik
  annotations:
    lbipam.cilium.io/ips: "192.168.55.211"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: 9000
      targetPort: http
      protocol: TCP
    - name: https
      port: 9443
      targetPort: https
      protocol: TCP
