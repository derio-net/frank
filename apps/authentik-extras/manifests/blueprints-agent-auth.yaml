# Authentik Blueprint: Agent Authentication
# Creates an OAuth2 provider for non-interactive cluster access.
# Used by Claude Code and CI/CD to authenticate with kubectl via OIDC.
# Machine user creation and client secret must be set via Authentik admin UI (manual operation).
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints-agent-auth
  namespace: authentik
  labels:
    app.kubernetes.io/component: blueprint
data:
  agent-auth.yaml: |
    # yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
    version: 1
    metadata:
      name: Agent Authentication
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      # OAuth2 Provider for agent kubectl access (client credentials grant)
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: Kubernetes Agent Access
        id: provider-k8s-agent
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          authentication_flow: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
          client_type: confidential
          client_id: k8s-agent
          # client_secret is set via Authentik Admin UI
          redirect_uris: ""
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, offline_access]]
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          access_token_validity: hours=8

      # Application entry
      - model: authentik_core.application
        state: present
        identifiers:
          slug: k8s-agent
        attrs:
          name: Kubernetes Agent Access
          provider: !KeyOf provider-k8s-agent
