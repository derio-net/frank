apiVersion: v1
kind: ConfigMap
metadata:
  name: blackbox-exporter-config
  namespace: monitoring
data:
  blackbox.yml: |
    modules:
      http_2xx:
        prober: http
        timeout: 10s
        http:
          # User-Agent identifies Frank's own uptime probes so the edge-traffic
          # definition can exclude them. KEEP IN SYNC with facts.PROBE_UA_TOKEN
          # in apps/ai-alert-helper/src/ai_alert_helper/facts.py.
          headers:
            User-Agent: "Frank-Blackbox-Probe/1.0 (+https://blog.derio.net)"
          valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
          valid_status_codes: [200, 301, 302]
          follow_redirects: true
          preferred_ip_protocol: ip4
      http_2xx_no_redirect:
        prober: http
        timeout: 10s
        http:
          # See note above — keep in sync with facts.PROBE_UA_TOKEN.
          headers:
            User-Agent: "Frank-Blackbox-Probe/1.0 (+https://blog.derio.net)"
          valid_status_codes: [200]
          follow_redirects: false
          preferred_ip_protocol: ip4
      # Cert-expiry canary module (issue #251): identical to http_2xx_no_redirect
      # plus insecure_skip_verify, so the TLS handshake against an EXPIRED cert
      # completes and probe_ssl_earliest_cert_expiry is emitted (the default
      # module aborts the handshake before cert inspection — empirically
      # confirmed on v0.25.0, see the parent plan's Deployment Deviations).
      http_2xx_insecure_tls:
        prober: http
        timeout: 10s
        http:
          # See note above — keep in sync with facts.PROBE_UA_TOKEN.
          headers:
            User-Agent: "Frank-Blackbox-Probe/1.0 (+https://blog.derio.net)"
          valid_status_codes: [200]
          follow_redirects: false
          preferred_ip_protocol: ip4
          tls_config:
            insecure_skip_verify: true
      tcp_connect:
        prober: tcp
        timeout: 5s
      # --- GPU time-share end-to-end probes (Layers 11/16) -------------------
      # gpu-1 hosts the only GPU and time-shares it between Ollama (inference)
      # and ComfyUI (media) — exactly one is ever live. These probes assert the
      # workload can actually DO ITS JOB, not just that pods exist (pod-existence
      # metrics are blind to scale-to-0). Plan:
      # docs/superpowers/plans/2026-06-15--obs--gpu-timeshare-health-probes
      #
      # Layer 11: a real chat completion through LiteLLM. bearer_token_file is the
      # dedicated probe virtual key, mounted optional:true (probe fails auth, not
      # the pod, until the key is minted — see the plan's manual phase).
      litellm_chat:
        prober: http
        timeout: 25s
        http:
          method: POST
          valid_status_codes: [200]
          bearer_token_file: /etc/blackbox-secrets/litellm-probe-key
          headers:
            Content-Type: application/json
          body: |
            {"model":"gemma-12b-nothin","max_tokens":4,"messages":[{"role":"user","content":"reply with the single word: ok"}]}
          fail_if_body_not_matches_regexp:
            - '"choices"'
          preferred_ip_protocol: ip4
      # Layer 16: ComfyUI API liveness. /object_info returns the loaded node set;
      # matching a core node (KSampler) proves the server is up AND custom nodes
      # imported — catches node-import failures, not just liveness. No auth
      # in-cluster (SSO is ingress-only). NOTE: /object_info is a large
      # (hundreds-of-KB) JSON doc — blackbox reads the whole body for the regexp;
      # fine at 10s, but a future blackbox `body_size_limit` would truncate and
      # break the match, so do not set one for this module.
      comfyui_object_info:
        prober: http
        timeout: 10s
        http:
          method: GET
          valid_status_codes: [200]
          fail_if_body_not_matches_regexp:
            - 'KSampler'
          preferred_ip_protocol: ip4
