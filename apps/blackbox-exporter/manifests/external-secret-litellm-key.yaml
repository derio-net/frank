apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-master-key
  namespace: monitoring
spec:
  # The blackbox litellm_chat probe authenticates to the LiteLLM gateway with the
  # LiteLLM MASTER key (operator decision — simpler than a dedicated virtual key,
  # which would need an out-of-band mint). LITELLM_MASTER_KEY already exists in
  # Infisical (the litellm app's ExternalSecret reads the same key), so this syncs
  # on deploy with no manual step. Trade-off: the probe carries full LiteLLM admin
  # privilege; it is read-only in practice (one chat completion) and the Secret is
  # scoped to the monitoring namespace + mounted read-only into blackbox-exporter.
  refreshInterval: 5m
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: litellm-master-key
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: litellm-master-key
      remoteRef:
        key: LITELLM_MASTER_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
