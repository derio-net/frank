apiVersion: operator.victoriametrics.com/v1beta1
kind: VMProbe
metadata:
  name: feature-health-probes
  namespace: monitoring
spec:
  targets:
    staticConfig:
      targets:
        - http://n8n-01.n8n-01.svc.cluster.local:5678
        - https://paperclip.frank.derio.net
        - https://grafana.frank.derio.net
        - https://blog.derio.net
        - http://health-bridge.monitoring.svc.cluster.local:8080/healthz
      labels:
        probe_group: feature_health
  module: http_2xx
  vmProberSpec:
    url: blackbox-exporter.monitoring.svc:9115
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMProbe
metadata:
  name: management-plane-probes
  namespace: monitoring
spec:
  targets:
    staticConfig:
      targets:
        - https://omni.frank.derio.net/
        - https://omni.frank.derio.net:8100/
      labels:
        probe_group: management_plane
  module: http_2xx
  vmProberSpec:
    url: blackbox-exporter.monitoring.svc:9115
---
# Cert-expiry canary (issue #251, option 1): perpetually-expired cert keeps the
# tls-cert-expiring-{14d,7d} rules exercised end-to-end. canary="true" flows
# into the alert instance labels and is caught by the perma-muted first-position
# notification-policy route — no Telegram, no health-bridge. The firing alert
# instances in the Grafana alert list ARE the heartbeat; the
# tls-cert-canary-absent watchdog covers metric disappearance.
# Spec: docs/superpowers/specs/2026-06-07--obs--cert-expiry-canary-design.md
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMProbe
metadata:
  name: expired-cert-canary
  namespace: monitoring
spec:
  targets:
    staticConfig:
      targets:
        - https://expired.badssl.com/
      labels:
        probe_group: cert_canary   # distinct group — keeps feature-health dashboards clean
        canary: "true"
  module: http_2xx_insecure_tls
  vmProberSpec:
    url: blackbox-exporter.monitoring.svc:9115
---
# GPU time-share end-to-end probes (Layers 11/16). gpu-1 time-shares its single
# GPU between Ollama (inference) and ComfyUI (media) — exactly one is ever live,
# so probe_success flips between the two. The per-layer alert rules read these
# as probe_success{layer="11"|"16"}; gpu-node-both-down reads the group.
# Plan: docs/superpowers/plans/2026-06-15--obs--gpu-timeshare-health-probes
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMProbe
metadata:
  name: inference-probe
  namespace: monitoring
spec:
  targets:
    staticConfig:
      targets:
        - http://litellm.litellm.svc.cluster.local:4000/v1/chat/completions
      labels:
        probe_group: gpu_timeshare
        layer: "11"
  module: litellm_chat
  # scrapeTimeout (30s) MUST exceed the litellm_chat module timeout (25s) so a
  # slow-but-real completion (cold model load when Ollama just got the GPU, or a
  # queued request) returns probe_success=0 — NOT a scrape-layer NoData. A NoData
  # would read as noDataState:OK on gpu-node-both-down and could fail to PAGE a
  # genuinely wedged GPU node. interval >= scrapeTimeout (operator constraint).
  interval: 60s
  scrapeTimeout: 30s
  vmProberSpec:
    url: blackbox-exporter.monitoring.svc:9115
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMProbe
metadata:
  name: media-probe
  namespace: monitoring
spec:
  targets:
    staticConfig:
      targets:
        - http://comfyui.comfyui.svc.cluster.local:8188/object_info
      labels:
        probe_group: gpu_timeshare
        layer: "16"
  module: comfyui_object_info
  # scrapeTimeout (15s) > comfyui_object_info module timeout (10s), same NoData-vs-0
  # reasoning as inference-probe. Kept symmetric so the gpu_timeshare group has a
  # consistent cadence feeding gpu-node-both-down's for:10m window.
  interval: 60s
  scrapeTimeout: 15s
  vmProberSpec:
    url: blackbox-exporter.monitoring.svc:9115
