apiVersion: apps/v1
kind: Deployment
metadata:
  name: blackbox-exporter
  namespace: monitoring
  labels:
    app: blackbox-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blackbox-exporter
  template:
    metadata:
      labels:
        app: blackbox-exporter
    spec:
      containers:
        - name: blackbox-exporter
          image: prom/blackbox-exporter:v0.25.0
          ports:
            - name: http
              containerPort: 9115
          args:
            - --config.file=/config/blackbox.yml
          volumeMounts:
            - name: config
              mountPath: /config
            # LiteLLM master key (bearer_token_file for the litellm_chat module).
            - name: litellm-master-key
              mountPath: /etc/blackbox-secrets
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: blackbox-exporter-config
        # optional:true defensively — LITELLM_MASTER_KEY already exists in
        # Infisical so ESO syncs this on deploy, but if it were ever briefly
        # unsynced the pod (and the blog uptime probe) must still start; only the
        # litellm_chat probe would fail auth in that window.
        - name: litellm-master-key
          secret:
            secretName: litellm-master-key
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: blackbox-exporter
  namespace: monitoring
  labels:
    app: blackbox-exporter
spec:
  selector:
    app: blackbox-exporter
  ports:
    - name: http
      port: 9115
      targetPort: 9115
