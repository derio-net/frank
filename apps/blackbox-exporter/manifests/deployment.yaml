apiVersion: apps/v1
kind: Deployment
metadata:
  name: blackbox-exporter
  namespace: monitoring
  labels:
    app: blackbox-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blackbox-exporter
  template:
    metadata:
      labels:
        app: blackbox-exporter
    spec:
      containers:
        - name: blackbox-exporter
          image: prom/blackbox-exporter:v0.25.0
          ports:
            - name: http
              containerPort: 9115
          args:
            - --config.file=/config/blackbox.yml
          volumeMounts:
            - name: config
              mountPath: /config
            # Dedicated LiteLLM probe virtual key (bearer_token_file for the
            # litellm_chat module). optional via the volume below.
            - name: litellm-probe-key
              mountPath: /etc/blackbox-secrets
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: blackbox-exporter-config
        # optional:true — the Secret is absent until the probe virtual key is
        # minted (manual phase). The pod (and the blog uptime probe) must start
        # regardless; only the litellm_chat probe fails auth until the key lands.
        - name: litellm-probe-key
          secret:
            secretName: litellm-probe-key
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: blackbox-exporter
  namespace: monitoring
  labels:
    app: blackbox-exporter
spec:
  selector:
    app: blackbox-exporter
  ports:
    - name: http
      port: 9115
      targetPort: 9115
