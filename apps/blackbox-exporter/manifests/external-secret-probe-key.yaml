apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-probe-key
  namespace: monitoring
spec:
  # Least-privilege LiteLLM virtual key for the litellm_chat blackbox probe
  # (NOT the master key). Minted out-of-band — see the plan's manual phase
  # (manual-op id: obs-litellm-probe-virtual-key). Until the Infisical key
  # exists this ExternalSecret stays SecretSyncedError and the target Secret is
  # absent; the blackbox-exporter mount is optional:true so the pod still runs
  # (the blog uptime probe keeps working) — only the litellm_chat probe fails
  # auth in the meantime.
  refreshInterval: 5m
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: litellm-probe-key
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: litellm-probe-key
      remoteRef:
        key: LITELLM_PROBE_VIRTUAL_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
