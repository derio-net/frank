apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-vk-data
  namespace: agents
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-vk
  namespace: agents
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres-vk
  template:
    metadata:
      labels:
        app: postgres-vk
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_DB
              value: remote
            - name: POSTGRES_USER
              value: remote
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vk-remote-secrets
                  key: POSTGRES_PASSWORD
          args:
            - "-c"
            - "wal_level=logical"
            - "-c"
            - "max_replication_slots=5"
            - "-c"
            - "max_wal_senders=5"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-vk-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-vk
  namespace: agents
spec:
  selector:
    app: postgres-vk
  ports:
    - port: 5432
      targetPort: 5432
