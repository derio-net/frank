apiVersion: apps/v1
kind: Deployment
metadata:
  name: electric
  namespace: agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: electric
  template:
    metadata:
      labels:
        app: electric
    spec:
      containers:
        - name: electric
          image: electricsql/electric:1.4.13
          ports:
            - containerPort: 3000
          env:
            - name: ELECTRIC_INSECURE
              value: "true"
            - name: ELECTRIC_ROLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vk-remote-secrets
                  key: ELECTRIC_ROLE_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://electric:$(ELECTRIC_ROLE_PASSWORD)@postgres-vk:5432/remote?sslmode=disable"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: electric
  namespace: agents
spec:
  selector:
    app: electric
  ports:
    - port: 3000
      targetPort: 3000
