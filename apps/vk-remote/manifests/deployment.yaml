apiVersion: apps/v1
kind: Deployment
metadata:
  name: vk-remote
  namespace: agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vk-remote
  template:
    metadata:
      labels:
        app: vk-remote
    spec:
      containers:
        - name: vk-remote
          image: ghcr.io/derio-net/vk-remote:1768b9c
          ports:
            - containerPort: 8081
          env:
            - name: PORT
              value: "8081"
            - name: HOST
              value: "0.0.0.0"
            - name: NODE_ENV
              value: "production"
            - name: SERVER_PUBLIC_BASE_URL
              value: "https://vk.cluster.derio.net"
            - name: ELECTRIC_URL
              value: "http://electric:3000"
            - name: SELF_HOST_LOCAL_AUTH_EMAIL
              value: "admin@localhost"
            - name: VIBEKANBAN_REMOTE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vk-remote-secrets
                  key: VIBEKANBAN_REMOTE_JWT_SECRET
            - name: SELF_HOST_LOCAL_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vk-remote-secrets
                  key: SELF_HOST_LOCAL_AUTH_PASSWORD
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vk-remote-secrets
                  key: POSTGRES_PASSWORD
            - name: SERVER_DATABASE_URL
              value: "postgresql://remote:$(POSTGRES_PASSWORD)@postgres-vk:5432/remote?sslmode=disable"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
        - name: relay-server
          image: ghcr.io/derio-net/vk-remote:1768b9c  # keep in sync with vk-remote image above
          command: ["/usr/local/bin/relay-server"]
          ports:
            - containerPort: 8082
              protocol: TCP
          env:
            - name: RELAY_LISTEN_ADDR
              value: "0.0.0.0:8082"
            - name: VIBEKANBAN_REMOTE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vk-remote-secrets
                  key: VIBEKANBAN_REMOTE_JWT_SECRET
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vk-remote-secrets
                  key: POSTGRES_PASSWORD
            - name: SERVER_DATABASE_URL
              value: "postgresql://remote:$(POSTGRES_PASSWORD)@postgres-vk:5432/remote?sslmode=disable"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          startupProbe:
            tcpSocket:
              port: 8082
            failureThreshold: 10
            periodSeconds: 3
          readinessProbe:
            tcpSocket:
              port: 8082
            periodSeconds: 15
          livenessProbe:
            tcpSocket:
              port: 8082
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: vk-remote
  namespace: agents
spec:
  selector:
    app: vk-remote
  ports:
    - name: http
      port: 8081
      targetPort: 8081
    - name: relay
      port: 8082
      targetPort: 8082
