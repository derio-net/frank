# Syncs Resend API key from Infisical for any agent-driven transactional
# email flows running inside the ruflo pod.
#
# Marked `optional: true` on the Deployment's secretRef so a missing or
# lagging sync does not block rollouts — same rule paperclip uses.
# See frank-gotchas.md ("envFrom.secretRef without optional: true blocks
# rolling updates entirely") for the rationale.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ruflo-resend
  namespace: ruflo-system
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: ruflo-resend
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # In-cluster env var uses the standard `RESEND_API_KEY` name expected
    # by the official Resend SDKs and the Resend MCP server; sourced from
    # the `EMAIL_RESEND_API_KEY` Infisical entry (same key paperclip uses).
    - secretKey: RESEND_API_KEY
      remoteRef:
        key: EMAIL_RESEND_API_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
