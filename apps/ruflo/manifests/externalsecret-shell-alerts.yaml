# Telegram bot credentials for the ruflo-shell sidecar's notify-telegram.sh
# helper (e.g., supercronic alerts on cron failures). Same source-of-truth
# Infisical entries that secure-agent-pod / paperclip-shell use.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ruflo-shell-alerts
  namespace: ruflo-system
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: ruflo-shell-alerts
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: FRANK_C2_TELEGRAM_BOT_TOKEN
      remoteRef:
        key: FRANK_C2_TELEGRAM_BOT_TOKEN
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: FRANK_C2_TELEGRAM_CHAT_ID
      remoteRef:
        key: FRANK_C2_TELEGRAM_CHAT_ID
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
