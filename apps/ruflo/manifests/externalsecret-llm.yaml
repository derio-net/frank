# Syncs OpenRouter + LiteLLM connection details from Infisical.
#
# Ruvocal (the upstream) speaks the OpenAI HTTP shape via
# OPENAI_BASE_URL + OPENAI_API_KEY. Pointing OPENAI_BASE_URL at the
# in-cluster LiteLLM gateway keeps zero direct frontier-LLM provider keys
# inside the ruflo pod — same pattern paperclip uses (see
# apps/paperclip/manifests/external-secret-llm.yaml).
#
# OPENROUTER_API_KEY is also exposed for code paths that bypass the
# OpenAI SDK and call OpenRouter directly. Reuses the existing Infisical
# entry that LiteLLM already consumes (apps/litellm/manifests/external-secret.yaml).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ruflo-llm
  namespace: ruflo-system
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: ruflo-llm
    creationPolicy: Owner
    template:
      data:
        OPENROUTER_API_KEY: "{{ .OPENROUTER_API_KEY }}"
        OPENAI_API_KEY: "{{ .OPENROUTER_API_KEY }}"
        OPENAI_BASE_URL: "http://litellm.litellm.svc:4000"
    deletionPolicy: Retain
  data:
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: OPENROUTER_API_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
