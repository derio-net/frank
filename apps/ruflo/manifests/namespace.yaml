# Namespace for ruflo (ruvocal multi-agent orchestrator) — Phase 16.
# Baseline PodSecurity — both containers run as non-root (UID 1000).
apiVersion: v1
kind: Namespace
metadata:
  name: ruflo-system
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline
