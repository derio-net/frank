# Minimal ServiceAccount for the ruflo Pod.
# Unlike secure-agent-pod, ruflo does NOT get cluster-admin: it's a
# narrowly-scoped orchestration workload that only talks to LiteLLM and
# its own database. No K8s API access is required from inside the pod.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ruflo
  namespace: ruflo-system
