apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-agent
  namespace: alert-agent
  labels:
    app.kubernetes.io/name: alert-agent
spec:
  replicas: 1
  # Single Telegram getUpdates consumer + single persistent tmux session — both
  # require exactly one pod; Recreate so a roll never runs two consumers at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: alert-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alert-agent
    spec:
      # Default ServiceAccount, NO RBAC — HTTP-only posture (matches the old
      # helper). Investigation is over VictoriaLogs/VictoriaMetrics/Grafana/
      # GoatCounter only; the agent never gets a kube credential.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        # --- main: the persistent agent session + the surge/digest cron --------
        - name: agent
          image: ghcr.io/derio-net/multi-agent-shell:aecf74d675f562fe55cd00336f874d61582f2000
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          ports:
            - { name: ssh, containerPort: 2222 }
          env:
            - { name: AGENT_SESSION_SERVE, value: "1" }            # bake the serve endpoint
            # Disable tmux-continuum auto-restore: the driver owns sessions, so
            # continuum must never resurrect a DEAD bash shell that ensure_session
            # would reuse (the DM-into-bash failure). Honored by agent-shell-base's
            # tmux-resurrect.conf if-shell (Fix B). Fix C is the load-bearing guard;
            # this is defence + cleanliness (stops the 5-min save/restore churn).
            - { name: AGENT_TMUX_RESTORE, value: "off" }
            - { name: AGENT_SESSION_URL, value: "http://localhost:8765" }
            - { name: PYTHONPATH, value: "/opt/pylib" }
            - { name: VICTORIALOGS_URL, value: "http://victoria-logs-victoria-logs-single-server.monitoring.svc.cluster.local:9428" }
            - { name: GOATCOUNTER_URL, value: "http://goatcounter.goatcounter-system.svc.cluster.local:8080" }
            - { name: SURGE_ABS_FLOOR, value: "50" }
            - { name: SURGE_VISITOR_FLOOR, value: "10" }
            - { name: SURGE_COOLDOWN_HOURS, value: "6" }
            - { name: SURGE_STATE_PATH, value: "/home/agent/.alert-agent/surge-state.json" }
          envFrom:
            # optional:true so a missing/lagging Secret never blocks the pod
            # (the gotcha: a non-optional envFrom secretRef wedges it on a missing
            # Secret). Telegram is required-but-present; GoatCounter may be absent
            # until seeded (facts.py is fail-open).
            - secretRef: { name: alert-agent-secrets, optional: true }       # FRANK_C2_TELEGRAM_*
            - secretRef: { name: alert-agent-goatcounter, optional: true }   # OBS_GOATCOUNTER_API_TOKEN
          volumeMounts:
            - { name: home, mountPath: /home/agent }
            - { name: pylib-frankfacts, mountPath: /opt/pylib/frank_facts }
            - { name: pylib-bridge, mountPath: /opt/pylib/tg_bridge }
            - { name: pylib-handlers, mountPath: /opt/pylib/handlers }
            - { name: bin, mountPath: /opt/alert-agent-bin }
            - { name: crontab, mountPath: /home/agent/.crontab, subPath: .crontab }
            # Load the agent instructions as the harness context file(s) — NOT
            # SKILL.md, which no harness auto-loads. claude reads CLAUDE.md ONLY
            # (never AGENTS.md natively); codex/opencode/antigravity read AGENTS.md
            # (the cross-tool standard). Mount the same ConfigMap content under both
            # so whichever harness the driver launches picks it up. The driver runs
            # claude with cwd /home/agent (WORKDIR), so ./CLAUDE.md auto-loads —
            # without it a free-text DM has no tools/boundary and reaches for kubectl
            # (absent here), burning the timeout. (The multi-agent-shell image also
            # fans AGENTS.md out to GEMINI.md / .github/copilot-instructions.md.)
            - { name: skill, mountPath: /home/agent/AGENTS.md, subPath: SKILL.md }
            - { name: skill, mountPath: /home/agent/CLAUDE.md, subPath: SKILL.md }
          resources:
            requests: { cpu: 50m, memory: 256Mi }
            # claude TUI + tmux: one shared "alert-agent-ops" session for surge/
            # digest/grafana + one per inbound chat. 8Gi (not 3Gi) so the NATIVE
            # claude build's background auto-updater — which buffers the ~245MB
            # download ~17x in anon memory, peaking ~4.2-4.5GiB — fits without a
            # group-OOM (frank-gotchas/agent-shells.md; hermes was raised 4->8 for
            # the same reason). Request stays low; this only permits the spike.
            limits: { memory: 8Gi }
        # --- sidecar: inbound Telegram (single getUpdates consumer) ------------
        - name: telegram-bridge
          image: ghcr.io/derio-net/multi-agent-shell:aecf74d675f562fe55cd00336f874d61582f2000
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          command: ["/opt/alert-agent-bin/telegram-bridge"]
          env:
            - { name: PYTHONPATH, value: "/opt/pylib" }
            - { name: AGENT_SESSION_URL, value: "http://localhost:8765" }   # shared pod netns
          envFrom:
            - secretRef: { name: alert-agent-secrets, optional: true }
            - secretRef: { name: alert-agent-goatcounter, optional: true }
          volumeMounts:
            - { name: pylib-frankfacts, mountPath: /opt/pylib/frank_facts }
            - { name: pylib-bridge, mountPath: /opt/pylib/tg_bridge }
            - { name: pylib-handlers, mountPath: /opt/pylib/handlers }
            - { name: bin, mountPath: /opt/alert-agent-bin }
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { memory: 96Mi }
        # --- sidecar: grafana-webhook receiver (the re-pointed contact point) --
        - name: grafana-webhook
          image: ghcr.io/derio-net/multi-agent-shell:aecf74d675f562fe55cd00336f874d61582f2000
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          command: ["/opt/alert-agent-bin/grafana-webhook"]
          ports:
            - { name: webhook, containerPort: 8090 }
          env:
            - { name: PYTHONPATH, value: "/opt/pylib" }
            - { name: AGENT_SESSION_URL, value: "http://localhost:8765" }
            - { name: GRAFANA_WEBHOOK_PORT, value: "8090" }
            - { name: VICTORIALOGS_URL, value: "http://victoria-logs-victoria-logs-single-server.monitoring.svc.cluster.local:9428" }
          envFrom:
            - secretRef: { name: alert-agent-secrets, optional: true }
            - secretRef: { name: alert-agent-goatcounter, optional: true }
          volumeMounts:
            - { name: pylib-frankfacts, mountPath: /opt/pylib/frank_facts }
            - { name: pylib-bridge, mountPath: /opt/pylib/tg_bridge }
            - { name: pylib-handlers, mountPath: /opt/pylib/handlers }
            - { name: bin, mountPath: /opt/alert-agent-bin }
          readinessProbe:
            httpGet: { path: /healthz, port: webhook }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { memory: 96Mi }
      volumes:
        - name: home
          persistentVolumeClaim: { claimName: alert-agent-home }
        - { name: pylib-frankfacts, configMap: { name: alert-agent-frankfacts } }
        - { name: pylib-bridge, configMap: { name: alert-agent-bridge } }
        - { name: pylib-handlers, configMap: { name: alert-agent-handlers } }
        - name: bin
          configMap: { name: alert-agent-bin, defaultMode: 0755 }
        - { name: crontab, configMap: { name: alert-agent-crontab } }
        - { name: skill, configMap: { name: alert-agent-skill } }
