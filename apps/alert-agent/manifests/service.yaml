apiVersion: v1
kind: Service
metadata:
  name: alert-agent
  namespace: alert-agent
  labels:
    app.kubernetes.io/name: alert-agent
spec:
  selector:
    app.kubernetes.io/name: alert-agent
  ports:
    # The grafana-webhook receiver — the re-pointed "AI Helper Webhook" target.
    - { name: webhook, port: 8080, targetPort: webhook }
