apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-alert-helper
  namespace: ai-alert-helper-system
  labels:
    app.kubernetes.io/name: ai-alert-helper
spec:
  replicas: 1
  # Recreate, NOT RollingUpdate: the analyst poller long-polls Telegram
  # getUpdates, and Telegram allows exactly ONE consumer per bot token —
  # a rolling update would briefly run two pollers (409 conflict).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-alert-helper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-alert-helper
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      enableServiceLinks: false
      containers:
        - name: ai-alert-helper
          image: ghcr.io/derio-net/ai-alert-helper:0.2.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: VICTORIALOGS_URL
              value: "http://victoria-logs-victoria-logs-single-server.monitoring.svc.cluster.local:9428"
            # Internal service URL — the public counter.cluster.derio.net
            # ingress is behind Authentik forward-auth, which 302-redirects
            # API token requests to the SSO login. The in-cluster digest must
            # hit the GoatCounter Service directly to reach the /api/v0 stats.
            - name: GOATCOUNTER_URL
              value: "http://goatcounter.goatcounter-system.svc.cluster.local:8080"
            - name: LITELLM_URL
              value: "http://litellm.litellm.svc.cluster.local:4000"
            - name: LLM_MODEL_PRIMARY
              value: "qwen-think-14b"
            # LLM_MODEL_FALLBACK deliberately ABSENT (no-fallback policy,
            # 2026-06-04): the 0.2.0 adapter treats the empty default as
            # "no fallback, fail loud" — local inference only, and an
            # identical-model retry adds latency without resilience.
            # Analyst (Telegram Q&A) model + client-side context budget.
            # ANALYST_NUM_CTX does NOT reach Ollama (LiteLLM drops num_ctx
            # for ollama_chat — litellm#12930); the SERVER window is
            # OLLAMA_CONTEXT_LENGTH on apps/ollama/values.yaml. Keep the two
            # EQUAL: this value drives prompt-eviction so requests stay under
            # the server window (Ollama truncates silently past it). Drop
            # both to 8192 if the Test Plan VRAM measurement shows pressure.
            - name: LLM_MODEL_ANALYST
              value: "mistral-small-24b"
            - name: ANALYST_NUM_CTX
              value: "16384"
            # Canonical playbook, mounted whole-dir from the kustomize
            # configMapGenerator (hash-suffixed name -> pod rolls on edit;
            # never subPath — kubelet doesn't refresh subPath mounts).
            - name: SKILL_PATH
              value: "/etc/analyst/SKILL.md"
            # Surge detector tuning (read in surge.compute / /surge-check).
            - name: SURGE_ABS_FLOOR        # min req/hr for any tier (kills baseline-of-1 artifacts)
              value: "50"
            - name: SURGE_VISITOR_FLOOR    # min GoatCounter pageviews to confirm a Major as URGENT
              value: "10"
            - name: SURGE_COOLDOWN_HOURS   # min hours before re-notifying the same tier (dedup floor)
              value: "6"
          envFrom:
            - secretRef:
                name: ai-alert-helper-secrets
          resources:
            requests:
              cpu: 20m
              memory: 60Mi
            limits:
              memory: 256Mi   # poller + per-chat history headroom (0.2.0)
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: analyst-skill
              mountPath: /etc/analyst
              readOnly: true
      volumes:
        - name: analyst-skill
          configMap:
            name: analyst-skill   # kustomize rewrites to the hash-suffixed name
