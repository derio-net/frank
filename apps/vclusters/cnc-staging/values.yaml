# Long-lived CNC staging vCluster. Unlike experiments, this is an ArgoCD
# deploy target and its cluster credentials must be registered out-of-band.
#
# Overrides on top of apps/vclusters/template/values.yaml. Chart vcluster
# 0.32.1 pins root `additionalProperties: false` in values.schema.json, so the
# removed `isolation:` key fails `helm template` outright — the quota lives
# under `policies.resourceQuota` (template key style), not `isolation:`.
controlPlane:
  statefulSet:
    persistence:
      volumeClaim:
        enabled: true
        size: 20Gi
        storageClass: longhorn
policies:
  resourceQuota:
    enabled: true
    quota:
      requests.cpu: "8"
      requests.memory: 16Gi
      count/pods: "50"

# Approach A (frank secret-sync): the 3 CNC staging secrets are resolved
# HOST-side by apps/cnc-staging-host (host ESO + infisical) in this vCluster's
# own host namespace, then synced INTO the vCluster (ns cnc-staging, where the
# pods consume them) by name. This is OSS-native sync — NOT the Pro-only
# `integrations.externalSecrets` that crashed the control-plane (#651/#652).
# Reading the vCluster's OWN host ns needs no extra RBAC.
sync:
  fromHost:
    secrets:
      enabled: true
      mappings:
        byName:
          "cnc-staging-vcluster/cnc-secrets": "cnc-staging/cnc-secrets"
          "cnc-staging-vcluster/cnc-ghcr-pull": "cnc-staging/cnc-ghcr-pull"
          "cnc-staging-vcluster/cnc-runner-auth": "cnc-staging/cnc-runner-auth"
