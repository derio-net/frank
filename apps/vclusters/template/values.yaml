# vCluster template values — sensible defaults for Frank cluster
# Individual vClusters import these and override as needed.
#
# Chart: loft-sh/vcluster v0.32.1
# Repo:  https://charts.loft.sh

# Syncer configuration — what gets synced between host and virtual cluster
sync:
  toHost:
    pods:
      enabled: true
    services:
      enabled: true
    configMaps:
      enabled: true
    secrets:
      enabled: true
    endpoints:
      enabled: true
    persistentVolumeClaims:
      enabled: true
    ingresses:
      enabled: true
  fromHost:
    nodes:
      enabled: true
    storageClasses:
      enabled: true

# Backing store — embedded etcd with Longhorn persistence
controlPlane:
  backingStore:
    etcd:
      embedded:
        enabled: true
  statefulSet:
    persistence:
      volumeClaim:
        enabled: true
        storageClass: longhorn
        size: 5Gi
        retentionPolicy: Delete
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# Policies — resource quotas, limit ranges, and network policies
policies:
  resourceQuota:
    enabled: true
    quota:
      requests.cpu: "4"
      requests.memory: 8Gi
      limits.cpu: "8"
      limits.memory: 16Gi
      count/pods: "50"
      count/services: "20"
      count/persistentvolumeclaims: "10"
  limitRange:
    enabled: true
    default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
  networkPolicy:
    enabled: true
