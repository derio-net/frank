# Argo Rollouts canary for LiteLLM Gateway
#
# History: this was originally specified with a Cilium traffic-router plugin
# (rollouts-plugin-trafficrouter-cilium) that turned out to never have been
# published as a release artifact. The plugin URL 404'd, the controller could
# not load it, and the Rollout sat stuck at Step 0/6 for 39 days while the
# Helm-managed Deployment quietly served traffic on its own. We discovered
# this only when we tried to use the canary for the first time — see
# building/19-progressive-delivery (Update: 2026-05-04 section) for the full
# postmortem.
#
# Current design: replica-count canary (no traffic routing). The stable and
# canary ReplicaSets share the chart's Service (litellm @ 192.168.55.206:4000),
# so kube-proxy/Cilium endpoint selection distributes requests across the
# union of pods proportional to pod count. With replicas=5, setWeight=20
# → 1 canary + 4 stable; setWeight=50 → 3 canary + 2 stable.
#
# workloadRef: Rollout reads pod template from the Helm chart's Deployment.
# scaleDown: onsuccess — controller scales the Deployment to 0 the moment
# the Rollout reaches Healthy. Argo Rollouts' default for workloadRef.scaleDown
# is "never", so without this field the Helm Deployment keeps running its
# pod alongside the Rollout's pods (5+1 = 6 total). PR #213 left this field
# off; this PR adds it. ArgoCD ignoreDifferences on apps/Deployment/spec.replicas
# prevents ArgoCD from fighting the controller's scale-down.
#
# Canary steps:
#   20% (1/5 pods) → manual pause → operator promote →
#   50% (3/5 pods) → manual pause → operator promote →
#   100% (full promotion)
#
# Metric-gated analysis is currently DISABLED. The original design referenced
# `litellm_request_total` from VictoriaMetrics, but that metric is part of
# LiteLLM's Enterprise (paid) Prometheus integration — the OSS image we run
# does not emit it, and there's no scrape config either. The first end-to-end
# rehearsal on 2026-05-04 (PR #215) proved this: AnalysisRun panicked with
# `reflect: slice index out of range` because the query returned an empty
# vector, controller treated 5 consecutive Errors as abort signal, rollout
# correctly failed closed.
#
# `apps/litellm/manifests/analysis-template.yaml` is left in place as a
# scaffold but is not referenced from any step here. A real signal source —
# Cilium Hubble L7 stats, a JSON-log → Prometheus sidecar exporter, or an
# Argo Rollouts `web` provider against /health/readiness — is brainstormed
# in `docs/superpowers/specs/2026-05-04--deploy--litellm-canary-metric-source-design.md`.
# Once one of those lands, re-introduce `analysis: { templates: ... }` between
# each setWeight and the next manual pause.
#
# Until then: gating is fully manual at each pause. Operator is the
# AnalysisRun.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: litellm
  namespace: litellm
spec:
  replicas: 5
  workloadRef:
    apiVersion: apps/v1
    kind: Deployment
    name: litellm
    scaleDown: onsuccess
  strategy:
    canary:
      steps:
        - setWeight: 20
        - pause: {}
        - setWeight: 50
        - pause: {}
