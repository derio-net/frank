# AnalysisTemplate: LiteLLM error rate via VictoriaMetrics Prometheus API
# Runs 5 x 1-minute intervals (5 min total) at each canary step
# Inconclusive handling: NaN results (0 traffic / VM down) match neither success nor
# failure condition, so Argo Rollouts treats them as inconclusive automatically.
# inconclusiveLimit: 3 = after 3 inconclusive intervals, abort and hold rollout
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: litellm-error-rate
  namespace: litellm
spec:
  metrics:
    - name: error-rate
      interval: 1m
      count: 5
      inconclusiveLimit: 3
      successCondition: "result[0] < 0.05"
      failureCondition: "result[0] >= 0.05"
      provider:
        prometheus:
          address: "http://vmsingle-victoria-metrics-victoria-metrics-k8s-stack.monitoring.svc.cluster.local:8428"
          query: |
            sum(rate(litellm_request_total{status=~"5.."}[5m]))
            /
            sum(rate(litellm_request_total[5m]))
