# LiteLLM — unified LLM inference gateway
# Routes between local Ollama models and cloud providers via OpenRouter
# Exposed at 192.168.55.206:4000 as OpenAI-compatible API
#
# ─────────────────────────────────────────────────────────────────────────────
# TODO ON NEXT IMAGE BUMP — fold in the chart-config improvements PR #210
# discovered we don't have. Don't ship a bump without these:
#
# 1. Pod-template `affinity` requiring amd64. PR #210's final promote landed
#    one of 5 pods on raspi-1 (RPi 4, ARM, low-power) by scheduler tiebreaker
#    — there's NO config protecting LiteLLM from the slow ARM node, every
#    prior amd64 placement was luck. T2 documented this in
#    docs/agentic-discussion/2026-05-04--litellm-canary-for-real/terminal-2.md.
#    Suggested block (verify cpu/memory numbers from `kubectl top pod` first):
#
#      resources:
#        requests:
#          cpu: 200m
#          memory: 512Mi
#        limits:
#          memory: 1Gi
#      affinity:
#        nodeAffinity:
#          requiredDuringSchedulingIgnoredDuringExecution:
#            nodeSelectorTerms:
#            - matchExpressions:
#              - key: kubernetes.io/arch
#                operator: In
#                values: [amd64]
#
# 2. PreSync migration Job pinned to amd64 (separate from the main pod
#    template — chart may need migrationJob.nodeSelector or equivalent).
#    PR #220 had to bump v1.83.14-stable → v1.83.14-stable.patch.1 because
#    the upstream arm64 layer for v1.83.14-stable was broken, and the Job
#    landed on raspi-1 by default. T2 flagged this in the rehearsal as
#    optimization (avoid the 4-7 min cold-pull tax on raspi-1); PR #210
#    promoted it to "would have prevented an entire class of failure mode."
#
# 3. ✅ DONE in this PR — qwen-vl-7b dropped from q8_0 to default Q4_K_M.
#    The Q8_0 tag was 9.4GB on disk; once loaded with 128K-context KV cache
#    and vision tower it pushed past the 16GB RTX 5070 Ti budget and Ollama
#    refused with "model requires more system memory." Q4_K_M fits with
#    ~4GB headroom. OCR fidelity is slightly reduced; gemma-12b remains
#    the heavier-model option in the same multimodal slot.
#
# Discovery context: the full PR-#210 cascade postmortem is in
# blog/content/docs/building/19-progressive-delivery (Update sections) and
# the multi-agent collaboration log at
# docs/agentic-discussion/2026-05-04--litellm-canary-for-real/.
# ─────────────────────────────────────────────────────────────────────────────

image:
  repository: ghcr.io/berriai/litellm-database
  tag: "main-v1.83.14-stable.patch.1"
  pullPolicy: IfNotPresent

# Master key from ExternalSecret-managed K8s Secret
masterkeySecretName: "litellm-api-keys"
masterkeySecretKey: "LITELLM_MASTER_KEY"

# Inject API keys from K8s Secret as env vars
# ExternalSecret "litellm-api-keys" syncs from Infisical
environmentSecrets:
  - litellm-api-keys

envVars:
  STORE_MODEL_IN_DB: "True"

# LiteLLM proxy configuration (rendered as config.yaml)
#
# Lineup refresh — 2026-05-03
# Sized for gpu-1's RTX 5070 Ti (16GB GDDR7). With OLLAMA_MAX_LOADED_MODELS=1,
# each loaded model can use up to ~14GB after KV cache + multimodal overhead.
# Local covers default + multimodal + coding + reasoning; cloud covers
# frontier-scale, video, and 200B+-class reasoning.
proxy_config:
  model_list:
    # ──────────────────────────────────────────────
    # LOCAL MODELS (Ollama on gpu-1, RTX 5070 Ti 16GB)
    # ──────────────────────────────────────────────

    # Mistral Small 3.2 24B — default general-purpose, 128K context
    # Strong all-rounder with function calling. Q4_K_M ≈ 14GB VRAM.
    # Replaces qwen3.5:9b as default.
    - model_name: mistral-small-24b
      litellm_params:
        model: ollama/mistral-small3.2:24b
        api_base: http://ollama.ollama.svc.cluster.local:11434

    # Gemma 3 12B — multimodal (text + image), 128K context
    # Best practical local vision model — OCR, charts, screenshot analysis.
    # Q4_K_M ≈ 8GB + ~1.4GB vision tower.
    - model_name: gemma-12b
      litellm_params:
        model: ollama/gemma3:12b
        api_base: http://ollama.ollama.svc.cluster.local:11434

    # Qwen2.5-VL 7B (Q4_K_M) — Qwen-family alternative to gemma-12b for vision
    # Different model architecture from Gemma3; useful when one struggles on a
    # specific input class (handwriting, dense tables, multi-column layouts).
    # Default Q4_K_M ≈ 5.5GB + vision tower + KV cache ≈ 12GB on the 16GB
    # RTX 5070 Ti — comfortable headroom. Q8_0 was tried first but OOMed at
    # ~15-17GB total when KV cache for 128K context loaded; see PR #210
    # postmortem for the canary-day discovery.
    - model_name: qwen-vl-7b
      litellm_params:
        model: ollama/qwen2.5vl:7b
        api_base: http://ollama.ollama.svc.cluster.local:11434

    # Qwen2.5-Coder 14B (Q6) — code generation and completion
    # Q6_K instead of default Q4 — measurably fewer syntax errors at the
    # cost of ~3GB more VRAM. Replaces both deepseek-coder:6.7b and
    # carstenuhlig/omnicoder-9b with a single stronger model.
    - model_name: qwen-coder-14b
      litellm_params:
        model: ollama/qwen2.5-coder:14b-instruct-q6_K
        api_base: http://ollama.ollama.svc.cluster.local:11434

    # Qwen3 14B — reasoning model with native thinking mode, 32K context
    # Useful when a problem benefits from extended reasoning steps.
    # Q4_K_M ≈ 9GB VRAM.
    - model_name: qwen-think-14b
      litellm_params:
        model: ollama/qwen3:14b
        api_base: http://ollama.ollama.svc.cluster.local:11434

    # ──────────────────────────────────────────────
    # CLOUD MODELS — Free tier via OpenRouter
    # Rate limit: 20 req/min, 200 req/day per model
    # Slugs verified live against /api/v1/models on 2026-05-03 — refresh
    # via /update-openrouter-models when entries start 404'ing.
    # ──────────────────────────────────────────────

    # Gemma 4 31B Instruct — flagship free multimodal, 256K context
    # Text + image + video input, function calling, 140+ languages.
    # ✅ Data: Open-weight, served by third-party
    - model_name: gemma-31b
      litellm_params:
        model: openrouter/google/gemma-4-31b-it:free
        api_key: os.environ/OPENROUTER_API_KEY

    # NVIDIA Nemotron Nano 2 VL — 12B multimodal, 128K context
    # Video understanding + document intelligence; the smaller, faster
    # video-capable companion to Gemma 4 31B.
    # ✅ Data: Open-weight, served by third-party
    - model_name: nemotron-vl-12b
      litellm_params:
        model: openrouter/nvidia/nemotron-nano-12b-v2-vl:free
        api_key: os.environ/OPENROUTER_API_KEY

    # NVIDIA Nemotron 3 Nano Omni 30B — multimodal + reasoning, 256K context
    # Accepts text/image/video/audio; reasoning mode. Largest free omni model.
    # ✅ Data: Open-weight, served by third-party
    - model_name: nemotron-omni-30b
      litellm_params:
        model: openrouter/nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free
        api_key: os.environ/OPENROUTER_API_KEY

    # Qwen3 Next 80B A3B Instruct — top free general/reasoning, 262K context
    # MoE (3B active), strong on coding + math + general knowledge.
    # Replaces step-flash slot.
    # ⚠ Data: Alibaba Cloud; prompts may be retained
    - model_name: qwen-next-80b
      litellm_params:
        model: openrouter/qwen/qwen3-next-80b-a3b-instruct:free
        api_key: os.environ/OPENROUTER_API_KEY

    # Qwen3 Coder — 480B MoE (35B active), 262K context
    # Frontier free coding model — for cases the local 14B coder isn't enough.
    # ⚠ Data: Alibaba Cloud; prompts may be retained
    - model_name: qwen-coder-480b
      litellm_params:
        model: openrouter/qwen/qwen3-coder:free
        api_key: os.environ/OPENROUTER_API_KEY

    # Hermes 3 405B — NousResearch fine-tune of Llama 3.1 405B, 131K context
    # Largest free open-weight model; backstop for general-purpose at scale.
    # ✅ Data: Open-weight, served by third-party
    - model_name: hermes-405b
      litellm_params:
        model: openrouter/nousresearch/hermes-3-llama-3.1-405b:free
        api_key: os.environ/OPENROUTER_API_KEY

  litellm_settings:
    default_model: mistral-small-24b

  general_settings:
    master_key: os.environ/LITELLM_MASTER_KEY

service:
  type: LoadBalancer
  port: 4000
  annotations:
    lbipam.cilium.io/ips: "192.168.55.206"

# Standalone PostgreSQL for virtual keys, spend tracking, usage logs
db:
  deployStandalone: true

postgresql:
  auth:
    username: litellm
    database: litellm
  primary:
    persistence:
      enabled: true
      size: 5Gi
      storageClass: longhorn
