# LiteLLM — unified LLM inference gateway
# Routes local Ollama models (OpenRouter free-tier cloud section removed
# 2026-06-04 — see the lineup note above proxy_config)
# Exposed at 192.168.55.206:4000 as OpenAI-compatible API
#
# ─────────────────────────────────────────────────────────────────────────────
# TODO ON NEXT IMAGE BUMP — chart-config improvements PR #210 discovered we
# didn't have. Items 1–3 below are now shipped/resolved; the one remainder
# before the next bump is item 1's `resources` requests/limits:
#
# 1. ✅ affinity SHIPPED 2026-06-06 (#478) — top-level `affinity:` block below
#    requires amd64 on the pod template. Background: PR #210's final promote
#    landed one of 5 pods on raspi-1 (RPi 4, ARM, low-power) by scheduler
#    tiebreaker — every prior amd64 placement was luck. T2 documented this in
#    docs/agentic-discussion/2026-05-04--litellm-canary-for-real/terminal-2.md.
#    STILL TODO: `resources` requests/limits — blocked on the dead Metrics
#    API (#394; `kubectl top` unavailable). Verify numbers from
#    VictoriaMetrics (container_memory_working_set_bytes / CPU rate for the
#    litellm pods) before setting. Draft from PR #210:
#
#      resources:
#        requests:
#          cpu: 200m
#          memory: 512Mi
#        limits:
#          memory: 1Gi
#
# 2. ✅ RESOLVED 2026-06-06 (#478) — the same top-level `affinity:` covers the
#    PreSync migration Job: chart 1.81.13 templates `.Values.affinity` and
#    `.Values.tolerations` into BOTH the Deployment (deployment.yaml:226/:230)
#    and the migrations Job (migrations-job.yaml:106/:110). Issue #478's
#    premise ("no scheduling support on the Job") only holds for
#    `nodeSelector` / migrationJob-scoped values. Background: PR #220 had to
#    bump v1.83.14-stable → .patch.1 because the upstream arm64 layer was
#    broken and the Job landed on raspi-1 by default; on 2026-06-04 the Job
#    hit raspi-1 minutes before the node wedged (7+ min Prisma run on a Pi).
#
# 3. ✅ DONE in this PR — qwen-vl-7b dropped from q8_0 to default Q4_K_M.
#    The Q8_0 tag was 9.4GB on disk; once loaded with 128K-context KV cache
#    and vision tower it pushed past the 16GB RTX 5070 Ti budget and Ollama
#    refused with "model requires more system memory." Q4_K_M fits with
#    ~4GB headroom. OCR fidelity is slightly reduced; gemma-12b remains
#    the heavier-model option in the same multimodal slot.
#
# Discovery context: the full PR-#210 cascade postmortem is in
# blog/content/docs/building/19-progressive-delivery (Update sections) and
# the multi-agent collaboration log at
# docs/agentic-discussion/2026-05-04--litellm-canary-for-real/.
# ─────────────────────────────────────────────────────────────────────────────

image:
  repository: ghcr.io/berriai/litellm-database
  tag: "main-v1.83.14-stable.patch.1"
  pullPolicy: IfNotPresent

# Master key from ExternalSecret-managed K8s Secret
masterkeySecretName: "litellm-api-keys"
masterkeySecretKey: "LITELLM_MASTER_KEY"

# Inject API keys from K8s Secret as env vars
# ExternalSecret "litellm-api-keys" syncs from Infisical
environmentSecrets:
  - litellm-api-keys

envVars:
  STORE_MODEL_IN_DB: "True"

# Keep LiteLLM off the ARM Pi nodes — gateway pods AND the PreSync Prisma
# migrations Job (#478). Chart 1.81.13 templates this top-level value into
# both pod templates (deployment.yaml:226, migrations-job.yaml:106).
# amd64 = mini-1/2/3, gpu-1, pc-1; excludes raspi-1/raspi-2. Arch (not
# hostname) is the real constraint: broken upstream arm64 image layers were
# a prior failure mode (PR #220).
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/arch
          operator: In
          values: [amd64]

# LiteLLM proxy configuration (rendered as config.yaml)
#
# Lineup refresh — 2026-05-03 (qwen3.6:35b-a3b added 2026-05-06; OpenRouter
# free-tier cloud section removed 2026-06-04 — rate limits made every cloud
# alias unreliable (429s/timeouts), and an unreliable model is worse than a
# missing one for anything automated. Local inference only; if frontier-scale
# is ever needed, add a PAID provider entry + key, never a :free one.)
# Sized for gpu-1's RTX 5070 Ti (16GB GDDR7). With OLLAMA_MAX_LOADED_MODELS=1,
# only one model loads at a time. Most entries are dense and fully resident
# in VRAM (≤14GB after KV cache + multimodal overhead); qwen36-a3b is the
# exception — MoE 35B-A3B that relies on partial CPU offload of inactive
# experts to gpu-1's 128GB host RAM. Local covers default + multimodal +
# coding + reasoning + MoE-flagship.
proxy_config:
  model_list:
    # ──────────────────────────────────────────────
    # LOCAL MODELS (Ollama on gpu-1, RTX 5070 Ti 16GB)
    # ──────────────────────────────────────────────

    # Mistral Small 3.2 24B — default general-purpose, 128K context
    # Strong all-rounder with function calling. Q4_K_M ≈ 14GB VRAM.
    # Replaces qwen3.5:9b as default.
    - model_name: mistral-small-24b
      litellm_params:
        model: ollama_chat/mistral-small3.2:24b
        api_base: http://ollama.ollama.svc.cluster.local:11434

    # Gemma 4 12B — multimodal (text + image), 256K context upstream
    # (server-capped by OLLAMA_CONTEXT_LENGTH=16384). Best practical local
    # vision model — OCR, charts, screenshot analysis. Q4_K_M ≈ 7.6GB +
    # vision tower. Replaced gemma3:12b 2026-06-05 (needed the ollama
    # 0.30.5 image pin — gemma4 arch lands in 0.30.3, FPE-crash-free from
    # 0.30.5). Thinking model: emits a reasoning preamble before answering
    # (CLI shows it; API keeps content clean — verified stream+tools on
    # the native /api/chat path populates tool_calls with zero scaffolding
    # leak). Alias kept stable so consumers are untouched.
    - model_name: gemma-12b
      litellm_params:
        model: ollama_chat/gemma4:12b
        api_base: http://ollama.ollama.svc.cluster.local:11434

    # Gemma 4 12B (no-think) — same backend as gemma-12b but with the
    # reasoning preamble disabled via extra_body (the qwen36-a3b-nothin
    # pattern). For consumers that can't set request-body params (UIs,
    # n8n nodes, model dropdowns) and want fast multimodal answers:
    # verified 0.7s/22 completion tokens vs 4.1s/300-token cap-out with
    # thinking on. gemma4 thinking is binary — "think": "low" levels are
    # accepted but ignored, so false is the only useful override.
    - model_name: gemma-12b-nothin
      litellm_params:
        model: ollama_chat/gemma4:12b
        api_base: http://ollama.ollama.svc.cluster.local:11434
        extra_body:
          think: false

    # Gemma 4 12B with a 64k context window — same weights as gemma-12b but
    # backed by the derived tag gemma4:12b-64k (Modelfile num_ctx 65536;
    # created chart-side in apps/ollama/values.yaml ollama.models.create).
    # Exists because ollama_chat ignores per-request num_ctx (litellm#12930)
    # and the server default is 16384. Measured KV cost: +846MiB over the 16k
    # baseline on gpu-1, 100% GPU. Primary consumer: hermes agent shell
    # (its config.yaml context_length overrides must match these values —
    # 64k pair = 65536, everything else = 16384; see manual-op
    # orch-hermes-context-budgets).
    - model_name: gemma-12b-64k
      litellm_params:
        model: ollama_chat/gemma4:12b-64k
        api_base: http://ollama.ollama.svc.cluster.local:11434

    # 64k + thinking disabled (the gemma-12b-nothin pattern at 64k).
    # Default model of the hermes agent shell.
    - model_name: gemma-12b-64k-nothin
      litellm_params:
        model: ollama_chat/gemma4:12b-64k
        api_base: http://ollama.ollama.svc.cluster.local:11434
        extra_body:
          think: false

    # Qwen2.5-VL 7B (Q4_K_M) — Qwen-family alternative to gemma-12b for vision
    # Different model architecture from Gemma4; useful when one struggles on a
    # specific input class (handwriting, dense tables, multi-column layouts).
    # Default Q4_K_M ≈ 5.5GB + vision tower + KV cache ≈ 12GB on the 16GB
    # RTX 5070 Ti — comfortable headroom. Q8_0 was tried first but OOMed at
    # ~15-17GB total when KV cache for 128K context loaded; see PR #210
    # postmortem for the canary-day discovery.
    - model_name: qwen-vl-7b
      litellm_params:
        model: ollama_chat/qwen2.5vl:7b
        api_base: http://ollama.ollama.svc.cluster.local:11434

    # Qwen2.5-Coder 14B (Q6) — code generation and completion
    # Q6_K instead of default Q4 — measurably fewer syntax errors at the
    # cost of ~3GB more VRAM. Replaces both deepseek-coder:6.7b and
    # carstenuhlig/omnicoder-9b with a single stronger model.
    - model_name: qwen-coder-14b
      litellm_params:
        model: ollama_chat/qwen2.5-coder:14b-instruct-q6_K
        api_base: http://ollama.ollama.svc.cluster.local:11434

    # Qwen3 14B — reasoning model with native thinking mode, 32K context
    # Useful when a problem benefits from extended reasoning steps.
    # Q4_K_M ≈ 9GB VRAM.
    - model_name: qwen-think-14b
      litellm_params:
        model: ollama_chat/qwen3:14b
        api_base: http://ollama.ollama.svc.cluster.local:11434

    # Qwen3.6 35B-A3B — MoE reasoning/general flagship, 256K context
    # 35B total / 3B active params per token. Q4_K_M ≈ 24GB on disk —
    # does NOT fit fully in 16GB VRAM. Ollama partially offloads
    # inactive experts to host RAM (gpu-1 has 128GB). The only local
    # model in the lineup that relies on partial offload; the dense
    # 14B/24B siblings remain fully resident.
    # Measured 2026-05-06 with num_ctx=4096: 41% CPU / 59% GPU split
    # (~15.3GB host RAM + ~10.7GB VRAM, 95% of the 16GB card),
    # ~20 tok/s generation, ~126 tok/s prefill. MoE routing keeps
    # throughput usable since only ~3B active weights are hot per
    # token — a dense 35B at the same split would be ~5x slower.
    # Cap num_ctx well below 256K — KV cache at full context would
    # dwarf the model itself. 8K-16K is the practical ceiling on a
    # 16GB card; higher contexts force more weights to CPU and the
    # generation rate drops sharply.
    # Thinking mode is ON by default (Qwen3.6 family characteristic).
    # Callers who want terse output should pass "think": false in the
    # API request body, or include "/no_think" in the prompt — without
    # this, even trivial questions trigger ~hundreds of reasoning
    # tokens before the answer.
    - model_name: qwen36-a3b
      litellm_params:
        model: ollama_chat/qwen3.6:35b-a3b
        api_base: http://ollama.ollama.svc.cluster.local:11434

    # Qwen3.6 35B-A3B (no-think) — same backend as qwen36-a3b but with
    # thinking mode suppressed via extra_body. For consumers (Ruflo, n8n)
    # that want the model's general intelligence without the reasoning
    # preamble. Saves ~100-500 tokens per response at the cost of chain-
    # of-thought quality — fine for chat/agent orchestration, not for
    # hard math or multi-step planning where thinking earns its keep.
    - model_name: qwen36-a3b-nothin
      litellm_params:
        model: ollama_chat/qwen3.6:35b-a3b
        api_base: http://ollama.ollama.svc.cluster.local:11434
        extra_body:
          think: false

    # Qwen3.6 35B-A3B with a 64k context window — backed by the derived tag
    # qwen3.6:35b-a3b-64k (apps/ollama/values.yaml ollama.models.create;
    # Modelfile num_ctx 65536, the litellm#12930 escape hatch). Hermes
    # agent-brain candidate (rework-1): hermes hard-requires >=64k context
    # (its preamble alone is ~15k tokens) and gemma4-12B failed the agentic
    # gate. Keep hermes config.yaml context_length overrides in sync (65536).
    - model_name: qwen36-a3b-64k
      litellm_params:
        model: ollama_chat/qwen3.6:35b-a3b-64k
        api_base: http://ollama.ollama.svc.cluster.local:11434

    # 64k + thinking suppressed (the qwen36-a3b-nothin pattern at 64k).
    - model_name: qwen36-a3b-64k-nothin
      litellm_params:
        model: ollama_chat/qwen3.6:35b-a3b-64k
        api_base: http://ollama.ollama.svc.cluster.local:11434
        extra_body:
          think: false

  litellm_settings:
    default_model: mistral-small-24b

  general_settings:
    master_key: os.environ/LITELLM_MASTER_KEY

service:
  type: LoadBalancer
  port: 4000
  annotations:
    lbipam.cilium.io/ips: "192.168.55.206"

# Standalone PostgreSQL for virtual keys, spend tracking, usage logs
db:
  deployStandalone: true

postgresql:
  auth:
    username: litellm
    database: litellm
  primary:
    persistence:
      enabled: true
      size: 5Gi
      storageClass: longhorn
