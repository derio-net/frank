# Runner registration token, minted inside Gitea and stored in Infisical
# (manual op cicd-gitea-runner-registration-token). act_runner registers once
# and persists its identity in /data/.runner on the PVC — rotating the token
# does NOT re-register an already-registered runner.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  annotations:
    # The app runs prune: true so kustomize's hash-suffixed
    # ConfigMaps get garbage-collected. This resource is exactly
    # what the repo-wide prune: false rule exists to protect, so
    # it opts out individually.
    argocd.argoproj.io/sync-options: Prune=false
  name: gitea-runner-token
  namespace: gitea-runner
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: gitea-runner-token
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: STOA_GITEA_RUNNER_TOKEN
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
