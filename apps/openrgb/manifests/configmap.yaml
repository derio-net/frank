apiVersion: v1
kind: ConfigMap
metadata:
  name: openrgb-config
  namespace: openrgb
data:
  # Device 0: Z790 EAGLE AX (IT5701-GIGABYTE) at /dev/hidraw0
  # Zones: D_LED1 Bottom, D_LED2 Top, Motherboard
  # 8 LEDs total. Modes: Direct, Static, Breathing, Blinking, Color Cycle, Flashing
  # To turn LEDs on, change 000000 to a color (e.g. ff0000 for red).
  # To change mode, replace "Static" (options: Static, Breathing, Blinking, Color Cycle, Flashing).
  OPENRGB_ARGS: "-d 0 -m Static -c ffffff"
