# ~/.tmux.conf — for /usr/local/bin/tmux 3.6+ (the system tmux that WezTerm
# launches via `tmux new-session -A -s claude-local`).
#
# IMPORTANT: This file is NOT loaded by zsh4humans's tmux. z4h ships its own
# config at ~/.cache/zsh4humans/v5/zsh4humans/.tmux.conf, which calls
# `unbind -a` and `set -g prefix None` — every binding here is invisible
# inside z4h's auto-tmux. To get these bindings, attach to the system tmux:
#     tmux ls                       # claude-local should be listed
#     tmux attach -t claude-local   # or use the WezTerm `local` workspace
#
# Reload after editing:
#     Prefix r                      (rebound below; default is refresh-client)
#     tmux source ~/.tmux.conf      (from any shell)
#
# Key notation:
#     C-x   = Control+x
#     M-x   = Option+x   (terminal must send Option as Meta for this to work)
#     C-M-x = Control+Option+x
#
# Default prefix is C-b. tmux's default keytable is `prefix`, so `bind X cmd`
# means "Prefix then X runs cmd". Unmodified defaults referenced inline below
# are listed only when relevant; the full set is `tmux list-keys`.

# ──────────────────────────────────────────────────────────────────────────────
# General
# ──────────────────────────────────────────────────────────────────────────────

# Default `Prefix r` runs refresh-client; rebind to source the config.
unbind r
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

# Mouse: click panes/windows, drag dividers, scroll buffer (default: off)
set -g mouse on

# ──────────────────────────────────────────────────────────────────────────────
# Status bar styling (cosmetic only — no functional bindings)
# ──────────────────────────────────────────────────────────────────────────────

set -g status-style              "bg=#000000,fg=#cccccc"
set -g status-left-length        40
set -g status-left               "#[fg=#000000,bg=#ffaa00,bold] #S #[default] "
# Prefix indicator: shows red [PREFIX] on the right when prefix is being held,
# so you can see at a glance whether tmux registered C-b. The conditional
# format #{?client_prefix,A,B} renders A while prefix is active, B otherwise.
set -g status-right "#{?client_prefix,#[fg=#ffffff#,bg=#cc0000#,bold] PREFIX #[default] ,}#[fg=#888888]%H:%M "
# Remote-tmux variant (uncomment in a remote .tmux.conf to make the bar scream remote):
# set -g status-right "#[fg=#000000,bg=#cc4444,bold] REMOTE:#h #[default] #[fg=#888888]%H:%M "

# Window status: leave bg unset so per-window styling can take precedence.
set -g window-status-style          "bg=default"
set -g window-status-current-style  "bg=default,bold"

# ──────────────────────────────────────────────────────────────────────────────
# Per-pane background coloring by cwd
#
# ~/.config/tmux/color-by-cwd.sh applies a per-pane bg via `select-pane -P`,
# based on the pane's current working directory. Once set, the color persists
# for the life of the pane — focus changes don't need to re-color anything.
#
# Trigger only on pane creation (split, new window, new session) and on cwd
# change (chpwd hook in b010_functions.zsh). Do NOT hook after-select-pane:
# the script's own `select-pane -P` call would re-fire that hook and loop,
# manifesting as a "cursor bouncing between panes" visual bug.
# ──────────────────────────────────────────────────────────────────────────────

set-hook -g after-split-window  'run-shell -b "~/.config/tmux/color-by-cwd.sh \"#{pane_current_path}\" \"#{pane_id}\""'
set-hook -g after-new-window    'run-shell -b "~/.config/tmux/color-by-cwd.sh \"#{pane_current_path}\" \"#{pane_id}\""'
set-hook -g after-new-session   'run-shell -b "~/.config/tmux/color-by-cwd.sh \"#{pane_current_path}\" \"#{pane_id}\""'

# ──────────────────────────────────────────────────────────────────────────────
# Pane splitting (added; defaults remain in effect alongside)
#
# Defaults still active (unchanged):
#     Prefix "          split-window -v       (pane below)
#     Prefix %          split-window -h       (pane right)
# ──────────────────────────────────────────────────────────────────────────────

# Added: splits that ALSO normalize the row/column to even sizes.
bind S  split-window -v \; select-layout even-vertical
bind |  split-window -h \; select-layout even-horizontal

# ──────────────────────────────────────────────────────────────────────────────
# Layouts
#
# Defaults (overrides flagged):
#     Prefix Space      next-layout                       [OVERRIDDEN below]
#     Prefix M-1        select-layout even-horizontal
#     Prefix M-2        select-layout even-vertical
#     Prefix M-3        select-layout main-horizontal
#     Prefix M-4        select-layout main-vertical
#     Prefix M-5        select-layout tiled
# ──────────────────────────────────────────────────────────────────────────────

# OVERRIDE: revert to previous layout instead of cycling forward.
bind Space    select-layout -o
# Added: keep cycle-through-presets behavior on a different key.
bind M-Space  next-layout

# ──────────────────────────────────────────────────────────────────────────────
# Custom multi-pane grids
#
# Two non-obvious traps when scripting tmux layouts:
#
# 1) tmux's command chains use the LITERAL `\;` (backslash + semicolon).
#    Do NOT wrap the chain in single quotes — single quotes turn the whole blob
#    into one literal command name, the binding silently no-ops, and
#    `list-keys` still shows it (so the bug is invisible at first).
#
# 2) tmux RENUMBERS panes after every split, in left-to-right / top-to-bottom
#    order. So `select-pane -t .1` does NOT keep pointing at the same pane —
#    after splitting pane 0, the new bottom pane becomes index 1 and the
#    *original* pane 1 shifts to index 2. We use directional selection
#    (`-L`, `-R`, `-U`, `-D`) instead, which is stable across renumbering
#    because it picks the spatial neighbour of the active pane.
# ──────────────────────────────────────────────────────────────────────────────

# 6-pane grid: 3 columns × 2 rows
#   +---+---+---+
#   | 0 | 2 | 4 |
#   +---+---+---+
#   | 1 | 3 | 5 |
#   +---+---+---+
bind C-M-6 \
  split-window -h \; split-window -h \; \
  select-layout even-horizontal \; \
  split-window -v \; \
  select-pane -L \; split-window -v \; \
  select-pane -L \; split-window -v \; \
  display-message "Layout: 3 cols × 2 rows"

# 6-pane grid: 2 columns × 3 rows
#   +---+---+
#   | 0 | 1 |
#   +---+---+
#   | 2 | 3 |
#   +---+---+
#   | 4 | 5 |
#   +---+---+
bind C-6 \
  split-window -v \; split-window -v \; \
  select-layout even-vertical \; \
  split-window -h \; \
  select-pane -U \; split-window -h \; \
  select-pane -U \; split-window -h \; \
  display-message "Layout: 2 cols × 3 rows"
