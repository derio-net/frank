# Pod-side tmux config — installed at /home/claude/.tmux.conf inside the
# secure-agent-pod's kali container.
#
# This is a stripped-down sibling of the laptop config:
#   • No zsh4humans warning (pod runs bash, not z4h).
#   • Status bar carries a red [REMOTE:hostname] banner so it's obvious
#     you're inside the pod, not the laptop's local tmux.
#   • Same pane-splitting / layout / 6-pane-grid bindings.
#   • Same per-pane color-by-cwd machinery, but with hooks driven by the
#     pod's bash shell (see ../bashrc-snippet.sh) instead of zsh chpwd.
#
# Reload after editing:
#   Prefix r                      (rebound below; default is refresh-client)
#   tmux source ~/.tmux.conf      (from any shell)

# ──────────────────────────────────────────────────────────────────────────────
# General
# ──────────────────────────────────────────────────────────────────────────────

unbind r
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

set -g mouse on

# ──────────────────────────────────────────────────────────────────────────────
# Status bar — REMOTE banner so you can tell at a glance you're in the pod
# ──────────────────────────────────────────────────────────────────────────────

set -g status-style              "bg=#000000,fg=#cccccc"
set -g status-left-length        40
set -g status-left               "#[fg=#000000,bg=#ffaa00,bold] #S #[default] "
# Remote-tmux flavor: red REMOTE:hostname tag + prefix indicator + clock.
set -g status-right "#{?client_prefix,#[fg=#ffffff#,bg=#cc0000#,bold] PREFIX #[default] ,}#[fg=#000000,bg=#cc4444,bold] REMOTE:#h #[default] #[fg=#888888]%H:%M "

set -g window-status-style          "bg=default"
set -g window-status-current-style  "bg=default,bold"

# ──────────────────────────────────────────────────────────────────────────────
# Pane splitting — adds two splits that also normalize the resulting row/col.
# Defaults stay alongside:  Prefix " (split-window -v),  Prefix % (split-window -h)
# ──────────────────────────────────────────────────────────────────────────────

bind S  split-window -v \; select-layout even-vertical
bind |  split-window -h \; select-layout even-horizontal

# ──────────────────────────────────────────────────────────────────────────────
# Layouts — overrides Space, adds M-Space.
# Defaults still active:  Prefix M-1..M-5 select preset layouts.
# ──────────────────────────────────────────────────────────────────────────────

bind Space    select-layout -o
bind M-Space  next-layout

# ──────────────────────────────────────────────────────────────────────────────
# Custom 6-pane grids
#
# Two non-obvious traps to keep in mind when editing these:
#   1) Do NOT wrap chains in single quotes — tmux treats single-quoted text as
#      one literal command name, and the binding silently no-ops.
#   2) tmux renumbers panes spatially after every split, so `select-pane -t .N`
#      drifts. Use directional selection (-L/-R/-U/-D), which is stable.
# ──────────────────────────────────────────────────────────────────────────────

# 3 columns × 2 rows
bind C-M-6 \
  split-window -h \; split-window -h \; \
  select-layout even-horizontal \; \
  split-window -v \; \
  select-pane -L \; split-window -v \; \
  select-pane -L \; split-window -v \; \
  display-message "Layout: 3 cols × 2 rows"

# 2 columns × 3 rows
bind C-6 \
  split-window -v \; split-window -v \; \
  select-layout even-vertical \; \
  split-window -h \; \
  select-pane -U \; split-window -h \; \
  select-pane -U \; split-window -h \; \
  display-message "Layout: 2 cols × 3 rows"

# ──────────────────────────────────────────────────────────────────────────────
# Per-pane background coloring by cwd
#
# ~/.config/tmux/color-by-cwd.sh sets per-pane bg via `select-pane -P` based
# on the active pane's working directory. Hooks fire only on pane creation
# (split / new-window / new-session). Do NOT add `after-select-pane` — the
# script's own `select-pane -P` would re-fire that hook and loop.
#
# The bash side (bashrc-snippet.sh) covers the cwd-changed case via a `cd`
# wrapper, equivalent to zsh's chpwd.
# ──────────────────────────────────────────────────────────────────────────────

set-hook -g after-split-window  'run-shell -b "~/.config/tmux/color-by-cwd.sh \"#{pane_current_path}\" \"#{pane_id}\""'
set-hook -g after-new-window    'run-shell -b "~/.config/tmux/color-by-cwd.sh \"#{pane_current_path}\" \"#{pane_id}\""'
set-hook -g after-new-session   'run-shell -b "~/.config/tmux/color-by-cwd.sh \"#{pane_current_path}\" \"#{pane_id}\""'
