apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-agent-pod
  namespace: secure-agent-pod
  labels:
    app: secure-agent-pod
spec:
  replicas: 1
  strategy:
    type: Recreate  # RWO PVC — cannot mount on two pods simultaneously
  selector:
    matchLabels:
      app: secure-agent-pod
  template:
    metadata:
      labels:
        app: secure-agent-pod
    spec:
      serviceAccountName: agent-sa
      terminationGracePeriodSeconds: 30
      nodeSelector:
        kubernetes.io/hostname: gpu-1
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      securityContext:
        fsGroup: 1000

      volumes:
        - name: agent-home
          persistentVolumeClaim:
            claimName: agent-home
        - name: agent-configs
          secret:
            secretName: agent-configs
            optional: true
            defaultMode: 0400
        - name: ssh-keys
          secret:
            secretName: agent-ssh-keys
            defaultMode: 0400
      containers:
        - name: kali
          image: ghcr.io/derio-net/secure-agent-kali:be84c21075d027cc4a4f6c751c85c10aa4f92063
          ports:
            - name: ssh
              containerPort: 2222  # Non-root sshd; Service maps 22→2222
              protocol: TCP
          env:
            - name: PORT
              value: "18081"  # Deflect in-process VK to unused port; sidecar owns 8081
            - name: HOST
              value: "127.0.0.1"  # Bind only to loopback — not externally reachable
          envFrom:
            - secretRef:
                name: agent-secrets-tier1
                optional: true
            - secretRef:
                name: agent-secrets-tier2
                optional: true
          volumeMounts:
            - name: agent-home
              mountPath: /home/claude
            - name: agent-configs
              mountPath: /home/claude/.kube/configs
              readOnly: true
            - name: ssh-keys
              mountPath: /etc/ssh-keys
              readOnly: true
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "2000m"
              memory: 8Gi
            limits:
              memory: 32Gi
          readinessProbe:
            tcpSocket:
              port: ssh
            initialDelaySeconds: 10
            periodSeconds: 30
          livenessProbe:
            tcpSocket:
              port: ssh
            initialDelaySeconds: 30
            periodSeconds: 60
        - name: vk-local
          image: ghcr.io/derio-net/vk-local:be84c21075d027cc4a4f6c751c85c10aa4f92063
          ports:
            - name: vk-http
              containerPort: 8081
              protocol: TCP
          env:
            - name: PORT
              value: "8081"
            - name: HOST
              value: "0.0.0.0"
            - name: VK_SHARED_API_BASE
              value: "https://vk.cluster.derio.net"
            - name: VK_SHARED_RELAY_API_BASE
              value: "https://vk.cluster.derio.net"
          envFrom:
            - secretRef:
                name: agent-secrets-tier1
                optional: true
            - secretRef:
                name: agent-secrets-tier2
                optional: true
          volumeMounts:
            - name: agent-home
              mountPath: /home/claude
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "200m"
              memory: 512Mi
            limits:
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 30
