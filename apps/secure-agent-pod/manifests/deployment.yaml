apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-agent-pod
  namespace: secure-agent-pod
  labels:
    app: secure-agent-pod
spec:
  replicas: 1
  strategy:
    type: Recreate  # RWO PVC — cannot mount on two pods simultaneously
  selector:
    matchLabels:
      app: secure-agent-pod
  template:
    metadata:
      labels:
        app: secure-agent-pod
    spec:
      serviceAccountName: agent-sa
      # s6 cont-finish.d runs shutdown.sh (bridge:shutdown drain) then saves
      # the tmux layout. 45s gives cont-finish.d time to complete before SIGKILL.
      terminationGracePeriodSeconds: 45
      nodeSelector:
        kubernetes.io/hostname: gpu-1
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      securityContext:
        fsGroup: 1000

      volumes:
        - name: agent-home
          persistentVolumeClaim:
            claimName: agent-home
        - name: agent-configs
          secret:
            secretName: agent-configs
            optional: true
            defaultMode: 0400
        - name: ssh-keys
          secret:
            secretName: agent-ssh-keys
            defaultMode: 0400
        # Short-lived GitHub App installation token, minted by ESO
        # (clustergenerator-github-app.yaml → externalsecret-github-app-token.yaml).
        # Mounted as a whole-secret volume (NOT subPath) so kubelet live-updates
        # the file as ESO rotates it. optional: true so the pod still starts
        # before ESO first materializes the Secret. 0440 + fsGroup 1000 → readable
        # by the uid-1000 agent process; the private key is never on the pod.
        - name: github-token
          secret:
            secretName: agent-github-token
            optional: true
            defaultMode: 0440
      containers:
        - name: kali
          image: ghcr.io/derio-net/secure-agent-kali:a6f5a5772ba27081744c8266d345b9267d258add
          ports:
            - name: ssh
              containerPort: 2222  # Non-root sshd; Service maps 22→2222
              protocol: TCP
            # mosh-server picks a port from this range at session start;
            # service-mosh.yaml exposes them via a separate LB IP (UDP).
            - { name: mosh-60000, containerPort: 60000, protocol: UDP }
            - { name: mosh-60001, containerPort: 60001, protocol: UDP }
            - { name: mosh-60002, containerPort: 60002, protocol: UDP }
            - { name: mosh-60003, containerPort: 60003, protocol: UDP }
            - { name: mosh-60004, containerPort: 60004, protocol: UDP }
            - { name: mosh-60005, containerPort: 60005, protocol: UDP }
            - { name: mosh-60006, containerPort: 60006, protocol: UDP }
            - { name: mosh-60007, containerPort: 60007, protocol: UDP }
            - { name: mosh-60008, containerPort: 60008, protocol: UDP }
            - { name: mosh-60009, containerPort: 60009, protocol: UDP }
            - { name: mosh-60010, containerPort: 60010, protocol: UDP }
            - { name: mosh-60011, containerPort: 60011, protocol: UDP }
            - { name: mosh-60012, containerPort: 60012, protocol: UDP }
            - { name: mosh-60013, containerPort: 60013, protocol: UDP }
            - { name: mosh-60014, containerPort: 60014, protocol: UDP }
            - { name: mosh-60015, containerPort: 60015, protocol: UDP }
          env:
            - name: PORT
              value: "18081"  # Deflect in-process VK to unused port; sidecar owns 8081
            - name: HOST
              value: "127.0.0.1"  # Bind only to loopback — not externally reachable
            # Mosh default is 168h (7d) — too long for a 16-port range.
            # 1h reaps stuck servers fast enough to keep ports available.
            - name: MOSH_SERVER_NETWORK_TMOUT
              value: "3600"
          envFrom:
            - secretRef:
                name: agent-secrets-tier1
                optional: true
            - secretRef:
                name: agent-secrets-tier2
                optional: true
          volumeMounts:
            - name: agent-home
              mountPath: /home/claude
            - name: agent-configs
              mountPath: /home/claude/.kube/configs
              readOnly: true
            - name: ssh-keys
              mountPath: /etc/ssh-keys
              readOnly: true
            - name: github-token
              mountPath: /var/run/github
              readOnly: true
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "2000m"
              memory: 8Gi
            limits:
              memory: 32Gi
          readinessProbe:
            tcpSocket:
              port: ssh
            initialDelaySeconds: 10
            periodSeconds: 30
          livenessProbe:
            tcpSocket:
              port: ssh
            initialDelaySeconds: 30
            periodSeconds: 60
        - name: vk-local
          image: ghcr.io/derio-net/vk-local:a6f5a5772ba27081744c8266d345b9267d258add
          ports:
            - name: vk-http
              containerPort: 8081
              protocol: TCP
          env:
            - name: PORT
              value: "8081"
            - name: HOST
              value: "0.0.0.0"
            - name: VK_SHARED_API_BASE
              value: "https://vk.cluster.derio.net"
            - name: VK_SHARED_RELAY_API_BASE
              value: "https://vk.cluster.derio.net"
            # Cap concurrent executor spawns at 4 (Phase 4 / Option B1 of
            # docs/superpowers/archived-plans/2026-04-30--agents--vk-local-oom-remediation/_prose.md).
            # Design worst-case live cgroup: ~220 MiB saturated-idle + 4 × 480 MiB
            # ≈ 2,140 MiB. Spawns past the cap queue (see
            # `vibekanban_queued_executions` at /metrics).
            #
            # 2026-05-18 incident: bridge dispatched 8 cards; vk-local OOMKilled
            # at the 4 Gi limit despite the cap. Soak-derived 4 Gi (PR #264,
            # commit 390f64a) is NOT sufficient when the upstream bridge feeds
            # more cards than the cap — queued sessions and image-version drift
            # eat the headroom. The limit was restored to 8 Gi (the pre-soak
            # value) as the safety net. Do not dial back without (a) revalidating
            # the bridge-feed ceiling and (b) a soak under realistic, busy load.
            - name: VK_MAX_CONCURRENT_EXECUTIONS
              value: "4"
          envFrom:
            - secretRef:
                name: agent-secrets-tier1
                optional: true
            - secretRef:
                name: agent-secrets-tier2
                optional: true
          volumeMounts:
            - name: agent-home
              mountPath: /home/claude
            # vk-local also runs git (worktrees) as uid 1000 against the shared
            # ~/.gitconfig credential helper, so it needs the token file present too.
            - name: github-token
              mountPath: /var/run/github
              readOnly: true
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "200m"
              memory: 512Mi
            limits:
              memory: 8Gi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 30
