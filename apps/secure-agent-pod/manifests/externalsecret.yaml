apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-secrets-infisical
  namespace: secure-agent-pod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: agent-secrets-tier1
    creationPolicy: Owner
  data: []
  # Add Infisical-managed secrets here as needed.
  # Claude Code authenticates via Max subscription login (claude login),
  # not via ANTHROPIC_API_KEY env var.
