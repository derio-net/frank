# GitHub App installation-token generator (derio-fr-automation, App 3994132).
#
# Least-privilege identity that REPLACES the clawdia org-owner PAT for agent git/gh.
# ESO mints a short-lived (~1h) installation token; an ExternalSecret writes it into
# a Secret that the pod mounts as a live-updated file. The private key is NEVER
# mounted into a container — only the rotating token is. A container-filesystem
# compromise yields at most a ~1h token, not the key.
#
# NOTE: ESO (v2.1.0) resolves this generator's privateKey.secretRef in the CONSUMING
# ExternalSecret's namespace (secure-agent-pod) and IGNORES secretRef.namespace — so
# the key Secret must live in secure-agent-pod. That namespace is moot for the threat
# model (secure-agent-pod's SA is cluster-admin, so the key's ns doesn't change API
# read access); the real protection is that the key is never mounted into a container.
#
# To tighten further, scope the minted token with `repositories:` / `permissions:`
# (omitted here = the App's full install: 10 repos, contents/issues/PRs/workflows).
apiVersion: generators.external-secrets.io/v1alpha1
kind: ClusterGenerator
metadata:
  name: github-app-derio
spec:
  kind: GithubAccessToken
  generator:
    githubAccessTokenSpec:
      appID: "3994132"
      installID: "138773908"
      auth:
        privateKey:
          secretRef:
            name: github-app-derio-key
            key: key
