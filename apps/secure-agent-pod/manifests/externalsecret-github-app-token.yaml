# Short-lived GitHub App installation token for the agent pod.
#
# ESO re-runs the ClusterGenerator on refreshInterval and writes the freshly
# minted (~1h) token into Secret `agent-github-token`, key `token`. That Secret is
# mounted as a VOLUME (not envFrom) in the pod so kubelet live-updates the file
# (~1 min) as ESO rotates it — the git credential helper reads the file fresh on
# every operation, so the token never goes stale in a long-lived pod.
#
# refreshInterval (45m) keeps a comfortable margin under the 1h token TTL.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-github-token
  namespace: secure-agent-pod
spec:
  refreshInterval: 45m
  target:
    name: agent-github-token
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: github-app-derio
