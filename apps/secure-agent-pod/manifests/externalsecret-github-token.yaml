apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-secrets-tier2
  namespace: secure-agent-pod
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: agent-secrets-tier2
    creationPolicy: Owner
  data:
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: GITHUB_SECURE_AGENT_POD
