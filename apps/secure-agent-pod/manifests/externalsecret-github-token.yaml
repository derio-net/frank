apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-secrets-tier2
  namespace: secure-agent-pod
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: agent-secrets-tier2
    creationPolicy: Owner
  data:
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: GITHUB_SECURE_AGENT_POD
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: KALI_C2_TELEGRAM_BOT_TOKEN
    - secretKey: TELEGRAM_CHAT_ID
      remoteRef:
        key: KALI_C2_TELEGRAM_CHAT_ID
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: GEMINI_API_KEY
    - secretKey: GRAFANA_API_KEY
      remoteRef:
        key: GRAFANA_API_KEY
    - secretKey: R2_ACCESS_KEY
      remoteRef:
        key: R2_ACCESS_KEY
    - secretKey: R2_SECRET_KEY
      remoteRef:
        key: R2_SECRET_KEY
