apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-secrets-tier2
  namespace: secure-agent-pod
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: agent-secrets-tier2
    creationPolicy: Owner
    deletionPolicy: Retain
  # GITHUB_TOKEN is intentionally NOT sourced here. The agent's GitHub credential
  # is now a short-lived GitHub App installation token minted by ESO
  # (clustergenerator-github-app.yaml → externalsecret-github-app-token.yaml),
  # mounted as a live-updated file at /var/run/github/token and read by the
  # in-pod git credential helper + bashrc. The clawdia owner PAT (Infisical key
  # GITHUB_SECURE_AGENT_POD) is retired; it should be deleted in Infisical and the
  # clawdia account demoted owner→member.
  data:
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: KALI_C2_TELEGRAM_BOT_TOKEN
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: TELEGRAM_CHAT_ID
      remoteRef:
        key: KALI_C2_TELEGRAM_CHAT_ID
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: GEMINI_API_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: GRAFANA_API_KEY
      remoteRef:
        key: GRAFANA_API_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: R2_ACCESS_KEY
      remoteRef:
        key: R2_ACCESS_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: R2_SECRET_KEY
      remoteRef:
        key: R2_SECRET_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: GRAFANA_API_EDITOR_KEY
      remoteRef:
        key: GRAFANA_API_EDITOR_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: VK_ORG_ID
      remoteRef:
        key: VK_ORG_ID
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: VK_DERIO_OPS_PROJECT_ID
      remoteRef:
        key: VK_DERIO_OPS_PROJECT_ID
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: CHORES_BOT_TOKEN
      remoteRef:
        key: CHORES_BOT_TOKEN
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: NOTION_TOKEN
      remoteRef:
        key: NOTION_TOKEN_FAMILIE
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
