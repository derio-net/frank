apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-secrets-tier2
  namespace: secure-agent-pod
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: agent-secrets-tier2
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # TRANSITION: GITHUB_TOKEN (clawdia owner PAT) is retained here as the
    # fallback during cutover. The new path mints a short-lived GitHub App token
    # (clustergenerator-github-app.yaml → externalsecret-github-app-token.yaml,
    # mounted as a live-updated file); the in-pod credential helper prefers the
    # file and falls back to this env value. REMOVE this entry (and retire
    # Infisical key GITHUB_SECURE_AGENT_POD) only AFTER the App-token path is
    # verified live — then demote clawdia.
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: GITHUB_SECURE_AGENT_POD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: KALI_C2_TELEGRAM_BOT_TOKEN
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: TELEGRAM_CHAT_ID
      remoteRef:
        key: KALI_C2_TELEGRAM_CHAT_ID
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: GEMINI_API_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: GRAFANA_API_KEY
      remoteRef:
        key: GRAFANA_API_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: R2_ACCESS_KEY
      remoteRef:
        key: R2_ACCESS_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: R2_SECRET_KEY
      remoteRef:
        key: R2_SECRET_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: GRAFANA_API_EDITOR_KEY
      remoteRef:
        key: GRAFANA_API_EDITOR_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: VK_ORG_ID
      remoteRef:
        key: VK_ORG_ID
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: VK_DERIO_OPS_PROJECT_ID
      remoteRef:
        key: VK_DERIO_OPS_PROJECT_ID
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: CHORES_BOT_TOKEN
      remoteRef:
        key: CHORES_BOT_TOKEN
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: NOTION_TOKEN
      remoteRef:
        key: NOTION_TOKEN_FAMILIE
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
