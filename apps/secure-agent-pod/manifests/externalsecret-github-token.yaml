apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-secrets-tier2
  namespace: secure-agent-pod
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: agent-secrets-tier2
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: GITHUB_SECURE_AGENT_POD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: KALI_C2_TELEGRAM_BOT_TOKEN
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: TELEGRAM_CHAT_ID
      remoteRef:
        key: KALI_C2_TELEGRAM_CHAT_ID
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: GEMINI_API_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: GRAFANA_API_KEY
      remoteRef:
        key: GRAFANA_API_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: R2_ACCESS_KEY
      remoteRef:
        key: R2_ACCESS_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: R2_SECRET_KEY
      remoteRef:
        key: R2_SECRET_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: GRAFANA_API_EDITOR_KEY
      remoteRef:
        key: GRAFANA_API_EDITOR_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: VK_ORG_ID
      remoteRef:
        key: VK_ORG_ID
    - secretKey: VK_DERIO_OPS_PROJECT
      remoteRef:
        key: VK_DERIO_OPS_PROJECT
