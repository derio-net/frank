---
# hermes-agent-shell — official Hermes web dashboard + gateway API (migration
# 2026-07-09, willikins#285, decision 3). The dashboard ships its OWN basic-auth
# (HERMES_DASHBOARD_BASIC_AUTH_*, frank#626 — it refuses to bind 0.0.0.0 without
# an auth provider and self-authenticates at :9119/login), so it only needs
# ip-allowlist + security-headers at the edge. authentik-forwardauth was REMOVED
# 2026-07-12 (willikins#285): no authentik application/proxy-provider was ever
# configured for these hosts, so the outpost 404'd every request — a broken and,
# given #626, redundant edge layer. SSO via authentik is a possible later
# follow-up. Backend is the hermes-agent-shell-dashboard ClusterIP; the SSH/Mosh
# path stays on the Cilium L2 LoadBalancer and is unaffected.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hermes
  namespace: traefik-system
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`hermes.cluster.derio.net`)
      kind: Rule
      middlewares:
        - name: ip-allowlist
        - name: security-headers
      services:
        - name: hermes-agent-shell-dashboard
          namespace: hermes-agent-shell
          port: 9119
  tls:
    certResolver: cloudflare
    domains:
      - main: "*.cluster.derio.net"
---
# hermes gateway / OpenAI-compatible API. Separate hostname per the spec. The
# API is a machine surface (OpenAI-shape clients), gated behind ip-allowlist +
# security-headers. authentik-forwardauth was REMOVED 2026-07-12 (willikins#285)
# for the same reason as the dashboard route above: no authentik application was
# configured for this host, so the forward-auth outpost 404'd every request. The
# API carries its own bearer-token auth via LiteLLM keys.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hermes-api
  namespace: traefik-system
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`hermes-api.cluster.derio.net`)
      kind: Rule
      middlewares:
        - name: ip-allowlist
        - name: security-headers
      services:
        - name: hermes-agent-shell-dashboard
          namespace: hermes-agent-shell
          port: 8642
  tls:
    certResolver: cloudflare
    domains:
      - main: "*.cluster.derio.net"
---
# ============================================================================
# CNC permanent deployment (frank #637). IngressRoutes live host-side in
# traefik-system per the central convention — the host Traefik cannot see
# CRs INSIDE the staging vCluster, so an in-namespace IngressRoute (the shape
# the first draft shipped) never reconciles for staging.
# ----------------------------------------------------------------------------
# PROD — host `cnc` namespace, concrete backend. Authentik forward-auth gates
# the human web surface; the middleware must be configured to forward
# X-authentik-username to the backend (cncd reads it via AUTH_HEADER).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: cnc-prod
  namespace: traefik-system
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`cnc.cluster.derio.net`)
      kind: Rule
      middlewares:
        - {name: ip-allowlist}
        - {name: security-headers}
        - {name: authentik-forwardauth}
      services:
        - name: cnc-fru
          namespace: cnc
          port: 80
  tls:
    certResolver: cloudflare
    domains:
      - main: "*.cluster.derio.net"
---
# STAGING — the cnc-fru Service runs INSIDE the cnc-staging vCluster. The host
# Traefik reaches it only via the vCluster's host-synced Service
# (sync.toHost.services.enabled: true in the template). The synced name is
# vCluster-generated: `<svc>-x-<namespace>-x-<vcluster-release>` →
# `cnc-fru-x-cnc-staging-x-cnc-staging` in the host `cnc-staging` namespace.
# OPERATOR GATE: confirm the exact synced Service name at rollout (it depends on
# the live vCluster's sync config) — this is the vCluster ingress bridge the
# runbook documents. Left concrete here as the best-known name, not pretend.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: cnc-staging
  namespace: traefik-system
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`cnc-staging.cluster.derio.net`)
      kind: Rule
      middlewares:
        - {name: ip-allowlist}
        - {name: security-headers}
        - {name: authentik-forwardauth}
      services:
