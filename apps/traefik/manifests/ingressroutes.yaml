---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homepage
  namespace: traefik-system
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`master.cluster.derio.net`)
      kind: Rule
      middlewares:
        - name: ip-allowlist
        - name: security-headers
      services:
        - name: homepage
          namespace: homepage
          port: 3000
  tls:
    certResolver: cloudflare
    domains:
      - main: "*.cluster.derio.net"
