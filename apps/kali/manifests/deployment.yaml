apiVersion: apps/v1
kind: Deployment
metadata:
  name: kali
  namespace: kali-system
  labels:
    app.kubernetes.io/name: kali
    app.kubernetes.io/component: workstation
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kali
      app.kubernetes.io/component: workstation
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kali
        app.kubernetes.io/component: workstation
    spec:
      nodeSelector:
        kubernetes.io/hostname: gpu-1
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      terminationGracePeriodSeconds: 30
      containers:
        - name: kali
          image: kalilinux/kali-rolling:latest
          command: ["/bin/bash", "/scripts/startup.sh"]
          ports:
            - name: ssh
              containerPort: 22
              protocol: TCP
          resources:
            requests:
              cpu: 2000m
              memory: 8Gi
            limits:
              memory: 32Gi
          volumeMounts:
            - name: root-home
              mountPath: /root
            - name: startup-script
              mountPath: /scripts
              readOnly: true
            - name: ssh-keys
              mountPath: /etc/ssh-keys
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: ssh
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: ssh
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: root-home
          persistentVolumeClaim:
            claimName: kali-root
        - name: startup-script
          configMap:
            name: kali-startup
            defaultMode: 0755
        - name: ssh-keys
          secret:
            secretName: kali-ssh-keys
