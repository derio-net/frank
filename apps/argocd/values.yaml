## ArgoCD Helm values
## Chart: argo-cd (argo/argo-cd)
## Repo: https://argoproj.github.io/argo-helm

# Single-replica for homelab (no HA needed)
controller:
  replicas: 1

server:
  replicas: 1
  # Disable TLS on server (Traefik handles TLS termination)
  extraArgs:
    - --insecure
  service:
    type: LoadBalancer
    annotations:
      io.cilium/lb-ipam-ips: "192.168.55.200"

repoServer:
  replicas: 1

redis:
  enabled: true

# ArgoCD Notifications subchart — drives bump alerts for agent pods.
# Telegram creds come from the ExternalSecret defined in
# apps/argocd-notifications/manifests/externalsecret.yaml (synced by the
# `argocd-notifications` ArgoCD app), which materialises a Secret named
# `argocd-notifications-secret` in the argocd namespace. The controller picks
# it up via $-prefixed references below ($telegram-token, $telegram-chat-id).
#
# The CM keys (service.telegram, trigger.*, template.*) cannot be split across
# a separate Application because the chart already owns argocd-notifications-cm.
# We therefore feed the config through the chart's notifications.* values.
notifications:
  enabled: true
  # The Helm chart's empty placeholder Secret would race with our ExternalSecret
  # for ownership of `argocd-notifications-secret`. Let ESO own it.
  secret:
    create: false
  # telegramChatId is the numeric Telegram user ID for @DerioUnbound (type: private).
  # Not sensitive — positive IDs are user IDs, not tokens.
  # The native service.telegram cannot send to private chats (it routes positive IDs
  # to NewMessageToChannel("@<id>") which only works for channels/usernames).
  # We use service.webhook.telegram to call the Bot API directly instead.
  context:
    telegramChatId: 2034763022
  notifiers:
    service.webhook.telegram: |
      url: https://api.telegram.org/bot$telegram-token/sendMessage
      headers:
        - name: Content-Type
          value: application/json
  triggers:
    trigger.on-sync-running: |
      - description: Application is rolling out
        send:
          - agent-pod-rolling
        when: app.status.operationState.phase in ['Running']
    trigger.on-sync-succeeded: |
      - description: Application sync completed
        send:
          - agent-pod-ready
        when: app.status.operationState.phase in ['Succeeded']
  templates:
    template.agent-pod-rolling: |
      webhook:
        telegram:
          method: POST
          body: |
            {
              "chat_id": {{.context.telegramChatId}},
              "text": "🔄 *{{.app.metadata.name}}* is rolling out\nFrom: `{{.app.status.sync.revision | substr 0 7}}`\nTo:   `{{.app.spec.source.targetRevision | substr 0 7}}`\nPods will recreate in ~30s. mosh sessions will need re-spawn (Cmd+Shift+2).",
              "parse_mode": "Markdown"
            }
    template.agent-pod-ready: |
      webhook:
        telegram:
          method: POST
          body: |
            {
              "chat_id": {{.context.telegramChatId}},
              "text": "✅ *{{.app.metadata.name}}* synced — `{{.app.status.sync.revision | substr 0 7}}`",
              "parse_mode": "Markdown"
            }

# Disable dex (using Authentik OIDC instead)
dex:
  enabled: false

# Schedule on core-zone minis, avoid GPU node
global:
  affinity:
    podAntiAffinity: soft
    nodeAffinity:
      type: hard
      matchExpressions:
        - key: zone
          operator: In
          values:
            - core

configs:
  params:
    # Allow ArgoCD to manage resources in any namespace
    server.insecure: true
  cm:
    # Resource tracking via annotation (avoids conflicts with Helm labels)
    application.resourceTrackingMethod: annotation
    # Authentik OIDC SSO (Phase 13)
    url: https://argocd.frank.derio.net
    oidc.config: |
      name: Authentik
      issuer: https://auth.frank.derio.net/application/o/argocd/
      clientID: argocd
      clientSecret: $argocd-oidc-secret:oidc.authentik.clientSecret
      requestedScopes:
        - openid
        - profile
        - email
        - groups
        - offline_access
    # resource.exclusions REPLACES the argo-cd chart default (Helm does not merge
    # a multiline string value), so the chart's default exclusions are reproduced
    # here VERBATIM (argo-cd chart 9.4.6) and the scoped Pod entry is appended.
    # scripts/tests/test_argocd_vcluster_pod_exclusion.py guards that the defaults
    # survive AND that the Pod exclusion stays cluster-scoped (never global).
    resource.exclusions: |
      ### Network resources created by the Kubernetes control plane (chart default)
      - apiGroups:
        - ''
        - discovery.k8s.io
        kinds:
        - Endpoints
        - EndpointSlice
      ### Internal Kubernetes resources (chart default)
      - apiGroups:
        - coordination.k8s.io
        kinds:
        - Lease
      ### Internal Kubernetes Authz/Authn resources (chart default)
      - apiGroups:
        - authentication.k8s.io
        - authorization.k8s.io
        kinds:
        - SelfSubjectReview
        - TokenReview
        - LocalSubjectAccessReview
        - SelfSubjectAccessReview
        - SelfSubjectRulesReview
        - SubjectAccessReview
      ### Intermediate Certificate Requests (chart default)
      - apiGroups:
        - certificates.k8s.io
        kinds:
        - CertificateSigningRequest
      - apiGroups:
        - cert-manager.io
        kinds:
        - CertificateRequest
      ### Cilium internal resources (chart default)
      - apiGroups:
        - cilium.io
        kinds:
        - CiliumIdentity
        - CiliumEndpoint
        - CiliumEndpointSlice
      ### Kyverno intermediate and reporting resources (chart default)
      - apiGroups:
        - kyverno.io
        - reports.kyverno.io
        - wgpolicyk8s.io
        kinds:
        - PolicyReport
        - ClusterPolicyReport
        - EphemeralReport
        - ClusterEphemeralReport
        - AdmissionReport
        - ClusterAdmissionReport
        - BackgroundScanReport
        - ClusterBackgroundScanReport
        - UpdateRequest
      ### fr-debugging 2026-07-19 — work around argo-cd#26529 / kubernetes#136533.
      ### ArgoCD v3.3.2 (kubectl v0.34.0) panics `assignment to entry in nil map`
      ### in populatePodInfo when caching a Pod from a remote vCluster that ships a
      ### LimitRange, crashing the application-controller cluster-wide. Skip Pods on
      ### the cnc-staging vCluster ONLY (scoped by `clusters`) so the main cluster
      ### keeps full per-pod visibility. Remove when ArgoCD ships >= 3.5 (client-go
      ### 1.36.1, the upstream fix).
      - apiGroups:
        - ''
        kinds:
        - Pod
        clusters:
        - https://cnc-staging.cnc-staging-vcluster.svc:443
  rbac:
    policy.csv: |
      g, root-admins, role:admin
      g, root-devops, role:admin
      g, root-developers, role:readonly
    policy.default: role:readonly
    scopes: "[groups]"
