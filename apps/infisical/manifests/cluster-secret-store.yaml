apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: infisical
spec:
  provider:
    infisical:
      auth:
        universalAuthCredentials:
          clientId:
            secretRef:
              name: infisical-credentials
              namespace: external-secrets
              key: clientId
          clientSecret:
            secretRef:
              name: infisical-credentials
              namespace: external-secrets
              key: clientSecret
      hostAPI: http://192.168.55.204:8080/api
