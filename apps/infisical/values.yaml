infisical:
  replicaCount: 1

  image:
    tag: "v0.151.0"

  # Reference to the SOPS-bootstrapped secret containing all required env vars.
  # Applied manually: sops --decrypt secrets/infisical/infisical-secrets.yaml | kubectl apply -f -
  kubeSecretRef: infisical-secrets

  service:
    type: LoadBalancer
    annotations:
      lbipam.cilium.io/ips: "192.168.55.204"

postgresql:
  enabled: true
  auth:
    username: infisical
    database: infisicalDB
    # Passwords come from the bootstrap secret (keys: password, postgres-password).
    # Never put plaintext credentials here.
    existingSecret: infisical-secrets
  primary:
    persistence:
      size: 5Gi
      storageClass: longhorn

  # DB_CONNECTION_URI env var is read from infisical-secrets (via kubeSecretRef envFrom).
  # Setting useExistingPostgresSecret here as well so the chart does not auto-inject
  # a conflicting connection string built from postgresql.auth.password.
  useExistingPostgresSecret:
    enabled: true
    existingConnectionStringSecret:
      name: infisical-secrets
      key: DB_CONNECTION_URI

redis:
  enabled: true
  architecture: standalone
  auth:
    # Password comes from the bootstrap secret.
    existingSecret: infisical-secrets
    existingSecretPasswordKey: redis-password

ingress:
  enabled: false
  nginx:
    enabled: false
