infisical:
  replicaCount: 1

  image:
    tag: "v0.151.0"

  # Reference to the SOPS-bootstrapped secret containing Infisical app env vars.
  # Applied manually: sops --decrypt secrets/infisical/infisical-secrets.yaml | kubectl apply -f -
  # Note: DB_CONNECTION_URI is intentionally absent from this secret to avoid
  # duplicate env var conflicts — it is injected via useExistingPostgresSecret below.
  kubeSecretRef: infisical-secrets

  service:
    type: LoadBalancer
    annotations:
      lbipam.cilium.io/ips: "192.168.55.204"

postgresql:
  enabled: true
  auth:
    username: infisical
    database: infisicalDB
    # Passwords come from the bootstrap secret (keys: password, postgres-password).
    existingSecret: infisical-secrets
  primary:
    persistence:
      size: 5Gi
      storageClass: longhorn

  # DB_CONNECTION_URI is read from a dedicated secret to prevent duplicate env var
  # conflict with kubeSecretRef envFrom injection.
  useExistingPostgresSecret:
    enabled: true
    existingConnectionStringSecret:
      name: infisical-db-uri
      key: DB_CONNECTION_URI

redis:
  enabled: true
  architecture: standalone
  auth:
    existingSecret: infisical-secrets
    existingSecretPasswordKey: redis-password

ingress:
  enabled: false
  nginx:
    enabled: false
