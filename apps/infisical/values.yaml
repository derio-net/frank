infisical:
  replicaCount: 1

  image:
    tag: "v0.151.0"

  # Reference to the SOPS-bootstrapped secret containing Infisical app env vars.
  # Applied manually: sops --decrypt secrets/infisical/infisical-secrets.yaml | kubectl apply -f -
  # DB_CONNECTION_URI and REDIS_URL are intentionally absent — injected by the chart
  # via useExistingPostgresSecret and redis.auth.password paths respectively.
  # (Both exist in separate secrets applied out-of-band.)
  kubeSecretRef: infisical-secrets

  service:
    type: LoadBalancer
    annotations:
      lbipam.cilium.io/ips: "192.168.55.204"

# PostgreSQL is deployed as a separate ArgoCD app (infisical-postgresql)
# to avoid the chart bug where both postgresql.enabled AND useExistingPostgresSecret
# both inject DB_CONNECTION_URI independently (no else branch = duplicate env var).
postgresql:
  enabled: false
  useExistingPostgresSecret:
    enabled: true
    existingConnectionStringSecret:
      name: infisical-db-uri
      key: DB_CONNECTION_URI

# Redis is deployed as a separate ArgoCD app (infisical-redis).
# The chart injects REDIS_URL from redis.auth.password (not existingSecret),
# so REDIS_URL must come from infisical-secrets via envFrom.
redis:
  enabled: false

ingress:
  enabled: false
  nginx:
    enabled: false
