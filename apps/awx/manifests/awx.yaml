apiVersion: awx.ansible.com/v1beta1
kind: AWX
metadata:
  name: awx
  namespace: awx
  annotations:
    # Apply the CR after the operator chart (CRD + Deployment, wave 0).
    argocd.argoproj.io/sync-wave: "1"
spec:
  service_type: ClusterIP
  ingress_type: none
  replicas: 1
  admin_user: admin
  admin_password_secret: awx-admin-password
  secret_key_secret: awx-secret-key
  # Operator-managed Postgres (no postgres_configuration_secret given):
  postgres_storage_class: longhorn
  postgres_storage_requirements:
    requests:
      storage: 8Gi
  # DEVIATION (P1 fix): the sclorg/postgresql-15 image runs as UID 26, but a
  # fresh Longhorn PVC mounts root-owned, so the postgres container cannot
  # create its PGDATA subdir (`mkdir '/var/lib/pgsql/data/userdata': Permission
  # denied` → CrashLoopBackOff, 696 restarts). The operator emits an empty
  # securityContext unless told otherwise. postgres_data_volume_init injects a
  # root init container that chowns the data volume to UID 26 before postgres
  # starts — storage-agnostic (works regardless of CSI fsGroup support).
  postgres_data_volume_init: true
  projects_persistence: false
  # Non-secret OIDC settings. SOCIAL_AUTH_OIDC_SECRET is set out-of-band
  # via the AWX Settings API (manual-op in Phase 3) so the secret value
  # never lands in git.
  # DEVIATION (P1 fix): extra_settings `value` is injected verbatim as the
  # right-hand side of a Python assignment in the operator-rendered settings
  # file (`SETTING = <value>`). String values MUST carry inner Python quotes,
  # else e.g. `SOCIAL_AUTH_OIDC_OIDC_ENDPOINT = https://...` is a Python
  # SyntaxError → uwsgi "unable to load app" → awx-web CrashLoop → the
  # operator's "Check for pending migrations" exec into awx-web fails → DB
  # never migrates → web/task init `wait-for-migrations` loops forever.
  # YAML-double-quote wrapping a Python-single-quoted literal (per AWX docs).
  extra_settings:
    - setting: SOCIAL_AUTH_OIDC_OIDC_ENDPOINT
      value: "'https://auth.cluster.derio.net/application/o/awx/'"
    - setting: SOCIAL_AUTH_OIDC_KEY
      value: "'awx'"
