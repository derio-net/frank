# Ollama — local LLM inference on gpu-1's RTX 5070
# Serves models via OpenAI-compatible API on ClusterIP:11434
# Consumed by LiteLLM gateway, not exposed externally

# Pinned explicitly (chart 1.50.0 defaults to its appVersion, 0.17.7).
# 0.30.5 is the first release where gemma4:12b works — support landed in
# 0.30.3 but crashed with a floating-point exception until the 0.30.5 fix.
image:
  tag: "0.30.5"

ollama:
  gpu:
    enabled: true
    type: nvidia
    number: 1
    nvidiaResource: "nvidia.com/gpu"

  models:
    pull: []
    run: []
    # Derived models created at container startup (chart-managed
    # `ollama create`). Modelfile PARAMETER num_ctx is the per-model
    # escape hatch from litellm#12930 (LiteLLM cannot pass num_ctx
    # per-request; OLLAMA_CONTEXT_LENGTH below stays the server-wide
    # default for everything else). Measured 2026-06-06 on gpu-1
    # (RTX 5070 Ti): 64k KV costs +846MiB over the 16k baseline
    # (9,686 vs 8,840 MiB), 100% GPU. Blob-sharing: the tag adds only
    # a manifest layer. See spec
    # docs/superpowers/specs/2026-06-06--orch--hermes-context-survival-design.md
    create:
      - name: gemma4:12b-64k
        template: |
          FROM gemma4:12b
          PARAMETER num_ctx 65536
      # Designated hermes agent brain (rework-1): gemma4-12B failed the
      # hermes agentic gate (degenerate tool loops, confabulation — parent
      # plan P4 evidence). Measured 2026-06-06: 24GB total, 39%/61% CPU/GPU
      # hybrid (MoE 3B-active), 61 t/s generation, 1,792 t/s long-prompt
      # prefill (14k tokens in 7.8s). Native ceiling 262,144 so num_ctx
      # 65536 is honored — contrast qwen3:14b, which silently CLAMPS to its
      # 40,960 trained ceiling (below hermes's 64k floor; only `ollama ps`
      # CONTEXT reveals a clamp).
      - name: qwen3.6:35b-a3b-64k
        template: |
          FROM qwen3.6:35b-a3b
          PARAMETER num_ctx 65536
    clean: false

extraEnv:
  - name: OLLAMA_KEEP_ALIVE
    value: "24h"
  - name: OLLAMA_MAX_LOADED_MODELS
    value: "1"
  # Server-side default context window. Per-request num_ctx does NOT pass
  # through LiteLLM for ollama_chat (BerriAI/litellm#12930, closed
  # not-planned; verified live 2026-06-05: options / top-level / extra_body
  # shapes all left the runner ctx at 4096 with silent prompt truncation).
  # 16384 is the trace-analyst target (spec §6); the KV-cache VRAM cost
  # applies only to the one loaded model (MAX_LOADED_MODELS=1). If the
  # Test Plan measurement shows reclaim pressure on the 16GB card, drop
  # to 8192 here AND in ai-alert-helper's ANALYST_NUM_CTX (client-side
  # trim budget — keep them equal).
  - name: OLLAMA_CONTEXT_LENGTH
    value: "16384"

persistentVolume:
  enabled: true
  # 200Gi — sized for the 6-model lineup (~79GB at rest, qwen3.6:35b-a3b
  # added 2026-05-06 brought it from ~55GB) plus headroom for experimentation.
  # The 5070 Ti has 16GB VRAM; only one model loads at a time per
  # OLLAMA_MAX_LOADED_MODELS=1, so disk is the only soft limit on how many
  # models can cohabit.
  size: 200Gi
  storageClass: longhorn
  accessModes:
    - ReadWriteOnce

tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule

nodeSelector:
  kubernetes.io/hostname: gpu-1

resources:
  requests:
    memory: 16Gi
    cpu: 4000m
  limits:
    memory: 64Gi

livenessProbe:
  enabled: true
  initialDelaySeconds: 120
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  enabled: true
  initialDelaySeconds: 60
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 6

terminationGracePeriodSeconds: 120
