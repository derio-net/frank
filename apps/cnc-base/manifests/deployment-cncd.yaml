apiVersion: apps/v1
kind: Deployment
metadata:
  name: cncd
  labels:
    app.kubernetes.io/name: cncd
    app.kubernetes.io/part-of: cnc
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: cncd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cncd
        app.kubernetes.io/part-of: cnc
    spec:
      serviceAccountName: cnc
      imagePullSecrets:
        - name: cnc-ghcr-pull
      # The cncd image is distroless (gcr.io/distroless/static-debian12:nonroot,
      # uid 65532). Match it explicitly so the RWO PVCs (cncd-data, cnc-bundle)
      # are group-writable by 65532 — fsGroup re-owns the Longhorn volume on
      # mount. No initContainer: env-key is the deliberate master-key posture
      # (see below), so there is nothing to pre-seed as root.
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: cncd
          image: ghcr.io/agentic-stoa/cnc-frd:0.18.0
          imagePullPolicy: IfNotPresent
          # distroless ENTRYPOINT is ["/cncd"]; `args` supplies the subcommand.
          # `command:` would REPLACE the entrypoint and exec a nonexistent
          # `serve` binary (distroless has no shell / no PATH) → CrashLoop.
          args: ["serve"]
          ports:
            - name: http
              containerPort: 8080
          env:
            # PG_PASSWORD must precede CNCD_DATABASE_URL: k8s `$(VAR)` expansion
            # only resolves names defined EARLIER in the list.
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cnc-db-postgresql
                  key: password
            - name: CNCD_DATABASE_URL
              value: postgres://cnc:$(PG_PASSWORD)@cnc-db-postgresql:5432/cnc
            - name: CNCD_BUNDLE_PATH
              value: /bundle
            - name: CNCD_WRITEBACK_MODE
              value: "off"
            # cncd reads CNCD_BASE_URL (default http://127.0.0.1:8080), NOT
            # CNCD_PUBLIC_URL — the latter was a no-op that left the served
            # SKILL.md URL wrong off-laptop.
            - name: CNCD_BASE_URL
              value: http://cncd:8080
            # agent-session adapter (spec b): the node base URL + the per-runner
            # SERVICE bearer cncd presents to the node's /v1/session/send. The
            # token is the SAME secret the node mounts (cnc-runner-auth/token);
            # the k8s node Service is single-host `cnc-node` (no {runner} template).
            - name: CNCD_NODE_BASE_URL
              value: http://cnc-node:8765
            - name: CNCD_RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cnc-runner-auth
                  key: token
            # Authentik's forward-auth outpost emits X-authentik-username; cncd's
            # AUTH_HEADER defaults to X-Forwarded-User, so without this every
            # authenticated browser request 403s (no actor header). The
            # traefik-system authentik-forwardauth middleware must copy this
            # header to the backend (authResponseHeaders) — see runbook.
            - name: AUTH_HEADER
              value: X-authentik-username
            # Master-key posture: ENV-KEY (deliberate). cncd reads
            # CNCD_SECRETS_MASTER_KEY from env and it takes precedence over the
            # on-PVC key file, so Infisical is the single source of truth
            # (frank-idiomatic: every other secret is ESO env/envFrom). Rotation
            # is an Infisical change + pod restart, NOT `cncd rotate-master-key`
            # (which re-seals the file path and would be shadowed by this env).
            - name: CNCD_SECRETS_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: cnc-secrets
                  key: CNCD_SECRETS_MASTER_KEY
          volumeMounts:
            - name: cncd-data
              mountPath: /var/lib/cncd
            - name: bundle
              mountPath: /bundle
          resources:
            requests: {cpu: 250m, memory: 256Mi}
            limits: {cpu: "1", memory: 1Gi}
          readinessProbe:
            httpGet: {path: /healthz, port: http}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /healthz, port: http}
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: cncd-data
          persistentVolumeClaim:
            claimName: cncd-data
        - name: bundle
          persistentVolumeClaim:
            claimName: cnc-bundle
