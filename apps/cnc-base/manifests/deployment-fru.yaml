apiVersion: apps/v1
kind: Deployment
metadata:
  name: cnc-fru
  labels:
    app.kubernetes.io/name: cnc-fru
    app.kubernetes.io/part-of: cnc
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cnc-fru
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cnc-fru
        app.kubernetes.io/part-of: cnc
    spec:
      imagePullSecrets:
        - name: cnc-ghcr-pull
      containers:
        - name: cnc-fru
          image: ghcr.io/agentic-stoa/cnc-fru:0.7.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          env:
            # cnc-fru's Caddyfile reverse-proxies to {$CNCD_UPSTREAM:cncd:8080};
            # CNC_API_URL was a no-op (Caddy never reads it).
            - name: CNCD_UPSTREAM
              value: cncd:8080
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 500m, memory: 256Mi}
          readinessProbe:
            tcpSocket: {port: http}
            periodSeconds: 10
          livenessProbe:
            tcpSocket: {port: http}
            initialDelaySeconds: 30
            periodSeconds: 30
