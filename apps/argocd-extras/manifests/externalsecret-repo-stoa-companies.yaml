# ArgoCD repository credential for the private agentic-stoa/companies Gitea
# mirror — Frank's first repo credential (every other Application sources the
# public derio-net/frank repo). The `argocd.argoproj.io/secret-type: repository`
# label on the target template is what makes ArgoCD register it.
#
# Consumed by the stoa-live-mirror-sync Application (apps/root/templates/),
# which pulls the Stoa-canonical Tekton manifests from the mirror at a pinned
# SHA. See docs/superpowers/specs/2026-06-04--cicd--stoa-live-mirror-sync-
# trigger-design.md.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: repo-stoa-companies
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: repo-stoa-companies
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: git
        name: stoa-companies
        url: http://gitea-http.gitea.svc.cluster.local:3000/agentic-stoa/companies.git
        # Dedicated least-privilege Gitea user: read access to this one repo
        # only (Gitea token scopes are repo-coarse, so isolation is by user).
        # See manual-op cicd-stoa-argocd-gitea-reader.
        username: argocd-reader
        password: "{{ .token }}"
  data:
    - secretKey: token
      remoteRef:
        # Absolute path: the `infisical` ClusterSecretStore is scoped to
        # secretsPath: / (frank infra secrets); stoa-org secrets live under
        # /agentic-stoa (see apps/tekton/manifests/externalsecret-stoa-github-
        # mirror.yaml for the original rationale).
        key: /agentic-stoa/STOA_GITEA_ARGOCD_TOKEN
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
