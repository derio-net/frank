# Disable alerting — Phase 9+
vmalert:
  enabled: false
alertmanager:
  enabled: false

# Disable kube-controller-manager scraping — service name exceeds 63 chars with this release name
kubeControllerManager:
  enabled: false

# VMSingle — single-node metrics storage
vmsingle:
  spec:
    retentionPeriod: "1"   # 1 month
    storage:
      storageClassName: longhorn
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 20Gi

# Grafana — exposed via Cilium L2 LoadBalancer
grafana:
  enabled: true
  service:
    type: LoadBalancer
    loadBalancerIP: 192.168.55.203
  persistence:
    enabled: true
    storageClassName: longhorn
    size: 1Gi
  # Install VictoriaLogs datasource plugin (pre-installs on pod start)
  plugins:
    - victoriametrics-logs-datasource
  # VictoriaLogs datasource is provisioned declaratively via grafana-victorialogs-ds ConfigMap.
  # extraConfigmapMounts mounts it into /etc/grafana/provisioning/datasources/.
  extraConfigmapMounts:
    - name: victorialogs-datasource
      mountPath: /etc/grafana/provisioning/datasources/victorialogs.yaml
      subPath: victorialogs-datasource.yaml
      configMap: grafana-victorialogs-datasource
      readOnly: true
