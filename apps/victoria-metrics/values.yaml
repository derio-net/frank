# Disable alerting — Phase 9+
vmalert:
  enabled: false
alertmanager:
  enabled: false

# Disable kube-controller-manager scraping — service name exceeds 63 chars with this release name
kubeControllerManager:
  enabled: false

# VMSingle — single-node metrics storage
vmsingle:
  spec:
    retentionPeriod: "1"   # 1 month
    storage:
      storageClassName: longhorn
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 20Gi

# Kubelet scrape (cadvisor + resources + probes + kubelet) — drop high-cardinality
# node-meta labels. The chart's default relabelConfigs labelmap every
# `__meta_kubernetes_node_label_*` onto every metric. On Frank's amd64 nodes
# (NFD CPU features, Talos extensions, NVIDIA driver labels) this puts each
# series at 60–135 labels, exceeding VictoriaMetrics' default
# -maxLabelsPerTimeseries=40, so vmsingle silently drops them — that is the
# cause of the cadvisor metric gap on the 5 amd64 nodes (mini-1/2/3, gpu-1,
# pc-1). raspi nodes carry ~33 labels and pass under the limit. Adding a
# labeldrop after the chart's default keeps the useful node labels (tier,
# zone, kubernetes_io_arch, node, instance, accelerator, igpu) and trims the
# pure metadata noise.
kubelet:
  vmScrape:
    spec:
      metricRelabelConfigs:
        - action: labeldrop
          regex: (uid)
        - action: labeldrop
          regex: (id|name)
        - action: drop
          source_labels: [__name__]
          regex: (rest_client_request_duration_seconds_bucket|rest_client_request_duration_seconds_sum|rest_client_request_duration_seconds_count)
        - action: labeldrop
          regex: (feature_node_kubernetes_io_.*|extensions_talos_dev_.*|nvidia_com_.*|beta_kubernetes_io_.*)

# Grafana — exposed via Cilium L2 LoadBalancer
grafana:
  enabled: true
  # RWO Longhorn PVC + single replica → must use Recreate, not RollingUpdate (frank-gotchas.md)
  deploymentStrategy:
    type: Recreate
  service:
    type: LoadBalancer
    loadBalancerIP: 192.168.55.203
  persistence:
    enabled: true
    storageClassName: longhorn
    size: 1Gi
  # Install VictoriaLogs datasource plugin (pre-installs on pod start)
  plugins:
    - victoriametrics-logs-datasource
  # VictoriaLogs datasource is provisioned declaratively via grafana-victorialogs-ds ConfigMap.
  # extraConfigmapMounts mounts it into /etc/grafana/provisioning/datasources/.
  extraConfigmapMounts:
    - name: victorialogs-datasource
      mountPath: /etc/grafana/provisioning/datasources/victorialogs.yaml
      subPath: victorialogs-datasource.yaml
      configMap: grafana-victorialogs-datasource
      readOnly: true
    # --- Alerting provisioning (rules, contact points, notification policy) ---
    - name: alerting-rules
      mountPath: /etc/grafana/provisioning/alerting/alert-rules.yaml
      subPath: alert-rules.yaml
      configMap: grafana-alerting-rules
      readOnly: true
    - name: alerting-contact-points
      mountPath: /etc/grafana/provisioning/alerting/contact-points.yaml
      subPath: contact-points.yaml
      configMap: grafana-alerting-contact-points
      readOnly: true
    - name: alerting-notification-policy
      mountPath: /etc/grafana/provisioning/alerting/notification-policy.yaml
      subPath: notification-policy.yaml
      configMap: grafana-alerting-notification-policy
      readOnly: true
    # --- Dashboard provisioning (provider config + JSON) ---
    - name: dashboard-provider
      mountPath: /etc/grafana/provisioning/dashboards/feature-health-provider.yaml
      subPath: feature-health-provider.yaml
      configMap: grafana-alerting-dashboard
      readOnly: true
    - name: dashboard-json
      mountPath: /var/lib/grafana/dashboards/feature-health/feature-health.json
      subPath: feature-health.json
      configMap: grafana-alerting-dashboard
      readOnly: true
    # secure-agent-pod operating dashboard (Phase 5 soak readings)
    - name: sap-dashboard-provider
      mountPath: /etc/grafana/provisioning/dashboards/secure-agent-pod-provider.yaml
      subPath: secure-agent-pod-provider.yaml
      configMap: grafana-secure-agent-pod-dashboard
      readOnly: true
    - name: sap-dashboard-json
      mountPath: /var/lib/grafana/dashboards/secure-agent-pod/secure-agent-pod.json
      subPath: secure-agent-pod.json
      configMap: grafana-secure-agent-pod-dashboard
      readOnly: true
  # Authentik OIDC SSO (Phase 13) + Alerting secrets (Telegram, Health Bridge)
  envFromSecrets:
    - name: grafana-oidc-secret
      optional: false
    - name: grafana-alerting-secrets
      optional: true
  grafana.ini:
    server:
      root_url: https://grafana.frank.derio.net
    auth.generic_oauth:
      enabled: true
      name: Authentik
      client_id: grafana
      client_secret: ${GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
      scopes: openid profile email groups offline_access
      auth_url: https://auth.frank.derio.net/application/o/authorize/
      token_url: https://auth.frank.derio.net/application/o/token/
      api_url: https://auth.frank.derio.net/application/o/userinfo/
      role_attribute_path: "contains(groups[*], 'root-admins') && 'Admin' || contains(groups[*], 'root-devops') && 'Editor' || 'Viewer'"
      allow_assign_grafana_admin: true
