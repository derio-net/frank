# Syncs Gitea secrets from Infisical.
# username/password: admin account (chart expects these keys for admin.existingSecret)
# key/secret: Authentik OIDC client ID/secret (chart expects these for oauth existingSecret)
# github-mirror-token: GitHub PAT for pull mirrors
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-secrets
  namespace: gitea
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: gitea-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: username
      remoteRef:
        key: GITEA_ADMIN_USER
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: password
      remoteRef:
        key: GITEA_ADMIN_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: key
      remoteRef:
        key: GITEA_OIDC_CLIENT_ID
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: secret
      remoteRef:
        key: GITEA_OIDC_CLIENT_SECRET
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: github-mirror-token
      remoteRef:
        key: GITHUB_MIRROR_TOKEN
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
