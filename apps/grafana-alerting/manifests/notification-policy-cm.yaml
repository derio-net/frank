apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting-notification-policy
  namespace: monitoring
data:
  notification-policy.yaml: |
    apiVersion: 1
    # Always-active interval used to permanently silence the cert-expiry canary
    # route below (Grafana has no null receiver; an always-muted route is the
    # idiomatic permanent mute). Spec:
    # docs/superpowers/specs/2026-06-07--obs--cert-expiry-canary-design.md
    muteTimes:
      - orgId: 1
        name: perma-mute
        time_intervals:
          - times:
              - start_time: "00:00"
                end_time: "24:00"
    policies:
      - orgId: 1
        receiver: "Telegram - Willikins"
        group_wait: 30s
        group_interval: 3m
        repeat_interval: 3m
        routes:
          # ROUTE ORDER IS LOAD-BEARING (issue #251 canary). The two canary
          # routes must precede the severity routes (the canary fires BOTH
          # tls-cert rules: warning + critical) and the feature-health route
          # (health-bridge would mint a never-closing bug issue). The watchdog
          # route must precede the mute route — the watchdog alert ALSO
          # carries canary="true" (absent() propagates its selector's equality
          # matchers) and would otherwise be swallowed by the mute.
          #
          # 1. Canary watchdog — health-bridge ONLY. severity=critical is
          #    required for health-bridge's dead→bug-issue lifecycle (auto-
          #    closed on heal) but must never reach Telegram.
          - receiver: "Health Bridge Webhook"
            matchers:
              - canary_watchdog="true"
            continue: false
          # 2. Canary heartbeat instances — permanently muted, still visible
          #    in the Grafana alert list (that visibility IS the heartbeat).
          - receiver: "Telegram - Willikins"   # explicit for readability — never delivers (perma-muted)
            matchers:
              - canary="true"
            mute_time_intervals:
              - perma-mute
            continue: false
          # Dead-man's-switch direct-page: an alert that means "the monitoring
          # canary itself died" must page Telegram DIRECTLY, never via the AI
          # Helper (an LLM that can give stale/wrong triage — on 2026-06-21 it
          # turned the canary-heartbeat-stale test alert into a FALSE "CrowdSec
          # blind since yesterday" report while CrowdSec was actively banning).
          # MUST precede the blog-edge route below, else that swallows it
          # (the rule lives in the blog-edge folder). continue:false → Telegram only.
          - receiver: "Telegram - Willikins"
            matchers:
              - telegram_direct="true"
            continue: false
          # blog-edge folder alerts go exclusively to the AI helper, which
          # builds a fact sheet, calls the LLM, and posts to Telegram itself.
          # Continue:false so the default Telegram contact point doesn't
          # also fire (avoiding double notifications).
          - receiver: "AI Helper Webhook"
            matchers:
              - grafana_folder="blog-edge"
            continue: false
          # GPU time-share tiles (Layers 11/16): exactly one of inference/media is
          # always down by design (whoever lacks gpu-1). Route to health-bridge
          # ONLY — degraded tile, NO Telegram. ORDER IS LOAD-BEARING: must precede
          # the severity routes (continue:true → Telegram) or these warning-level
          # alerts would page on every GPU switch. The genuine-fault pager is the
          # gpu-node-both-down rule (severity=critical, no gpu_timeshare label).
          - receiver: "Health Bridge Webhook"
            matchers:
              - gpu_timeshare="true"
            continue: false
          - receiver: "Telegram - Willikins"
            matchers:
              - severity=critical
            continue: true
          - receiver: "Telegram - Willikins"
            matchers:
              - severity=warning
            continue: true
          - receiver: "Health Bridge Webhook"
            matchers:
              - grafana_folder="feature-health"
            continue: false
