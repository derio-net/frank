apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting-notification-policy
  namespace: monitoring
data:
  notification-policy.yaml: |
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: "Telegram - Willikins"
        group_wait: 30s
        group_interval: 3m
        repeat_interval: 3m
        routes:
          # blog-edge folder alerts go exclusively to the AI helper, which
          # builds a fact sheet, calls the LLM, and posts to Telegram itself.
          # Continue:false so the default Telegram contact point doesn't
          # also fire (avoiding double notifications).
          - receiver: "AI Helper Webhook"
            matchers:
              - grafana_folder="blog-edge"
            continue: false
          - receiver: "Telegram - Willikins"
            matchers:
              - severity=critical
            continue: true
          - receiver: "Telegram - Willikins"
            matchers:
              - severity=warning
            continue: true
          - receiver: "Health Bridge Webhook"
            matchers:
              - grafana_folder="feature-health"
            continue: false
