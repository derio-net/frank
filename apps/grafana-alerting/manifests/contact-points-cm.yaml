apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting-contact-points
  namespace: monitoring
data:
  contact-points.yaml: |
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: "Telegram - Willikins"
        receivers:
          - uid: efi04e0201jb4f
            type: telegram
            settings:
              bottoken: $FRANK_C2_TELEGRAM_BOT_TOKEN
              chatid: |
                $FRANK_C2_TELEGRAM_CHAT_ID
              # parse_mode intentionally unset → plain text. Markdown mode
              # interprets the underscore in labels like `job=session_manager`
              # as italic delimiters and silently strips the underscores,
              # which has caused real triage misdirection (alert renders as
              # `job=sessionmanager`, runbook templates the wrong grep target).
              # Plain text loses the **Firing**/**Resolved** bolding from the
              # default Grafana template — accepted tradeoff: correctness > formatting.
      - orgId: 1
        name: "Health Bridge Webhook"
        receivers:
          - uid: health-bridge-webhook
            type: webhook
            settings:
              url: "http://health-bridge.monitoring.svc.cluster.local:8080/webhook"
              httpMethod: POST
              authorization_scheme: Bearer
              authorization_credentials: $HEALTH_BRIDGE_WEBHOOK_SECRET
      - orgId: 1
        name: "AI Helper Webhook"
        receivers:
          - uid: ai-alert-helper-webhook
            type: webhook
            settings:
              url: "http://ai-alert-helper.ai-alert-helper-system.svc.cluster.local:8080/alert"
              httpMethod: POST
