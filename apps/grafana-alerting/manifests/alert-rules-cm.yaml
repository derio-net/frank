      # =====================================================================
      # blog-edge folder rules (obs layer phase 3+5) — fired alerts route to
      # the AI Helper Webhook (added in phase 5). For now they route through
      # the default Telegram contact point.
      # =====================================================================

      - orgId: 1
        name: blog-edge-security
        folder: blog-edge
        interval: 1m
        rules:
          # queryType: stats hits /select/logsql/stats_query which returns
          # a Prometheus-style instant vector (wide series). Without it the
          # default queryType uses /select/logsql/query which returns a
          # *long* series of log lines, and Grafana's SSE reduce step
          # rejects it with "input data must be a wide series but got
          # type long".
          - uid: crowdsec-decision-burst
            title: CrowdSec decision burst
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: affdoo4s9258gc
                model:
                  refId: A
                  queryType: stats
                  expr: 'kubernetes.namespace_name:crowdsec-system AND log:Adding AND log:decisions | stats count() as value'
              - refId: B
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: __expr__
                model: { refId: B, type: reduce, expression: A, reducer: last, settings: { mode: dropNN } }
              - refId: C
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator: { type: gt, params: [10] }
            noDataState: OK
            execErrState: Error
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: ">10 CrowdSec ban decisions in last 5m"
              runbook: "blog-edge-security dashboard — investigate by source IP."

          - uid: falco-critical-event
            title: Falco critical event
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: affdoo4s9258gc
                model:
                  refId: A
                  queryType: stats
                  expr: 'priority:Critical | stats count() as value'
              - refId: B
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: __expr__
                model: { refId: B, type: reduce, expression: A, reducer: last, settings: { mode: dropNN } }
              - refId: C
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator: { type: gt, params: [0] }
            noDataState: OK
            execErrState: Error
            for: 0s
            labels:
              severity: critical
            annotations:
              summary: "Falco fired a critical-severity event"
              runbook: "blog-edge-security dashboard — inspect rule + container."
