apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting-rules
  namespace: monitoring
data:
  alert-rules.yaml: |
    apiVersion: 1
    groups:
      # =====================================================================
      # FEATURE-LEVEL ALERTS (bugs in specific willikins crons / endpoints)
      # Labels: severity + github_issue=willikins#<N>
      # These fire independently of the Layer trackers below; the Layer
      # rules aggregate them into a single "is this Layer up" signal.
      # =====================================================================

      # --- Heartbeat-stale: exercise reminder (eval every 5m) ---
      - orgId: 1
        name: heartbeat-stale-5m
        folder: feature-health
        interval: 5m
        rules:
          - uid: exercise-reminder-stale
            title: Exercise Reminder Stale
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: P4169E866C3094E38
                model:
                  refId: A
                  expr: 'time() - willikins_heartbeat_last_success_timestamp{job="exercise_reminder"}'
                  instant: true
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  refId: B
                  type: reduce
                  expression: A
                  reducer: last
                  settings:
                    mode: dropNN
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 10800
            noDataState: OK
            execErrState: Error
            for: 1m
            labels:
              severity: critical
              github_issue: "willikins#11"
            annotations:
              summary: Exercise reminder cron heartbeat is stale (>3h since last success)

      # --- Heartbeat-stale: session manager (eval every 1m) ---
      - orgId: 1
        name: heartbeat-stale-1m
        folder: feature-health
        interval: 1m
        rules:
          - uid: session-manager-stale
            title: Session Manager Stale
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: P4169E866C3094E38
                model:
                  refId: A
                  expr: 'time() - willikins_heartbeat_last_success_timestamp{job="session_manager"}'
                  instant: true
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  refId: B
                  type: reduce
                  expression: A
                  reducer: last
                  settings:
                    mode: dropNN
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 600
            noDataState: OK
            execErrState: Error
            for: 5m
            labels:
              severity: critical
              github_issue: "willikins#13"
            annotations:
              summary: Session manager cron heartbeat is stale (>10m since last success)

      # --- Heartbeat-stale: audit digest (eval every 30m) ---
      - orgId: 1
        name: heartbeat-stale-30m
        folder: feature-health
        interval: 30m
        rules:
          - uid: audit-digest-stale
            title: Audit Digest Stale
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: P4169E866C3094E38
                model:
                  refId: A
                  expr: 'time() - willikins_heartbeat_last_success_timestamp{job="audit_digest"}'
                  instant: true
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  refId: B
                  type: reduce
                  expression: A
                  reducer: last
                  settings:
                    mode: dropNN
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 93600
            noDataState: OK
            execErrState: Error
            for: 1h
            labels:
              severity: warning
              github_issue: "willikins#12"
            annotations:
              summary: Audit digest cron heartbeat is stale (>26h since last success)

      # --- Heartbeat-stale: VK Issue Bridge (eval every 2m) ---
      - orgId: 1
        name: heartbeat-stale-2m
        folder: feature-health
        interval: 2m
        rules:
          - uid: vk-bridge-stale
            title: VK Issue Bridge Stale
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: P4169E866C3094E38
                model:
                  refId: A
                  expr: 'time() - willikins_heartbeat_last_success_timestamp{job="vk_issue_bridge"}'
                  instant: true
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  refId: B
                  type: reduce
                  expression: A
                  reducer: last
                  settings:
                    mode: dropNN
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 600
            noDataState: OK
            execErrState: Error
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: VK Issue Bridge has not pushed a heartbeat in over 10 minutes — supercronic may be down or the bridge is failing

      # --- VK Issue Bridge failures (eval every 5m) ---
      - orgId: 1
        name: vk-bridge-failures
        folder: feature-health
        interval: 5m
        rules:
          - uid: vk-bridge-failures
            title: VK Issue Bridge Failures
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: P4169E866C3094E38
                model:
                  refId: A
                  # Preserve `reason` and `issue` labels through the aggregation
                  # so the annotation template can name the specific failure.
                  expr: 'sum by (reason, issue) (increase(willikins_vk_bridge_failure_total[15m]))'
                  instant: true
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: __expr__
                model:
                  refId: B
                  type: reduce
                  expression: A
                  reducer: last
                  settings:
                    mode: dropNN
              - refId: C
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0
            noDataState: OK
            execErrState: Error
            for: 0m
            labels:
              severity: warning
            annotations:
              summary: "VK Issue Bridge: {{ $values.B.Value | printf \"%.0f\" }} failure(s) reason={{ $labels.reason }} issue=#{{ $labels.issue }} in last 15m"
              description: "Check /home/claude/.willikins-agent/vk-bridge.log for the failing payload"

      # --- Endpoint-down (eval every 1m) ---
      - orgId: 1
        name: endpoint-down
        folder: feature-health
        interval: 1m
        rules:
          - uid: endpoint-down
            title: Endpoint Down
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: P4169E866C3094E38
                model:
                  refId: A
                  expr: 'probe_success{probe_group="feature_health"}'
                  instant: true
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  refId: B
                  type: reduce
                  expression: A
                  reducer: last
                  settings:
                    mode: dropNN
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: lt
                        params:
                          - 1
            noDataState: OK
            execErrState: Error
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Endpoint probe failing: {{ $labels.instance }}"

      # --- Pod-not-running (eval every 1m) ---
      - orgId: 1
        name: pod-not-running
        folder: feature-health
        interval: 1m
        rules:
          - uid: agent-pod-not-running
            title: Agent Pod Not Running
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: P4169E866C3094E38
                model:
                  refId: A
                  expr: 'kube_pod_status_phase{namespace="secure-agent-pod", phase="Running"}'
                  instant: true
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  refId: B
                  type: reduce
                  expression: A
                  reducer: last
                  settings:
                    mode: dropNN
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: lt
                        params:
                          - 1
            noDataState: OK
            execErrState: Error
            for: 5m
            labels:
              severity: critical
              github_issue: "frank-ops#18"
            annotations:
              summary: "Secure agent pod {{ $labels.pod }} not in Running phase"

      # =====================================================================
      # LAYER TRACKERS (Derio Ops board, derio-net/frank-ops — private)
      # Labels: severity + github_issue=frank-ops#<LAYER>
      # One rule per Layer. Use aggregation to keep the signal single.
      # Added in Pass 3 — see docs/superpowers/specs/2026-04-16--platform--derio-ops-layers-restoration-design.md
      # =====================================================================

      # --- Layer 8 — Observability (frank-ops#8) ---
      # Per-instance: one alert per failing monitoring pod, plus one if the
      # health-bridge self-probe fails. Uses label_replace to inject a
      # `component` label that normalises across both signals for templating.
      - orgId: 1
        name: layer-8-observability-down
        folder: feature-health
        interval: 1m
        rules:
          - uid: layer-8-observability-down
            title: Layer 8 Observability Degraded
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: P4169E866C3094E38
                model:
                  refId: A
                  # Raw readiness values (0=NotReady, 1=Ready) with a
                  # normalised `component` label for templating. Threshold lt 1
                  # fires on value==0, per-series.
                  expr: |
                    label_replace(
                      kube_pod_status_ready{namespace="monitoring",condition="true"},
                      "component", "pod/$1", "pod", "(.+)"
                    )
                    or
                    label_replace(
                      probe_success{instance="http://health-bridge.monitoring.svc.cluster.local:8080/healthz"},
                      "component", "probe/health-bridge-healthz", "", ""
                    )
                  instant: true
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: __expr__
                model:
                  refId: B
                  type: reduce
                  expression: A
                  reducer: last
                  settings: { mode: dropNN }
              - refId: C
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator: { type: lt, params: [1] }
            noDataState: OK
            execErrState: Error
            for: 5m
            labels:
              severity: critical
              github_issue: "frank-ops#8"
            annotations:
              summary: "L8 Observability: {{ $labels.component }} failing"
              runbook: "kubectl get pods -n monitoring; kubectl get probe -n monitoring feature-health-probes -o yaml"

      # --- Layer 18 — Persistent Agent (frank-ops#18) ---
      # Per-job heartbeat check — fires ONE alert instance per stale cron, all
      # labelled github_issue=frank-ops#18 so they roll up to the Layer tracker.
      # Bridge lastState-dedup ensures only one Lifecycle transition per fire-bundle;
      # the first instance's annotation (with specific job name) lands in the comment.
      # Pod-level critical failures are covered by agent-pod-not-running
      # (labels.github_issue=frank-ops#18, severity=critical) — leave that rule intact.
      - orgId: 1
        name: layer-18-persistent-agent-degraded
        folder: feature-health
        interval: 1m
        rules:
          - uid: layer-18-persistent-agent-degraded
            title: Layer 18 Persistent Agent Heartbeat Stale
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: P4169E866C3094E38
                model:
                  refId: A
                  # Each clause returns a 0/1 series WITH the source metric's labels
                  # (notably `job`). `or` stacks them into a multi-dimensional
                  # series — one element per currently-stale job.
                  expr: |
                    (time() - willikins_heartbeat_last_success_timestamp{job="exercise_reminder"} > bool 10800)
                    or (time() - willikins_heartbeat_last_success_timestamp{job="session_manager"} > bool 600)
                    or (time() - willikins_heartbeat_last_success_timestamp{job="audit_digest"} > bool 93600)
                    or (time() - willikins_heartbeat_last_success_timestamp{job="vk_issue_bridge"} > bool 600)
                  instant: true
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: __expr__
                model:
                  refId: B
                  type: reduce
                  expression: A
                  reducer: last
                  settings: { mode: dropNN }
              - refId: C
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator: { type: gt, params: [0] }
            noDataState: OK
            execErrState: Error
            for: 5m
            labels:
              severity: warning
              github_issue: "frank-ops#18"
            annotations:
              summary: "Layer 18 (Persistent Agent) — {{ $labels.job }} cron heartbeat stale. See willikins#11/#12/#13 for per-cron triage."
              runbook: "kubectl logs -n secure-agent-pod -l app=secure-agent-pod --tail=50 | grep -i {{ $labels.job }}"

      # --- Layer 1 — Hardware & Nodes (frank-ops#1) ---
      # Per-node: one alert instance per NotReady node.
      - orgId: 1
        name: layer-1-hardware-down
        folder: feature-health
        interval: 1m
        rules:
          - uid: layer-1-hardware-down
            title: Layer 1 Hardware Node NotReady
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: P4169E866C3094E38
                model:
                  refId: A
                  # status="false" series are 1 when node is NotReady, 0 otherwise.
                  expr: 'kube_node_status_condition{condition="Ready",status="false"}'
                  instant: true
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: __expr__
                model: { refId: B, type: reduce, expression: A, reducer: last, settings: { mode: dropNN } }
              - refId: C
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator: { type: gt, params: [0] }
            noDataState: OK
            execErrState: Error
            for: 5m
            labels:
              severity: warning
              github_issue: "frank-ops#1"
            annotations:
              summary: "L1 Hardware: node {{ $labels.node }} NotReady"
              runbook: "kubectl describe node {{ $labels.node }}; talosctl -n {{ $labels.node }} health"

      # --- Layer 2 — OS & Bootstrap (frank-ops#2) ---
      # Per control-plane node only — HA lost = critical.
      - orgId: 1
        name: layer-2-os-down
        folder: feature-health
        interval: 1m
        rules:
          - uid: layer-2-os-down
            title: Layer 2 OS Control-Plane NotReady
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: P4169E866C3094E38
                model:
                  refId: A
                  expr: |
                    kube_node_status_condition{condition="Ready",status="false"}
                    * on(node) group_left kube_node_role{role="control-plane"}
                  instant: true
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: __expr__
                model: { refId: B, type: reduce, expression: A, reducer: last, settings: { mode: dropNN } }
              - refId: C
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator: { type: gt, params: [0] }
            noDataState: OK
            execErrState: Error
            for: 2m
            labels:
              severity: critical
              github_issue: "frank-ops#2"
            annotations:
              summary: "L2 OS: control-plane node {{ $labels.node }} NotReady — HA at risk"
              runbook: "talosctl -n {{ $labels.node }} health; talosctl -n {{ $labels.node }} dmesg | tail -50"

      # --- Layer 3 — Networking / Cilium (frank-ops#3) ---
      # Per-pod alert when any cilium-agent, cilium-envoy, or cilium-operator pod is NotReady.
      - orgId: 1
        name: layer-3-networking-down
        folder: feature-health
        interval: 1m
        rules:
          - uid: layer-3-networking-down
            title: Layer 3 Cilium Agent Down
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: P4169E866C3094E38
                model:
                  refId: A
                  expr: 'kube_pod_status_ready{namespace="kube-system",pod=~"cilium-.*",condition="true"}'
                  instant: true
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: __expr__
                model: { refId: B, type: reduce, expression: A, reducer: last, settings: { mode: dropNN } }
              - refId: C
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator: { type: lt, params: [1] }
            noDataState: OK
            execErrState: Error
            for: 5m
            labels:
              severity: warning
              github_issue: "frank-ops#3"
            annotations:
              summary: "L3 Cilium: pod {{ $labels.pod }} NotReady"
              runbook: "kubectl -n kube-system describe pod {{ $labels.pod }}; kubectl -n kube-system logs {{ $labels.pod }} --tail=50"

      # --- Layer 4 — Storage / Longhorn (frank-ops#4) ---
      # DEFERRED: the original plan used longhorn_volume_robustness for per-volume
      # degraded/faulted detection, but Longhorn native metrics aren't scraped yet.
      # Fallback: alert when any longhorn-manager pod is NotReady (control-plane signal).
      # Follow-up: enable Longhorn ServiceMonitor/VMServiceScrape to restore the
      # original volume-level rule.
      - orgId: 1
        name: layer-4-storage-down
        folder: feature-health
        interval: 1m
        rules:
          - uid: layer-4-storage-down
            title: Layer 4 Longhorn Manager NotReady
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: P4169E866C3094E38
                model:
                  refId: A
                  expr: 'kube_pod_status_ready{namespace="longhorn-system",pod=~"longhorn-manager-.*",condition="true"}'
                  instant: true
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: __expr__
                model: { refId: B, type: reduce, expression: A, reducer: last, settings: { mode: dropNN } }
              - refId: C
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator: { type: lt, params: [1] }
            noDataState: OK
            execErrState: Error
            for: 10m
            labels:
              severity: warning
              github_issue: "frank-ops#4"
            annotations:
              summary: "L4 Longhorn: manager pod {{ $labels.pod }} NotReady — storage control-plane degraded"
              runbook: "kubectl -n longhorn-system describe pod {{ $labels.pod }}; kubectl -n longhorn-system get volumes"

      # --- Layer 5 — GPU Compute (frank-ops#5) ---
      # Per-pod: fires for each NotReady GPU-operator or Intel-DRA-driver pod.
      - orgId: 1
        name: layer-5-gpu-down
        folder: feature-health
        interval: 1m
        rules:
          - uid: layer-5-gpu-down
            title: Layer 5 GPU Operator NotReady
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: P4169E866C3094E38
                model:
                  refId: A
                  expr: 'kube_pod_status_ready{namespace=~"gpu-operator|intel-gpu-resource-driver",condition="true"}'
                  instant: true
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: __expr__
                model: { refId: B, type: reduce, expression: A, reducer: last, settings: { mode: dropNN } }
              - refId: C
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator: { type: lt, params: [1] }
            noDataState: OK
            execErrState: Error
            for: 5m
            labels:
              severity: warning
              github_issue: "frank-ops#5"
            annotations:
              summary: "L5 GPU: {{ $labels.namespace }}/{{ $labels.pod }} NotReady"
              runbook: "kubectl -n {{ $labels.namespace }} describe pod {{ $labels.pod }}"

      # --- Layer 6 — GitOps / ArgoCD (frank-ops#6) ---
      # DEFERRED: original plan included an "app unhealthy" sub-rule using
      # argocd_app_info, but ArgoCD app metrics aren't scraped yet.
      # Follow-up: add argocd metrics ServiceMonitor/VMServiceScrape to
      # restore per-app health signal.
      # For now, alert on any NotReady argocd-* pod (server + controller).
      - orgId: 1
        name: layer-6-gitops-down
        folder: feature-health
        interval: 1m
        rules:
          - uid: layer-6-gitops-down
            title: Layer 6 ArgoCD Pod Down
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: P4169E866C3094E38
                model:
                  refId: A
                  expr: 'kube_pod_status_ready{namespace="argocd",condition="true"}'
                  instant: true
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: __expr__
                model: { refId: B, type: reduce, expression: A, reducer: last, settings: { mode: dropNN } }
              - refId: C
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator: { type: lt, params: [1] }
            noDataState: OK
            execErrState: Error
            for: 10m
            labels:
              severity: critical
              github_issue: "frank-ops#6"
            annotations:
              summary: "L6 ArgoCD: pod {{ $labels.pod }} NotReady — cluster GitOps impaired"
              runbook: "kubectl -n argocd describe pod {{ $labels.pod }}; kubectl -n argocd logs {{ $labels.pod }} --tail=50"

      # --- Layer 9 — Backup & DR (frank-ops#9) ---
      # Per-cronjob: one alert per backup CronJob whose last successful run is
      # stale. DEFERRED: the original plan targeted longhorn_backup_* metrics
      # for per-volume backup age — those aren't scraped. Using kube_cronjob
      # last-success as a proxy for now.
      - orgId: 1
        name: layer-9-backup-stale
        folder: feature-health
        interval: 5m
        rules:
          - uid: layer-9-backup-stale
            title: Layer 9 Backup CronJob Stale
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 3600, to: 0 }
                datasourceUid: P4169E866C3094E38
                model:
                  refId: A
                  # Per-cronjob: fire if last success was more than the CronJob's
                  # expected cadence plus slack. daily-nas: >48h; weekly-r2: >10d.
                  expr: |
                    (time() - kube_cronjob_status_last_successful_time{namespace="longhorn-system",cronjob="daily-nas"} > bool 172800)
                    or (time() - kube_cronjob_status_last_successful_time{namespace="longhorn-system",cronjob="weekly-r2"} > bool 864000)
                  instant: true
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange: { from: 3600, to: 0 }
                datasourceUid: __expr__
                model: { refId: B, type: reduce, expression: A, reducer: last, settings: { mode: dropNN } }
              - refId: C
                relativeTimeRange: { from: 3600, to: 0 }
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator: { type: gt, params: [0] }
            noDataState: OK
            execErrState: Error
            for: 30m
            labels:
              severity: warning
              github_issue: "frank-ops#9"
            annotations:
              summary: "L9 Backup: {{ $labels.cronjob }} CronJob last-success exceeded cadence threshold"
              runbook: "kubectl -n longhorn-system get cronjob {{ $labels.cronjob }}; kubectl -n longhorn-system get jobs --sort-by=.status.startTime | tail -5"

