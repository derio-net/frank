# Bitnami PostgreSQL for ruflo (ruvocal multi-agent orchestrator).
# Mirrors apps/paperclip-db/values.yaml.
#
# Plan deviation: the original plan called for MongoDB (because upstream
# ruvocal historically shipped a Mongo schema). Phase 1 discovered that
# upstream now uses PostgreSQL via DATABASE_URL — see plan Deployment
# Notes (P1.T2 row). This sub-app implements the corrected design.

architecture: standalone

# docker.io/bitnami/postgresql images are unavailable; use the same GCR
# mirror as paperclip-db / infisical-postgresql / n8n-01-postgresql.
image:
  registry: mirror.gcr.io
  repository: bitnamilegacy/postgresql

auth:
  username: ruflo
  database: ruflo
  # Password auto-generated by chart, stored in `ruflo-db-postgresql` Secret.
  # The Deployment reads it via secretKeyRef and assembles DATABASE_URL inline
  # — same pattern paperclip uses.

primary:
  persistence:
    size: 20Gi
    storageClass: longhorn
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: "1"

metrics:
  enabled: true
  image:
    registry: mirror.gcr.io
    repository: bitnamilegacy/postgres-exporter
