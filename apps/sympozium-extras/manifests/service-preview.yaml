# ClusterIP preview service for Sympozium blue-green
# Argo Rollouts controller manages the selector to point at the preview (green) ReplicaSet
# Access via kubectl port-forward for smoke testing before promotion
apiVersion: v1
kind: Service
metadata:
  name: sympozium-apiserver-preview
  namespace: sympozium-system
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/component: apiserver
