apiVersion: sympozium.ai/v1alpha1
kind: SympoziumPolicy
metadata:
  name: default-policy
  namespace: sympozium-system
spec:
  toolGating:
    defaultAction: allow
    rules:
      - tool: execute_command
        action: ask
      - tool: write_file
        action: allow
      - tool: fetch_url
        action: allow
  subagentPolicy:
    maxDepth: 3
    maxConcurrent: 5
  sandboxPolicy:
    required: false
    maxCPU: "4"
    maxMemory: 8Gi
  networkPolicy:
    denyAll: false
    allowDNS: true
    allowEventBus: true
  featureGates:
    browser-automation: false
    code-execution: true
    file-access: true
    sub-agents: true
