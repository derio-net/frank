# ComfyUI diffusion model server on gpu-1
# Starts at 0 replicas — activate via GPU Switcher
apiVersion: apps/v1
kind: Deployment
metadata:
  name: comfyui
  namespace: comfyui
  labels:
    app.kubernetes.io/name: comfyui
    app.kubernetes.io/component: server
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: comfyui
      app.kubernetes.io/component: server
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: comfyui
        app.kubernetes.io/component: server
    spec:
      nodeSelector:
        kubernetes.io/hostname: gpu-1
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      securityContext:
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
      containers:
        - name: comfyui
          image: ghcr.io/derio-net/comfyui:comfyui-v0.3.10-pt2.10.0-cu128
          ports:
            - name: http
              containerPort: 8188
              protocol: TCP
          resources:
            requests:
              cpu: 4000m
              memory: 16Gi
              nvidia.com/gpu: "1"
            limits:
              memory: 24Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: models
              mountPath: /app/models
            - name: custom-nodes
              mountPath: /app/custom_nodes
          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: comfyui-models
        - name: custom-nodes
          persistentVolumeClaim:
            claimName: comfyui-custom-nodes
