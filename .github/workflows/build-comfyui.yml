name: Build ComfyUI Image

on:
  push:
    branches: [main]
    paths:
      - "apps/comfyui/docker/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/comfyui
  COMFYUI_REF: "v0.24.0"
  MANAGER_REF: "4.0.5"
  PYTORCH_VERSION: "2.10.0"
  TORCHVISION_VERSION: "0.25.0"
  CUDA_VERSION_PIP: "cu128"
  # stoa image revision — bump to move the image tag (and the Deployment pin)
  # together so a rebuild redeploys. Node refs are pinned to commit SHAs (these
  # repos publish no release tags) for reproducibility.
  # rev 2: pin torchaudio==torch (was resolving 2.11.0 vs torch 2.10.0, breaking
  #        libtorchaudio -> audio nodes + WanVideoWrapper + FishSpeech failed to load).
  # rev 3: patch ComfyUI-LTXVideo's kornia `pad` import (kornia 0.8.3 dropped it);
  #        pre-create FishSpeech's site-packages .pth as comfyui-owned.
  # rev 4: bump ComfyUI core v0.9.2 -> v0.24.0 (v0.23.0 fixed two LTX audio-video
  #        correctness bugs; v0.24.x adds NVFP4 weight-loading for the LTX-2.3
  #        dev NVFP4 checkpoint). Custom-node SHAs unchanged.
  # rev 5: version-gate the entrypoint node-seed (seed-if-absent let a stale
  #        unpatched ComfyUI-LTXVideo shadow the rev-3 kornia patch in the PVC,
  #        breaking imports after the v0.24 kornia 0.8.3 bump). This bump's only
  #        purpose is to trigger the one-time PVC re-seed.
  STOA_NODES: "5"
  LTXVIDEO_REF: "229437c6b65796d6a7a63ae34be2bd5ba31fa543"
  GGUF_REF: "6ea2651e7df66d7585f6ffee804b20e92fb38b8a"
  WANVIDEO_REF: "088128b224242e110d3906c6750e9a3a348a659b"
  KOKORO_REF: "cfb59b5605b351e196182c836f0b48c1a784e52f"
  FISHSPEECH_REF: "6d6cd7c0b00f07a057d9b799eeca80866a0d5ff7"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker image prune --all --force
          df -h /

      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/comfyui/docker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:comfyui-${{ env.COMFYUI_REF }}-pt${{ env.PYTORCH_VERSION }}-${{ env.CUDA_VERSION_PIP }}-stoa${{ env.STOA_NODES }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            COMFYUI_REF=${{ env.COMFYUI_REF }}
            MANAGER_REF=${{ env.MANAGER_REF }}
            PYTORCH_VERSION=${{ env.PYTORCH_VERSION }}
            TORCHVISION_VERSION=${{ env.TORCHVISION_VERSION }}
            CUDA_VERSION_PIP=${{ env.CUDA_VERSION_PIP }}
            STOA_NODES=${{ env.STOA_NODES }}
            LTXVIDEO_REF=${{ env.LTXVIDEO_REF }}
            GGUF_REF=${{ env.GGUF_REF }}
            WANVIDEO_REF=${{ env.WANVIDEO_REF }}
            KOKORO_REF=${{ env.KOKORO_REF }}
            FISHSPEECH_REF=${{ env.FISHSPEECH_REF }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
