name: Build ai-alert-helper

on:
  push:
    branches: [main]
    paths:
      - "apps/ai-alert-helper/src/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/ai-alert-helper/src
          push: true
          tags: |
            ghcr.io/derio-net/ai-alert-helper:0.2.0
            ghcr.io/derio-net/ai-alert-helper:latest
