name: Deploy Blog

on:
  push:
    branches: [main]
    paths:
      - "blog/**"
  workflow_dispatch:

concurrency:
  group: "blog-deploy"
  cancel-in-progress: false

jobs:
  # Keep GitHub Pages deployment during transition
  build-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@75d2e84710de30f6ff7268e08f310b60ef14033f # v3.0.0
        with:
          hugo-version: "0.157.0"
          extended: true

      - name: Build
        working-directory: blog
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: blog/public

  deploy-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-pages
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Build container image for Hop and update deployment manifest
  build-container:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push blog image
        uses: docker/build-push-action@v6
        with:
          context: blog
          push: true
          tags: |
            ghcr.io/derio-net/blog:latest
            ghcr.io/derio-net/blog:${{ github.sha }}

      - name: Update deployment manifest with new image tag
        run: |
          sed -i "s|image: ghcr.io/derio-net/blog:.*|image: ghcr.io/derio-net/blog:$IMAGE_SHA  # updated by CI — do not pin manually|" \
            clusters/hop/apps/blog/manifests/deployment.yaml
        env:
          IMAGE_SHA: ${{ github.sha }}

      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add clusters/hop/apps/blog/manifests/deployment.yaml
          # Only commit if the file actually changed
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci(blog): update image to ${IMAGE_SHA:0:7}"
          git push
        env:
          IMAGE_SHA: ${{ github.sha }}
