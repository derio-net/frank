name: Bump agent image SHAs

on:
  repository_dispatch:
    types: [agent-images-bumped]
  workflow_dispatch:
    inputs:
      agent_images_sha:
        description: agent-images commit SHA to bump to
        required: true

permissions:
  contents: write
  pull-requests: write
  packages: read

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve SHAs
        id: shas
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPATCH_SHA: ${{ github.event.client_payload.agent_images_sha }}
          INPUT_SHA: ${{ inputs.agent_images_sha }}
        run: |
          AI_SHA="${DISPATCH_SHA:-$INPUT_SHA}"
          if ! [[ "$AI_SHA" =~ ^[a-f0-9]{7,40}$ ]]; then
            echo "::error::Invalid agent_images_sha: must be 7-40 hex chars"
            exit 1
          fi

          # vk-remote: resolve latest tag from GHCR (7-char short SHA from metadata-action)
          VKR_SHA=$(gh api /orgs/derio-net/packages/container/vk-remote/versions \
            --jq '.[0].metadata.container.tags[] | select(. != "latest")' 2>/dev/null || true)

          # Capture the CURRENT (pre-bump) agent-images pin BEFORE the next step's
          # sed overwrites it — render_bump_body.py diffs old...new for the body.
          OLD_AI_SHA=$(grep -oE 'secure-agent-kali:[a-f0-9]+' \
            apps/secure-agent-pod/manifests/deployment.yaml | head -1 | cut -d: -f2)

          echo "ai_sha=$AI_SHA"         >> "$GITHUB_OUTPUT"
          echo "vkr_sha=$VKR_SHA"       >> "$GITHUB_OUTPUT"
          echo "old_ai_sha=$OLD_AI_SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved: OLD_AI_SHA=$OLD_AI_SHA AI_SHA=$AI_SHA VKR_SHA=$VKR_SHA"

      - name: Update manifests
        env:
          AI_SHA: ${{ steps.shas.outputs.ai_sha }}
          VKR_SHA: ${{ steps.shas.outputs.vkr_sha }}
        run: |
          # Every image built from the agent-images repo rides the SAME commit
          # SHA (CI builds them all from one commit). Bump EVERY pin of each
          # across apps/ — no per-file allowlist, so a new app pinning any of
          # them is covered automatically (the old hardcoded sed list silently
          # skipped alert-agent / n8n-01 / hermes-agent-shell). Keep this list in
          # sync with agent-images' build matrix; the Verify-coverage step below
          # fails loudly if a pinned agent-image is missing here, and
          # scripts/tests/test_agent_images_bump_coverage.py guards it locally.
          # `{ grep || true; }` so a listed-but-unpinned image (e.g. infra-shell)
          # — grep exit 1 — doesn't trip `bash -eo pipefail`; `xargs -r` no-ops on
          # empty input.
          AGENT_IMAGES="secure-agent-kali vk-local paperclip-shell ruflo-server ruflo-shell multi-agent-shell hermes-agent-shell hermes-agent-shell-ssh infra-shell"
          for img in $AGENT_IMAGES; do
            { grep -rlZ "ghcr.io/derio-net/$img:[a-f0-9]" apps/ 2>/dev/null || true; } \
              | xargs -0 -r sed -i "s|ghcr.io/derio-net/$img:[a-f0-9]\+|ghcr.io/derio-net/$img:$AI_SHA|g"
          done

          # vk-remote rides a DIFFERENT build (separate repo) → its own SHA.
          if [ -n "$VKR_SHA" ]; then
            { grep -rlZ "ghcr.io/derio-net/vk-remote:" apps/ 2>/dev/null || true; } \
              | xargs -0 -r sed -i "s|ghcr.io/derio-net/vk-remote:[a-zA-Z0-9._-]\+|ghcr.io/derio-net/vk-remote:$VKR_SHA|g"
          else
            echo "::warning::Could not resolve vk-remote SHA — skipping vk-remote bump"
          fi

      - name: Verify coverage
        env:
          AI_SHA: ${{ steps.shas.outputs.ai_sha }}
        run: |
          # Guard against a NEW app pinning an agent-image the AGENT_IMAGES list
          # above does not cover (the silent-skip bug that stranded alert-agent /
          # n8n-01 / hermes-agent-shell). After the bump, every 40-hex
          # ghcr.io/derio-net/* pin in apps/ must equal AI_SHA — any other value
          # is an uncovered agent-image. vk-remote uses a short tag (not 40-hex)
          # so it is out of scope; `blog` is built by frank, not agent-images.
          stale=$(grep -rEo "ghcr.io/derio-net/[a-z0-9-]+:[a-f0-9]{40}" apps/ \
                    | grep -vE ":${AI_SHA}\$" \
                    | grep -vE "derio-net/blog:" || true)
          if [ -n "$stale" ]; then
            echo "::error::agent-image pin(s) not bumped to ${AI_SHA} — add the image name to AGENT_IMAGES in .github/workflows/agent-images-bump.yml:"
            printf '%s\n' "$stale" | sort -u
            exit 1
          fi
          echo "coverage OK: all agent-image pins in apps/ are at ${AI_SHA}"

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_SHA: ${{ steps.shas.outputs.ai_sha }}
          VKR_SHA: ${{ steps.shas.outputs.vkr_sha }}
          OLD_AI_SHA: ${{ steps.shas.outputs.old_ai_sha }}
        run: |
          git config user.name  "clawdia-bumper[bot]"
          git config user.email "clawdia-bumper[bot]@users.noreply.github.com"

          # Include both SHAs so a new VKR_SHA with unchanged AI_SHA (or vice
          # versa) produces a distinct branch — avoids collisions with the
          # merged-but-not-deleted branches from earlier dispatches.
          BRANCH="bump/agent-images-${AI_SHA:0:7}"
          if [ -n "$VKR_SHA" ]; then
            BRANCH="${BRANCH}-vkr-${VKR_SHA:0:7}"
          fi

          if git diff --quiet; then
            echo "No changes to bump."
            exit 0
          fi

          # If a PR is already open for this exact SHA pair, nothing to do.
          OPEN_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -n "$OPEN_PR" ]; then
            echo "Open PR #$OPEN_PR already covers $BRANCH — skipping."
            exit 0
          fi

          git checkout -b "$BRANCH"

          git add apps/
          if [ -n "$VKR_SHA" ]; then
            git commit -m "chore(agents): bump agent-images to ${AI_SHA:0:7}, vk-remote to ${VKR_SHA:0:7}"
          else
            git commit -m "chore(agents): bump agent-images to ${AI_SHA:0:7}"
          fi

          # Enriched body: names the upstream agent-images PR(s) + a summary.
          # Best-effort — render_bump_body.py falls back to the two-line body if
          # the agent-images gh-api lookup fails, so the PR always opens.
          BODY=$(python3 scripts/render_bump_body.py \
            --old "$OLD_AI_SHA" --new "$AI_SHA" --vkr "$VKR_SHA")

          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "chore(agents): bump agent-images + vk-remote" \
            --body "$BODY"
