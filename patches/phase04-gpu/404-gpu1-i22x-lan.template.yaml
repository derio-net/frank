## TEMPLATE ONLY: do not apply this file directly.
##
## Purpose: move gpu-1's stable node address (192.168.55.31/24) from the
## damaged onboard Realtek r8169 NIC to the replacement PCIe I22X-LAN card.
##
## Operator flow:
##   1. Install the I22X-LAN card and leave the onboard Realtek port unplugged.
##   2. Discover the new card MAC from Talos/Omni.
##   3. Copy this file to `404-gpu1-i22x-lan.yaml`.
##   4. Replace `<I22X_MAC_ADDRESS>` with the discovered MAC.
##   5. Verify the default gateway is still 192.168.55.1, or adjust it to the
##      live LAN gateway before applying.
##   6. Apply the concrete file with `omnictl apply -f`.
##
## Binding by MAC is deliberate: PCIe slot topology can change Linux interface
## names, but the replacement NIC's hardware address is stable.
metadata:
    namespace: default
    type: ConfigPatches.omni.sidero.dev
    id: 404-gpu1-i22x-lan
    labels:
        omni.sidero.dev/cluster: frank
        omni.sidero.dev/cluster-machine: 03ff0210-04e0-05b0-ab06-300700080009
spec:
    data: |
        machine:
            network:
                interfaces:
                    - deviceSelector:
                          hardwareAddr: "<I22X_MAC_ADDRESS>"
                      dhcp: false
                      addresses:
                          - 192.168.55.31/24
                      routes:
                          - network: 0.0.0.0/0
                            gateway: 192.168.55.1
