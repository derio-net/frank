# SOPS-encrypt before committing:
#   sops --encrypt --in-place secrets/kali/ssh-keys.yaml
# Apply to cluster:
#   sops --decrypt secrets/kali/ssh-keys.yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: kali-ssh-keys
  namespace: kali-system
type: Opaque
stringData:
  authorized_keys: |
    ssh-ed25519 REPLACE_WITH_YOUR_PUBLIC_KEY user@machine
